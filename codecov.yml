# Codecov configuration
# Docs: https://docs.codecov.com/docs/codecovyml-reference

codecov:
  notify:
    # Wait for explicit send-notifications from CI rather than firing after
    # the first upload. Prevents premature status checks when both Go and
    # frontend jobs run, and avoids waiting forever when one is skipped.
    manual_trigger: true

# Exclude code with no unit-testable logic so the percentage reflects testable
# surface rather than irreducible scaffolding. Generated code (*.pb.go, gqlgen
# output) is already stripped from the profile by the `coverage` make target.
# Kept IN deliberately: demo generators, resolvers, and MCP tools all carry real
# logic and are covered by tests instead of ignored.
ignore:
  - "**/cmd/*/main.go" # service entrypoints: flag parsing, wiring, signal handling
  - "cli/main.go" # CLI entrypoint
  - "pkg/testutil" # test-only helpers (mocks, fixtures, JWT/WS test rigs)

coverage:
  status:
    default_rules:
      # When a flag's CI job is skipped (no relevant file changes), auto-pass
      # its status check instead of leaving it pending or using stale data.
      flag_coverage_not_uploaded_behavior: pass
    project:
      go:
        target: auto
        threshold: 5%
        flags:
          - go
        informational: true
      frontend:
        target: auto
        threshold: 5%
        flags:
          - frontend
        informational: true
    patch:
      go:
        target: 50%
        flags:
          - go
        informational: true
      frontend:
        target: 50%
        flags:
          - frontend
        informational: true

comment:
  layout: "condensed_header, condensed_files, condensed_footer"
  behavior: default
  require_changes: true
  show_carryforward_flags: true

flags:
  go:
    paths:
      - "**/*.go"
    carryforward: true
  frontend:
    paths:
      - "**/*.ts"
      - "**/*.tsx"
      - "**/*.svelte"
    carryforward: true
