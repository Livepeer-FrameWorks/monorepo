name: Feature Request
description: Suggest a new feature or enhancement
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this solve?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How should this work?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: What other approaches did you consider?
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Streaming / Media
        - API / GraphQL
        - Billing / Payments
        - Analytics
        - Federation / Multi-cluster
        - Edge Deployment
        - DNS / Certificates
        - Security
        - SDK (Player)
        - SDK (StreamCrafter)
        - CLI
        - Documentation
        - Other
    validations:
      required: true
