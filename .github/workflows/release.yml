name: Release Platform

on:
  push:
    tags:
      - "v*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  REGISTRY: ghcr.io/livepeer-frameworks
  GOFLAGS: -tags=nomsgpack

jobs:
  define-release-components:
    name: Define Release Components
    needs: [release-plan]
    runs-on: ubuntu-latest
    outputs:
      image_matrix: ${{ steps.components.outputs.image_matrix }}
      webapp_matrix: ${{ steps.components.outputs.webapp_matrix }}
    steps:
      - uses: actions/checkout@v7
      - name: Download release-plan decision
        uses: actions/download-artifact@v8
        with:
          name: release-plan
          path: dist
      - id: components
        run: |
          set -euo pipefail
          shopt -s nullglob
          COMPONENTS_FILE=".github/release-components.json"
          # Keep full matrices so downstream jobs are never skipped by an
          # empty matrix. Individual build steps inspect release-plan and
          # skip expensive work for carry-forward components.
          image_matrix=$(jq -c '{service:[.services[] | select(.dockerfile != null) | {name, context, dockerfile}]}' "$COMPONENTS_FILE")
          webapp_matrix=$(jq -c '{webapp:.webapps}' "$COMPONENTS_FILE")
          echo "image_matrix=${image_matrix}" >> "$GITHUB_OUTPUT"
          echo "webapp_matrix=${webapp_matrix}" >> "$GITHUB_OUTPUT"
          echo "Image matrix:" >&2
          echo "${image_matrix}" | jq '.service | map(.name)' >&2
          echo "Webapp matrix:" >&2
          echo "${webapp_matrix}" | jq '.webapp | map(.name)' >&2

  # ---------------------------------------------------------------------------
  # release-plan: compute per-component source-hash + carry-forward decisions
  # against the most recent on-track baseline release. Uploads the decision
  # JSON as an artifact the build, merge, and manifest jobs consume to skip
  # rebuilds and stamp source_hash on every manifest entry.
  # See docs/architecture/build-and-packaging.md for the recipe.
  # ---------------------------------------------------------------------------
  release-plan:
    name: Release Plan (source-hash, carry-forward)
    runs-on: ubuntu-latest
    outputs:
      baseline_tag: ${{ steps.plan.outputs.baseline_tag }}
      build_count: ${{ steps.plan.outputs.build_count }}
      carry_forward_count: ${{ steps.plan.outputs.carry_forward_count }}
    steps:
      - name: Checkout monorepo
        uses: actions/checkout@v7
      - name: Generate GitOps token
        id: gitops_app_token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ vars.GITOPS_APP_ID }}
          private-key: ${{ secrets.GITOPS_APP_PRIVATE_KEY }}
          repositories: gitops
      - name: Checkout GitOps repo (read-only, for baseline lookup)
        uses: actions/checkout@v7
        with:
          repository: Livepeer-FrameWorks/gitops
          token: ${{ steps.gitops_app_token.outputs.token }}
          path: gitops
          fetch-depth: 1
      - uses: actions/setup-go@v7
        with:
          go-version-file: .go-version
          cache-dependency-path: tools/release-plan/go.sum
        env:
          GOTOOLCHAIN: local
      - name: Run release-plan
        id: plan
        run: |
          set -euo pipefail
          mkdir -p dist
          cd tools/release-plan
          go run . \
            --monorepo "${GITHUB_WORKSPACE}" \
            --gitops "${GITHUB_WORKSPACE}/gitops" \
            --tag "${{ github.ref_name }}" \
            --out "${GITHUB_WORKSPACE}/dist/release-plan.json"
          # Surface key counts to the workflow summary.
          jq -r '"baseline_tag=\(.baseline_tag // "")"' "${GITHUB_WORKSPACE}/dist/release-plan.json" >> "$GITHUB_OUTPUT"
          jq -r '"build_count=\(.summary.build_count)"' "${GITHUB_WORKSPACE}/dist/release-plan.json" >> "$GITHUB_OUTPUT"
          jq -r '"carry_forward_count=\(.summary.carry_forward_count)"' "${GITHUB_WORKSPACE}/dist/release-plan.json" >> "$GITHUB_OUTPUT"
          {
            echo "### Release plan"
            echo ""
            jq -r '"- Platform: \(.platform_version) (track \(.track))\n- Baseline: \(.baseline_tag // "none")\n- Build: \(.summary.build_count)\n- Carry-forward: \(.summary.carry_forward_count)"' "${GITHUB_WORKSPACE}/dist/release-plan.json"
            echo ""
            echo "<details><summary>Per-component decisions</summary>"
            echo ""
            echo '```json'
            jq '.decisions | map_values({action, source_hash, baseline_source_hash, baseline_tag})' "${GITHUB_WORKSPACE}/dist/release-plan.json"
            echo '```'
            echo ""
            echo "</details>"
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Upload release-plan artifact
        uses: actions/upload-artifact@v7
        with:
          name: release-plan
          path: dist/release-plan.json

  # ---------------------------------------------------------------------------
  # Service Docker images — split amd64 (ubuntu) + arm64 (native self-hosted)
  # ---------------------------------------------------------------------------
  build-images-amd64:
    name: Build Images (amd64)
    needs: [define-release-components]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.define-release-components.outputs.image_matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Download release-plan decision
        uses: actions/download-artifact@v8
        with:
          name: release-plan
          path: dist

      - name: Check release-plan decision
        id: plan
        run: |
          action=$(jq -r --arg n "${{ matrix.service.name }}" '.decisions[$n].action // "build"' dist/release-plan.json)
          echo "action=${action}" >> "$GITHUB_OUTPUT"
          echo "${{ matrix.service.name }} action=${action}"

      - name: Set up Docker Buildx
        if: ${{ steps.plan.outputs.action == 'build' }}
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        if: ${{ steps.plan.outputs.action == 'build' }}
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to DockerHub
        if: ${{ steps.plan.outputs.action == 'build' }}
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Read service component version
        if: ${{ steps.plan.outputs.action == 'build' }}
        id: svcver
        run: |
          # Webapps keep their npm-aligned semver in package.json; Go services
          # ship in lockstep with the platform tag, so we use github.ref_name.
          PACKAGE_JSON="${{ matrix.service.context }}/package.json"
          if [[ -f "$PACKAGE_JSON" ]]; then
            echo "version=$(jq -r .version "$PACKAGE_JSON")" >> "$GITHUB_OUTPUT"
          else
            echo "version=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build & push ${{ matrix.service.name }} (amd64)
        if: ${{ steps.plan.outputs.action == 'build' }}
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.service.dockerfile }}
          platforms: linux/amd64
          push: true
          provenance: true
          sbom: true
          build-args: |
            VERSION=${{ github.ref_name }}
            GIT_COMMIT=${{ github.sha }}
            BUILD_DATE=${{ github.event.repository.updated_at }}
            COMPONENT_NAME=${{ matrix.service.name }}
            COMPONENT_VERSION=${{ steps.svcver.outputs.version }}
          tags: |
            ${{ env.REGISTRY }}/frameworks-${{ matrix.service.name }}:${{ github.ref_name }}-amd64
            livepeerframeworks/frameworks-${{ matrix.service.name }}:${{ github.ref_name }}-amd64
          cache-from: type=gha,scope=${{ matrix.service.name }}-amd64
          cache-to: type=gha,mode=max,ignore-error=true,scope=${{ matrix.service.name }}-amd64

      - name: Write digest artifact
        if: ${{ steps.plan.outputs.action == 'build' }}
        run: |
          mkdir -p dist
          cat > dist/arch-digest-${{ matrix.service.name }}-amd64.json <<JSON
          {
            "name": "${{ matrix.service.name }}",
            "digest": "${{ steps.build.outputs.digest }}",
            "service_version": "${{ github.ref_name }}"
          }
          JSON

      - name: Write carry-forward placeholder
        if: ${{ steps.plan.outputs.action != 'build' }}
        run: |
          mkdir -p dist
          echo "${{ matrix.service.name }} carry_forward" > dist/skip-${{ matrix.service.name }}-amd64.txt

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: arch-digest-${{ matrix.service.name }}-amd64
          path: dist/*

  build-images-arm64:
    name: Build Images (arm64)
    needs: [define-release-components]
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.define-release-components.outputs.image_matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Download release-plan decision
        uses: actions/download-artifact@v8
        with:
          name: release-plan
          path: dist

      - name: Check release-plan decision
        id: plan
        run: |
          action=$(jq -r --arg n "${{ matrix.service.name }}" '.decisions[$n].action // "build"' dist/release-plan.json)
          echo "action=${action}" >> "$GITHUB_OUTPUT"
          echo "${{ matrix.service.name }} action=${action}"

      - name: Set up Docker Buildx
        if: ${{ steps.plan.outputs.action == 'build' }}
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        if: ${{ steps.plan.outputs.action == 'build' }}
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to DockerHub
        if: ${{ steps.plan.outputs.action == 'build' }}
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Read service component version
        if: ${{ steps.plan.outputs.action == 'build' }}
        id: svcver
        run: |
          # Webapps keep their npm-aligned semver in package.json; Go services
          # ship in lockstep with the platform tag, so we use github.ref_name.
          PACKAGE_JSON="${{ matrix.service.context }}/package.json"
          if [[ -f "$PACKAGE_JSON" ]]; then
            echo "version=$(jq -r .version "$PACKAGE_JSON")" >> "$GITHUB_OUTPUT"
          else
            echo "version=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build & push ${{ matrix.service.name }} (arm64)
        if: ${{ steps.plan.outputs.action == 'build' }}
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.service.dockerfile }}
          platforms: linux/arm64
          push: true
          provenance: true
          sbom: true
          build-args: |
            VERSION=${{ github.ref_name }}
            GIT_COMMIT=${{ github.sha }}
            BUILD_DATE=${{ github.event.repository.updated_at }}
            COMPONENT_NAME=${{ matrix.service.name }}
            COMPONENT_VERSION=${{ steps.svcver.outputs.version }}
          tags: |
            ${{ env.REGISTRY }}/frameworks-${{ matrix.service.name }}:${{ github.ref_name }}-arm64
            livepeerframeworks/frameworks-${{ matrix.service.name }}:${{ github.ref_name }}-arm64
          cache-from: type=gha,scope=${{ matrix.service.name }}-arm64
          cache-to: type=gha,mode=max,ignore-error=true,scope=${{ matrix.service.name }}-arm64

      - name: Write digest artifact
        if: ${{ steps.plan.outputs.action == 'build' }}
        run: |
          mkdir -p dist
          cat > dist/arch-digest-${{ matrix.service.name }}-arm64.json <<JSON
          {
            "name": "${{ matrix.service.name }}",
            "digest": "${{ steps.build.outputs.digest }}",
            "service_version": "${{ github.ref_name }}"
          }
          JSON

      - name: Write carry-forward placeholder
        if: ${{ steps.plan.outputs.action != 'build' }}
        run: |
          mkdir -p dist
          echo "${{ matrix.service.name }} carry_forward" > dist/skip-${{ matrix.service.name }}-arm64.txt

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: arch-digest-${{ matrix.service.name }}-arm64
          path: dist/*

  # Merge per-arch images into multi-arch manifests
  merge-image-manifests:
    name: Merge Image Manifests
    needs: [define-release-components, build-images-amd64, build-images-arm64]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Download release-plan decision
        uses: actions/download-artifact@v8
        with:
          name: release-plan
          path: dist

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to DockerHub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Download amd64 digests
        uses: actions/download-artifact@v8
        with:
          pattern: arch-digest-*-amd64
          path: dist/
          merge-multiple: true

      - name: Download arm64 digests
        uses: actions/download-artifact@v8
        with:
          pattern: arch-digest-*-arm64
          path: dist/
          merge-multiple: true

      - name: Create multi-arch manifests
        run: |
          set -euo pipefail
          TAG="${{ github.ref_name }}"
          COMPONENTS_FILE=".github/release-components.json"
          PLAN_FILE="dist/release-plan.json"
          shopt -s nullglob
          mkdir -p final
          jq -r '.services[] | select(.dockerfile != null) | .name' "$COMPONENTS_FILE" | while read -r SVC; do
            action=$(jq -r --arg n "$SVC" '.decisions[$n].action // "build"' "$PLAN_FILE")
            if [[ "$action" == "carry_forward" ]]; then
              echo "==> Skipping multi-arch manifest for ${SVC}: carry_forward"
              continue
            fi
            GHCR="${{ env.REGISTRY }}/frameworks-${SVC}"
            DH="livepeerframeworks/frameworks-${SVC}"

            TRACK=""
            case "${TAG}" in
              *-beta*) TRACK="beta" ;;
              *-rc*)   TRACK="rc" ;;
              v[0-9]*) TRACK="latest" ;;
            esac

            GHCR_TAGS=("-t" "${GHCR}:${TAG}")
            DH_TAGS=("-t" "${DH}:${TAG}")
            if [[ -n "${TRACK}" ]]; then
              GHCR_TAGS+=("-t" "${GHCR}:${TRACK}")
              DH_TAGS+=("-t" "${DH}:${TRACK}")
            fi

            docker buildx imagetools create \
              "${GHCR_TAGS[@]}" \
              "${GHCR}:${TAG}-amd64" \
              "${GHCR}:${TAG}-arm64"

            docker buildx imagetools create \
              "${DH_TAGS[@]}" \
              "${DH}:${TAG}-amd64" \
              "${DH}:${TAG}-arm64"

            GHCR_DIGEST="sha256:$(docker buildx imagetools inspect "${GHCR}:${TAG}" --raw | sha256sum | cut -d' ' -f1)"
            DH_DIGEST="sha256:$(docker buildx imagetools inspect "${DH}:${TAG}" --raw | sha256sum | cut -d' ' -f1)"
            SVCVER=$(jq -r .service_version "dist/arch-digest-${SVC}-amd64.json")

            cat > "final/image-${SVC}.json" <<JSON
          {
            "name": "${SVC}",
            "image": "${DH}:${TAG}",
            "digest": "${DH_DIGEST}",
            "dockerhub_image": "${DH}:${TAG}",
            "dockerhub_digest": "${DH_DIGEST}",
            "ghcr_image": "${GHCR}:${TAG}",
            "ghcr_digest": "${GHCR_DIGEST}",
            "service_version": "${SVCVER}",
            "git_commit": "${{ github.sha }}"
          }
          JSON
          done
          touch final/keep.txt

      - name: Upload merged digests
        uses: actions/upload-artifact@v7
        with:
          name: image-digest-services
          path: final/*

  # ---------------------------------------------------------------------------
  # Single-image edge container (helmsman + MistServer + Caddy under s6).
  # Consumes the SAME pinned native tarballs as bare-metal installs (staged by
  # edge/stage-dist.sh) so in-place component updates inside the container are
  # byte-identical to native updates. Built per-arch, merged, and emitted into
  # the manifest services list as "edge".
  # ---------------------------------------------------------------------------
  # MistServer's latest release is resolved ONCE here and consumed by both
  # edge-image arch builds and the manifest job, so the baked Mist version
  # can never diverge from the manifest pin (or between architectures) if a
  # Mist release lands mid-workflow.
  resolve-mistserver:
    name: Resolve MistServer Release
    runs-on: ubuntu-latest
    steps:
      - name: Generate release metadata GitHub App token
        id: mist-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ vars.GITOPS_APP_ID }}
          private-key: ${{ secrets.GITOPS_APP_PRIVATE_KEY }}
          repositories: mistserver

      - name: Fetch latest MistServer release metadata
        env:
          GH_APP_TOKEN: ${{ steps.mist-token.outputs.token }}
        run: |
          set -euo pipefail
          mkdir -p dist
          curl -fsSL \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_APP_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/Livepeer-FrameWorks/mistserver/releases/latest \
            > dist/mistserver-release.json
          jq -re '.tag_name' dist/mistserver-release.json

      # Publicly downloadable asset URLs are a platform contract, not a CI
      # convenience: edge nodes fetch these SAME browser_download_urls
      # without credentials (ansible get_url on native installs, helmsman's
      # in-place updater inside containers). If this probe fails, fix the
      # mistserver repo/release visibility — do NOT paper over it with a
      # token here, or every edge self-update breaks instead.
      - name: Assert release assets are publicly downloadable
        run: |
          set -euo pipefail
          URL=$(jq -re '[.assets[] | select((.name | startswith("mistserver-linux-")) and (.name | endswith(".tar.gz")))][0].browser_download_url' dist/mistserver-release.json)
          curl -fsSLI -o /dev/null "$URL"
          echo "Asset publicly reachable: ${URL}"

      # stage-dist hard-requires checksums (no --allow-unverified in CI) and
      # native provisioning refuses checksum-less Mist artifacts on every
      # platform (edgeExternalBinary), so ANY runtime tarball missing
      # GitHub's computed digest — darwin included — must fail HERE at
      # resolution, not late in image builds or at provision time.
      - name: Assert runtime tarballs carry digests
        run: |
          set -euo pipefail
          MISSING=$(jq -r '[.assets[] | select((.name | startswith("mistserver-")) and (.name | contains("-debug-") | not) and (.name | endswith(".tar.gz"))) | select((.digest // "") == "") | .name] | join(", ")' dist/mistserver-release.json)
          if [[ -n "$MISSING" ]]; then
            echo "MistServer runtime assets missing digests (re-upload so GitHub computes them): $MISSING" >&2
            exit 1
          fi
          echo "All runtime tarballs carry digests"

      - name: Upload MistServer release metadata
        uses: actions/upload-artifact@v7
        with:
          name: mistserver-release
          path: dist/mistserver-release.json

  build-edge-image:
    name: Build Edge Image (${{ matrix.arch }})
    needs:
      [release-plan, resolve-mistserver, build-service-binaries-amd64, build-service-binaries-arm64]
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Download release-plan decision
        uses: actions/download-artifact@v8
        with:
          name: release-plan
          path: dist

      - name: Download MistServer release metadata
        uses: actions/download-artifact@v8
        with:
          name: mistserver-release
          path: dist

      - name: Download service binary artifacts
        uses: actions/download-artifact@v8
        with:
          name: binary-all-linux-${{ matrix.arch }}
          path: dist/binaries

      # A carry-forward helmsman means the binaries job intentionally built
      # no fresh tarball; the image then bakes the carried artifact (same
      # bytes native nodes run) at its carried service_version so the
      # release reconciler sees converged versions.
      - name: Resolve helmsman artifact (build or carry-forward)
        id: helmsman
        run: |
          set -euo pipefail
          action=$(jq -r '.decisions.helmsman.action // "build"' dist/release-plan.json)
          if [[ "$action" == "carry_forward" ]]; then
            art=$(jq -ce --arg a "linux-${{ matrix.arch }}" \
              '.decisions.helmsman.carried_native_binary.artifacts[] | select(.arch == $a)' dist/release-plan.json)
            url=$(echo "$art" | jq -re .url)
            sum=$(echo "$art" | jq -re .checksum)
            file="dist/binaries/$(echo "$art" | jq -re .file)"
            mkdir -p dist/binaries
            curl -fsSL -o "$file" "$url"
            case "$sum" in
              sha256:*) echo "${sum#sha256:}  $file" | sha256sum -c - ;;
              sha512:*) echo "${sum#sha512:}  $file" | sha512sum -c - ;;
              *) echo "unsupported checksum format: $sum" >&2; exit 1 ;;
            esac
            version=$(jq -re '.decisions.helmsman.carried_service.service_version // .decisions.helmsman.baseline_tag' dist/release-plan.json)
            echo "Using carried-forward helmsman ${version} from ${url}"
          else
            file=$(ls dist/binaries/frameworks-helmsman-*-linux-${{ matrix.arch }}.tar.gz)
            version="${{ github.ref_name }}"
          fi
          echo "tar=${file}" >> "$GITHUB_OUTPUT"
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Resolve MistServer native tarball
        id: mist
        run: |
          set -euo pipefail
          TAG=$(jq -re '.tag_name' dist/mistserver-release.json)
          ASSET=$(jq -ce --arg arch "linux-${{ matrix.arch }}" \
            '[.assets[] | select((.name | startswith("mistserver-" + $arch + "-")) and (.name | contains("-debug-") | not) and (.name | endswith(".tar.gz")))][0]' \
            dist/mistserver-release.json)
          echo "url=$(echo "$ASSET" | jq -re .browser_download_url)" >> "$GITHUB_OUTPUT"
          echo "checksum=$(echo "$ASSET" | jq -r '.digest // ""')" >> "$GITHUB_OUTPUT"
          echo "version=${TAG}" >> "$GITHUB_OUTPUT"
          echo "Resolved MistServer ${TAG}: $(echo "$ASSET" | jq -r .name)"

      - name: Resolve pinned Caddy tarball
        id: caddy
        run: |
          set -euo pipefail
          python3 - "linux-${{ matrix.arch }}" <<'PY' >> "$GITHUB_OUTPUT"
          import sys, yaml
          arch = sys.argv[1]
          with open("config/infrastructure.yaml") as fh:
              data = yaml.safe_load(fh)
          caddy = next(e for e in data["infrastructure"] if e["name"] == "caddy")
          artifact = next(a for a in caddy["artifacts"] if a["arch"] == arch)
          print(f"url={artifact['url']}")
          print(f"checksum={artifact.get('checksum', '')}")
          print(f"version={caddy['version']}")
          PY

      - name: Stage edge dist
        run: |
          set -euo pipefail
          ./edge/stage-dist.sh \
            --arch ${{ matrix.arch }} \
            --helmsman-tar "${{ steps.helmsman.outputs.tar }}" \
            --helmsman-version "${{ steps.helmsman.outputs.version }}" \
            --mist-url "${{ steps.mist.outputs.url }}" \
            --mist-sha256 "${{ steps.mist.outputs.checksum }}" \
            --mist-version "${{ steps.mist.outputs.version }}" \
            --caddy-url "${{ steps.caddy.outputs.url }}" \
            --caddy-sha256 "${{ steps.caddy.outputs.checksum }}" \
            --caddy-version "${{ steps.caddy.outputs.version }}" \
            --config-schema-version "${{ github.ref_name }}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to DockerHub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & push edge image (${{ matrix.arch }})
        uses: docker/build-push-action@v7
        with:
          context: edge
          file: edge/Dockerfile
          platforms: linux/${{ matrix.arch }}
          push: true
          provenance: true
          sbom: true
          tags: |
            ${{ env.REGISTRY }}/frameworks-edge:${{ github.ref_name }}-${{ matrix.arch }}
            livepeerframeworks/frameworks-edge:${{ github.ref_name }}-${{ matrix.arch }}
          cache-from: type=gha,scope=edge-${{ matrix.arch }}
          cache-to: type=gha,mode=max,ignore-error=true,scope=edge-${{ matrix.arch }}

  merge-edge-image:
    name: Merge Edge Image Manifest
    needs: [build-edge-image]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to DockerHub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Create multi-arch edge manifest
        run: |
          set -euo pipefail
          TAG="${{ github.ref_name }}"
          GHCR="${{ env.REGISTRY }}/frameworks-edge"
          DH="livepeerframeworks/frameworks-edge"

          TRACK=""
          case "${TAG}" in
            *-beta*) TRACK="beta" ;;
            *-rc*)   TRACK="rc" ;;
            v[0-9]*) TRACK="latest" ;;
          esac

          GHCR_TAGS=("-t" "${GHCR}:${TAG}")
          DH_TAGS=("-t" "${DH}:${TAG}")
          if [[ -n "${TRACK}" ]]; then
            GHCR_TAGS+=("-t" "${GHCR}:${TRACK}")
            DH_TAGS+=("-t" "${DH}:${TRACK}")
          fi

          docker buildx imagetools create \
            "${GHCR_TAGS[@]}" \
            "${GHCR}:${TAG}-amd64" \
            "${GHCR}:${TAG}-arm64"

          docker buildx imagetools create \
            "${DH_TAGS[@]}" \
            "${DH}:${TAG}-amd64" \
            "${DH}:${TAG}-arm64"

          GHCR_DIGEST="sha256:$(docker buildx imagetools inspect "${GHCR}:${TAG}" --raw | sha256sum | cut -d' ' -f1)"
          DH_DIGEST="sha256:$(docker buildx imagetools inspect "${DH}:${TAG}" --raw | sha256sum | cut -d' ' -f1)"

          mkdir -p final
          cat > "final/image-edge.json" <<JSON
          {
            "name": "edge",
            "image": "${DH}:${TAG}",
            "digest": "${DH_DIGEST}",
            "dockerhub_image": "${DH}:${TAG}",
            "dockerhub_digest": "${DH_DIGEST}",
            "ghcr_image": "${GHCR}:${TAG}",
            "ghcr_digest": "${GHCR_DIGEST}",
            "service_version": "${TAG}",
            "git_commit": "${{ github.sha }}"
          }
          JSON

      - name: Upload edge digest
        uses: actions/upload-artifact@v7
        with:
          name: image-digest-edge
          path: final/*

  # ---------------------------------------------------------------------------
  # Webapp Docker images — split amd64 (ubuntu) + arm64 (native self-hosted)
  # ---------------------------------------------------------------------------
  build-webapps-amd64:
    name: Build Webapps (amd64)
    needs: [define-release-components]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.define-release-components.outputs.webapp_matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Download release-plan decision
        uses: actions/download-artifact@v8
        with:
          name: release-plan
          path: dist

      - name: Check release-plan decision
        id: plan
        run: |
          action=$(jq -r --arg n "${{ matrix.webapp.name }}" '.decisions[$n].action // "build"' dist/release-plan.json)
          echo "action=${action}" >> "$GITHUB_OUTPUT"
          echo "${{ matrix.webapp.name }} action=${action}"

      - name: Create GitOps app token
        if: ${{ steps.plan.outputs.action == 'build' }}
        id: gitops_app_token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ vars.GITOPS_APP_ID }}
          private-key: ${{ secrets.GITOPS_APP_PRIVATE_KEY }}
          repositories: gitops

      - name: Checkout GitOps config
        if: ${{ steps.plan.outputs.action == 'build' }}
        uses: actions/checkout@v7
        with:
          repository: Livepeer-FrameWorks/gitops
          token: ${{ steps.gitops_app_token.outputs.token }}
          path: env-repo
          sparse-checkout: |
            config/production.env
          sparse-checkout-cone-mode: false

      - name: Set up Go
        if: ${{ steps.plan.outputs.action == 'build' }}
        uses: actions/setup-go@v7
        with:
          go-version-file: .go-version
          cache: false
        env:
          GOTOOLCHAIN: local

      - name: Generate frontend build env
        if: ${{ steps.plan.outputs.action == 'build' }}
        id: frontend_env
        run: |
          set -euo pipefail
          cd scripts/env
          GOCACHE="$RUNNER_TEMP/go-build" go run . \
            --frontend-only \
            --context production \
            --base ../../config/env/base.env \
            --overlay ../../env-repo/config/production.env \
            --output "$RUNNER_TEMP/frontend.env"
          cd ../..

          set -a
          . "$RUNNER_TEMP/frontend.env"
          set +a

          {
            echo 'build_args<<EOF'
            echo 'BUILD_ENV=production'
            while IFS='=' read -r key _; do
              case "$key" in
                ""|\#*|ENV_CONTEXT|ENV_GENERATED_AT) continue ;;
              esac
              printf '%s=%s\n' "$key" "${!key}"
            done < "$RUNNER_TEMP/frontend.env"
            echo EOF
          } >> "$GITHUB_OUTPUT"

      - name: Setup Node.js + pnpm
        if: ${{ steps.plan.outputs.action == 'build' }}
        uses: ./.github/actions/setup-node-pnpm

      - name: Build player package
        if: ${{ steps.plan.outputs.action == 'build' }}
        run: |
          cd npm_player
          pnpm run build

      - name: Build studio package
        if: ${{ steps.plan.outputs.action == 'build' }}
        run: |
          cd npm_studio
          pnpm run build

      - name: Build application
        if: ${{ steps.plan.outputs.action == 'build' }}
        run: |
          set -a
          . "$RUNNER_TEMP/frontend.env"
          set +a
          cd ${{ matrix.webapp.context }}
          pnpm run build

      - name: Create static bundle
        if: ${{ steps.plan.outputs.action == 'build' }}
        run: |
          cd ${{ matrix.webapp.context }}
          tar czf ../${{ matrix.webapp.name }}-build.tar.gz ${{ matrix.webapp.build_dir }}/

      - name: Set up Docker Buildx
        if: ${{ steps.plan.outputs.action == 'build' }}
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        if: ${{ steps.plan.outputs.action == 'build' }}
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to DockerHub
        if: ${{ steps.plan.outputs.action == 'build' }}
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image (amd64)
        if: ${{ steps.plan.outputs.action == 'build' }}
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.webapp.context }}/Dockerfile
          platforms: linux/amd64
          push: true
          provenance: true
          sbom: true
          build-args: ${{ steps.frontend_env.outputs.build_args }}
          tags: |
            ${{ env.REGISTRY }}/frameworks-${{ matrix.webapp.name }}:${{ github.ref_name }}-amd64
            livepeerframeworks/frameworks-${{ matrix.webapp.name }}:${{ github.ref_name }}-amd64
          cache-from: type=gha,scope=${{ matrix.webapp.name }}-amd64
          cache-to: type=gha,mode=max,ignore-error=true,scope=${{ matrix.webapp.name }}-amd64

      - name: Write digest artifact
        if: ${{ steps.plan.outputs.action == 'build' }}
        run: |
          mkdir -p dist
          cat > dist/arch-digest-${{ matrix.webapp.name }}-amd64.json <<JSON
          {
            "name": "${{ matrix.webapp.name }}",
            "digest": "${{ steps.build.outputs.digest }}"
          }
          JSON

      - name: Write carry-forward placeholder
        if: ${{ steps.plan.outputs.action != 'build' }}
        run: |
          mkdir -p dist
          echo "${{ matrix.webapp.name }} carry_forward" > dist/skip-${{ matrix.webapp.name }}-amd64.txt

      - name: Upload digest artifact
        uses: actions/upload-artifact@v7
        with:
          name: arch-digest-${{ matrix.webapp.name }}-amd64
          path: dist/*

      - name: Upload static bundle artifact
        if: ${{ steps.plan.outputs.action == 'build' }}
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.webapp.name }}-bundle
          path: ${{ matrix.webapp.name }}-build.tar.gz

  build-webapps-arm64:
