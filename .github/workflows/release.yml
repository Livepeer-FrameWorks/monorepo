        run: |
          set -euo pipefail
          VERSION="${{ github.ref_name }}"
          BUILD_DATE="$(date -u '+%Y-%m-%dT%H:%M:%SZ')"
          mkdir -p dist/binaries

          SERVICES='[
            {"name":"bridge","context":"api_gateway","cmd":"./cmd/bridge","cgo":false},
            {"name":"quartermaster","context":"api_tenants","cmd":"./cmd/quartermaster","cgo":true},
            {"name":"commodore","context":"api_control","cmd":"./cmd/commodore","cgo":false},
            {"name":"purser","context":"api_billing","cmd":"./cmd/purser","cgo":false},
            {"name":"foghorn","context":"api_balancing","cmd":"./cmd/foghorn","cgo":true},
            {"name":"decklog","context":"api_firehose","cmd":"cmd/decklog/main.go","cgo":false},
            {"name":"periscope-ingest","context":"api_analytics_ingest","cmd":"./cmd/periscope","cgo":false},
            {"name":"periscope-query","context":"api_analytics_query","cmd":"./cmd/periscope","cgo":false},
            {"name":"signalman","context":"api_realtime","cmd":"./cmd/signalman","cgo":false},
            {"name":"helmsman","context":"api_sidecar","cmd":"./cmd/helmsman","cgo":false},
            {"name":"steward","context":"api_forms","cmd":"./cmd/steward","cgo":false},
            {"name":"navigator","context":"api_dns","cmd":"./cmd/navigator","cgo":false},
            {"name":"deckhand","context":"api_ticketing","cmd":"./cmd/deckhand","cgo":false},
            {"name":"privateer","context":"api_mesh","cmd":"./cmd/privateer","cgo":false},
            {"name":"skipper","context":"api_consultant","cmd":"./cmd/skipper","cgo":false},
            {"name":"chandler","context":"api_assets","cmd":"./cmd/chandler","cgo":false}
          ]'

          echo "$SERVICES" | jq -c '.[]' | while read -r svc; do
            name=$(echo "$svc" | jq -r .name)
            context=$(echo "$svc" | jq -r .context)
            cmd=$(echo "$svc" | jq -r .cmd)
            cgo=$(echo "$svc" | jq -r .cgo)

            echo "==> Building ${name} (linux/amd64)"

            if [[ -f "${context}/VERSION" ]]; then
              svcver=$(tr -d '\n' < "${context}/VERSION")
