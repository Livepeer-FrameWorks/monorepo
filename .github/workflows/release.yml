name: Release Platform

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write # create release, upload assets
  packages: write # push images to GHCR

env:
  REGISTRY: ghcr.io/livepeer-frameworks

jobs:
  # ---------------------------------------------------------------------------
  # Service Docker images — split amd64 (ubuntu) + arm64 (native self-hosted)
  # ---------------------------------------------------------------------------
  build-images-amd64:
    name: Build Images (amd64)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - { name: bridge, context: api_gateway, dockerfile: api_gateway/Dockerfile }
          - { name: quartermaster, context: api_tenants, dockerfile: api_tenants/Dockerfile }
          - { name: commodore, context: api_control, dockerfile: api_control/Dockerfile }
          - { name: purser, context: api_billing, dockerfile: api_billing/Dockerfile }
          - { name: foghorn, context: api_balancing, dockerfile: api_balancing/Dockerfile }
          - { name: decklog, context: api_firehose, dockerfile: api_firehose/Dockerfile }
          - {
              name: periscope-ingest,
              context: api_analytics_ingest,
              dockerfile: api_analytics_ingest/Dockerfile,
            }
          - {
              name: periscope-query,
              context: api_analytics_query,
              dockerfile: api_analytics_query/Dockerfile,
            }
          - { name: signalman, context: api_realtime, dockerfile: api_realtime/Dockerfile }
          - { name: helmsman, context: api_sidecar, dockerfile: api_sidecar/Dockerfile }
          - { name: steward, context: api_forms, dockerfile: api_forms/Dockerfile }
          - { name: deckhand, context: api_ticketing, dockerfile: api_ticketing/Dockerfile }
          - { name: navigator, context: api_dns, dockerfile: api_dns/Dockerfile }
          - { name: skipper, context: api_consultant, dockerfile: api_consultant/Dockerfile }
          - { name: chandler, context: api_assets, dockerfile: api_assets/Dockerfile }
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to DockerHub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Read service component version
        id: svcver
        run: |
          VERSION_FILE="${{ matrix.service.context }}/VERSION"
          PACKAGE_JSON="${{ matrix.service.context }}/package.json"
          if [[ -f "$VERSION_FILE" ]]; then
            echo "version=$(tr -d '\n' < "$VERSION_FILE")" >> "$GITHUB_OUTPUT"
          elif [[ -f "$PACKAGE_JSON" ]]; then
            echo "version=$(jq -r .version "$PACKAGE_JSON")" >> "$GITHUB_OUTPUT"
          else
            echo "version=0.0.0" >> "$GITHUB_OUTPUT"
          fi

      - name: Build & push ${{ matrix.service.name }} (amd64)
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.service.dockerfile }}
          platforms: linux/amd64
          push: true
          provenance: true
          sbom: true
          build-args: |
            VERSION=${{ github.ref_name }}
            GIT_COMMIT=${{ github.sha }}
            BUILD_DATE=${{ github.event.repository.updated_at }}
            COMPONENT_NAME=${{ matrix.service.name }}
            COMPONENT_VERSION=${{ steps.svcver.outputs.version }}
          tags: |
            ${{ env.REGISTRY }}/frameworks-${{ matrix.service.name }}:${{ github.ref_name }}-amd64
            livepeerframeworks/frameworks-${{ matrix.service.name }}:${{ github.ref_name }}-amd64
          cache-from: type=gha,scope=${{ matrix.service.name }}-amd64
          cache-to: type=gha,mode=max,ignore-error=true,scope=${{ matrix.service.name }}-amd64

      - name: Write digest artifact
        run: |
          mkdir -p dist
          cat > dist/arch-digest-${{ matrix.service.name }}-amd64.json <<JSON
          {
            "name": "${{ matrix.service.name }}",
            "digest": "${{ steps.build.outputs.digest }}",
            "service_version": "${{ steps.svcver.outputs.version }}"
          }
          JSON

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: arch-digest-${{ matrix.service.name }}-amd64
          path: dist/arch-digest-${{ matrix.service.name }}-amd64.json

  build-images-arm64:
    name: Build Images (arm64)
    runs-on: ubuntu-24.04-arm
    strategy:
      fail-fast: false
      matrix:
        service:
          - { name: bridge, context: api_gateway, dockerfile: api_gateway/Dockerfile }
          - { name: quartermaster, context: api_tenants, dockerfile: api_tenants/Dockerfile }
          - { name: commodore, context: api_control, dockerfile: api_control/Dockerfile }
          - { name: purser, context: api_billing, dockerfile: api_billing/Dockerfile }
          - { name: foghorn, context: api_balancing, dockerfile: api_balancing/Dockerfile }
          - { name: decklog, context: api_firehose, dockerfile: api_firehose/Dockerfile }
          - {
              name: periscope-ingest,
              context: api_analytics_ingest,
              dockerfile: api_analytics_ingest/Dockerfile,
            }
          - {
              name: periscope-query,
              context: api_analytics_query,
              dockerfile: api_analytics_query/Dockerfile,
            }
          - { name: signalman, context: api_realtime, dockerfile: api_realtime/Dockerfile }
          - { name: helmsman, context: api_sidecar, dockerfile: api_sidecar/Dockerfile }
          - { name: steward, context: api_forms, dockerfile: api_forms/Dockerfile }
          - { name: deckhand, context: api_ticketing, dockerfile: api_ticketing/Dockerfile }
          - { name: navigator, context: api_dns, dockerfile: api_dns/Dockerfile }
          - { name: skipper, context: api_consultant, dockerfile: api_consultant/Dockerfile }
          - { name: chandler, context: api_assets, dockerfile: api_assets/Dockerfile }
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to DockerHub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Read service component version
        id: svcver
        run: |
          VERSION_FILE="${{ matrix.service.context }}/VERSION"
          PACKAGE_JSON="${{ matrix.service.context }}/package.json"
          if [[ -f "$VERSION_FILE" ]]; then
            echo "version=$(tr -d '\n' < "$VERSION_FILE")" >> "$GITHUB_OUTPUT"
          elif [[ -f "$PACKAGE_JSON" ]]; then
            echo "version=$(jq -r .version "$PACKAGE_JSON")" >> "$GITHUB_OUTPUT"
          else
            echo "version=0.0.0" >> "$GITHUB_OUTPUT"
          fi

      - name: Build & push ${{ matrix.service.name }} (arm64)
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.service.dockerfile }}
          platforms: linux/arm64
          push: true
          provenance: true
          sbom: true
          build-args: |
            VERSION=${{ github.ref_name }}
            GIT_COMMIT=${{ github.sha }}
            BUILD_DATE=${{ github.event.repository.updated_at }}
            COMPONENT_NAME=${{ matrix.service.name }}
            COMPONENT_VERSION=${{ steps.svcver.outputs.version }}
          tags: |
            ${{ env.REGISTRY }}/frameworks-${{ matrix.service.name }}:${{ github.ref_name }}-arm64
            livepeerframeworks/frameworks-${{ matrix.service.name }}:${{ github.ref_name }}-arm64
          cache-from: type=gha,scope=${{ matrix.service.name }}-arm64
          cache-to: type=gha,mode=max,ignore-error=true,scope=${{ matrix.service.name }}-arm64

      - name: Write digest artifact
        run: |
          mkdir -p dist
          cat > dist/arch-digest-${{ matrix.service.name }}-arm64.json <<JSON
          {
            "name": "${{ matrix.service.name }}",
            "digest": "${{ steps.build.outputs.digest }}",
            "service_version": "${{ steps.svcver.outputs.version }}"
          }
          JSON

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: arch-digest-${{ matrix.service.name }}-arm64
          path: dist/arch-digest-${{ matrix.service.name }}-arm64.json

  # Merge per-arch images into multi-arch manifests
  merge-image-manifests:
    name: Merge Image Manifests
    needs: [build-images-amd64, build-images-arm64]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - bridge
          - quartermaster
          - commodore
          - purser
          - foghorn
          - decklog
          - periscope-ingest
          - periscope-query
          - signalman
          - helmsman
          - steward
          - deckhand
          - navigator
          - skipper
          - chandler
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to DockerHub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Download amd64 digest
        uses: actions/download-artifact@v8
        with:
          name: arch-digest-${{ matrix.service }}-amd64
          path: dist/

      - name: Download arm64 digest
        uses: actions/download-artifact@v8
        with:
          name: arch-digest-${{ matrix.service }}-arm64
          path: dist/

      - name: Create multi-arch manifest
        run: |
          set -euo pipefail
          TAG="${{ github.ref_name }}"
          SVC="${{ matrix.service }}"
          GHCR="${{ env.REGISTRY }}/frameworks-${SVC}"
          DH="livepeerframeworks/frameworks-${SVC}"

          # Determine track tag from version suffix
          TRACK=""
          case "${TAG}" in
            *-beta*) TRACK="beta" ;;
            *-rc*)   TRACK="rc" ;;
            v[0-9]*) TRACK="latest" ;;
          esac

          GHCR_TAGS=("-t" "${GHCR}:${TAG}")
          DH_TAGS=("-t" "${DH}:${TAG}")
          if [[ -n "${TRACK}" ]]; then
            GHCR_TAGS+=("-t" "${GHCR}:${TRACK}")
            DH_TAGS+=("-t" "${DH}:${TRACK}")
          fi

          docker buildx imagetools create \
            "${GHCR_TAGS[@]}" \
            "${GHCR}:${TAG}-amd64" \
            "${GHCR}:${TAG}-arm64"

          docker buildx imagetools create \
            "${DH_TAGS[@]}" \
            "${DH}:${TAG}-amd64" \
            "${DH}:${TAG}-arm64"

          # Get the combined manifest digest
          DIGEST="sha256:$(docker buildx imagetools inspect "${GHCR}:${TAG}" --raw | sha256sum | cut -d' ' -f1)"
          SVCVER=$(jq -r .service_version dist/arch-digest-${SVC}-amd64.json)

          mkdir -p final
          cat > final/image-${SVC}.json <<JSON
          {
            "name": "${SVC}",
            "image": "${GHCR}:${TAG}",
            "digest": "${DIGEST}",
            "service_version": "${SVCVER}",
            "git_commit": "${{ github.sha }}"
          }
          JSON

      - name: Upload merged digest
        uses: actions/upload-artifact@v7
        with:
          name: image-digest-${{ matrix.service }}
          path: final/image-${{ matrix.service }}.json

  # ---------------------------------------------------------------------------
  # Webapp Docker images — split amd64 (ubuntu) + arm64 (native self-hosted)
  # ---------------------------------------------------------------------------
  build-webapps-amd64:
    name: Build Webapps (amd64)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        webapp:
          - { name: chartroom, context: website_application, env_prefix: VITE, build_dir: build }
          - { name: foredeck, context: website_marketing, env_prefix: VITE, build_dir: dist }
          - { name: logbook, context: website_docs, env_prefix: VITE, build_dir: dist }
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Create GitOps app token
        id: gitops_app_token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ vars.GITOPS_APP_ID }}
          private-key: ${{ secrets.GITOPS_APP_PRIVATE_KEY }}
          repositories: gitops

      - name: Checkout GitOps config
        uses: actions/checkout@v6
        with:
          repository: Livepeer-FrameWorks/gitops
          token: ${{ steps.gitops_app_token.outputs.token }}
          path: env-repo
          sparse-checkout: |
            config/production.env
          sparse-checkout-cone-mode: false

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.25"

      - name: Generate frontend build env
        id: frontend_env
        run: |
          set -euo pipefail
          cd scripts/env
          GOCACHE="$RUNNER_TEMP/go-build" go run . \
            --frontend-only \
            --context production \
            --base ../../config/env/base.env \
            --overlay ../../env-repo/config/production.env \
            --output "$RUNNER_TEMP/frontend.env"
          cd ../..

          set -a
          . "$RUNNER_TEMP/frontend.env"
          set +a

          {
            echo 'build_args<<EOF'
            echo 'BUILD_ENV=production'
            while IFS='=' read -r key _; do
              case "$key" in
                ""|\#*|ENV_CONTEXT|ENV_GENERATED_AT) continue ;;
              esac
              printf '%s=%s\n' "$key" "${!key}"
            done < "$RUNNER_TEMP/frontend.env"
            echo EOF
          } >> "$GITHUB_OUTPUT"

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "pnpm"
          cache-dependency-path: "pnpm-lock.yaml"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build player package
        run: |
          cd npm_player
          pnpm run build

      - name: Build studio package
        run: |
          cd npm_studio
          pnpm run build

      - name: Build application
        run: |
          set -a
          . "$RUNNER_TEMP/frontend.env"
          set +a
          cd ${{ matrix.webapp.context }}
          pnpm run build

      - name: Create static bundle
        run: |
          cd ${{ matrix.webapp.context }}
          tar czf ../${{ matrix.webapp.name }}-build.tar.gz ${{ matrix.webapp.build_dir }}/

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to DockerHub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image (amd64)
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.webapp.context }}/Dockerfile
          platforms: linux/amd64
          push: true
          provenance: true
          sbom: true
          build-args: ${{ steps.frontend_env.outputs.build_args }}
          tags: |
            ${{ env.REGISTRY }}/frameworks-${{ matrix.webapp.name }}:${{ github.ref_name }}-amd64
            livepeerframeworks/frameworks-${{ matrix.webapp.name }}:${{ github.ref_name }}-amd64
          cache-from: type=gha,scope=${{ matrix.webapp.name }}-amd64
          cache-to: type=gha,mode=max,ignore-error=true,scope=${{ matrix.webapp.name }}-amd64

      - name: Write digest artifact
        run: |
          mkdir -p dist
          cat > dist/arch-digest-${{ matrix.webapp.name }}-amd64.json <<JSON
          {
            "name": "${{ matrix.webapp.name }}",
            "digest": "${{ steps.build.outputs.digest }}"
          }
          JSON

      - name: Upload digest artifact
        uses: actions/upload-artifact@v7
        with:
          name: arch-digest-${{ matrix.webapp.name }}-amd64
          path: dist/arch-digest-${{ matrix.webapp.name }}-amd64.json

      - name: Upload static bundle artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.webapp.name }}-bundle
          path: ${{ matrix.webapp.name }}-build.tar.gz

  build-webapps-arm64:
    name: Build Webapps (arm64)
    runs-on: ubuntu-24.04-arm
    strategy:
      fail-fast: false
      matrix:
        webapp:
          - { name: chartroom, context: website_application }
          - { name: foredeck, context: website_marketing }
          - { name: logbook, context: website_docs }
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Create GitOps app token
        id: gitops_app_token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ vars.GITOPS_APP_ID }}
          private-key: ${{ secrets.GITOPS_APP_PRIVATE_KEY }}
          repositories: gitops

      - name: Checkout GitOps config
        uses: actions/checkout@v6
        with:
          repository: Livepeer-FrameWorks/gitops
          token: ${{ steps.gitops_app_token.outputs.token }}
          path: env-repo
          sparse-checkout: |
            config/production.env
          sparse-checkout-cone-mode: false

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.25"

      - name: Generate frontend build env
        id: frontend_env
        run: |
          set -euo pipefail
          cd scripts/env
          GOCACHE="$RUNNER_TEMP/go-build" go run . \
            --frontend-only \
            --context production \
            --base ../../config/env/base.env \
            --overlay ../../env-repo/config/production.env \
            --output "$RUNNER_TEMP/frontend.env"
          cd ../..

          set -a
          . "$RUNNER_TEMP/frontend.env"
          set +a

          {
            echo 'build_args<<EOF'
            echo 'BUILD_ENV=production'
            while IFS='=' read -r key _; do
              case "$key" in
                ""|\#*|ENV_CONTEXT|ENV_GENERATED_AT) continue ;;
              esac
              printf '%s=%s\n' "$key" "${!key}"
            done < "$RUNNER_TEMP/frontend.env"
            echo EOF
          } >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to DockerHub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image (arm64)
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.webapp.context }}/Dockerfile
          platforms: linux/arm64
          push: true
          provenance: true
          sbom: true
          build-args: ${{ steps.frontend_env.outputs.build_args }}
          tags: |
            ${{ env.REGISTRY }}/frameworks-${{ matrix.webapp.name }}:${{ github.ref_name }}-arm64
            livepeerframeworks/frameworks-${{ matrix.webapp.name }}:${{ github.ref_name }}-arm64
          cache-from: type=gha,scope=${{ matrix.webapp.name }}-arm64
          cache-to: type=gha,mode=max,ignore-error=true,scope=${{ matrix.webapp.name }}-arm64

      - name: Write digest artifact
        run: |
          mkdir -p dist
          cat > dist/arch-digest-${{ matrix.webapp.name }}-arm64.json <<JSON
          {
            "name": "${{ matrix.webapp.name }}",
            "digest": "${{ steps.build.outputs.digest }}"
          }
          JSON

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: arch-digest-${{ matrix.webapp.name }}-arm64
          path: dist/arch-digest-${{ matrix.webapp.name }}-arm64.json

  # Merge per-arch webapp images into multi-arch manifests
  merge-webapp-manifests:
    name: Merge Webapp Manifests
    needs: [build-webapps-amd64, build-webapps-arm64]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        webapp:
          - chartroom
          - foredeck
          - logbook
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to DockerHub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Download amd64 digest
        uses: actions/download-artifact@v8
        with:
          name: arch-digest-${{ matrix.webapp }}-amd64
          path: dist/

      - name: Download arm64 digest
        uses: actions/download-artifact@v8
        with:
          name: arch-digest-${{ matrix.webapp }}-arm64
          path: dist/

      - name: Create multi-arch manifest
        run: |
          set -euo pipefail
          TAG="${{ github.ref_name }}"
          APP="${{ matrix.webapp }}"
          GHCR="${{ env.REGISTRY }}/frameworks-${APP}"
          DH="livepeerframeworks/frameworks-${APP}"

          # Determine track tag from version suffix
          TRACK=""
          case "${TAG}" in
            *-beta*) TRACK="beta" ;;
            *-rc*)   TRACK="rc" ;;
            v[0-9]*) TRACK="latest" ;;
          esac

          GHCR_TAGS=("-t" "${GHCR}:${TAG}")
          DH_TAGS=("-t" "${DH}:${TAG}")
          if [[ -n "${TRACK}" ]]; then
            GHCR_TAGS+=("-t" "${GHCR}:${TRACK}")
            DH_TAGS+=("-t" "${DH}:${TRACK}")
          fi

          docker buildx imagetools create \
            "${GHCR_TAGS[@]}" \
            "${GHCR}:${TAG}-amd64" \
            "${GHCR}:${TAG}-arm64"

          docker buildx imagetools create \
            "${DH_TAGS[@]}" \
            "${DH}:${TAG}-amd64" \
            "${DH}:${TAG}-arm64"

          DIGEST="sha256:$(docker buildx imagetools inspect "${GHCR}:${TAG}" --raw | sha256sum | cut -d' ' -f1)"

          mkdir -p final
          cat > final/image-${APP}.json <<JSON
          {
            "name": "${APP}",
            "image": "${GHCR}:${TAG}",
            "digest": "${DIGEST}",
            "git_commit": "${{ github.sha }}"
          }
          JSON

      - name: Upload merged digest
        uses: actions/upload-artifact@v7
        with:
          name: image-digest-${{ matrix.webapp }}
          path: final/image-${{ matrix.webapp }}.json

  # CLI linux/amd64 — built on GitHub-hosted ubuntu runner
  build-cli:
    name: Build CLI (linux/amd64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Sanitize platform tag to component version
        id: compver
        run: |
          ver="${GITHUB_REF_NAME#v}"
          echo "value=${ver}" >> "$GITHUB_OUTPUT"
      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"
          cache-dependency-path: cli/go.sum
      - name: Build CLI linux binaries
        run: |
          set -euo pipefail
          mkdir -p dist/cli
          cd cli
          LDFLAGS="-X frameworks/pkg/version.Version=${{ github.ref_name }} -X frameworks/pkg/version.GitCommit=${{ github.sha }} -X frameworks/pkg/version.BuildDate=$(date -u '+%Y-%m-%dT%H:%M:%SZ') -X frameworks/pkg/version.ComponentName=cli -X frameworks/pkg/version.ComponentVersion=${{ steps.compver.outputs.value }}"
          for target in linux-amd64 linux-arm64; do
            IFS='-' read -r os arch <<< "$target"
            out="frameworks-${os}-${arch}"
            GOOS="$os" GOARCH="$arch" CGO_ENABLED=0 go build -ldflags "$LDFLAGS" -o "$out" .
            mv "$out" "../dist/cli/$out"
          done
      - name: Upload CLI artifact
        uses: actions/upload-artifact@v7
        with:
          name: cli-linux
          path: dist/cli/*

  # CLI darwin — built on self-hosted Mac Mini, signed and notarized
  build-cli-darwin:
    name: Build CLI (darwin)
    runs-on: macos-arm64-self-hosted
    steps:
      - uses: actions/checkout@v6
      - name: Add Homebrew to PATH
        run: echo "/opt/homebrew/bin" >> "$GITHUB_PATH"
      - name: Sanitize platform tag to component version
        id: compver
        run: |
          ver="${GITHUB_REF_NAME#v}"
          echo "value=${ver}" >> "$GITHUB_OUTPUT"
      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"
          cache-dependency-path: cli/go.sum

      - name: Build CLI darwin/arm64
        run: |
          set -euo pipefail
          mkdir -p dist/cli
          cd cli
          GOOS=darwin GOARCH=arm64 CGO_ENABLED=0 \
            go build -ldflags "-X frameworks/pkg/version.Version=${{ github.ref_name }} -X frameworks/pkg/version.GitCommit=${{ github.sha }} -X frameworks/pkg/version.BuildDate=$(date -u '+%Y-%m-%dT%H:%M:%SZ') -X frameworks/pkg/version.ComponentName=cli -X frameworks/pkg/version.ComponentVersion=${{ steps.compver.outputs.value }}" -o "frameworks-darwin-arm64" .
          mv "frameworks-darwin-arm64" "../dist/cli/frameworks-darwin-arm64"

      - name: Unlock keychain
        run: security unlock-keychain -p "${{ secrets.LOGIN_KEYCHAIN_PASSWORD }}" login.keychain

      - name: Sign and notarize darwin CLI binary
        run: |
          set -euo pipefail
          binary="dist/cli/frameworks-darwin-arm64"

          codesign --sign "${{ secrets.APPLE_DEVELOPER_ID }}" \
                   --timestamp --options runtime \
                   "$binary"
          codesign --verify --verbose=2 "$binary"

          ditto -c -k --keepParent "$binary" "${binary}.zip"
          xcrun notarytool submit "${binary}.zip" \
            --apple-id "${{ secrets.APPLE_ID }}" \
            --password "${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}" \
            --team-id "${{ secrets.APPLE_TEAM_ID }}" \
            --wait
          rm "${binary}.zip"

      - name: Upload CLI artifact
        uses: actions/upload-artifact@v7
        with:
          name: cli-darwin-arm64
          path: dist/cli/*

  # Linux/amd64 service binaries — built on GitHub-hosted ubuntu runner
  build-service-binaries-amd64:
