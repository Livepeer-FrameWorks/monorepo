name: Release Platform

on:
  push:
    tags:
      - "v*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  REGISTRY: ghcr.io/livepeer-frameworks

jobs:
  define-release-components:
    name: Define Release Components
    runs-on: ubuntu-latest
    outputs:
      image_matrix: ${{ steps.components.outputs.image_matrix }}
      webapp_matrix: ${{ steps.components.outputs.webapp_matrix }}
    steps:
      - uses: actions/checkout@v6
      - id: components
        run: |
          set -euo pipefail
          COMPONENTS_FILE=".github/release-components.json"
          printf 'image_matrix=%s\n' "$(jq -c '{service:[.services[] | select(.dockerfile != null) | {name, context, dockerfile}]}' "$COMPONENTS_FILE")" >> "$GITHUB_OUTPUT"
          printf 'webapp_matrix=%s\n' "$(jq -c '{webapp:.webapps}' "$COMPONENTS_FILE")" >> "$GITHUB_OUTPUT"

  # ---------------------------------------------------------------------------
  # Service Docker images — split amd64 (ubuntu) + arm64 (native self-hosted)
  # ---------------------------------------------------------------------------
  build-images-amd64:
    name: Build Images (amd64)
    needs: [define-release-components]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.define-release-components.outputs.image_matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to DockerHub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Read service component version
        id: svcver
        run: |
          VERSION_FILE="${{ matrix.service.context }}/VERSION"
          PACKAGE_JSON="${{ matrix.service.context }}/package.json"
          if [[ -f "$VERSION_FILE" ]]; then
            echo "version=$(tr -d '\n' < "$VERSION_FILE")" >> "$GITHUB_OUTPUT"
          elif [[ -f "$PACKAGE_JSON" ]]; then
            echo "version=$(jq -r .version "$PACKAGE_JSON")" >> "$GITHUB_OUTPUT"
          else
            echo "ERROR: ${{ matrix.service.context }} has neither VERSION nor package.json" >&2
            exit 1
          fi

      - name: Build & push ${{ matrix.service.name }} (amd64)
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.service.dockerfile }}
          platforms: linux/amd64
          push: true
          provenance: true
          sbom: true
          build-args: |
            VERSION=${{ github.ref_name }}
            GIT_COMMIT=${{ github.sha }}
            BUILD_DATE=${{ github.event.repository.updated_at }}
            COMPONENT_NAME=${{ matrix.service.name }}
            COMPONENT_VERSION=${{ steps.svcver.outputs.version }}
          tags: |
            ${{ env.REGISTRY }}/frameworks-${{ matrix.service.name }}:${{ github.ref_name }}-amd64
            livepeerframeworks/frameworks-${{ matrix.service.name }}:${{ github.ref_name }}-amd64
          cache-from: type=gha,scope=${{ matrix.service.name }}-amd64
          cache-to: type=gha,mode=max,ignore-error=true,scope=${{ matrix.service.name }}-amd64

      - name: Write digest artifact
        run: |
          mkdir -p dist
          cat > dist/arch-digest-${{ matrix.service.name }}-amd64.json <<JSON
          {
            "name": "${{ matrix.service.name }}",
            "digest": "${{ steps.build.outputs.digest }}",
            "service_version": "${{ steps.svcver.outputs.version }}"
          }
          JSON

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: arch-digest-${{ matrix.service.name }}-amd64
          path: dist/arch-digest-${{ matrix.service.name }}-amd64.json

  build-images-arm64:
    name: Build Images (arm64)
    needs: [define-release-components]
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.define-release-components.outputs.image_matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to DockerHub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Read service component version
        id: svcver
        run: |
          VERSION_FILE="${{ matrix.service.context }}/VERSION"
          PACKAGE_JSON="${{ matrix.service.context }}/package.json"
          if [[ -f "$VERSION_FILE" ]]; then
            echo "version=$(tr -d '\n' < "$VERSION_FILE")" >> "$GITHUB_OUTPUT"
          elif [[ -f "$PACKAGE_JSON" ]]; then
            echo "version=$(jq -r .version "$PACKAGE_JSON")" >> "$GITHUB_OUTPUT"
          else
            echo "ERROR: ${{ matrix.service.context }} has neither VERSION nor package.json" >&2
            exit 1
          fi

      - name: Build & push ${{ matrix.service.name }} (arm64)
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.service.dockerfile }}
          platforms: linux/arm64
          push: true
          provenance: true
          sbom: true
          build-args: |
            VERSION=${{ github.ref_name }}
            GIT_COMMIT=${{ github.sha }}
            BUILD_DATE=${{ github.event.repository.updated_at }}
            COMPONENT_NAME=${{ matrix.service.name }}
            COMPONENT_VERSION=${{ steps.svcver.outputs.version }}
          tags: |
            ${{ env.REGISTRY }}/frameworks-${{ matrix.service.name }}:${{ github.ref_name }}-arm64
            livepeerframeworks/frameworks-${{ matrix.service.name }}:${{ github.ref_name }}-arm64
          cache-from: type=gha,scope=${{ matrix.service.name }}-arm64
          cache-to: type=gha,mode=max,ignore-error=true,scope=${{ matrix.service.name }}-arm64

      - name: Write digest artifact
        run: |
          mkdir -p dist
          cat > dist/arch-digest-${{ matrix.service.name }}-arm64.json <<JSON
          {
            "name": "${{ matrix.service.name }}",
            "digest": "${{ steps.build.outputs.digest }}",
            "service_version": "${{ steps.svcver.outputs.version }}"
          }
          JSON

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: arch-digest-${{ matrix.service.name }}-arm64
          path: dist/arch-digest-${{ matrix.service.name }}-arm64.json

  # Merge per-arch images into multi-arch manifests
  merge-image-manifests:
    name: Merge Image Manifests
    needs: [define-release-components, build-images-amd64, build-images-arm64]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to DockerHub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Download amd64 digests
        uses: actions/download-artifact@v8
        with:
          pattern: arch-digest-*-amd64
          path: dist/
          merge-multiple: true

      - name: Download arm64 digests
        uses: actions/download-artifact@v8
        with:
          pattern: arch-digest-*-arm64
          path: dist/
          merge-multiple: true

      - name: Create multi-arch manifests
        run: |
          set -euo pipefail
          TAG="${{ github.ref_name }}"
          COMPONENTS_FILE=".github/release-components.json"
          mkdir -p final
          jq -r '.services[] | select(.dockerfile != null) | .name' "$COMPONENTS_FILE" | while read -r SVC; do
            GHCR="${{ env.REGISTRY }}/frameworks-${SVC}"
            DH="livepeerframeworks/frameworks-${SVC}"

            TRACK=""
            case "${TAG}" in
              *-beta*) TRACK="beta" ;;
              *-rc*)   TRACK="rc" ;;
              v[0-9]*) TRACK="latest" ;;
            esac

            GHCR_TAGS=("-t" "${GHCR}:${TAG}")
            DH_TAGS=("-t" "${DH}:${TAG}")
            if [[ -n "${TRACK}" ]]; then
              GHCR_TAGS+=("-t" "${GHCR}:${TRACK}")
              DH_TAGS+=("-t" "${DH}:${TRACK}")
            fi

            docker buildx imagetools create \
              "${GHCR_TAGS[@]}" \
              "${GHCR}:${TAG}-amd64" \
              "${GHCR}:${TAG}-arm64"

            docker buildx imagetools create \
              "${DH_TAGS[@]}" \
              "${DH}:${TAG}-amd64" \
              "${DH}:${TAG}-arm64"

            DIGEST="sha256:$(docker buildx imagetools inspect "${GHCR}:${TAG}" --raw | sha256sum | cut -d' ' -f1)"
            SVCVER=$(jq -r .service_version "dist/arch-digest-${SVC}-amd64.json")

            cat > "final/image-${SVC}.json" <<JSON
          {
            "name": "${SVC}",
            "image": "${GHCR}:${TAG}",
            "digest": "${DIGEST}",
            "service_version": "${SVCVER}",
            "git_commit": "${{ github.sha }}"
          }
          JSON
          done

      - name: Upload merged digests
        uses: actions/upload-artifact@v7
        with:
          name: image-digest-services
          path: final/image-*.json

  # ---------------------------------------------------------------------------
  # Webapp Docker images — split amd64 (ubuntu) + arm64 (native self-hosted)
  # ---------------------------------------------------------------------------
  build-webapps-amd64:
    name: Build Webapps (amd64)
    needs: [define-release-components]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.define-release-components.outputs.webapp_matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Create GitOps app token
        id: gitops_app_token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ vars.GITOPS_APP_ID }}
          private-key: ${{ secrets.GITOPS_APP_PRIVATE_KEY }}
          repositories: gitops

      - name: Checkout GitOps config
        uses: actions/checkout@v6
        with:
          repository: Livepeer-FrameWorks/gitops
          token: ${{ steps.gitops_app_token.outputs.token }}
          path: env-repo
          sparse-checkout: |
            config/production.env
          sparse-checkout-cone-mode: false

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: .go-version
          cache: false
        env:
          GOTOOLCHAIN: local

      - name: Generate frontend build env
        id: frontend_env
        run: |
          set -euo pipefail
          cd scripts/env
          GOCACHE="$RUNNER_TEMP/go-build" go run . \
            --frontend-only \
            --context production \
            --base ../../config/env/base.env \
            --overlay ../../env-repo/config/production.env \
            --output "$RUNNER_TEMP/frontend.env"
          cd ../..

          set -a
          . "$RUNNER_TEMP/frontend.env"
          set +a

          {
            echo 'build_args<<EOF'
            echo 'BUILD_ENV=production'
            while IFS='=' read -r key _; do
              case "$key" in
                ""|\#*|ENV_CONTEXT|ENV_GENERATED_AT) continue ;;
              esac
              printf '%s=%s\n' "$key" "${!key}"
            done < "$RUNNER_TEMP/frontend.env"
            echo EOF
          } >> "$GITHUB_OUTPUT"

      - name: Setup Node.js + pnpm
        uses: ./.github/actions/setup-node-pnpm

      - name: Build player package
        run: |
          cd npm_player
          pnpm run build

      - name: Build studio package
        run: |
          cd npm_studio
          pnpm run build

      - name: Build application
        run: |
          set -a
          . "$RUNNER_TEMP/frontend.env"
          set +a
          cd ${{ matrix.webapp.context }}
          pnpm run build

      - name: Create static bundle
        run: |
          cd ${{ matrix.webapp.context }}
          tar czf ../${{ matrix.webapp.name }}-build.tar.gz ${{ matrix.webapp.build_dir }}/

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to DockerHub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image (amd64)
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.webapp.context }}/Dockerfile
          platforms: linux/amd64
          push: true
          provenance: true
          sbom: true
          build-args: ${{ steps.frontend_env.outputs.build_args }}
          tags: |
            ${{ env.REGISTRY }}/frameworks-${{ matrix.webapp.name }}:${{ github.ref_name }}-amd64
            livepeerframeworks/frameworks-${{ matrix.webapp.name }}:${{ github.ref_name }}-amd64
          cache-from: type=gha,scope=${{ matrix.webapp.name }}-amd64
          cache-to: type=gha,mode=max,ignore-error=true,scope=${{ matrix.webapp.name }}-amd64

      - name: Write digest artifact
        run: |
          mkdir -p dist
          cat > dist/arch-digest-${{ matrix.webapp.name }}-amd64.json <<JSON
          {
            "name": "${{ matrix.webapp.name }}",
            "digest": "${{ steps.build.outputs.digest }}"
          }
          JSON

      - name: Upload digest artifact
        uses: actions/upload-artifact@v7
        with:
          name: arch-digest-${{ matrix.webapp.name }}-amd64
          path: dist/arch-digest-${{ matrix.webapp.name }}-amd64.json

      - name: Upload static bundle artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.webapp.name }}-bundle
          path: ${{ matrix.webapp.name }}-build.tar.gz

  build-webapps-arm64:
    name: Build Webapps (arm64)
    needs: [define-release-components]
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.define-release-components.outputs.webapp_matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Create GitOps app token
        id: gitops_app_token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ vars.GITOPS_APP_ID }}
          private-key: ${{ secrets.GITOPS_APP_PRIVATE_KEY }}
          repositories: gitops

      - name: Checkout GitOps config
        uses: actions/checkout@v6
        with:
          repository: Livepeer-FrameWorks/gitops
          token: ${{ steps.gitops_app_token.outputs.token }}
          path: env-repo
          sparse-checkout: |
            config/production.env
          sparse-checkout-cone-mode: false

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: .go-version
          cache: false
        env:
          GOTOOLCHAIN: local

      - name: Generate frontend build env
        id: frontend_env
        run: |
          set -euo pipefail
          cd scripts/env
          GOCACHE="$RUNNER_TEMP/go-build" go run . \
            --frontend-only \
            --context production \
            --base ../../config/env/base.env \
            --overlay ../../env-repo/config/production.env \
            --output "$RUNNER_TEMP/frontend.env"
          cd ../..

          set -a
          . "$RUNNER_TEMP/frontend.env"
          set +a

          {
            echo 'build_args<<EOF'
            echo 'BUILD_ENV=production'
            while IFS='=' read -r key _; do
              case "$key" in
                ""|\#*|ENV_CONTEXT|ENV_GENERATED_AT) continue ;;
              esac
              printf '%s=%s\n' "$key" "${!key}"
            done < "$RUNNER_TEMP/frontend.env"
            echo EOF
          } >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to DockerHub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image (arm64)
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.webapp.context }}/Dockerfile
          platforms: linux/arm64
          push: true
          provenance: true
          sbom: true
          build-args: ${{ steps.frontend_env.outputs.build_args }}
          tags: |
            ${{ env.REGISTRY }}/frameworks-${{ matrix.webapp.name }}:${{ github.ref_name }}-arm64
            livepeerframeworks/frameworks-${{ matrix.webapp.name }}:${{ github.ref_name }}-arm64
          cache-from: type=gha,scope=${{ matrix.webapp.name }}-arm64
          cache-to: type=gha,mode=max,ignore-error=true,scope=${{ matrix.webapp.name }}-arm64

      - name: Write digest artifact
        run: |
          mkdir -p dist
          cat > dist/arch-digest-${{ matrix.webapp.name }}-arm64.json <<JSON
          {
            "name": "${{ matrix.webapp.name }}",
            "digest": "${{ steps.build.outputs.digest }}"
          }
          JSON

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: arch-digest-${{ matrix.webapp.name }}-arm64
          path: dist/arch-digest-${{ matrix.webapp.name }}-arm64.json

  # Merge per-arch webapp images into multi-arch manifests
  merge-webapp-manifests:
    name: Merge Webapp Manifests
    needs: [define-release-components, build-webapps-amd64, build-webapps-arm64]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to DockerHub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Download amd64 digests
        uses: actions/download-artifact@v8
        with:
          pattern: arch-digest-*-amd64
          path: dist/
          merge-multiple: true

      - name: Download arm64 digests
        uses: actions/download-artifact@v8
        with:
          pattern: arch-digest-*-arm64
          path: dist/
          merge-multiple: true

      - name: Create multi-arch manifests
        run: |
          set -euo pipefail
          TAG="${{ github.ref_name }}"
          COMPONENTS_FILE=".github/release-components.json"
          mkdir -p final
          jq -r '.webapps[].name' "$COMPONENTS_FILE" | while read -r APP; do
            GHCR="${{ env.REGISTRY }}/frameworks-${APP}"
            DH="livepeerframeworks/frameworks-${APP}"

            TRACK=""
            case "${TAG}" in
              *-beta*) TRACK="beta" ;;
              *-rc*)   TRACK="rc" ;;
              v[0-9]*) TRACK="latest" ;;
            esac

            GHCR_TAGS=("-t" "${GHCR}:${TAG}")
            DH_TAGS=("-t" "${DH}:${TAG}")
            if [[ -n "${TRACK}" ]]; then
              GHCR_TAGS+=("-t" "${GHCR}:${TRACK}")
              DH_TAGS+=("-t" "${DH}:${TRACK}")
            fi

            docker buildx imagetools create \
              "${GHCR_TAGS[@]}" \
              "${GHCR}:${TAG}-amd64" \
              "${GHCR}:${TAG}-arm64"

            docker buildx imagetools create \
              "${DH_TAGS[@]}" \
              "${DH}:${TAG}-amd64" \
              "${DH}:${TAG}-arm64"

            DIGEST="sha256:$(docker buildx imagetools inspect "${GHCR}:${TAG}" --raw | sha256sum | cut -d' ' -f1)"

            cat > "final/image-${APP}.json" <<JSON
          {
            "name": "${APP}",
            "image": "${GHCR}:${TAG}",
            "digest": "${DIGEST}",
            "git_commit": "${{ github.sha }}"
          }
          JSON
          done

      - name: Upload merged digests
        uses: actions/upload-artifact@v7
        with:
          name: image-digest-webapps
          path: final/image-*.json

  # CLI linux/amd64 — built on GitHub-hosted ubuntu runner
  build-cli:
    name: Build CLI (linux/amd64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Read CLI component version
        id: compver
        run: |
          ver=$(tr -d '\n' < cli/VERSION)
          echo "value=${ver}" >> "$GITHUB_OUTPUT"
      - uses: actions/setup-go@v6
        with:
          go-version-file: .go-version
          cache-dependency-path: cli/go.sum
        env:
          GOTOOLCHAIN: local
      - name: Build CLI linux binaries
        run: |
          set -euo pipefail
          mkdir -p dist/cli
          cd cli
          LDFLAGS="-X frameworks/pkg/version.Version=${{ github.ref_name }} -X frameworks/pkg/version.GitCommit=${{ github.sha }} -X frameworks/pkg/version.BuildDate=$(date -u '+%Y-%m-%dT%H:%M:%SZ') -X frameworks/pkg/version.ComponentName=cli -X frameworks/pkg/version.ComponentVersion=${{ steps.compver.outputs.value }}"
          for target in linux-amd64 linux-arm64; do
            IFS='-' read -r os arch <<< "$target"
            out="frameworks-${os}-${arch}"
            GOOS="$os" GOARCH="$arch" CGO_ENABLED=0 go build -ldflags "$LDFLAGS" -o "$out" .
            mv "$out" "../dist/cli/$out"
          done
      - name: Upload CLI artifact
        uses: actions/upload-artifact@v7
        with:
          name: cli-linux
          path: dist/cli/*

  # CLI darwin — built on self-hosted Mac Mini, signed and notarized
  build-cli-darwin:
    name: Build CLI (darwin)
    runs-on: macos-arm64-self-hosted
    steps:
      - uses: actions/checkout@v6
      - name: Add Homebrew to PATH
        run: echo "/opt/homebrew/bin" >> "$GITHUB_PATH"
      - name: Read CLI component version
        id: compver
        run: |
          ver=$(tr -d '\n' < cli/VERSION)
          echo "value=${ver}" >> "$GITHUB_OUTPUT"
      - uses: actions/setup-go@v6
        with:
          go-version-file: .go-version
          cache-dependency-path: cli/go.sum
        env:
          GOTOOLCHAIN: local

      - name: Build CLI darwin/arm64
        run: |
          set -euo pipefail
          mkdir -p dist/cli
          cd cli
          GOOS=darwin GOARCH=arm64 CGO_ENABLED=0 \
            go build -ldflags "-X frameworks/pkg/version.Version=${{ github.ref_name }} -X frameworks/pkg/version.GitCommit=${{ github.sha }} -X frameworks/pkg/version.BuildDate=$(date -u '+%Y-%m-%dT%H:%M:%SZ') -X frameworks/pkg/version.ComponentName=cli -X frameworks/pkg/version.ComponentVersion=${{ steps.compver.outputs.value }}" -o "frameworks-darwin-arm64" .
          mv "frameworks-darwin-arm64" "../dist/cli/frameworks-darwin-arm64"

      - name: Setup signing keychain
        env:
          APPLE_CERTIFICATE_P12: ${{ secrets.APPLE_CERTIFICATE_P12 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: ./scripts/ci/setup-signing-keychain.sh

      - name: Sign and notarize darwin CLI artifact
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          binary="dist/cli/frameworks-darwin-arm64"
          release_zip="dist/cli/frameworks-cli-v${VERSION}-darwin-arm64.zip"
          staging_dir="$(mktemp -d)"
          trap 'rm -rf "$staging_dir"' EXIT

          codesign --sign "${{ secrets.APPLE_DEVELOPER_ID }}" \
                   --timestamp --options runtime \
                   "$binary"
          codesign --verify --verbose=2 "$binary"

          cp "$binary" "$staging_dir/frameworks"
          ditto -c -k --keepParent "$staging_dir/frameworks" "$release_zip"
          xcrun notarytool submit "$release_zip" \
            --apple-id "${{ secrets.APPLE_ID }}" \
            --password "${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}" \
            --team-id "${{ secrets.APPLE_TEAM_ID }}" \
            --wait

      - name: Upload CLI artifact
        uses: actions/upload-artifact@v7
        with:
          name: cli-darwin-arm64
          path: dist/cli/*

      - name: Clean up signing keychain
        if: always()
        run: ./scripts/ci/cleanup-signing-keychain.sh

  # Linux/amd64 service binaries — built on GitHub-hosted ubuntu runner
  build-service-binaries-amd64:
    name: Build Service Binaries (linux/amd64)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: .go-version
        env:
          GOTOOLCHAIN: local

      - name: Install zig (for CGO cross-compilation)
        uses: mlugg/setup-zig@v2

      - name: Build all service binaries
        env:
          GOOS: linux
          GOARCH: amd64
        run: |
          set -euo pipefail
          COMPONENTS_FILE=".github/release-components.json"
          VERSION="${{ github.ref_name }}"
          BUILD_DATE="$(date -u '+%Y-%m-%dT%H:%M:%SZ')"
          mkdir -p dist/binaries

          jq -c '.services[] | {name, context, cmd, cgo}' "$COMPONENTS_FILE" | while read -r svc; do
            name=$(echo "$svc" | jq -r .name)
            context=$(echo "$svc" | jq -r .context)
            cmd=$(echo "$svc" | jq -r .cmd)
            cgo=$(echo "$svc" | jq -r .cgo)

            echo "==> Building ${name} (linux/amd64)"

            if [[ -f "${context}/VERSION" ]]; then
              svcver=$(tr -d '\n' < "${context}/VERSION")
            else
              svcver="0.0.0"
            fi

            BINARY="frameworks-${name}-linux-amd64"
            OUTPUT="frameworks-${name}-${VERSION}-linux-amd64"

            if [[ "$cgo" == "true" ]]; then
              export CGO_ENABLED=1
              export CC="zig cc -target x86_64-linux-musl"
              export CXX="zig c++ -target x86_64-linux-musl"
            else
              export CGO_ENABLED=0
              unset CC CXX 2>/dev/null || true
            fi

            (cd "$context" && go build -ldflags "\
              -X frameworks/pkg/version.Version=${VERSION} \
              -X frameworks/pkg/version.GitCommit=${{ github.sha }} \
              -X frameworks/pkg/version.BuildDate=${BUILD_DATE} \
              -X frameworks/pkg/version.ComponentName=${name} \
              -X frameworks/pkg/version.ComponentVersion=${svcver} \
              -s -w" \
              -o "${BINARY}" \
              "${cmd}")

            tar czf "dist/binaries/${OUTPUT}.tar.gz" -C "${context}" "${BINARY}"
            rm "${context}/${BINARY}"
          done

      - name: Upload binary artifact
        uses: actions/upload-artifact@v7
        with:
          name: binary-all-linux-amd64
          path: dist/binaries/*.tar.gz

  # Linux/arm64 service binaries — built on GitHub-hosted ARM runner (native, no QEMU)
  build-service-binaries-arm64:
    name: Build Service Binaries (linux/arm64)
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: .go-version
        env:
          GOTOOLCHAIN: local

      - name: Install zig (for CGO cross-compilation)
        uses: mlugg/setup-zig@v2

      - name: Build all service binaries
        env:
          GOOS: linux
          GOARCH: arm64
        run: |
          set -euo pipefail
          COMPONENTS_FILE=".github/release-components.json"
          VERSION="${{ github.ref_name }}"
          BUILD_DATE="$(date -u '+%Y-%m-%dT%H:%M:%SZ')"
          mkdir -p dist/binaries

          jq -c '.services[] | {name, context, cmd, cgo}' "$COMPONENTS_FILE" | while read -r svc; do
            name=$(echo "$svc" | jq -r .name)
            context=$(echo "$svc" | jq -r .context)
            cmd=$(echo "$svc" | jq -r .cmd)
            cgo=$(echo "$svc" | jq -r .cgo)

            echo "==> Building ${name} (linux/arm64)"

            if [[ -f "${context}/VERSION" ]]; then
              svcver=$(tr -d '\n' < "${context}/VERSION")
            else
              svcver="0.0.0"
            fi

            BINARY="frameworks-${name}-linux-arm64"
            OUTPUT="frameworks-${name}-${VERSION}-linux-arm64"

            if [[ "$cgo" == "true" ]]; then
              export CGO_ENABLED=1
              export CC="zig cc -target aarch64-linux-musl"
              export CXX="zig c++ -target aarch64-linux-musl"
            else
              export CGO_ENABLED=0
              unset CC CXX 2>/dev/null || true
            fi

            (cd "$context" && go build -ldflags "\
              -X frameworks/pkg/version.Version=${VERSION} \
              -X frameworks/pkg/version.GitCommit=${{ github.sha }} \
              -X frameworks/pkg/version.BuildDate=${BUILD_DATE} \
              -X frameworks/pkg/version.ComponentName=${name} \
              -X frameworks/pkg/version.ComponentVersion=${svcver} \
              -s -w" \
              -o "${BINARY}" \
              "${cmd}")

            tar czf "dist/binaries/${OUTPUT}.tar.gz" -C "${context}" "${BINARY}"
            rm "${context}/${BINARY}"
          done

      - name: Upload binary artifact
        uses: actions/upload-artifact@v7
        with:
          name: binary-all-linux-arm64
          path: dist/binaries/*.tar.gz

  # Darwin/arm64 service binaries — built on self-hosted Mac, signed and notarized.
  # CGO services (quartermaster, foghorn) are skipped — no darwin binary for those.
  build-service-binaries-darwin:
    name: Build Service Binaries (darwin/arm64)
    runs-on: macos-arm64-self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Add Homebrew to PATH
        run: echo "/opt/homebrew/bin" >> "$GITHUB_PATH"

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: .go-version
        env:
          GOTOOLCHAIN: local

      - name: Setup signing keychain
        env:
          APPLE_CERTIFICATE_P12: ${{ secrets.APPLE_CERTIFICATE_P12 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: ./scripts/ci/setup-signing-keychain.sh

      - name: Build, sign, and notarize all darwin binaries
        run: |
          set -euo pipefail
          COMPONENTS_FILE=".github/release-components.json"
          VERSION="${{ github.ref_name }}"
          BUILD_DATE="$(date -u '+%Y-%m-%dT%H:%M:%SZ')"
          mkdir -p dist/binaries

          jq -c '.services[] | select(.darwin_binary) | {name, context, cmd}' "$COMPONENTS_FILE" | while read -r svc; do
            name=$(echo "$svc" | jq -r .name)
            context=$(echo "$svc" | jq -r .context)
            cmd=$(echo "$svc" | jq -r .cmd)

            echo "==> Building ${name} (darwin/arm64)"

            if [[ -f "${context}/VERSION" ]]; then
              svcver=$(tr -d '\n' < "${context}/VERSION")
            else
              svcver="0.0.0"
            fi

            BINARY="frameworks-${name}-darwin-arm64"
            OUTPUT="frameworks-${name}-${VERSION}-darwin-arm64.zip"

            (cd "$context" && GOOS=darwin GOARCH=arm64 CGO_ENABLED=0 go build -ldflags "\
              -X frameworks/pkg/version.Version=${VERSION} \
              -X frameworks/pkg/version.GitCommit=${{ github.sha }} \
              -X frameworks/pkg/version.BuildDate=${BUILD_DATE} \
              -X frameworks/pkg/version.ComponentName=${name} \
              -X frameworks/pkg/version.ComponentVersion=${svcver} \
              -s -w" \
              -o "${BINARY}" \
              "${cmd}")

            # Sign
            codesign --sign "${{ secrets.APPLE_DEVELOPER_ID }}" \
                     --timestamp --options runtime \
                     "${context}/${BINARY}"
            codesign --verify --verbose=2 "${context}/${BINARY}"

            # Notarize the final shipped zip artifact
            ditto -c -k --keepParent "${context}/${BINARY}" "dist/binaries/${OUTPUT}"
            xcrun notarytool submit "dist/binaries/${OUTPUT}" \
              --apple-id "${{ secrets.APPLE_ID }}" \
              --password "${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}" \
              --team-id "${{ secrets.APPLE_TEAM_ID }}" \
              --wait
            rm "${context}/${BINARY}"
          done

      - name: Upload binary artifact
        uses: actions/upload-artifact@v7
        with:
          name: binary-all-darwin-arm64
          path: dist/binaries/*.zip

      - name: Clean up signing keychain
        if: always()
        run: ./scripts/ci/cleanup-signing-keychain.sh

  # macOS tray app — FrameWorks desktop client (menu bar app).
  # Built with Xcode via XcodeGen, signed and notarized on the Mac runner.
  build-tray-app:
    name: Build macOS Tray App
    runs-on: macos-arm64-self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Add Homebrew to PATH
        run: echo "/opt/homebrew/bin" >> "$GITHUB_PATH"

      - name: Setup signing keychain
        env:
          APPLE_CERTIFICATE_P12: ${{ secrets.APPLE_CERTIFICATE_P12 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: ./scripts/ci/setup-signing-keychain.sh

      - name: Generate GQL Swift constants
        run: ./scripts/generate-swift-gql.sh

      - name: Generate Xcode project
        working-directory: app_mac
        run: xcodegen generate

      - name: Set version from tag
        working-directory: app_mac
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          BUILD_NUMBER="${GITHUB_RUN_NUMBER}"
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString ${VERSION}" Info.plist
          /usr/libexec/PlistBuddy -c "Add :CFBundleVersion string ${BUILD_NUMBER}" Info.plist 2>/dev/null || \
            /usr/libexec/PlistBuddy -c "Set :CFBundleVersion ${BUILD_NUMBER}" Info.plist

      - name: Archive
        working-directory: app_mac
        run: |
          xcodebuild archive \
            -project FrameWorks.xcodeproj \
            -scheme FrameWorks \
            -configuration Release \
            -archivePath build/FrameWorks.xcarchive \
            ENABLE_HARDENED_RUNTIME=YES \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM="${{ secrets.APPLE_TEAM_ID }}" \
            CODE_SIGN_IDENTITY="${{ secrets.APPLE_DEVELOPER_ID }}"

      - name: Export archive
        working-directory: app_mac
        run: |
          cat > build/ExportOptions.plist <<'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>developer-id</string>
            <key>teamID</key>
            <string>${{ secrets.APPLE_TEAM_ID }}</string>
          </dict>
          </plist>
          PLIST

          xcodebuild -exportArchive \
            -archivePath build/FrameWorks.xcarchive \
            -exportOptionsPlist build/ExportOptions.plist \
            -exportPath build/export

      - name: Verify signature
        working-directory: app_mac
        run: codesign --verify --verbose=2 build/export/FrameWorks.app

      - name: Notarize
        working-directory: app_mac
        run: |
          ditto -c -k --keepParent build/export/FrameWorks.app build/FrameWorks-notarize.zip
          xcrun notarytool submit build/FrameWorks-notarize.zip \
            --apple-id "${{ secrets.APPLE_ID }}" \
            --team-id "${{ secrets.APPLE_TEAM_ID }}" \
            --password "${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}" \
            --wait
          xcrun stapler staple build/export/FrameWorks.app

      - name: Verify Gatekeeper acceptance
        working-directory: app_mac
        run: spctl -a -vvv build/export/FrameWorks.app

      - name: Package artifacts
        working-directory: app_mac
        run: |
          VERSION="${GITHUB_REF_NAME#v}"

          # .zip for Homebrew Cask
          ditto -c -k --keepParent build/export/FrameWorks.app "build/FrameWorks-v${VERSION}.zip"
          shasum -a 256 "build/FrameWorks-v${VERSION}.zip" > "build/FrameWorks-v${VERSION}.zip.sha256"

          # .dmg for direct download
          mkdir -p build/dmg-staging
          cp -R build/export/FrameWorks.app build/dmg-staging/
          ln -s /Applications build/dmg-staging/Applications
          hdiutil create -volname "FrameWorks" -srcfolder build/dmg-staging \
            -ov -format UDZO "build/FrameWorks-v${VERSION}.dmg"
          codesign --sign "${{ secrets.APPLE_DEVELOPER_ID }}" --timestamp --options runtime \
            "build/FrameWorks-v${VERSION}.dmg"

          xcrun notarytool submit "build/FrameWorks-v${VERSION}.dmg" \
            --apple-id "${{ secrets.APPLE_ID }}" \
            --password "${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}" \
            --team-id "${{ secrets.APPLE_TEAM_ID }}" \
            --wait
          xcrun stapler staple "build/FrameWorks-v${VERSION}.dmg"

          shasum -a 256 "build/FrameWorks-v${VERSION}.dmg" > "build/FrameWorks-v${VERSION}.dmg.sha256"

      - name: Upload tray app artifacts
        uses: actions/upload-artifact@v7
        with:
          name: tray-app-darwin
          path: |
            app_mac/build/FrameWorks-v*.zip
            app_mac/build/FrameWorks-v*.zip.sha256
            app_mac/build/FrameWorks-v*.dmg
            app_mac/build/FrameWorks-v*.dmg.sha256

      - name: Clean up signing keychain
        if: always()
        run: ./scripts/ci/cleanup-signing-keychain.sh

  # macOS .pkg installer — bundles CLI + optional tray app.
  build-darwin-pkg:
    name: Build macOS .pkg
    needs: [build-cli-darwin, build-tray-app]
    runs-on: macos-arm64-self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Add Homebrew to PATH
        run: echo "/opt/homebrew/bin" >> "$GITHUB_PATH"

      - name: Download CLI darwin/arm64 binary
        uses: actions/download-artifact@v8
        with:
          name: cli-darwin-arm64
          path: dist/cli

      - name: Prepare CLI binary
        run: |
          cd dist/cli
          cp frameworks-darwin-arm64 frameworks
          chmod 755 frameworks

      - name: Setup signing keychain
        env:
          APPLE_CERTIFICATE_P12: ${{ secrets.APPLE_CERTIFICATE_P12 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_INSTALLER_P12: ${{ secrets.APPLE_INSTALLER_P12 }}
          APPLE_INSTALLER_PASSWORD: ${{ secrets.APPLE_INSTALLER_PASSWORD }}
        run: ./scripts/ci/setup-signing-keychain.sh

      - name: Download tray app
        uses: actions/download-artifact@v8
        with:
          name: tray-app-darwin
          path: dist/tray
        continue-on-error: true

      - name: Extract tray app for .pkg bundling
        run: |
          if ls dist/tray/FrameWorks-v*.zip 1>/dev/null 2>&1; then
            cd dist/tray
            unzip -q FrameWorks-v*.zip
            echo "Tray app extracted for .pkg bundling"
          else
            echo "No tray app artifact — .pkg will contain CLI only"
          fi

      - name: Build .pkg
        env:
          APPLE_DEVELOPER_ID: ${{ secrets.APPLE_DEVELOPER_ID }}
          APPLE_INSTALLER_ID: ${{ secrets.APPLE_INSTALLER_ID }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          TRAY_ARG=""
          if [ -d "dist/tray/FrameWorks.app" ]; then
            TRAY_ARG="dist/tray/FrameWorks.app"
          fi
          ./scripts/macos-pkg/build-pkg.sh \
            "${VERSION}" \
            dist/cli/frameworks \
            ${TRAY_ARG}

      - name: Upload .pkg artifact
        uses: actions/upload-artifact@v7
        with:
          name: darwin-pkg
          path: dist/pkg/frameworks-*.pkg*

      - name: Clean up signing keychain
        if: always()
        run: ./scripts/ci/cleanup-signing-keychain.sh

  manifest:
    name: Generate & Publish Manifest
    needs:
      - merge-image-manifests
      - merge-webapp-manifests
      - build-cli
      - build-cli-darwin
      - build-service-binaries-amd64
      - build-service-binaries-arm64
      - build-service-binaries-darwin
      - build-tray-app
      - build-darwin-pkg
    runs-on: ubuntu-latest
    permissions:
      contents: write # softprops/action-gh-release uploads release assets
      packages: read # docker login to pull image digests for manifest generation
    steps:
      - uses: actions/checkout@v6
      - name: Generate release metadata GitHub App token
        id: release-metadata-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ vars.GITOPS_APP_ID }}
          private-key: ${{ secrets.GITOPS_APP_PRIVATE_KEY }}
          repositories: go-livepeer,mistserver
      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Download image digest artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: image-digest-*
          path: dist/digests
          merge-multiple: true

      # Native binary tarballs / zips are pulled in so the manifest can embed
      # per-artifact sha256 checksums. Without these, consumers that download
      # via get_url have no integrity check (bypassing the artifact-pinning
      # model for non-infra binaries).
      - name: Download linux/amd64 binary artifacts for checksumming
        uses: actions/download-artifact@v8
        with:
          name: binary-all-linux-amd64
          path: dist/binaries-linux-amd64
      - name: Download linux/arm64 binary artifacts for checksumming
        uses: actions/download-artifact@v8
        with:
          name: binary-all-linux-arm64
          path: dist/binaries-linux-arm64
      - name: Download darwin/arm64 binary artifacts for checksumming
        uses: actions/download-artifact@v8
        with:
          name: binary-all-darwin-arm64
          path: dist/binaries-darwin-arm64

      - name: Fetch go-livepeer metadata from latest release
        id: golivepeer
        env:
          GH_APP_TOKEN: ${{ steps.release-metadata-token.outputs.token }}
        run: |
          set -euo pipefail

          BODY_FILE="$(mktemp)"
          HEADER_FILE="$(mktemp)"
          trap 'rm -f "$BODY_FILE" "$HEADER_FILE"' EXIT

          STATUS="$(
            curl -sSL \
              -D "$HEADER_FILE" \
              -o "$BODY_FILE" \
              -w '%{http_code}' \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer ${GH_APP_TOKEN}" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              https://api.github.com/repos/Livepeer-FrameWorks/go-livepeer/releases/latest
          )"

          if [ "$STATUS" != "200" ]; then
            echo "GitHub API request failed for go-livepeer latest release: HTTP ${STATUS}"
            echo "Response headers:"
            cat "$HEADER_FILE"
            echo "Response body:"
            cat "$BODY_FILE"
            exit 1
          fi

          RELEASE="$(cat "$BODY_FILE")"

          TAG=$(echo "$RELEASE" | jq -re '.tag_name')
          RELEASE_URL=$(echo "$RELEASE" | jq -re '.html_url')
          ASSETS=$(echo "$RELEASE" | jq -c '[.assets[] | {name:.name, url:.browser_download_url, size:.size}]')

          # go-livepeer docker tags match git tags (metadata-action type=ref,event=tag)
          # Fetch digest directly from registry — no dependency on release assets
          DIGEST="sha256:$(docker buildx imagetools inspect "ghcr.io/livepeer-frameworks/go-livepeer:${TAG}" --raw | sha256sum | cut -d' ' -f1)"

          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "digest=${DIGEST}" >> "$GITHUB_OUTPUT"
          echo "release_tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "release_url=${RELEASE_URL}" >> "$GITHUB_OUTPUT"
          echo "assets=${ASSETS}" >> "$GITHUB_OUTPUT"
          echo "Fetched go-livepeer latest release: ${TAG}"
          echo "Docker tag: ${TAG}, Digest: ${DIGEST}"

      - name: Fetch MistServer metadata from latest release
        id: mistserver
        env:
          GH_APP_TOKEN: ${{ steps.release-metadata-token.outputs.token }}
        run: |
          set -euo pipefail

          BODY_FILE="$(mktemp)"
          HEADER_FILE="$(mktemp)"
          trap 'rm -f "$BODY_FILE" "$HEADER_FILE"' EXIT

          STATUS="$(
            curl -sSL \
              -D "$HEADER_FILE" \
              -o "$BODY_FILE" \
              -w '%{http_code}' \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer ${GH_APP_TOKEN}" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              https://api.github.com/repos/Livepeer-FrameWorks/mistserver/releases/latest
          )"

          if [ "$STATUS" != "200" ]; then
            echo "GitHub API request failed for MistServer latest release: HTTP ${STATUS}"
            echo "Response headers:"
            cat "$HEADER_FILE"
            echo "Response body:"
            cat "$BODY_FILE"
            exit 1
          fi

          RELEASE="$(cat "$BODY_FILE")"

          TAG=$(echo "$RELEASE" | jq -re '.tag_name')
          TAG_URL=$(echo "$RELEASE" | jq -re '.assets[] | select(.name=="docker-tag.txt") | .browser_download_url')
          RELEASE_URL=$(echo "$RELEASE" | jq -re '.html_url')
          ASSETS=$(echo "$RELEASE" | jq -c '[.assets[] | {name:.name, url:.browser_download_url, size:.size}]')

          DOCKER_TAG=$(curl -fsSL "$TAG_URL")
          DIGEST="sha256:$(docker buildx imagetools inspect "ghcr.io/livepeer-frameworks/mistserver:${DOCKER_TAG}" --raw | sha256sum | cut -d' ' -f1)"

          echo "digest=${DIGEST}" >> "$GITHUB_OUTPUT"
          echo "tag=${DOCKER_TAG}" >> "$GITHUB_OUTPUT"
          echo "release_tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "release_url=${RELEASE_URL}" >> "$GITHUB_OUTPUT"
          echo "assets=${ASSETS}" >> "$GITHUB_OUTPUT"
          echo "Fetched MistServer latest release: ${TAG}"
          echo "Docker tag: ${DOCKER_TAG}, Digest: ${DIGEST}"

      - name: Generate manifest
        run: |
          set -euo pipefail
          COMPONENTS_FILE=".github/release-components.json"
          WEBAPP_NAMES="$(jq -r '.webapps[].name' "$COMPONENTS_FILE")"
          CGO_SERVICES="$(jq -r '.services[] | select(.cgo) | .name' "$COMPONENTS_FILE")"
          BINARY_ONLY_SERVICES="$(jq -r '.services[] | select(.dockerfile == null) | .name' "$COMPONENTS_FILE")"

          # Header
          cat > dist/manifest.yaml <<YAML
          platform_version: ${{ github.ref_name }}
          git_commit: ${{ github.sha }}
          release_date: $(date -u '+%Y-%m-%dT%H:%M:%SZ')

          YAML

          # Services (microservices with service_version field)
          echo "services:" >> dist/manifest.yaml
          for f in dist/digests/*.json; do
            name=$(jq -r .name "$f")
            # Skip interfaces - they go in interfaces section
            if echo "$WEBAPP_NAMES" | grep -qx "$name"; then
              continue
            fi

            image=$(jq -r .image "$f")
            digest=$(jq -r .digest "$f")
            svcver=$(jq -r .service_version "$f")

            cat >> dist/manifest.yaml <<YAML
            - name: ${name}
              service_version: ${svcver}
              image: ${image}
              digest: ${digest}
          YAML
          done

          # Native Binaries (for bare-metal deployment).
          # Each artifact embeds a sha256 checksum computed from the built
          # tarball/zip so consumers can do integrity-verified downloads.
          RELEASE_DL="${{ github.server_url }}/${{ github.repository }}/releases/download/${{ github.ref_name }}"
          echo "" >> dist/manifest.yaml
          echo "native_binaries:" >> dist/manifest.yaml

          artifact_sha256() {
            local path="$1"
            if [ -f "$path" ]; then
              echo "sha256:$(sha256sum "$path" | awk '{print $1}')"
            else
              # Missing artifact — fail loudly so the release is rejected.
              # A checksum-less entry would let consumers download unverified.
              echo "missing artifact for manifest: $path" >&2
              exit 1
            fi
          }

          emit_linux_artifacts() {
            local svc="$1"
            local amd_file="frameworks-${svc}-${{ github.ref_name }}-linux-amd64.tar.gz"
            local arm_file="frameworks-${svc}-${{ github.ref_name }}-linux-arm64.tar.gz"
            local amd_sum arm_sum
            amd_sum="$(artifact_sha256 "dist/binaries-linux-amd64/${amd_file}")"
            arm_sum="$(artifact_sha256 "dist/binaries-linux-arm64/${arm_file}")"
            cat >> dist/manifest.yaml <<YAML
                - arch: linux-amd64
                  file: ${amd_file}
                  url: ${RELEASE_DL}/${amd_file}
                  checksum: ${amd_sum}
                - arch: linux-arm64
                  file: ${arm_file}
                  url: ${RELEASE_DL}/${arm_file}
                  checksum: ${arm_sum}
          YAML
          }

          emit_darwin_artifact() {
            local svc="$1"
            local file="frameworks-${svc}-${{ github.ref_name }}-darwin-arm64.zip"
            local sum
            sum="$(artifact_sha256 "dist/binaries-darwin-arm64/${file}")"
            cat >> dist/manifest.yaml <<YAML
                - arch: darwin-arm64
                  file: ${file}
                  url: ${RELEASE_DL}/${file}
                  checksum: ${sum}
          YAML
          }

          for f in dist/digests/*.json; do
            name=$(jq -r .name "$f")
            if echo "$WEBAPP_NAMES" | grep -qx "$name"; then
              continue
            fi
            cat >> dist/manifest.yaml <<YAML
            - name: ${name}
              artifacts:
          YAML
            emit_linux_artifacts "$name"
            if ! echo "$CGO_SERVICES" | grep -qx "$name"; then
              emit_darwin_artifact "$name"
            fi
          done

          # Binary-only services (no Docker image, only native binaries)
          for svc in $BINARY_ONLY_SERVICES; do
            cat >> dist/manifest.yaml <<YAML
            - name: ${svc}
              artifacts:
          YAML
            emit_linux_artifacts "$svc"
            emit_darwin_artifact "$svc"
          done

          # Interfaces (reference implementations)
          echo "" >> dist/manifest.yaml
          echo "interfaces:" >> dist/manifest.yaml
          for f in dist/digests/*.json; do
            name=$(jq -r .name "$f")
            # Only include interfaces
            if ! echo "$WEBAPP_NAMES" | grep -qx "$name"; then
              continue
            fi

            image=$(jq -r .image "$f")
            digest=$(jq -r .digest "$f")

            bundle="${name}-build.tar.gz"

            cat >> dist/manifest.yaml <<YAML
            - name: ${name}
              image: ${image}
              digest: ${digest}
              static_bundle: ${bundle}
          YAML
          done

          # External Dependencies (MistServer from separate repo)
          echo "" >> dist/manifest.yaml
          cat >> dist/manifest.yaml <<YAML
          external_dependencies:
            - name: mistserver
              image: ghcr.io/livepeer-frameworks/mistserver:${{ steps.mistserver.outputs.tag }}
              digest: "${{ steps.mistserver.outputs.digest }}"
              release_url: "${{ steps.mistserver.outputs.release_url }}"
              release_tag: "${{ steps.mistserver.outputs.release_tag }}"
          YAML

          mist_assets='${{ steps.mistserver.outputs.assets }}'
          if [[ -n "$mist_assets" && "$mist_assets" != "null" && "$mist_assets" != "[]" ]]; then
            echo "    binaries:" >> dist/manifest.yaml
            echo "$mist_assets" | jq -r '.[] | "      - name: \(.name)\n        url: \(.url)" + (if .size then "\n        size_bytes: \(.size)" else "" end)' >> dist/manifest.yaml
          fi

          cat >> dist/manifest.yaml <<YAML
            - name: go-livepeer
              image: ghcr.io/livepeer-frameworks/go-livepeer:${{ steps.golivepeer.outputs.tag }}
              digest: "${{ steps.golivepeer.outputs.digest }}"
              release_url: "${{ steps.golivepeer.outputs.release_url }}"
              release_tag: "${{ steps.golivepeer.outputs.release_tag }}"
          YAML

          lp_assets='${{ steps.golivepeer.outputs.assets }}'
          if [[ -n "$lp_assets" && "$lp_assets" != "null" && "$lp_assets" != "[]" ]]; then
            echo "    binaries:" >> dist/manifest.yaml
            echo "$lp_assets" | jq -r '.[] | select(.name | test("linux|darwin")) | "      - name: \(.name)\n        url: \(.url)" + (if .size then "\n        size_bytes: \(.size)" else "" end)' >> dist/manifest.yaml
          fi

          # Infrastructure Requirements (from config/infrastructure.yaml)
          echo "" >> dist/manifest.yaml
          cat config/infrastructure.yaml >> dist/manifest.yaml
      - name: Upload manifest artifact
        uses: actions/upload-artifact@v7
        with:
          name: release-manifest
          path: dist/manifest.yaml
      - name: Download CLI artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: cli-*
          path: dist/cli
          merge-multiple: true
      - name: Package CLI binaries as tarballs
        run: |
          set -euo pipefail
          cd dist/cli
          VERSION="${GITHUB_REF_NAME#v}"
          shopt -s nullglob
          for f in frameworks-*; do
            [[ "$f" == *.sha256 ]] && continue
            [[ "$f" == *.tar.gz ]] && continue
            [[ "$f" == *.zip ]] && continue
            [[ "$f" == *darwin-arm64 ]] && { rm -f "$f"; continue; }
            tarball="frameworks-cli-v${VERSION}-${f#frameworks-}.tar.gz"
            cp "$f" frameworks
            tar czf "$tarball" frameworks
            rm frameworks
            rm -f "$f"
          done

          for artifact in frameworks-cli-v${VERSION}-linux-*.tar.gz frameworks-cli-v${VERSION}-darwin-arm64.zip; do
            [ -f "$artifact" ] || continue
            sha256sum "$artifact" > "${artifact}.sha256"
          done
      - name: Download service binary artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: binary-*
          path: dist/binaries
          merge-multiple: true
      - name: Generate SHA256 checksums for service binaries
        run: |
          set -euo pipefail
          cd dist/binaries
          for artifact in *.tar.gz *.zip; do
            [ -f "$artifact" ] || continue
            sha256sum "$artifact" > "${artifact}.sha256"
          done
      - name: Download chartroom bundle
        uses: actions/download-artifact@v8
        with:
          name: chartroom-bundle
          path: dist/
      - name: Download foredeck bundle
        uses: actions/download-artifact@v8
        with:
          name: foredeck-bundle
          path: dist/
      - name: Download logbook bundle
        uses: actions/download-artifact@v8
        with:
          name: logbook-bundle
          path: dist/
      - name: Generate SHA256 checksums for webapp bundles
        run: |
          set -euo pipefail
          cd dist
          for bundle in chartroom-build.tar.gz foredeck-build.tar.gz logbook-build.tar.gz; do
            [ -f "$bundle" ] || continue
            sha256sum "$bundle" > "${bundle}.sha256"
          done
      - name: Download macOS .pkg
        uses: actions/download-artifact@v8
        with:
          name: darwin-pkg
          path: dist/pkg
        continue-on-error: true
      - name: Download tray app artifacts
        uses: actions/download-artifact@v8
        with:
          name: tray-app-darwin
          path: dist/tray
        continue-on-error: true
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            dist/manifest.yaml
            dist/cli/*
            dist/binaries/*.tar.gz
            dist/binaries/*.tar.gz.sha256
            dist/binaries/*.zip
            dist/binaries/*.zip.sha256
            dist/pkg/*
            dist/tray/*
            dist/chartroom-build.tar.gz
            dist/chartroom-build.tar.gz.sha256
            dist/foredeck-build.tar.gz
            dist/foredeck-build.tar.gz.sha256
            dist/logbook-build.tar.gz
            dist/logbook-build.tar.gz.sha256
            scripts/install.sh

      - name: Generate Homebrew tap token
        id: homebrew-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ vars.GITOPS_APP_ID }}
          private-key: ${{ secrets.GITOPS_APP_PRIVATE_KEY }}
          repositories: homebrew-tap
        continue-on-error: true

      - name: Bump Homebrew tap
        if: steps.homebrew-token.outcome == 'success'
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          git clone "https://x-access-token:${{ steps.homebrew-token.outputs.token }}@github.com/Livepeer-FrameWorks/homebrew-tap.git" /tmp/homebrew-tap
          bash /tmp/homebrew-tap/scripts/bump.sh "${VERSION}" "${{ steps.homebrew-token.outputs.token }}"
        continue-on-error: true

  update-env:
    name: Update GitOps Environment Repo
    needs: [manifest]
    runs-on: ubuntu-latest
    env:
      ENV_REPO: Livepeer-FrameWorks/gitops
      RELEASE_BRANCH: release/${{ github.ref_name }}
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ vars.GITOPS_APP_ID }}
          private-key: ${{ secrets.GITOPS_APP_PRIVATE_KEY }}
          repositories: gitops
      - name: Checkout env repo
        uses: actions/checkout@v6
        with:
          repository: ${{ env.ENV_REPO }}
          token: ${{ steps.app-token.outputs.token }}
          path: env-repo
      - name: Download manifest artifact
        uses: actions/download-artifact@v8
        with:
          name: release-manifest
          path: dist
      - name: Commit and push manifest to env repo
        run: |
          set -euo pipefail
          cd env-repo

          # Create release manifest
          mkdir -p releases
          cp ../dist/manifest.yaml releases/${{ github.ref_name }}.yaml

          # Update channel pointer
          channel="stable"
          if [[ "${{ github.ref_name }}" =~ -rc($|([.-]?[0-9]+)$) ]]; then channel="rc"; fi
          mkdir -p channels
          cat > channels/${channel}.yaml <<YAML
          platform_version: ${{ github.ref_name }}
          manifest: releases/${{ github.ref_name }}.yaml
          updated_at: $(date -u '+%Y-%m-%dT%H:%M:%SZ')
          YAML

          # Commit and push
          git config user.name "github-actions"
          git config user.email "github-actions@users.noreply.github.com"

          # Fetch branch if it exists
          git fetch origin "${RELEASE_BRANCH}" || true

          # Create or reset to new content
          git checkout -B "${RELEASE_BRANCH}"
          git add releases/${{ github.ref_name }}.yaml channels/${channel}.yaml
          git commit -m "Release manifest for ${{ github.ref_name }}"
          git push --force origin "${RELEASE_BRANCH}"

      - name: Create or update PR to env repo
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          cd env-repo

          # Check if PR already exists
          PR_NUMBER=$(gh pr list \
            --repo "${{ env.ENV_REPO }}" \
            --head "${RELEASE_BRANCH}" \
            --base main \
            --json number \
            --jq '.[0].number' 2>/dev/null || echo "")

          if [[ -n "$PR_NUMBER" ]]; then
            echo "PR #${PR_NUMBER} already exists and was updated via branch push"
            echo "https://github.com/${{ env.ENV_REPO }}/pull/${PR_NUMBER}"
          else
            gh pr create \
              --repo "${{ env.ENV_REPO }}" \
              --base main \
              --head "${RELEASE_BRANCH}" \
              --title "Release ${{ github.ref_name }} manifest" \
              --body "This PR adds the release manifest for ${{ github.ref_name }}.

          It maps each service to image@digest and includes component versions.

          **Platform Version:** \`${{ github.ref_name }}\`
          **Git Commit:** \`${{ github.sha }}\`
          **Release Date:** \`$(date -u '+%Y-%m-%dT%H:%M:%SZ')\`"
          fi
