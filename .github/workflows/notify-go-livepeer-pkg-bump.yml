# Notify go-livepeer when packages it imports from monorepo/pkg change on
# master so it can open an auto-bump PR. Pairs with
# .github/workflows/bump-monorepo-pkg.yaml in Livepeer-FrameWorks/go-livepeer;
# that workflow runs `go get monorepo/pkg@<sha>` and opens a PR.
#
name: Notify go-livepeer pkg bump

on:
  push:
    branches: [master]
    paths:
      - "pkg/**"
      - "scripts/ci/go-livepeer-pkg-impact.sh"
      - ".github/workflows/notify-go-livepeer-pkg-bump.yml"

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version-file: pkg/go.mod

      - name: Check go-livepeer pkg impact
        id: impact
        run: scripts/ci/go-livepeer-pkg-impact.sh "${{ github.event.before }}" "${{ github.sha }}"

      - name: Generate go-livepeer GitHub App token
        if: steps.impact.outputs.affected == 'true'
        id: go-livepeer-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ vars.GITOPS_APP_ID }}
          private-key: ${{ secrets.GITOPS_APP_PRIVATE_KEY }}
          repositories: go-livepeer

      - name: Send repository_dispatch
        if: steps.impact.outputs.affected == 'true'
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ steps.go-livepeer-token.outputs.token }}
          repository: Livepeer-FrameWorks/go-livepeer
          event-type: monorepo-pkg-changed
          client-payload: |
            {
              "monorepo_sha": "${{ github.sha }}",
              "monorepo_short_sha": "${{ github.sha }}",
              "monorepo_ref": "${{ github.ref }}",
              "triggered_by": "${{ github.event.head_commit.message }}"
            }
