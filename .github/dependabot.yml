version: 2
updates:
  # Go modules - keep the workspace together. Service modules use
  # replace ../pkg, so pkg dependency bumps can require service go.sum
  # updates even when service go.mod files do not change directly.
  - package-ecosystem: gomod
    directories:
      - /pkg
      - /api_analytics_ingest
      - /api_analytics_query
      - /api_assets
      - /api_balancing
      - /api_billing
      - /api_consultant
      - /api_control
      - /api_dns
      - /api_firehose
      - /api_forms
      - /api_gateway
      - /api_mesh
      - /api_realtime
      - /api_sidecar
      - /api_tenants
      - /api_ticketing
      - /cli
      - /scripts/env
      - /scripts/registry
      - /tools/release-plan
    schedule:
      interval: weekly
    groups:
      go-deps:
        patterns: ["*"]

  # Node/pnpm - root workspace
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    groups:
      npm-deps:
        patterns: ["*"]
        exclude-patterns: ["@types/*"]
      npm-types:
        patterns: ["@types/*"]

  # Node/pnpm - player packages
  - package-ecosystem: npm
    directory: /npm_player
    schedule:
      interval: weekly
    groups:
      player-deps:
        patterns: ["*"]

  # Node/pnpm - studio packages
  - package-ecosystem: npm
    directory: /npm_studio
    schedule:
      interval: weekly
    groups:
      studio-deps:
        patterns: ["*"]

  # GitHub Actions
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      actions:
        patterns: ["*"]
