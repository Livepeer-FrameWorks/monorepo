    subitems:
      - slug: skipper
        name: Skipper (in-app consultant agent)
        description: Conversational platform agent for support and investigations.
        status: partial
        gap_reason: MCP exposes ask_consultant only; conversation management (list/get/send/archive) is not exposed.
        required_surfaces:
          graphql: { required: true }
          mcp: { required: true }
          webapp: { required: true }
          docs: { required: true }
        surfaces:
          graphql:
            mutations:
              - createConversation
              - sendMessage
              - updateSkipperConversation
              - deleteSkipperConversation
              - markSkipperReportsRead
            queries:
              - conversation
              - conversationsConnection
              - messagesConnection
              - skipperConversation
              - skipperConversations
              - skipperReport
              - skipperReports
              - skipperUnreadReportCount
            subscriptions: [liveConversationUpdates, liveMessageReceived, skipperChat]
          mcp:
            tools: [ask_consultant, search_support_history]
          webapp:
            routes: ["/skipper", "/skipper/investigations", "/messages", "/messages/:id"]
          docs:
            pages: [agents/skipper.mdx, operators/skipper.mdx]

  # ───────────────── Engagement & Interactivity ─────────────────

  - slug: conferencing
    name: Conferencing and remote contribution
    area: engagement
    description: Multi-party WebRTC rooms and remote-guest contribution — commentators and callers mixed into a managed stream.
    status: roadmap
    gap_reason: |
      WHIP ingest and WHEP playback ship as single-source paths. Rooms need a session/room model, participant auth,
      server-side audio (then video) mixing into a managed stream for live-commentator and remote-guest workflows, plus
      API, dashboard, and MCP surfaces.
    depends_on: [streams]
    related: [rooms-interactivity]
    required_surfaces:
      graphql: { required: true }
      mcp: { required: true }
      webapp: { required: true }
      docs: { required: true }

  - slug: rooms-interactivity
    name: Rooms, chat, and interactivity (Parlor)
    area: engagement
    description: Viewer chat and engagement primitives — channel points, hype trains, leaderboards, flair, and moderation views — synced to the stream.
    status: roadmap
    gap_reason: |
      The planned rooms service (api_rooms, codename Parlor) is a stub; the product design (chat, channel points, hype
      trains, leaderboards, flair, stream-synced events, moderator views) is captured in docs/rfcs/parlor.md. Viewer chat
      is the first surface; real-time A/V rooms live under conferencing.
    related: [conferencing]
    required_surfaces:
      graphql: { required: true }
      mcp: { required: true }
      webapp: { required: true }
      docs: { required: true }

  # ───────────────── Account & Apps ─────────────────

  - slug: tenant
    name: Tenant settings
    area: account
    description: Tenant identity, billing setup, retention defaults, routing preferences, and wallet-provisioned account lifecycle.
    status: partial
    gap_reason: |
      Core tenant account setup is live: wallet-provisioned accounts, tenant name, billing details, billing tier/balance, storage retention defaults,
      and preferred cluster/routing settings are exposed. Broader tenant administration is still expanding: team/RBAC, notification preferences,
      custom domains/branding, security controls, and account lifecycle controls are not yet complete across API, dashboard, MCP, and docs.
    required_surfaces:
      graphql: { required: true }
      webapp: { required: true }
      docs: { required: true }
      mcp: { required: true }
    surfaces:
      graphql:
        mutations: [updateTenant]
        queries: [tenant]
      mcp:
        tools: [get_tenant_settings, update_tenant_settings]
      webapp:
        routes: ["/settings", "/account/billing"]
      docs:
        pages: [agents/wallet-auth.mdx, agents/mcp.mdx]
    subitems:
      - slug: team-rbac
        name: Teams & RBAC
        description: Multi-user tenants with role-based access control.
        status: roadmap
        gap_reason: Not shipped. Requires tenant membership model, role grants, invitation flow, GraphQL policy checks, MCP permission scoping, and webapp team administration.
        required_surfaces:
          graphql: { required: true }
          mcp: { required: true }
          webapp: { required: true }
          docs: { required: true }

