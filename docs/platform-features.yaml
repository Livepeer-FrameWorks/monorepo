          required: false,
          reason: "Native apps consume the existing API; no dedicated schema surface.",
        }
      mcp: { required: false, reason: "Not an agent surface." }
      webapp: { required: false, reason: "Native apps, not dashboard routes." }
      docs: { required: true }
    subitems:
