          mcp: { required: true }
          webapp: { required: true }
          docs: { required: true }

  - slug: cluster-marketplace
    name: Cluster marketplace
    area: infrastructure
    description: Browse listed clusters and manage subscriptions. A vetted public marketplace program for third-party capacity is on the roadmap.
    status: partial
    gap_reason: |
      Marketplace primitives ship across the API, MCP, dashboard, and docs: listing, preferred cluster selection, invites, subscription requests, approval, pricing models, monthly checkout, and metered/custom rating paths. What is still missing is the full public marketplace operating model: operator vetting, published commercial terms, support boundaries, and production onboarding workflow for third-party capacity.
    required_surfaces:
      graphql: { required: true }
      mcp: { required: true }
      webapp: { required: true }
