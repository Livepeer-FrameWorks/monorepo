              required: false,
              reason: "Driven by Foghorn's release reconciler over the Helmsman control stream; no API surface.",
            }
          mcp: { required: false, reason: "No agent surface; updates are automatic." }
          webapp:
            {
              required: false,
              reason: "No dashboard workflow; component versions surface via node views.",
            }
