# Platform feature registry for FrameWorks.
#
# Single source of truth for which features exist on which surfaces (GraphQL,
# MCP, webapp, docs) and what configurability they expose. Validated by
# `make verify-feature-registry` (scripts/registry/main.go).
#
# Structure:
#   - Top-level rows are product families grouped into pillars via `area`
#     (streaming | playback | media-library | processing | analytics |
#     infrastructure | commerce | developer | engagement | account).
#   - A family may carry a `subitems:` list (one level deep). Subitems are
#     full feature rows — own slug, status, surfaces — but inherit the
#     parent's pillar and must not set `area`. Slugs are globally unique
#     across both levels (they are /developer/features/[slug] URLs).
#
# Conventions:
#   - status:     shipped | partial | gap | roadmap
#                 partial = some required surfaces filled but not all
#                 gap     = no required surfaces filled (or none for this feature)
#                 roadmap = future intent (skips reference validation)
#   - kind:       product (default) | foundation. Foundations are building
#                 blocks whose value shows up through the products built on
#                 them; renderers mark them and derive what they enable.
#   - depends_on: directional edges to other slugs (cycle-checked); the
#                 generator derives the reverse `enables` list. related: is
#                 for non-directional peers only.
#   - aliases:    retired slugs that should keep resolving in the webapp.
#   - surfaces.cli.commands: `frameworks` command paths ("edge update");
#                 every segment is validated against cobra Use: declarations
#                 in cli/cmd/.
#   - Each feature's required_surfaces.* is explicit. Default for shipped
#     configurable features is graphql+mcp+webapp+docs all required (agents
#     are first-class personas). Opt-out per surface uses required: false +
#     reason.
#   - Sensitivity flags (sensitive/returns_secret_material/...) belong on the
#     surface that handles the secret (typically mcp).
#   - Webapp routes use SvelteKit syntax with `:name` for dynamic segments;
#     the validator converts to `[name]` on disk.
#   - Docs pages are repo-relative paths from website_docs/src/content/docs/.
#
# Adding a feature: add a row (or a subitem under its family), run
# `make verify-feature-registry`, fix any missing-reference errors, commit
# YAML + generated registry.json together.

features:
  # ───────────────── Streaming ─────────────────

  - slug: streams
    name: Live streams
    area: streaming
    description: Push and pull live streams with stream keys and ingest configuration. Push ingest over RTMP/E-RTMP, SRT, and WHIP (WebRTC); pull from RTSP, SRT, RIST, HLS, MPEG-TS, and Mist/DTSC sources.
    status: shipped
    required_surfaces:
      graphql: { required: true }
      mcp: { required: true }
      webapp: { required: true }
      docs: { required: true }
    surfaces:
      graphql:
        mutations: [createStream, updateStream, deleteStream, refreshStreamKey]
        queries: [stream, streamsConnection, streamingConfig]
        subscriptions: [liveStreamEvents, liveTrackListUpdates]
      mcp:
        tools: [create_stream, update_stream, delete_stream, refresh_stream_key]
      webapp:
        routes: ["/streams", "/streams/:id"]
      docs:
        pages:
          - builders/streams.mdx
          - builders/quick-start.mdx
          - builders/ingest.mdx
    subitems:
      - slug: stream-keys
        name: Stream keys
        kind: foundation
        description: Per-stream ingest credentials with rotation.
        status: shipped
        required_surfaces:
          graphql: { required: true }
          mcp:
            required: true
            sensitive: true
            returns_secret_material: true
            requires_confirmation: true
            audit_events: true
          webapp: { required: true }
          docs: { required: true }
        surfaces:
          graphql:
            mutations: [createStreamKey, deleteStreamKey, refreshStreamKey]
            queries: [streamKeysConnection, validateStreamKey]
          mcp:
            tools:
              [
                list_stream_keys,
                create_stream_key,
                delete_stream_key,
                refresh_stream_key,
                validate_stream_key,
              ]
          webapp:
            routes: ["/streams/:id"]
          docs:
            pages: [builders/ingest.mdx]

      - slug: pull-streams
        name: Pull streams
        description: Stream inputs pulled from upstream sources (RTSP, SRT, RIST, HLS, etc.) instead of pushed, with resolution-stage lifecycle audit.
        status: partial
        gap_reason: |
          Resolution-stage lifecycle events ship: Foghorn writes pull_source_events rows for STREAM_SOURCE evaluations (resolved / not_found / disabled / blocked_uri / private_not_allowed / commodore_error / foghorn_base_unresolved), exposed via Stream.recentPullSourceEvents and shown on the stream setup panel. Downstream MistServer dial telemetry needs new upstream connect/disconnect/retry trigger types before FrameWorks can show dial-stage health.
        required_surfaces:
          graphql: { required: true }
          mcp: { required: true }
          webapp: { required: true }
          docs: { required: true }
        surfaces:
          graphql:
            mutations: [createStream, updateStream]
          mcp:
            tools: [create_stream, update_stream]
          webapp:
            routes: ["/streams/:id"]
          docs:
            pages: [builders/pull-streams.mdx]

      - slug: multistream-targets
        name: Multistream push targets
        description: Forward live streams to additional RTMP/SRT destinations.
        status: shipped
        required_surfaces:
          graphql: { required: true }
          mcp: { required: true }
          webapp: { required: true }
          docs: { required: true }
        configurability:
          cost_affecting: true
          per_resource_override: present
          effective_value_visible: present
          audit_events: present
          undo: present
        surfaces:
          graphql:
            mutations: [createPushTarget, updatePushTarget, deletePushTarget]
          mcp:
            tools: [list_push_targets, create_push_target, update_push_target, delete_push_target]
          webapp:
            routes: ["/streams/:id"]
          docs:
            pages: [builders/multistreaming.mdx]

  - slug: streamcrafter
    name: StreamCrafter (browser studio)
    area: streaming
    description: Browser-based broadcasting studio — WHIP/WebRTC ingest, compositing, and multi-source mixing. Ships as npm packages @livepeer-frameworks/streamcrafter-{core,react,svelte,wc} and powers the dashboard's Go Live page.
    status: shipped
    depends_on: [streams]
    related: [conferencing, device-discovery-contribution-inputs]
    required_surfaces:
      graphql: { required: true }
      mcp:
        { required: false, reason: "Client-side SDK; agents drive streams via the stream tools." }
      webapp: { required: true }
      docs: { required: true }
    surfaces:
      graphql:
        queries: [resolveIngestEndpoint]
      webapp:
        routes: ["/go-live", "/developer/sdks"]
      docs:
        pages:
          - builders/ingest.mdx
          - builders/ingest-advanced.mdx
          - builders/ingest-compositor.mdx
          - builders/ingest-react.mdx
          - builders/ingest-svelte.mdx
          - builders/ingest-vanilla.mdx
          - builders/ingest-wc.mdx
          - builders/integration-guide.mdx

  - slug: device-discovery-contribution-inputs
    name: Device discovery and contribution inputs
    area: streaming
    description: Edge-local discovery for cameras, PTZ devices, NDI sources, USB capture, HDMI inputs, and local contribution paths.
    status: roadmap
    gap_reason: |
      Experimental media-engine discovery and local-source creation exist below the FrameWorks product layer. The missing work is
      packaging that capability into FrameWorks Edge, then exposing it through API, dashboard, Tray, CLI, and MCP workflows for managed
      streams and self-hosted clusters.
    depends_on: [edge-clusters, companion-apps]
    related: [live-ai, conferencing]
    required_surfaces:
      graphql: { required: true }
      mcp: { required: true }
      webapp: { required: true }
      docs: { required: true }

  # ───────────────── Playback ─────────────────

  - slug: playback
    name: Playback
    area: playback
    description: Resolve a viewer or ingest endpoint for a stream / VOD / clip. Delivery over HLS, LL-HLS (CMAF), DASH, WebRTC (WHEP), and progressive MP4.
    status: shipped
    depends_on: [viewer-routing]
    required_surfaces:
      graphql: { required: true }
      mcp: { required: true }
      webapp: { required: true }
      docs: { required: true }
    surfaces:
      graphql:
        queries: [resolveViewerEndpoint, resolveIngestEndpoint]
      mcp:
        tools: [resolve_playback_endpoint]
      webapp:
        routes: ["/view"]
      docs:
        pages:
          - builders/playback.mdx
          - builders/playback-advanced.mdx
          - builders/playback-theming.mdx
          - builders/playback-react.mdx
          - builders/playback-svelte.mdx
          - builders/playback-vanilla.mdx
          - builders/playback-wc.mdx
    subitems:
      - slug: player-sdks
        name: Player SDKs
        description: Embeddable player packages — @livepeer-frameworks/player-{core,react,svelte,wc} — with theming, adaptive playback, and built-in boot/QoE telemetry.
        status: shipped
        depends_on: [playback]
        related: [analytics]
        required_surfaces:
          graphql: { required: true }
          mcp:
            {
              required: false,
              reason: "Client-side SDK; agents resolve endpoints via resolve_playback_endpoint.",
            }
          webapp: { required: true }
          docs: { required: true }
        surfaces:
          graphql:
            queries: [resolveViewerEndpoint]
          webapp:
            routes: ["/developer/sdks", "/view"]
          docs:
            pages:
              - builders/playback-react.mdx
              - builders/playback-svelte.mdx
              - builders/playback-vanilla.mdx
              - builders/playback-wc.mdx
              - builders/playback-theming.mdx
              - builders/playback-advanced.mdx

      - slug: playback-access-control
        name: Playback access control
        description: Public / JWT / webhook playback authorization policy on streams, clips, and VOD assets, with a dry-run tester and full agent management surface.
        status: shipped
        depends_on: [signing-keys]
        required_surfaces:
          graphql: { required: true }
          mcp: { required: true }
          webapp: { required: true }
          docs: { required: true }
        configurability:
          security_affecting: true
          tenant_default: false
          per_resource_override: present
          effective_value_visible: present
          audit_events: present
          undo: present
        surfaces:
          graphql:
            mutations: [setPlaybackPolicy, testPlaybackAccess]
          mcp:
            tools: [test_playback_access, set_playback_policy, clear_playback_policy]
          webapp:
            routes: ["/streams/:id"]
          docs:
            pages: [builders/playback-access-control.mdx]
        examples:
          - title: "Test a JWT against the live policy"
            query: |
              mutation TestJWT {
                testPlaybackAccess(input: {
                  playbackId: "<playback-id>"
                  viewerToken: "eyJhbGciOiJFUzI1NiIs..."
                  connector: "hls"
                }) {
                  ... on PlaybackAccessDecision {
                    allowed
                    reason
                    kid
                    claimsJson
                  }
                  ... on ValidationError { message field }
                }
              }
          - title: "Inspect webhook policy without firing"
            query: |
              mutation Inspect {
                testPlaybackAccess(input: {
                  playbackId: "<playback-id>"
                  fireWebhook: false
                }) {
                  ... on PlaybackAccessDecision { policyType reason detail }
                }
              }
          - title: "Fire a real webhook test"
            query: |
              mutation Fire {
                testPlaybackAccess(input: {
                  playbackId: "<playback-id>"
                  viewerIp: "203.0.113.42"
                  connector: "hls"
                  fireWebhook: true
                }) {
                  ... on PlaybackAccessDecision {
                    allowed reason webhookStatus webhookLatencyMs
                  }
                }
              }

      - slug: signing-keys
        name: Signing keys
        kind: foundation
        description: ES256 keypairs for signing playback JWTs. Private material returned once on creation.
        status: shipped
        required_surfaces:
          graphql: { required: true }
          webapp: { required: true }
          docs: { required: true }
          mcp:
            required: true
            sensitive: true
            returns_secret_material: true
            requires_confirmation: true
            audit_events: true
        surfaces:
          graphql:
            mutations: [createSigningKey, revokeSigningKey]
            queries: [signingKey, signingKeysConnection]
          mcp:
            tools: [list_signing_keys, create_signing_key, revoke_signing_key]
          webapp:
            routes: ["/developer/signing-keys"]
          docs:
            pages: [builders/playback-access-control.mdx]

      - slug: drm
        name: DRM
        description: FairPlay, Widevine, and PlayReady protection for premium playback workflows.
        status: roadmap
        gap_reason: Not shipped. Playback signing keys and webhook/JWT access control are available today, but multi-DRM license packaging and player enforcement are separate work.
        depends_on: [playback-access-control, player-sdks]
        required_surfaces:
          graphql: { required: true }
          mcp: { required: true }
          webapp: { required: true }
          docs: { required: true }

  # ───────────────── Media Library ─────────────────

  - slug: dvr-recordings
    name: DVR recordings
    area: media-library
    description: 24/7-capable DVR recording with bounded live seekback, continuous archive storage, chapter replay, and VOD-style playback.
    status: shipped
    related: [media-retention]
    required_surfaces:
      graphql: { required: true }
      mcp: { required: true }
      webapp: { required: true }
      docs: { required: true }
    surfaces:
      graphql:
        mutations: [startDVR, stopDVR, deleteDVR]
        queries: [dvrRecordingsConnection]
        subscriptions: [liveDvrLifecycle]
      mcp:
        tools: [start_dvr, stop_dvr, delete_dvr]
      webapp:
        routes: ["/library"]
      docs:
        pages:
          - builders/recordings.mdx
          - operators/dvr.mdx
    subitems:
      - slug: dvr-chapters
        name: DVR chapters
        description: Chapter artifacts that segment a long-running DVR session into replayable windows, so a 24/7 recording can be replayed by window, civil-time range, or explicit range without restarting the live stream.
        status: partial
        gap_reason: Chapter playback and policy controls are present in the dashboard; audit-event coverage for chapter-policy changes still needs verification.
        required_surfaces:
          graphql: { required: true }
          mcp: { required: true }
          webapp: { required: true }
          docs: { required: true }
        configurability:
          per_resource_override: present
          effective_value_visible: partial
          audit_events: unverified
          undo: present
        surfaces:
          graphql:
            mutations: [updateStream]
            queries: [dvrChapter, dvrChapters]
          mcp:
            tools: [update_stream]
          webapp:
            routes: ["/streams/:id", "/view"]
          docs:
            pages: [builders/dvr-chapters.mdx]

      - slug: scheduled-recordings
        name: Scheduled recordings
        description: Calendar-driven DVR captures that start and stop on schedule, so streams record themselves on a fixed cadence.
        status: roadmap
        gap_reason: DVR recording is shipped (start_dvr / stop_dvr exist); scheduling is the gap. Requires a schedule store, a sweeper that triggers DVR start/stop at window boundaries, GraphQL mutation + query surface, MCP tools, and a calendar UI. Primary use cases include places of worship, lectures, periodic events, and any scheduled programming.
        depends_on: [dvr-recordings]
        required_surfaces:
          graphql: { required: true }
          mcp: { required: true }
          webapp: { required: true }
          docs: { required: true }

  - slug: vod
    name: VOD assets
    area: media-library
    description: Multipart VOD upload and lifecycle.
    status: shipped
    required_surfaces:
      graphql: { required: true }
      mcp: { required: true }
      webapp: { required: true }
      docs: { required: true }
    surfaces:
      graphql:
        mutations: [createVodUpload, completeVodUpload, abortVodUpload, deleteVodAsset]
        queries: [vodAsset, vodAssetsConnection, vodUploadStatus]
        subscriptions: [liveVodLifecycle]
      mcp:
        tools:
          [
            create_vod_upload,
            complete_vod_upload,
            abort_vod_upload,
            get_vod_upload_status,
            delete_vod_asset,
          ]
      webapp:
        routes: ["/library"]
      docs:
        pages: [builders/recordings.mdx]
    subitems:
      - slug: scheduled-vod-streams
        name: Scheduled VOD streams
        description: Linear live channels assembled from existing VOD assets, with schedules that make archived media play as a rolling live stream.
        status: roadmap
        gap_reason: |
          Not shipped. Managed Mist-native streams provide the lower-level primitive for platform-owned concrete stream configs, but scheduled VOD streams need a separate product layer:
          a schedule/timeline store, VOD artifact selection, asset availability checks, pre-hydration/pinning for frozen assets, failover-aware edge placement, GraphQL/MCP controls,
          and dashboard scheduling workflows. The source material should remain normal finalized VOD artifacts with their existing storage lifecycle; the scheduler turns them into a
          live channel without bypassing artifact ownership, retention, or billing semantics.
        depends_on: [vod]
        required_surfaces:
          graphql: { required: true }
          mcp: { required: true }
          webapp: { required: true }
          docs: { required: true }

  - slug: clips
    name: Clips
    area: media-library
    description: Time-range clips extracted from streams or recordings.
    status: shipped
    required_surfaces:
      graphql: { required: true }
      mcp: { required: true }
      webapp: { required: true }
      docs: { required: true }
    surfaces:
      graphql:
        mutations: [createClip, deleteClip]
        queries: [clip, clipsConnection]
        subscriptions: [liveClipLifecycle]
      mcp:
        tools: [create_clip, delete_clip]
      webapp:
        routes: ["/library"]
      docs:
        pages: [builders/clips.mdx]

  - slug: media-retention
    name: Media retention
    area: media-library
    description: Tenant-controlled storage policy for 24/7 DVR archives, clips, and VOD assets, with per-asset overrides and entitlement bounds.
    status: shipped
    required_surfaces:
      graphql: { required: true }
      mcp: { required: true }
      webapp: { required: true }
      docs: { required: true }
    configurability:
      cost_affecting: true
      tenant_default: present
      per_resource_override: present
      effective_value_visible: present
      entitlement_bounds: present
      audit_events: present
      undo: present
    surfaces:
      graphql:
        mutations: [setMediaRetentionPolicy, updateMediaRetention, resetMediaRetentionOverride]
        queries: [mediaRetentionPolicy]
      mcp:
        tools:
          [
            get_retention_policy,
            set_retention_policy,
            update_asset_retention,
            reset_asset_retention,
          ]
      webapp:
        routes: ["/account/billing"]
      docs:
        pages: [builders/storage-and-retention.mdx]
    examples:
      - title: "Read per-class defaults + tier cap + effective horizons"
        query: |
          query MediaRetentionPolicy {
            mediaRetentionPolicy {
              defaultVodRetentionDays
              defaultDvrRetentionDays
              defaultClipRetentionDays
              effectiveVodRetentionDays
              effectiveDvrRetentionDays
              effectiveClipRetentionDays
              bounds { maxRecordingRetentionDays }
            }
          }
      - title: "Keep VOD forever (paid tier)"
        query: |
          mutation Set { setMediaRetentionPolicy(input: { targetType: VOD, days: 0 }) {
            ... on MediaRetentionPolicy { effectiveVodRetentionDays }
            ... on ValidationError { message field }
          } }
      - title: "Set clip default to 14 days"
        query: |
          mutation Set { setMediaRetentionPolicy(input: { targetType: CLIP, days: 14 }) {
            ... on MediaRetentionPolicy { effectiveClipRetentionDays }
            ... on ValidationError { message field }
          } }
      - title: "Per-stream override (DVR 90d, clip cleared)"
        query: |
          mutation Override {
            setStreamRetentionOverrides(input: {
              streamId: "<stream-id>",
              dvrRetentionDaysOverride: 90,
              clearClipRetentionOverride: true
            }) {
              ... on StreamRetentionOverrides { dvrRetentionDaysOverride clipRetentionDaysOverride }
              ... on ValidationError { message field }
            }
          }
      - title: "Per-asset override (clip kept forever)"
        query: |
          mutation Update {
            updateMediaRetention(input: { targetType: CLIP, targetId: "<clip-hash>", retentionDays: 0 }) {
              ... on EffectiveRetention { retentionDays retentionUntil source }
              ... on ValidationError { message field }
            }
          }

  - slug: thumbnails-and-previews
    name: Thumbnails and sprite previews
    area: media-library
    description: Auto-generated poster frames and sprite-tile preview strips for live streams, clips, VOD, and DVR playback.
    status: partial
    gap_reason: >
      Apps can read Chandler poster, sprite JPG, and sprite VTT URLs through resolveViewerEndpoint metadata and the
      resolve_playback_endpoint MCP tool. The webapp builds bulk library thumbnails by combining streamingConfig.chandlerDomain
      with stream IDs and artifact hashes from list queries. The remaining gap is a first-class bulk asset URL surface for
      external apps and agents: streams/clips/DVR/VOD list queries should return ready-to-use preview asset URLs or a shared
      helper contract, without requiring one resolveViewerEndpoint call per asset. Generation status, regeneration, and
      troubleshooting remain follow-on operational controls.
    required_surfaces:
      docs: { required: true }
      graphql:
        required: true
      mcp: { required: true }
      webapp:
        required: true
    surfaces:
      graphql:
        queries: [resolveViewerEndpoint]
        fields:
          [
            PlaybackMetadata.thumbnailAssets,
            ThumbnailAssets.posterUrl,
            ThumbnailAssets.spriteVttUrl,
            ThumbnailAssets.spriteJpgUrl,
            ThumbnailAssets.assetKey,
          ]
      mcp:
        tools: [resolve_playback_endpoint]
      webapp:
        routes: ["/library", "/view"]
      docs:
        pages: [builders/thumbnails-and-previews.mdx]
    examples:
      - title: "Fetch poster and sprite URLs"
        query: |
          query PreviewAssets($contentId: String!) {
            resolveViewerEndpoint(contentId: $contentId) {
              metadata {
                thumbnailAssets {
                  posterUrl
                  spriteVttUrl
                  spriteJpgUrl
                  assetKey
                }
              }
            }
          }
      - title: "Fetch the Chandler host for a library grid"
        query: |
          query LibraryPreviewHost {
            streamingConfig {
              chandlerDomain
            }
          }

  # ───────────────── Processing & AI ─────────────────

  - slug: processing
    name: Processing
    area: processing
    kind: foundation
    description: Server-side media processing — live ABR transcoding, on-edge AI, and composition — placed on the right nodes across a cluster.
    status: partial
    gap_reason: |
      Livepeer Gateway-backed transcoding is live with processing telemetry (see the transcoding subitem). The orchestration
      remainder is cluster-wide: client-side processing stats in MistServer and processing-aware scheduling in Foghorn, so heavy
      jobs (full transcodes, large AI models) land on dedicated compute nodes — leveraging the Livepeer network — while
      ultralight work stays on the edge.
    required_surfaces:
      graphql: { required: true }
      mcp: { required: true }
      webapp: { required: true }
      docs: { required: true }
    subitems:
      - slug: gateway-backed-transcoding
        name: Gateway-backed transcoding
        description: Live ABR renditions through Livepeer Gateway or local processing, with processing usage telemetry.
        status: partial
        gap_reason: |
          The media plane can use Livepeer Gateway-backed processing and the analytics API exposes processing/orchestrator telemetry.
          What is still missing is a tenant-facing control surface for rendition ladders, plan-aware defaults, per-stream overrides,
          and agent/dashboard workflows for choosing when Gateway-backed ABR is enabled.
        depends_on: [processing]
        required_surfaces:
          graphql: { required: true }
          mcp: { required: true }
          webapp: { required: true }
          docs: { required: true }
        surfaces:
          graphql:
            queries: [analytics]
            fields:
              [
                ProcessingUsage.processingUsageConnection,
                ProcessingUsageRecord.renditionCount,
                ProcessingUsageRecord.renditionsJson,
                ProcessingUsageSummary.livepeerSeconds,
                OrchestratorPerformancePoint.transcodeAttempts,
                OrchestratorPerformancePoint.transcodeSuccesses,
                OrchestratorPerformancePoint.transcodeFailures,
              ]
          webapp:
            routes: ["/analytics/usage"]
          docs:
            pages: [builders/encoder-setup.mdx, operators/architecture.mdx]

      - slug: live-ai
        name: Live AI processing
        description: ONNX models running directly on the in-memory stream buffer of media edge nodes — detection, transcription, moderation, audio tagging, and embeddings for semantic search.
        status: roadmap
        gap_reason: |
          The media-engine ONNX runtime is in active development: ultralight CPU models run directly on the in-memory stream
          buffer on edge nodes. Tested so far: object detection and segmentation (YOLO) and audio transcription (Parakeet,
          heavily quantized for CPU). Candidate workloads: content moderation (NSFW / violence), audio event tagging and
          speaker identification, and frame/text embeddings for semantic search. Heavy models defer to dedicated compute via
          the Livepeer network. The FrameWorks product layer — model selection, per-stream enablement, output routing to
          analytics and webhooks, and billing meters — is not designed yet. Pilot access exists via contact-sales.
        depends_on: [processing, edge-clusters]
        aliases: [composer-ai]
        required_surfaces:
          graphql: { required: true }
          mcp: { required: true }
          webapp: { required: true }
          docs: { required: true }

      - slug: composition
        name: Composition and SSAI
        description: MistServer-native blitter for logos, watermarks, and lower-third overlays; Composer for server-side ad insertion (SSAI), raw-pixel composition, picture-in-picture, and automated clipping.
        status: roadmap
        gap_reason: Not shipped. Requires product/API design for overlay placement and lifecycle, SSAI ad-decision integration, billing meters, agent permissions, and dashboard/MCP surfaces for configuring composition.
        depends_on: [processing]
        required_surfaces:
          graphql: { required: true }
          mcp: { required: true }
          webapp: { required: true }
          docs: { required: true }

  # ───────────────── Analytics & Observability ─────────────────

  - slug: analytics
    name: Analytics
    area: analytics
    description: Stream health, viewers, geographic, routing, quality tiers, federation, node metrics, and view-level player QoE (rebuffering, frame drops, startup, VOD retention) — with cross-player coverage still expanding.
    status: partial
    gap_reason: |
      Stream, routing, server-side QoS, and client QoE are live, plus view-level player QoE from the FrameWorks player: boot telemetry (TTFF waterfall + Resource Timing), viewer-experienced rebuffering, frame drops, bitrate/quality switches, exit-before-start, and per-asset VOD retention/watch-density — across API, dashboard, MCP, and docs.
      Still maturing: QoE from non-FrameWorks / third-party players, broader sampling/rollups, and the next telemetry pass — reducing time-to-first-frame and measuring/reducing cross-region stream-replication time.
    required_surfaces:
      graphql: { required: true }
      mcp: { required: true }
      webapp: { required: true }
      docs: { required: true }
    surfaces:
      graphql:
        queries: [analytics, usageAggregates, usageRecordsConnection, tenantUsage, networkStatus]
        subscriptions:
          - liveViewerMetrics
          - liveSystemHealth
          - liveProcessingEvents
          - liveStorageEvents
          - liveConnectionEvents
          - liveFirehose
      mcp:
        tools:
          - get_anomaly_report
          - get_stream_health_summary
          - diagnose_buffer_health
          - diagnose_packet_loss
          - diagnose_rebuffering
          - diagnose_routing
      webapp:
        routes:
          - "/analytics"
          - "/analytics/audience"
          - "/analytics/player-experience"
          - "/analytics/qoe"
          - "/analytics/usage"
          - "/streams/:id/analytics"
          - "/streams/:id/health"
      docs:
        pages: [builders/analytics-api.mdx]

  - slug: incidents-and-alerts
    name: Incidents and alerts
    area: analytics
    description: Tenant-scoped incident feed aggregating node-health, certificate, DNS, capacity, and cluster alerts with acknowledge/resolve and realtime delivery.
    status: roadmap
    gap_reason: |
      Not shipped. Prometheus and Grafana cover internal monitoring. The customer-facing gap is a tenant incident feed — Alertmanager webhook ingestion, dedup/fingerprinting, an incident store, GraphQL queries + acknowledge/resolve mutations, realtime delivery via Signalman, and MCP tools so agents can triage. Self-hosted operators get visibility into their own clusters (cert expiry, port reachability, DNS resolution, CPU/memory thresholds) without standing up a separate monitoring stack.
    related: [analytics]
    required_surfaces:
      graphql: { required: true }
      mcp: { required: true }
      webapp: { required: true }
      docs: { required: true }

