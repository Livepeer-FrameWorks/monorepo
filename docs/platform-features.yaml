      - slug: node-mode
        name: Node mode (drain / maintenance)
        kind: foundation
        description: Operator controls to drain a node, put it in maintenance, or restore it to active service.
        status: shipped
        required_surfaces:
          graphql: { required: true }
          mcp: { required: true }
          webapp: { required: true }
          docs: { required: true }
        configurability:
          tenant_default: not_applicable
          per_resource_override: present
          effective_value_visible: present
          entitlement_bounds: not_applicable
          audit_events: present
          undo: present
        surfaces:
          graphql:
            mutations: [setNodeMode]
          mcp:
            tools: [manage_node, set_node_mode]
          webapp:
            routes: ["/nodes/:id"]
          docs:
            pages: [hybrid/node-mode.mdx, hybrid/node-cli.mdx, hybrid/edge-nodes.mdx]
        examples:
          - title: "Drain a node"
            query: |
              mutation Drain { setNodeMode(input: { nodeId: "<node-id>", mode: DRAINING, reason: "monthly maintenance" }) {
                ... on InfrastructureNode {
                  nodeId
                  effectiveMode
                  routingImpactPreview { activeStreams activeViewers }
                }
                ... on ValidationError { message field }
                ... on NotFoundError { message }
              } }
          - title: "Restore a node"
            query: |
              mutation Restore { setNodeMode(input: { nodeId: "<node-id>", mode: NORMAL }) {
                ... on InfrastructureNode { effectiveMode }
                ... on ValidationError { message field }
              } }

      - slug: federation-network
