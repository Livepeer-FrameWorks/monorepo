  - slug: byoc-ownership
    name: BYOC ownership levels
    area: infrastructure
    description: The deployment ownership spectrum — from bring-your-own edge nodes to fully sovereign self-hosting.
    status: partial
    gap_reason: |
      The first level ships today as edge clusters: bring your own MistServer edge nodes and FrameWorks runs DNS, TLS,
      geo-balanced routing, federation, tenant subdomains, analytics, playback access control, and billing around them.
      The deeper levels — private media clusters, hosted private clusters, and fully sovereign self-hosting — are roadmap
      subitems.
    required_surfaces:
      graphql: { required: true }
      mcp: { required: true }
      webapp: { required: true }
      docs: { required: true }
    surfaces:
      docs:
        pages: [hybrid/overview.mdx]
    subitems:
      - slug: byo-media-cluster
        name: Private media cluster (BYOC)
        description: Run the media and data plane on your own cloud while using the FrameWorks control plane for tenancy, routing, billing, and access control.
        status: roadmap
        gap_reason: Not shipped as a public workflow. Edge enrollment and cross-cluster federation exist, but running a full media and data cluster on customer-controlled infrastructure needs federation-trust hardening (scoped per-cluster credentials or mutual TLS) and a media-cluster provisioning preset.
        depends_on: [edge-clusters, federation-network]
        required_surfaces:
          graphql: { required: true }
          mcp: { required: true }
          webapp: { required: true }
          docs: { required: true }

      - slug: hosted-private-clusters
        name: Hosted private clusters (BYOC)
        description: FrameWorks-provisioned dedicated, isolated clusters for a single tenant, with reserved capacity and fixed-rate pricing.
        status: roadmap
        gap_reason: Not shipped. Private-cluster records and tenant-cluster access exist, but self-serve provisioning of dedicated capacity needs cloud-provider automation (infrastructure-as-code or provider SDKs) that does not exist today, plus a reserved-capacity billing SKU and an operator console.
        depends_on: [edge-iso-cloud-images]
        required_surfaces:
          graphql: { required: true }
          mcp: { required: true }
          webapp: { required: true }
          docs: { required: true }

      - slug: sovereign-self-host
        name: Fully sovereign self-hosting (BYOC)
        description: Run the entire FrameWorks stack with no runtime dependency on FrameWorks, including your own object storage, analytics store, DNS, and an isolated control plane and identity root.
        status: roadmap
        gap_reason: Not shipped as turnkey. Self-hosting the stack is possible today, but full sovereignty needs dedicated-database and identity decoupling from the shared control plane, self-hosted DNS (PowerDNS is planned, not built), and a bring-your-own object-storage and analytics-store path. Today FrameWorks runs ClickHouse and S3-compatible storage for hosted tenants.
        depends_on: [standalone-storage-services, managed-dns-routing]
        required_surfaces:
          graphql: { required: true }
          mcp: { required: true }
          webapp: { required: true }
          docs: { required: true }

  - slug: adjacent-infra-services
    name: Adjacent infrastructure services
    area: infrastructure
    description: Infrastructure products adjacent to video delivery — managed DNS, generic proxying/CDN, and standalone storage.
    status: partial
    gap_reason: |
      FrameWorks already operates DNS automation, service proxying, and media storage internally for operated deployments,
      and managed media-cluster DNS is partially customer-facing. Turning these into standalone customer products — custom
      domains, origins, buckets/volumes, policies, billing, and support boundaries — is tracked by the subitems.
    required_surfaces:
      graphql: { required: true }
      mcp: { required: true }
      webapp: { required: true }
      docs: { required: true }
    subitems:
      - slug: managed-dns-routing
        name: Managed DNS and cluster domains
        description: Platform-managed DNS, TLS certificates, media-cluster domains, and tenant streaming domain discovery.
        status: partial
        gap_reason: |
          Navigator reconciles platform and media-cluster DNS for operated deployments, and the API exposes tenant streaming domains
          through streamingConfig. The missing product surface is customer-controlled DNS: custom domain onboarding, verification,
          certificate status, proxy policy, and self-serve dashboard/MCP workflows.
        required_surfaces:
          graphql: { required: true }
          mcp: { required: true }
          webapp: { required: true }
          docs: { required: true }
        surfaces:
          graphql:
            queries: [streamingConfig]
            fields:
              [
                StreamingConfig.ingestDomain,
                StreamingConfig.edgeDomain,
                StreamingConfig.playDomain,
                StreamingConfig.chandlerDomain,
                StreamingConfig.officialIngestDomain,
                StreamingConfig.officialEdgeDomain,
                StreamingConfig.officialPlayDomain,
                StreamingConfig.officialChandlerDomain,
              ]
          docs:
            pages: [operators/dns.mdx, operators/deployment.mdx]

      - slug: generic-proxying-cdn
        name: Generic proxying and CDN services
        description: Customer-configured proxy/CDN front doors for non-video services and adjacent workloads.
        status: roadmap
        gap_reason: |
          Navigator can proxy selected platform services for operated deployments. A customer-facing generic proxy/CDN product is not shipped:
          it needs origin onboarding, routing policy, TLS/domain validation, caching controls, abuse controls, billing, and dashboard/API/MCP
          workflows.
        required_surfaces:
          graphql: { required: true }
          mcp: { required: true }
          webapp: { required: true }
          docs: { required: true }

      - slug: standalone-storage-services
        name: Standalone object and block storage
        description: Customer-facing storage buckets, volumes, policies, and lifecycle controls outside the video-asset workflow.
        status: roadmap
        gap_reason: |
          FrameWorks already has media storage, cold-storage lifecycle, and cross-cluster S3 delegation for DVR, clips, VOD, thumbnails,
          and preview assets. A standalone object/block storage product is not shipped: it needs resource provisioning, quota/billing,
          access credentials, policy management, dashboard/API/MCP controls, and operator support boundaries.
        required_surfaces:
          graphql: { required: true }
          mcp: { required: true }
          webapp: { required: true }
          docs: { required: true }

