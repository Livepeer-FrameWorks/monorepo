      webapp: { required: true }
      docs: { required: true }
      mcp:
        required: true
        sensitive: true
        payment_authority: true
        requires_confirmation: true
        audit_events: true
    surfaces:
      graphql:
        mutations: [linkWallet, unlinkWallet, walletLogin, linkEmail, submitX402Payment]
      mcp:
        tools: [get_payment_options, submit_payment]
      webapp:
        routes: ["/account/balance"]
      docs:
        pages: [builders/wallet-and-crypto.mdx, agents/wallet-auth.mdx, agents/payments.mdx]

  # ───────────────── Developer Platform & Agents ─────────────────

  - slug: developer-api
    name: Developer API
    area: developer
    description: The GraphQL API and the tooling around it — playground, API tokens, webhooks, and server-side SDKs.
    status: partial
    gap_reason: The GraphQL API, playground, and developer tokens ship; outbound webhooks and server-side SDKs are roadmap subitems.
    required_surfaces:
      graphql:
        {
          required: false,
          reason: "The subitems carry the concrete operations; the API itself is the surface.",
        }
      mcp: { required: false, reason: "Agents access the API through the MCP server (agents-mcp)." }
      webapp: { required: true }
      docs: { required: true }
    surfaces:
      webapp:
        routes: ["/developer/playground"]
      docs:
        pages: [builders/api-reference.mdx]
    subitems:
      - slug: developer-tokens
        name: Developer API tokens
        kind: foundation
        description: Long-lived API tokens for SDK / CI use.
        status: shipped
        required_surfaces:
          graphql: { required: true }
          webapp: { required: true }
          docs: { required: true }
          mcp:
            required: false
            reason: API tokens authorize MCP itself; tools managing them would be circular.
        surfaces:
          graphql:
            mutations: [createDeveloperToken, revokeDeveloperToken]
            queries: [developerTokensConnection]
          webapp:
            routes: ["/developer/api-keys"]
          docs:
            pages: [builders/api-reference.mdx]

      - slug: graphql-playground
        name: GraphQL playground
        description: Interactive GraphQL explorer wired to the live schema.
        status: shipped
        required_surfaces:
          webapp: { required: true }
          docs: { required: true }
          graphql:
            { required: false, reason: "The playground IS a graphql client; nothing to expose." }
          mcp:
            {
              required: false,
              reason: "Agents use introspect_schema / generate_query / execute_query directly.",
            }
        surfaces:
          webapp:
            routes: ["/developer/playground"]
          docs:
            pages: [builders/api-reference.mdx]

      - slug: outbound-webhooks
        name: Outbound event webhooks
        description: Tenant-configured outbound webhooks for stream / clip / VOD lifecycle events.
        status: roadmap
        gap_reason: Not shipped. Inbound playback-auth webhook exists (covered by playback-access-control); outbound delivery is future work.
        required_surfaces:
          graphql: { required: true }
          mcp: { required: true }
          webapp: { required: true }
          docs: { required: true }

      - slug: backend-sdks
        name: Backend SDKs
        description: Server-side SDKs (Node, Python, PHP, Ruby, Elixir, Java, C#) wrapping the GraphQL API, webhooks, uploads, and access-token/JWT workflows.
        status: roadmap
        gap_reason: |
          Not shipped. Only frontend JS packages (player, StreamCrafter) exist today, and the migration guides disclose the
          missing server-side SDKs as a parity gap. Phased delivery, starting with Node and Python; each SDK covers API access,
          webhook verification, uploads, access tokens, and JWT signing.
        required_surfaces:
          graphql:
            {
              required: false,
              reason: "SDKs wrap the existing GraphQL API; no new schema surface.",
            }
          mcp: { required: false, reason: "Agents use the MCP server directly." }
          webapp: { required: true }
          docs: { required: true }

