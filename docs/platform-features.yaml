      - slug: edge-iso-cloud-images
        name: Edge ISO and cloud images
        kind: foundation
        description: Bootable FrameWorks Edge ISO and prebuilt cloud/marketplace images for on-demand media-cluster scaling.
        status: roadmap
        gap_reason: |
          Edge enrollment and bootstrap exist; the missing work is packaging: a bootable ISO for bare metal and prebuilt
          images with marketplace listings (AWS, GCP, DigitalOcean, Hetzner, Linode, Vultr) so a media cluster can scale on
          demand — for FrameWorks' own capacity and for BYOC deployments alike. Groundwork for hosted-private-cluster
          provisioning automation.
        required_surfaces:
