# Infrastructure Requirements for FrameWorks Platform
# This file tracks tested infrastructure versions for each platform release
# Update manually when bumping infrastructure components

infrastructure:
  - name: postgresql
    tested_version: "15.14"
    minimum_version: "14.0"
    image: postgres:15
    dev_version: "15.14"
    prod_version: "15.12-YB-2025.1.0.0"
    notes: "Dev uses PostgreSQL 15.14. Prod uses YugabyteDB (PostgreSQL 15.12 compatible)"

  - name: kafka
    tested_version: "4.2.0"
    minimum_version: "4.0.0"
    image: apache/kafka:4.2.0
    dev_version: "4.2.0"
    prod_version: "4.2.0"
    notes: "KRaft-only (no ZooKeeper). Uses combined broker+controller mode."

  - name: zookeeper
    tested_version: "3.9.5"
    minimum_version: "3.9.2"
    image: n/a
    notes: "No longer required for Kafka. Available as standalone infrastructure if needed."

  - name: clickhouse
    tested_version: "25.9.2.1"
    minimum_version: "18.16.1"
    image: clickhouse/clickhouse-server:25.9.2.1
    dev_version: "25.9.2.1"
    prod_version: "18.16.1"
    notes: "WARNING: Dev (25.9.2.1) and Prod (18.16.1) have significant version gap. Consider upgrading prod"

  - name: prometheus
    tested_version: "3.6.0"
    minimum_version: "2.40.0"
    image: prom/prometheus:v3.6.0
    dev_version: "3.6.0"
    prod_alternative: "VictoriaMetrics v1.122.0"
    notes: "Dev uses Prometheus 3.6.0. Prod uses VictoriaMetrics v1.122.0 (Prometheus-compatible)"

  - name: victoriametrics
    tested_version: "v1.122.0"
    minimum_version: "v1.100.0"
    image: victoriametrics/victoria-metrics:v1.122.0
    prod_version: "v1.122.0"
    notes: "Production alternative to Prometheus. Prometheus-compatible API"

  - name: vmauth
    tested_version: "v1.122.0"
    minimum_version: "v1.100.0"
    image: victoriametrics/vmauth:v1.122.0
    prod_version: "v1.122.0"
    notes: "JWT-authenticated reverse proxy in front of VictoriaMetrics for scoped edge telemetry writes"

  - name: vmagent
    tested_version: "v1.122.0"
    minimum_version: "v1.100.0"
    image: victoriametrics/vmagent:v1.122.0
    prod_version: "v1.122.0"
    notes: "Per-host metrics agent that scrapes local endpoints and remote-writes to VictoriaMetrics"

  - name: grafana
    tested_version: "12.2.0"
    minimum_version: "11.0.0"
    image: grafana/grafana:12.2.0
    dev_version: "12.2.0"
    prod_version: "11.6.1"
    notes: "Requires grafana-clickhouse-datasource plugin for ClickHouse integration"

  - name: nginx
    tested_version: "1.29.3"
    minimum_version: "1.24.0"
    image: nginx:1.29.3-alpine
    dev_version: "1.29.3 (alpine)"
    prod_version: "1.29.1"
    notes: "Alpine variant for smaller footprint in dev/docker environments"

  - name: listmonk
    tested_version: "v4.0.1"
    minimum_version: "v3.0.0"
    image: listmonk/listmonk:v4.0.1
    dev_version: "v4.0.1"
    prod_version: "v4.0.1"
    notes: "Self-hosted newsletter manager. Requires PostgreSQL."

  - name: metabase
    tested_version: "v0.52.5"
    minimum_version: "v0.46.0"
    image: metabase/metabase:v0.52.5
    notes: "BI analytics dashboard. Deployed via FlexibleProvisioner in Docker mode."

  - name: valkey
    tested_version: "8.1"
    minimum_version: "7.2"
    image: valkey/valkey:8.1-alpine
    notes: "Redis-compatible fork. Used for Foghorn HA state sync and Chatwoot Sidekiq."
