# Infrastructure manifest for FrameWorks platform releases.
# CI appends this file verbatim to the generated release manifest; the CLI
# reads it via the manifest fetcher. Each entry pins the version shipped by
# this platform release. `image:` is the docker reference for docker mode;
# `artifacts:` carries per-arch URL and optional checksum for native mode.

