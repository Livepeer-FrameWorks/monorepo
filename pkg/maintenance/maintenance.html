<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Coming Soon — FrameWorks</title>
    <link rel="icon" type="image/svg+xml" href="/frameworks-dark-logomark.svg" />
    <style>
      *,
      *::before,
      *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      @keyframes fadeInOut {
        0%,
        100% {
          opacity: 0.6;
        }
        50% {
          opacity: 0.9;
        }
      }

      @keyframes logoPulse {
        0%,
        100% {
          opacity: 0.15;
          transform: scale(1);
        }
        50% {
          opacity: 0.25;
          transform: scale(1.05);
        }
      }

      @keyframes logoPulseFast {
        0%,
        100% {
          opacity: 0.15;
          transform: scale(1);
        }
        50% {
          opacity: 0.25;
          transform: scale(1.05);
        }
      }

      @keyframes floatUp {
        0% {
          transform: translateY(100vh) rotate(0deg);
          opacity: 0;
        }
        10% {
          opacity: 0.6;
        }
        90% {
          opacity: 0.6;
        }
        100% {
          transform: translateY(-100px) rotate(360deg);
          opacity: 0;
        }
      }

      @keyframes gradientShift {
        0%,
        100% {
          background-position: 0% 50%;
        }
        50% {
          background-position: 100% 50%;
        }
      }

      @keyframes hitmarkerFade {
        0% {
          opacity: 1;
          transform: scale(0.5);
        }
        20% {
          opacity: 1;
          transform: scale(1.2);
        }
        100% {
          opacity: 0;
          transform: scale(1);
        }
      }

      @keyframes hitmarkerFade45 {
        0% {
          opacity: 1;
          transform: translate(-50%, -50%) rotate(45deg) scale(0.5);
        }
        20% {
          opacity: 1;
          transform: translate(-50%, -50%) rotate(45deg) scale(1.2);
        }
        100% {
          opacity: 0;
          transform: translate(-50%, -50%) rotate(45deg) scale(1);
        }
      }

      @keyframes hitmarkerFadeNeg45 {
        0% {
          opacity: 1;
          transform: translate(-50%, -50%) rotate(-45deg) scale(0.5);
        }
        20% {
          opacity: 1;
          transform: translate(-50%, -50%) rotate(-45deg) scale(1.2);
        }
        100% {
          opacity: 0;
          transform: translate(-50%, -50%) rotate(-45deg) scale(1);
        }
      }

      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      }

      .loading-container {
        position: relative;
        width: 100%;
        height: 100%;
        background: linear-gradient(
          135deg,
          hsl(235, 21%, 11%) 0%,
          hsl(233, 23%, 17%) 25%,
          hsl(235, 21%, 11%) 50%,
          hsl(233, 23%, 17%) 75%,
          hsl(235, 21%, 11%) 100%
        );
        background-size: 400% 400%;
        animation: gradientShift 16s ease-in-out infinite;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        user-select: none;
        -webkit-user-select: none;
      }

      .bubble {
        position: absolute;
        border-radius: 50%;
        transition: opacity 1s ease-in-out;
        pointer-events: none;
        user-select: none;
      }
      .bubble:nth-child(8n + 1) {
        background: hsla(218, 79%, 73%, 0.2);
      }
      .bubble:nth-child(8n + 2) {
        background: hsla(268, 75%, 76%, 0.2);
      }
      .bubble:nth-child(8n + 3) {
        background: hsla(97, 52%, 51%, 0.2);
      }
      .bubble:nth-child(8n + 4) {
        background: hsla(197, 95%, 74%, 0.2);
      }
      .bubble:nth-child(8n + 5) {
        background: hsla(352, 86%, 71%, 0.2);
      }
      .bubble:nth-child(8n + 6) {
        background: hsla(33, 81%, 64%, 0.2);
      }
      .bubble:nth-child(8n + 7) {
        background: hsla(218, 79%, 73%, 0.15);
      }
      .bubble:nth-child(8n + 8) {
        background: hsla(268, 75%, 76%, 0.15);
      }

      .particle {
        position: absolute;
        border-radius: 50%;
        opacity: 0;
        animation: floatUp linear infinite;
        pointer-events: none;
        user-select: none;
      }
      .particle:nth-child(8n + 1) {
        background: hsl(218, 79%, 73%);
      }
      .particle:nth-child(8n + 2) {
        background: hsl(268, 75%, 76%);
      }
      .particle:nth-child(8n + 3) {
        background: hsl(97, 52%, 51%);
      }
      .particle:nth-child(8n + 4) {
        background: hsl(197, 95%, 74%);
      }
      .particle:nth-child(8n + 5) {
        background: hsl(352, 86%, 71%);
      }
      .particle:nth-child(8n + 6) {
        background: hsl(33, 81%, 64%);
      }
      .particle:nth-child(8n + 7) {
        background: hsla(218, 79%, 73%, 0.8);
      }
      .particle:nth-child(8n + 8) {
        background: hsla(268, 75%, 76%, 0.8);
      }

      .center-logo {
        position: absolute;
        top: 50%;
        left: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 10;
        transition: transform 0.3s ease-out;
        user-select: none;
      }

      .logo-pulse {
        position: absolute;
        border-radius: 50%;
        background: hsla(218, 79%, 73%, 0.15);
        animation: logoPulse 3s ease-in-out infinite;
        user-select: none;
        pointer-events: none;
        transition: transform 0.3s ease-out;
      }
      .logo-pulse.hovered {
        animation-duration: 1s;
        transform: scale(1.2);
      }

      .logo-button {
        all: unset;
        cursor: pointer;
        display: block;
      }

      .logo-image {
        position: relative;
        z-index: 1;
        filter: drop-shadow(0 4px 8px hsla(235, 21%, 11%, 0.3));
        transition: all 0.3s ease-out;
        user-select: none;
        -webkit-user-drag: none;
        -webkit-touch-callout: none;
      }
      .logo-image.hovered {
        filter: drop-shadow(0 6px 12px hsla(235, 21%, 11%, 0.4)) brightness(1.1);
        transform: scale(1.1);
        cursor: pointer;
      }

      .message-block {
        position: absolute;
        bottom: 14%;
        left: 50%;
        transform: translateX(-50%);
        text-align: center;
        user-select: none;
        pointer-events: none;
        z-index: 15;
        width: 90%;
        max-width: 600px;
      }

      .message-title {
        color: hsl(220, 13%, 91%);
        font-size: clamp(18px, 3vw, 28px);
        font-weight: 700;
        letter-spacing: 0.15em;
        text-transform: uppercase;
        text-shadow: 0 2px 8px hsla(235, 21%, 11%, 0.6);
        margin-bottom: 10px;
      }

      .message-status {
        color: hsl(218, 79%, 73%);
        font-size: clamp(13px, 2vw, 16px);
        font-weight: 500;
        animation: fadeInOut 2s ease-in-out infinite;
        text-shadow: 0 0 12px hsla(218, 79%, 73%, 0.3);
        margin-bottom: 8px;
      }

      .message-body {
        color: hsla(227, 24%, 74%, 0.6);
        font-size: clamp(11px, 1.5vw, 13px);
        font-weight: 400;
        line-height: 1.6;
        text-shadow: 0 1px 4px hsla(235, 21%, 11%, 0.5);
      }

      .hero-title {
        position: absolute;
        top: 12%;
        left: 50%;
        transform: translateX(-50%);
        text-align: center;
        z-index: 15;
        user-select: none;
        pointer-events: none;
      }

      .hero-title h1 {
        color: hsl(220, 13%, 91%);
        font-size: clamp(28px, 5vw, 52px);
        font-weight: 800;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        text-shadow:
          0 2px 16px hsla(218, 79%, 73%, 0.2),
          0 4px 24px hsla(235, 21%, 11%, 0.6);
        margin: 0;
        line-height: 1.2;
      }

      .countdown {
        color: hsl(218, 79%, 73%);
        font-size: clamp(20px, 3.5vw, 40px);
        font-weight: 300;
        font-variant-numeric: tabular-nums;
        letter-spacing: 0.08em;
        margin-top: 8px;
        text-shadow: 0 0 20px hsla(218, 79%, 73%, 0.3);
        font-family: "SF Mono", "Cascadia Code", "Fira Code", Consolas, monospace;
      }

      .overlay-texture {
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background:
          radial-gradient(circle at 20% 80%, hsla(218, 79%, 73%, 0.03) 0%, transparent 50%),
          radial-gradient(circle at 80% 20%, hsla(268, 75%, 76%, 0.03) 0%, transparent 50%),
          radial-gradient(circle at 40% 40%, hsla(97, 52%, 51%, 0.02) 0%, transparent 50%);
        pointer-events: none;
        user-select: none;
      }

      .hitmarker {
        position: absolute;
        transform: translate(-50%, -50%);
        pointer-events: none;
        z-index: 100;
        width: 40px;
        height: 40px;
      }

      .hitmarker-line {
        position: absolute;
        width: 12px;
        height: 3px;
        background-color: hsl(220, 13%, 91%);
        box-shadow: 0 0 8px hsla(220, 13%, 91%, 0.8);
        border-radius: 1px;
      }

      .hitmarker-line.tl {
        top: 25%;
        left: 25%;
        animation: hitmarkerFade45 0.6s ease-out forwards;
      }
      .hitmarker-line.tr {
        top: 25%;
        left: 75%;
        animation: hitmarkerFadeNeg45 0.6s ease-out forwards;
      }
      .hitmarker-line.bl {
        top: 75%;
        left: 25%;
        animation: hitmarkerFadeNeg45 0.6s ease-out forwards;
      }
      .hitmarker-line.br {
        top: 75%;
        left: 75%;
        animation: hitmarkerFade45 0.6s ease-out forwards;
      }

      .dvd-logo {
        position: absolute;
        pointer-events: none;
        user-select: none;
        z-index: 1;
      }

      .support-links {
        position: absolute;
        bottom: 6%;
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        gap: 20px;
        z-index: 20;
        flex-wrap: wrap;
        justify-content: center;
      }

      .support-links a {
        color: hsla(227, 24%, 74%, 0.5);
        text-decoration: none;
        font-size: 13px;
        font-weight: 400;
        transition:
          color 0.2s ease,
          transform 0.2s ease;
        display: flex;
        align-items: center;
        gap: 5px;
      }

      .support-links a:hover {
        color: hsl(218, 79%, 73%);
        transform: translateY(-1px);
      }

      .support-links a svg {
        width: 14px;
        height: 14px;
        fill: currentColor;
        flex-shrink: 0;
      }
    </style>
  </head>
  <body>

      <div class="hero-title">
        <h1>Launching Soon</h1>
        <div class="countdown" id="countdown">00:00:00:00</div>
      </div>

      <!-- Hitmarkers injected by JS -->

      <!-- Particles (generated by JS) -->
      <div id="particles"></div>

      <!-- Bubbles (generated by JS) -->
      <div id="bubbles"></div>

    <script>
      (function () {
        var container = document.getElementById("container");
        var centerLogo = document.getElementById("centerLogo");
        var logoPulse = document.getElementById("logoPulse");
        var logoButton = document.getElementById("logoButton");
        var logoImage = document.getElementById("logoImage");
        var dvdLogo = document.getElementById("dvdLogo");
        var dvdSvg = document.getElementById("dvdSvg");

        // --- Chaotic countup timer ---
        var countdownEl = document.getElementById("countdown");
        // Start at 1-2 days in seconds
        var elapsed = (86400 + Math.random() * 86400) | 0;
        var velocity = 1;
        var velTimer = 0;
        var velDuration = 0;
        var fractional = 0;

        function pickVelocity() {
          var roll = Math.random();
          if (roll < 0.08) {
            // ~8%: go backwards slowly
            velocity = -(0.3 + Math.random() * 0.7);
            velDuration = 2000 + Math.random() * 3000;
          } else if (roll < 0.2) {
            // ~12%: crawl
            velocity = 0.1 + Math.random() * 0.3;
            velDuration = 3000 + Math.random() * 4000;
          } else if (roll < 0.4) {
            // ~20%: fast forward
            velocity = 3 + Math.random() * 8;
            velDuration = 1000 + Math.random() * 2000;
          } else if (roll < 0.5) {
            // ~10%: turbo
            velocity = 15 + Math.random() * 30;
            velDuration = 500 + Math.random() * 1500;
          } else {
            // ~50%: normal-ish
            velocity = 0.8 + Math.random() * 0.5;
            velDuration = 4000 + Math.random() * 6000;
          }
          velTimer = 0;
        }

        pickVelocity();

        function formatTime(totalSec) {
          var s = Math.max(0, Math.floor(totalSec));
          var days = (s / 86400) | 0;
          s -= days * 86400;
          var hrs = (s / 3600) | 0;
          s -= hrs * 3600;
          var mins = (s / 60) | 0;
          s -= mins * 60;
          return (
            (days < 10 ? "0" : "") +
            days +
            ":" +
            (hrs < 10 ? "0" : "") +
            hrs +
            ":" +
            (mins < 10 ? "0" : "") +
            mins +
            ":" +
            (s < 10 ? "0" : "") +
            s
          );
        }

        var lastCountTime = performance.now();
        function tickCountup(ts) {
          var dt = ts - lastCountTime;
          lastCountTime = ts;
          velTimer += dt;

          if (velTimer >= velDuration) pickVelocity();

          fractional += velocity * (dt / 1000);
          var whole = Math.floor(fractional);
          if (whole !== 0) {
            elapsed += whole;
            fractional -= whole;
            if (elapsed < 0) elapsed = 0;
            countdownEl.textContent = formatTime(elapsed);
          }

          requestAnimationFrame(tickCountup);
        }

        countdownEl.textContent = formatTime(elapsed);
        requestAnimationFrame(tickCountup);

        // --- Random message variations ---
        var messages = [
          {
            title: "SYSTEMS COMING ONLINE",
            status: "Initializing transcoding matrix\u2026",
            body: "If you can read this, you're early. That makes you one of us.",
          },
          {
            title: "THE BIGGEST STREAM \u2014 TREMENDOUS, VERY LIVE",
            status: "\ud83c\uddfa\ud83c\uddf8 Many people are saying this is the best launch ever.",
            body: "We have the greatest streams. Everybody knows it. The other platforms? Losers. Total disasters. We're going to stream so hard, you'll be tired of streaming. Believe me.",
          },
          {
            title: "STREAMING, LITERALLY",
            status: "A small creek of data is flowing toward your device.",
            body: "We tried to dam it but the bits keep leaking through. Nature finds a way. Expect a light drizzle of packets followed by a full downpour of content.",
          },
          {
            title:
              "\u2588\u2588\u2588\u2588\u2588\u2588 CLASSIFIED \u2588\u2588\u2588\u2588\u2588\u2588",
            status: "\u26a0\ufe0f CLEARANCE LEVEL: INSUFFICIENT",
            body: "This \u2588\u2588\u2588\u2588\u2588 is currently undergoing \u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588. All \u2588\u2588\u2588\u2588 will be \u2588\u2588\u2588\u2588\u2588\u2588 shortly. Do not \u2588\u2588\u2588\u2588 under any \u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588. Thank you for your \u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588.",
          },
          {
            title: "SYNERGIZING THE CONTENT PIPELINE\u2122",
            status: "Leveraging blockchain-adjacent streaming paradigms.",
            body: "Our AI-powered, quantum-ready, Web5-enabled platform is disrupting the synergy space. We put streaming in the cloud, then put that cloud in another cloud. It's clouds all the way down.",
          },
          {
            title: "NOW ENTERING: THE STREAM",
            status: "Current water temperature: refreshing.",
            body: "Please remove shoes before entering. No diving in the shallow end. Lifeguard is on break but the CDN is always watching.",
          },
          {
            title: "LAUNCH SEQUENCE INITIATED",
            status: "All edge nodes deploying across the network.",
            body: "Decentralized video infrastructure is being spun up worldwide. This is not a drill.",
          },
          {
            title: "DOWNSTREAM CONDITIONS: OPTIMAL",
            status: "Salmon are reporting excellent bitrates.",
            body: "The stream is being stocked with fresh content. Fishing permits not required. Catch and release policy applies to all packets.",
          },
        ];

        var msg = messages[Math.floor(Math.random() * messages.length)];
        document.getElementById("msgTitle").textContent = msg.title;
        document.getElementById("msgStatus").textContent = msg.status;
        document.getElementById("msgBody").textContent = msg.body;

        // --- Logo sizing ---
        var logoSize = 100;

        function updateLogoSize() {
          var minDim = Math.min(container.clientWidth, container.clientHeight);
          logoSize = minDim * 0.2;
          logoImage.style.width = logoSize + "px";
          logoImage.style.height = logoSize + "px";
          logoPulse.style.width = logoSize * 1.4 + "px";
          logoPulse.style.height = logoSize * 1.4 + "px";
        }

        updateLogoSize();
        if (typeof ResizeObserver !== "undefined") {
          new ResizeObserver(updateLogoSize).observe(container);
        } else {
          window.addEventListener("resize", updateLogoSize);
        }

        // --- Physics-based slippery logo ---
        var logoX = 0,
          logoY = 0;
        var logoVX = 0,
          logoVY = 0;
        var isHovered = false;
        var mouseX = -9999,
          mouseY = -9999;
        var mouseInContainer = false;

        var REPEL_RADIUS = 350;
        var REPEL_FORCE = 30;
        var RETURN_FORCE = 0.008;
        var FRICTION = 0.95;
        var EDGE_PADDING = 60;
        var EDGE_REPEL = 12;

        container.addEventListener("mousemove", function (e) {
          mouseX = e.clientX;
          mouseY = e.clientY;
          mouseInContainer = true;
        });

        container.addEventListener("mouseleave", function () {
          mouseInContainer = false;
          mouseX = -9999;
          mouseY = -9999;
        });

        function tickLogoPhysics() {
          var rect = container.getBoundingClientRect();
          var halfW = rect.width / 2;
          var halfH = rect.height / 2;
          var absX = rect.left + halfW + logoX;
          var absY = rect.top + halfH + logoY;

          // Mouse repulsion
          if (mouseInContainer) {
            var dX = mouseX - absX;
            var dY = mouseY - absY;
            var dist = Math.sqrt(dX * dX + dY * dY);

            if (dist < REPEL_RADIUS && dist > 0) {
              var strength = Math.pow((REPEL_RADIUS - dist) / REPEL_RADIUS, 1.5);
              var force = REPEL_FORCE * strength;
              logoVX -= (dX / dist) * force;
              logoVY -= (dY / dist) * force;
              isHovered = dist < logoSize * 1.5;
            } else {
              isHovered = false;
            }
          } else {
            isHovered = false;
          }

          // Boundary repulsion — push away from edges so it can't be cornered
          var maxX = halfW - EDGE_PADDING;
          var maxY = halfH - EDGE_PADDING;

          if (logoX > maxX) logoVX -= (logoX - maxX) * 0.3;
          if (logoX < -maxX) logoVX -= (logoX + maxX) * 0.3;
          if (logoY > maxY) logoVY -= (logoY - maxY) * 0.3;
          if (logoY < -maxY) logoVY -= (logoY + maxY) * 0.3;

          // Gentle return to center
          logoVX -= logoX * RETURN_FORCE;
          logoVY -= logoY * RETURN_FORCE;

          logoVX *= FRICTION;
          logoVY *= FRICTION;

          logoX += logoVX;
          logoY += logoVY;

          centerLogo.style.transform =
            "translate(-50%, -50%) translate(" + logoX + "px, " + logoY + "px)";
          logoPulse.classList.toggle("hovered", isHovered);
          logoImage.classList.toggle("hovered", isHovered);

          requestAnimationFrame(tickLogoPhysics);
        }
        requestAnimationFrame(tickLogoPhysics);

        function createSyntheticHitmarkerSound() {
          try {
            var ac = new (window.AudioContext || window.webkitAudioContext)();
            var osc1 = ac.createOscillator();
            var osc2 = ac.createOscillator();
            var noiseBuf = ac.createBuffer(1, ac.sampleRate * 0.1, ac.sampleRate);
            var noiseSrc = ac.createBufferSource();
            var data = noiseBuf.getChannelData(0);
            for (var i = 0; i < data.length; i++) data[i] = Math.random() * 2 - 1;
            noiseSrc.buffer = noiseBuf;

            var g1 = ac.createGain(),
              g2 = ac.createGain(),
              ng = ac.createGain(),
              mg = ac.createGain();
            osc1.connect(g1);
            osc2.connect(g2);
            noiseSrc.connect(ng);
            g1.connect(mg);
            g2.connect(mg);
            ng.connect(mg);
            mg.connect(ac.destination);

            var t = ac.currentTime;
            osc1.frequency.setValueAtTime(1800, t);
            osc1.frequency.exponentialRampToValueAtTime(900, t + 0.08);
            osc2.frequency.setValueAtTime(3600, t);
            osc2.frequency.exponentialRampToValueAtTime(1800, t + 0.04);
            osc1.type = "triangle";
            osc2.type = "sine";

            g1.gain.setValueAtTime(0, t);
            g1.gain.linearRampToValueAtTime(0.4, t + 0.002);
            g1.gain.exponentialRampToValueAtTime(0.001, t + 0.12);
            g2.gain.setValueAtTime(0, t);
            g2.gain.linearRampToValueAtTime(0.3, t + 0.001);
            g2.gain.exponentialRampToValueAtTime(0.001, t + 0.06);
            ng.gain.setValueAtTime(0, t);
            ng.gain.linearRampToValueAtTime(0.2, t + 0.001);
            ng.gain.exponentialRampToValueAtTime(0.001, t + 0.01);
            mg.gain.setValueAtTime(0.5, t);

            osc1.start(t);
            osc2.start(t);
            noiseSrc.start(t);
            osc1.stop(t + 0.15);
            osc2.stop(t + 0.15);
            noiseSrc.stop(t + 0.02);
          } catch (e) {}
        }

        function playHitmarkerSound() {
          try {
            var audio = new Audio(HITMARKER_DATA_URL);
            audio.volume = 0.3;
            audio.play().catch(function () {
              createSyntheticHitmarkerSound();
            });
          } catch (e) {
            createSyntheticHitmarkerSound();
          }
        }

        logoButton.addEventListener("click", function (e) {
          e.stopPropagation();
          var rect = container.getBoundingClientRect();
          var x = e.clientX - rect.left;
          var y = e.clientY - rect.top;

          var hm = document.createElement("div");
          hm.className = "hitmarker";
          hm.style.left = x + "px";
          hm.style.top = y + "px";
          hm.innerHTML =
            '<div class="hitmarker-line tl"></div><div class="hitmarker-line tr"></div><div class="hitmarker-line bl"></div><div class="hitmarker-line br"></div>';
          container.appendChild(hm);
          playHitmarkerSound();

          setTimeout(function () {
            hm.remove();
          }, 600);
        });

        // --- Particles ---
        var particlesEl = document.getElementById("particles");
        for (var i = 0; i < 12; i++) {
          var p = document.createElement("div");
          p.className = "particle";
          var left = Math.random() * 100;
          var size = Math.random() * 4 + 2;
          var dur = 8 + Math.random() * 4;
          var delay = Math.random() * 8;
          p.style.left = left + "%";
          p.style.width = size + "px";
          p.style.height = size + "px";
          p.style.animationDuration = dur + "s";
          p.style.animationDelay = delay + "s";
          particlesEl.appendChild(p);
        }

        // --- Bubbles ---
        var bubblesEl = document.getElementById("bubbles");
        var bubbleData = [];

        for (var i = 0; i < 8; i++) {
          var b = document.createElement("div");
          b.className = "bubble";
          var bState = {
            el: b,
            position: { top: Math.random() * 80 + 10, left: Math.random() * 80 + 10 },
            size: Math.random() * 60 + 30,
            timeoutId: null,
          };
          b.style.top = bState.position.top + "%";
          b.style.left = bState.position.left + "%";
          b.style.width = bState.size + "px";
          b.style.height = bState.size + "px";
          b.style.opacity = "0";
          bubblesEl.appendChild(b);
          bubbleData.push(bState);
        }

        function animateBubble(idx) {
          var bd = bubbleData[idx];
          bd.el.style.opacity = "0.15";
          var visible = 4000 + Math.random() * 3000;

          bd.timeoutId = setTimeout(function () {
            bd.el.style.opacity = "0";
            bd.timeoutId = setTimeout(function () {
              bd.position = { top: Math.random() * 80 + 10, left: Math.random() * 80 + 10 };
              bd.size = Math.random() * 60 + 30;
              bd.el.style.top = bd.position.top + "%";
              bd.el.style.left = bd.position.left + "%";
              bd.el.style.width = bd.size + "px";
              bd.el.style.height = bd.size + "px";
              bd.timeoutId = setTimeout(function () {
                animateBubble(idx);
              }, 200);
            }, 1500);
          }, visible);
        }

        for (var i = 0; i < 8; i++) {
          (function (idx) {
            setTimeout(function () {
              animateBubble(idx);
            }, idx * 500);
          })(i);
        }

        // --- DVD Logo bounce ---
        var DVD_COLORS = [
          "#7aa2f7",
          "#bb9af7",
          "#9ece6a",
          "#73daca",
          "#7dcfff",
          "#f7768e",
          "#e0af68",
          "#2ac3de",
        ];
        var ORIGINAL_W = 153,
          ORIGINAL_H = 69;
        var ASPECT = ORIGINAL_W / ORIGINAL_H;

        var dvdPos = { top: 0, left: 0 };
        var dvdVel = { x: 1.8, y: 1.6 };
        var dvdDims = { width: ORIGINAL_W, height: ORIGINAL_H };
        var dvdColor = DVD_COLORS[Math.floor(Math.random() * DVD_COLORS.length)];
        dvdSvg.setAttribute("fill", dvdColor);
        var dvdLastTime = performance.now();

        function pickDvdColor(current) {
          var next;
          do {
            next = DVD_COLORS[Math.floor(Math.random() * DVD_COLORS.length)];
          } while (next === current && DVD_COLORS.length > 1);
          return next;
        }

        function recalcDvd() {
          var pw = container.clientWidth,
            ph = container.clientHeight;
          if (!pw || !ph) return;
          var scale = 0.08;
          var maxW = pw * scale,
            maxH = ph * scale;
          var w = maxW,
            h = w / ASPECT;
          if (h > maxH) {
            h = maxH;
            w = h * ASPECT;
          }
          dvdDims = { width: Math.max(20, w), height: Math.max(20, h) };
          dvdLogo.style.width = dvdDims.width + "px";
          dvdLogo.style.height = dvdDims.height + "px";

          var maxTop = Math.max(0, ph - dvdDims.height);
          var maxLeft = Math.max(0, pw - dvdDims.width);
          dvdPos = { top: Math.random() * maxTop, left: Math.random() * maxLeft };
          dvdLogo.style.top = dvdPos.top + "px";
          dvdLogo.style.left = dvdPos.left + "px";

          var baseSpeed = Math.max(1.2, Math.min(dvdDims.width, dvdDims.height) / 70);
          dvdVel = {
            x: baseSpeed * (Math.random() > 0.5 ? 1 : -1),
            y: baseSpeed * (Math.random() > 0.5 ? 1 : -1),
          };
        }

        recalcDvd();
        if (typeof ResizeObserver !== "undefined") {
          new ResizeObserver(recalcDvd).observe(container);
        }

        function animateDvd(ts) {
          var dt = ts - dvdLastTime;
          dvdLastTime = ts;
          var mult = Math.min(dt / 16, 2);

          var maxTop = container.clientHeight - dvdDims.height;
          var maxLeft = container.clientWidth - dvdDims.width;
          var bounced = false;

          dvdPos.top += dvdVel.y * mult;
          dvdPos.left += dvdVel.x * mult;

          if (dvdPos.top <= 0 || dvdPos.top >= maxTop) {
            dvdVel.y = -dvdVel.y;
            dvdPos.top = Math.max(0, Math.min(maxTop, dvdPos.top));
            bounced = true;
          }
          if (dvdPos.left <= 0 || dvdPos.left >= maxLeft) {
            dvdVel.x = -dvdVel.x;
            dvdPos.left = Math.max(0, Math.min(maxLeft, dvdPos.left));
            bounced = true;
          }

          if (bounced) {
            dvdColor = pickDvdColor(dvdColor);
            dvdSvg.setAttribute("fill", dvdColor);
          }

          dvdLogo.style.top = dvdPos.top + "px";
          dvdLogo.style.left = dvdPos.left + "px";
          requestAnimationFrame(animateDvd);
        }

        requestAnimationFrame(animateDvd);
      })();
