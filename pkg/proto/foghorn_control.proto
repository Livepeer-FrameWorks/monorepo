syntax = "proto3";

package foghorn_control;

option go_package = "github.com/Livepeer-FrameWorks/monorepo/pkg/proto/foghorn_control;foghorncontrolpb";

// foghorn_control carries the Foghorn control-plane request/response messages
// that Commodore proxies to the Gateway: DVR chapters, node operational
// control, tenant termination/cache, and playback-access dry-run. The gRPC
// services that use these messages are defined in foghorn.proto.

message RetrieveDVRChapterRequest {
  string dvr_artifact_id = 1;
  string mode = 2;                   // 'window_sized_chapters' | 'fixed_interval' | '' (auto from policy)
  int32 interval_seconds = 3;        // required for fixed_interval
  int64 start_ms = 4;                // UTC epoch ms
  int64 end_ms = 5;                  // UTC epoch ms
  string tenant_id = 6;              // for tenant-isolation enforcement
}

message RetrieveDVRChapterResponse {
  string chapter_id = 1;
  string playback_artifact_hash = 2; // Internal artifact hash. Mist routing uses this; public clients use playback_id.
  string state = 3;                  // open | closed | finalizing | finalized | frozen | reclaimed | failed_source_missing | failed_permanent
  bool is_current = 4;
  bool has_gaps = 5;
  int32 segment_count = 6;
  int64 start_ms = 7;
  int64 end_ms = 8;
  string last_failure_reason = 9;
  reserved 10;
  reserved "manifest_s3_key", "manifest_url", "error";
  string playback_id = 11;           // Commodore-minted public playback key; empty until the finalization queue dispatches.
  // Actual MKV span = [first owned segment's media_start, last owned
  // segment's media_end). May differ from start_ms/end_ms when chapter
  // boundaries don't align with segment boundaries. 0 until the chapter
  // finalizes. Players anchor video.currentTime to wall-clock using
  // these so the timeline doesn't drift against the scheduled bounds.
  int64 actual_media_start_ms = 12;
  int64 actual_media_end_ms   = 13;
}

message ListDVRChaptersRequest {
  string dvr_artifact_id = 1;
  string mode = 2;                   // restrict to chapters of this mode; empty = all
  int32 interval_seconds = 3;
  int64 range_start_ms = 4;          // 0 = no lower bound
  int64 range_end_ms = 5;            // 0 = no upper bound
  int32 page_size = 6;               // default 200, max 1000
  string page_token = 7;             // keyset cursor (start_ms as decimal text)
  string tenant_id = 8;
}

message ChapterRef {
  string chapter_id = 1;
  string mode = 2;
  int32 interval_seconds = 3;
  int64 start_ms = 4;
  int64 end_ms = 5;
  bool is_current = 6;
  string playback_artifact_hash = 7; // Internal artifact hash; public clients use playback_id.
  bool has_gaps = 8;
  int32 segment_count = 9;
  string state = 10;
  string last_failure_reason = 11;
  string playback_id = 12;           // Commodore-minted public playback key; empty until the finalization queue dispatches.
  int64 actual_media_start_ms = 13;
  int64 actual_media_end_ms   = 14;
}

message ListDVRChaptersResponse {
  repeated ChapterRef chapters = 1;
  string next_page_token = 2;        // empty when no more pages
}

message SetNodeModeRequest {
  string node_id = 1;
  string mode = 2;    // "normal", "draining", "maintenance"
  string set_by = 3;  // caller identity for audit trail
}

enum SetNodeModeStatus {
  SET_NODE_MODE_STATUS_UNSPECIFIED = 0;
  SET_NODE_MODE_STATUS_SUCCESS = 1;
  SET_NODE_MODE_STATUS_INVALID_MODE = 2;
  SET_NODE_MODE_STATUS_NOT_FOUND = 3;
  SET_NODE_MODE_STATUS_ALREADY_IN_MODE = 4;
}

message SetNodeModeResponse {
  string node_id = 1;
  string mode = 2;
  string message = 3;
  SetNodeModeStatus status = 4;
}

message GetNodeHealthRequest {
  string node_id = 1;
}

message GetNodeHealthResponse {
  string node_id = 1;
  string operational_mode = 2;
  bool is_healthy = 3;
  int32 active_viewers = 4;
  int32 active_streams = 5;
  string last_heartbeat = 6;  // ISO8601
  string cluster_id = 7;
  string tenant_id = 8;       // owning tenant (empty for operator nodes)
  double cpu_percent = 9;
  double ram_used_mb = 10;
  double ram_max_mb = 11;
  double bandwidth_up_mbps = 12;
  double bandwidth_down_mbps = 13;
  double bw_limit_mbps = 14;
  uint64 disk_total_bytes = 15;
  uint64 disk_used_bytes = 16;
  string location = 17;
  optional double latitude = 18;
  optional double longitude = 19;
  repeated NodeComponentVersion component_versions = 20;
}

message NodeComponentVersion {
  string component = 1;
  string version = 2;
}

message InvalidateTenantCacheRequest {
  string tenant_id = 1;
  string reason = 2; // e.g., "reactivated", "balance_topped_up"
}

// InvalidateTenantCacheResponse indicates cache entries invalidated
message InvalidateTenantCacheResponse {
  int32 entries_invalidated = 1;
}

// TerminateTenantStreamsRequest is sent by Purser when a tenant is suspended
message TerminateTenantStreamsRequest {
  string tenant_id = 1;
  string reason = 2; // e.g., "insufficient_balance", "suspended"
}

// TerminateTenantStreamsResponse indicates the result of termination
message TerminateTenantStreamsResponse {
  int32 streams_terminated = 1;   // Number of streams that were stopped
  int32 sessions_terminated = 2;  // Total number of sessions stopped
  repeated string stream_names = 3; // Names of streams that were stopped
}

message TestPlaybackAccessRequest {
  string tenant_id = 1;
  // Exactly one of playback_id / internal_name must be set. internal_name
  // is what the live USER_NEW path keys on; playback_id is the public
  // identifier customers use everywhere else.
  string playback_id = 2;
  string internal_name = 3;
  // JWT mode: caller-supplied token + optional viewer context that the
  // evaluator would ordinarily get from the MistServer trigger payload.
  // viewer_token must be set; the rest are optional and surface only in
  // the deny detail / webhook payload path.
  string viewer_token = 4;
  string viewer_ip = 5;
  string request_url = 6;
  string connector = 7;
  string session_id = 8;
  // Webhook mode: when true and the resolved policy is type=webhook, the
  // evaluator fires a real outbound request to the customer URL. Caller
  // is responsible for showing a confirmation in the UI before setting
  // this; webhooks have side effects.
  bool fire_webhook = 9;
}

message TestPlaybackAccessResponse {
  bool allowed = 1;
  string policy_type = 2;          // "public" | "jwt" | "webhook" | ""
  string reason = 3;               // empty on allow; deny reason token otherwise
  string detail = 4;               // free-form context (verifier error, status code as text)
  string kid = 5;                  // JWT key ID claimed by the token (if any)
  string claims_json = 6;          // JSON-encoded claims map (verified or not)
  int32 webhook_status = 7;        // HTTP status from the customer URL (webhook mode)
  int32 webhook_latency_ms = 8;    // RTT for the webhook call
  // Echo of which policy target the evaluator resolved against. Useful
  // when Commodore mapped a public playback_id to an internal_name for
  // the caller.
  string resolved_internal_name = 9;
}
