  string tenant_id = 1;
  ArtifactAssetType asset_type = 2;
  string asset_key = 3;
  string storage_cluster_id = 4;
}

message MarkArtifactThumbnailsReadyResponse {
  bool updated = 1;
}

// UpdateArtifactStorageCluster updates storage_cluster_id only; never flips
// has_thumbnails. Called whenever Foghorn mutates
// foghorn.artifacts.storage_cluster_id.
message UpdateArtifactStorageClusterRequest {
  string tenant_id = 1;
  ArtifactAssetType asset_type = 2;
  string asset_key = 3;
  string storage_cluster_id = 4;
}

message UpdateArtifactStorageClusterResponse {
  bool updated = 1;
}

// UpdateArtifactSize projects foghorn.artifacts.size_bytes onto the matching
// commodore registry row. asset_key is clip_hash, dvr_hash, or vod_hash.
message UpdateArtifactSizeRequest {
  string tenant_id = 1;
  ArtifactAssetType asset_type = 2;
  string asset_key = 3;
  int64 size_bytes = 4;
  optional int64 duration_ms = 5; // Measured output duration; projects the real length of a partial clip (clips only)
}

message UpdateArtifactSizeResponse {
  bool updated = 1;
}

// Resolve clip hash to tenant context
// Used for analytics enrichment and playback authorization
message ResolveClipHashRequest {
  string clip_hash = 1;
}

message ResolveClipHashResponse {
  bool found = 1;                       // Whether clip was found
  string tenant_id = 2;                 // Tenant context for analytics
  string user_id = 3;                   // Owner for authorization
  string stream_id = 4;                 // Source stream UUID
  string stream_internal_name = 5;       // Source stream's MistServer routing name (via streams JOIN)
  string title = 6;                     // Clip title
  string description = 7;               // Clip description
  int64 start_time = 8;                 // Start timestamp (unix ms)
  int64 duration = 9;                   // Duration (ms)
  string clip_mode = 10;                // How clip was created
  string playback_id = 11;              // Public playback key
  string internal_name = 12;   // Artifact routing name (internal)
  string origin_cluster_id = 13;        // Cluster that originally created this clip
}

// Resolve DVR hash to tenant context
// Used for analytics enrichment and playback authorization
