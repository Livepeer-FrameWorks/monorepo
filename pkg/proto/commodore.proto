syntax = "proto3";

package commodore;

option go_package = "github.com/Livepeer-FrameWorks/monorepo/pkg/proto/commodore;commodorepb";

import "google/protobuf/timestamp.proto";
import "google/protobuf/empty.proto";
import "common.proto";
import "shared.proto";
import "foghorn_control.proto";
import "cluster_peer.proto";
import "tenant_limits.proto";
import "metering_contract.proto";
import "x402.proto";

// ============================================================================
// COMMODORE CONTROL PLANE - INTERNAL SERVICE APIs
//
// These are internal service-to-service APIs called by:
// - Foghorn (ValidateStreamKey during PUSH_REWRITE)
// - Decklog (ResolveInternalName for event enrichment)
// - Gateway (user operations proxied through)
//
// Field sources documented inline for verification.
// ============================================================================

// InternalService handles service-to-service lookups (Foghorn, Decklog, etc.)
service InternalService {
  // Called by Foghorn on PUSH_REWRITE to validate stream key
  // Source: pkg/api/commodore/types.go:ValidateStreamKeyResponse
  rpc ValidateStreamKey(ValidateStreamKeyRequest) returns (ValidateStreamKeyResponse);

  // Stream-key-less admission/materialization authority. Returns the same
  // fact set as ValidateStreamKey (tenant, user, stream IDs, processes JSON,
  // DVR policy, is_recording_enabled, billing flags) but keyed by stream_id
  // / playback_id / internal_name. Used by Foghorn at per-stream Apply time
  // for ingest modes that bypass PUSH_REWRITE (notably mist_native), so the
  // same cache writes happen without a stream key.
  //
  // Admission scope: `admitted` enforces user-active, cluster entitlement /
  // health, tenant suspension, and negative balance. It does NOT enforce
  // free-tier load or per-tenant stream-count caps (those are Foghorn-side
  // state in the push path); the facts needed to layer those checks
  // caller-side are returned in the response. This RPC is currently used
  // only for operator/system-tenant managed streams (see render-layer gate
  // in cli/pkg/bootstrap/render.go: mistNativeStreamToRendered), so the
  // missing caller-side gates do not affect customer billing today. Adding
  // tenant-owned managed streams requires implementing those caller-side
  // gates before relaxing that ownership constraint.
  rpc ResolveStreamContext(ResolveStreamContextRequest) returns (ResolveStreamContextResponse);

  // Lists every mist_native always_on stream whose single allowed source
  // cluster includes the caller's cluster_id. The repeated field is retained
  // for pull-stream symmetry, but current mist_native bootstrap/schema
  // validation requires exactly one entry.
  // Per-stream admission + policy resolution then go through
  // ResolveStreamContext above.
  // Stable ordering by stream_id keeps reconciler diffs deterministic.
  rpc ListManagedStreams(ListManagedStreamsRequest) returns (ListManagedStreamsResponse);

  // Lists a tenant's streams with their per-stream Skipper monitoring toggle.
  // Called by Skipper (api_consultant) each heartbeat cycle to resolve which
  // streams to monitor. Service-to-service; filters by tenant_id. Skipper keys
  // its monitored set and scoped Periscope reads on stream_id (the public UUID
  // = commodore.streams.id, which Periscope stores as stream_health.stream_id);
  // internal_name is returned only for logging/diagnostics.
  rpc ListStreamMonitoring(ListStreamMonitoringRequest) returns (ListStreamMonitoringResponse);

  // Records the cluster currently serving a managed stream. Foghorn calls
  // this after a successful ApplyManagedStream so commodore.streams.active_
  // ingest_cluster_id reflects the elected placement: without it, public
  // playback/control routing falls back to the tenant's default route and
  // a managed stream pinned to a non-default cluster gets routed to the
  // wrong Foghorn. Same column push ingest writes during PUSH_REWRITE.
  rpc RecordStreamActiveCluster(RecordStreamActiveClusterRequest) returns (RecordStreamActiveClusterResponse);

  // Clears commodore.streams.active_ingest_cluster_id for a managed stream
  // once Foghorn has confirmed the Mist config is gone (verified retract).
  // Without this, a disabled / suspended / removed managed stream keeps
  // routing pinned at its old cluster until some unrelated path overwrites
  // the column. Conditional: only clears when the recorded cluster matches
  // the caller's expected_cluster_id, so concurrent placement on a peer
  // cluster cannot have its pin nuked by a stale retract.
  rpc ClearStreamActiveCluster(ClearStreamActiveClusterRequest) returns (ClearStreamActiveClusterResponse);

  // Called by edge nodes to resolve playback ID to internal name
  // Source: pkg/api/commodore/types.go:ResolvePlaybackIDResponse
  rpc ResolvePlaybackID(ResolvePlaybackIDRequest) returns (ResolvePlaybackIDResponse);

  // Called by Foghorn's STREAM_SOURCE handler and /source origin selector for
  // pull+<internal_name> streams. Returns the configured upstream pull URI.
  // Decryption happens server-side; callers receive cleartext suitable for
  // handing to MistServer's input modules.
  rpc ResolvePullSourceByInternalName(ResolvePullSourceByInternalNameRequest) returns (ResolvePullSourceByInternalNameResponse);

  // Called by Foghorn's USER_NEW handler to fetch the full playback policy
  // (signing keys + claim requirements OR webhook policy) when requires_auth
  // is true on the resolved playback object. Enforcement callers must set
  // include_webhook_secret when they need the plaintext HMAC secret.
  rpc ResolvePlaybackPolicy(ResolvePlaybackPolicyRequest) returns (ResolvePlaybackPolicyResponse);

  // Mints and returns a signed policy bundle for a (tenant_id, stream_id)
  // pair. Foghorn caches the bundle with a soft TTL (background refresh)
  // and hard TTL (refuse stale). The bundle JWT carries the tenant plan,
  // allowed cluster set, playback policy snapshot, and a monotonic
  // bundle_version. Revocation rides the existing
  // playback_policy_invalidation_outbox channel with a 'bundle_revoke'
  // reason carrying a minimum-acceptable bundle_version watermark; Foghorn
  // drops cached entries below the watermark. Survives a central Commodore
  // outage for the hard-TTL window without serving stale policy past plan
  // downgrades.
  rpc GetSignedPolicyBundle(GetSignedPolicyBundleRequest) returns (GetSignedPolicyBundleResponse);

  // Called by Foghorn after a JWT policy successfully verifies.
  rpc RecordSigningKeyUse(RecordSigningKeyUseRequest) returns (google.protobuf.Empty);

  // Called by Decklog/Foghorn to enrich events with tenant context
  // Source: pkg/api/commodore/types.go:InternalNameResponse
  rpc ResolveInternalName(ResolveInternalNameRequest) returns (ResolveInternalNameResponse);

  // Called by Gateway to validate developer API tokens
  // Source: pkg/api/commodore/types.go:ValidateAPITokenResponse
  rpc ValidateAPIToken(ValidateAPITokenRequest) returns (ValidateAPITokenResponse);

  // Mint a short-TTL session token authorizing an operator to open the
  // Mist admin UI on a specific edge node. The token is bound to a
  // single node_id; Foghorn rejects validation against any other node.
  rpc MintMistAdminSession(MintMistAdminSessionRequest) returns (MintMistAdminSessionResponse);

  // Validate a mist-admin session token. Caller (Foghorn) MUST set
  // expected_node_id to the connected Helmsman's nodeID so that a token
  // for one node cannot be replayed against another.
  rpc ValidateMistAdminSession(ValidateMistAdminSessionRequest) returns (ValidateMistAdminSessionResponse);

  // Called by Foghorn to initiate DVR recording for a stream
  rpc StartDVR(shared.StartDVRRequest) returns (shared.StartDVRResponse);

  // ===== DVR CHAPTERS (api_gateway -> Commodore -> Foghorn) =====
  // Chapter retrieval + listing. Commodore is the customer-facing
  // intermediary: validates tenant ownership of the DVR artifact, then
  // forwards to Foghorn (which owns the chapter row + finalization
  // queue). Chapter mode/interval is configured on the Stream and
  // snapshotted at StartDVR — there is no mid-recording policy RPC.
  rpc RetrieveDVRChapter(foghorn_control.RetrieveDVRChapterRequest) returns (foghorn_control.RetrieveDVRChapterResponse);
  rpc ListDVRChapters(foghorn_control.ListDVRChaptersRequest) returns (foghorn_control.ListDVRChaptersResponse);

  // ============================================================================
  // CLIP/DVR REGISTRY (Foghorn → Commodore)
  // Business registry for clips and DVR recordings.
  // See: docs/architecture/clips-dvr.md
  // ============================================================================

  // Register a new clip in the business registry (called by Foghorn during CreateClip)
  rpc RegisterClip(RegisterClipRequest) returns (RegisterClipResponse);

  // Register a new DVR recording in the business registry (called by Foghorn during StartDVR)
  rpc RegisterDVR(RegisterDVRRequest) returns (RegisterDVRResponse);

  // Back-fill retention_until on a DVR recording at finalize time.
  // Foghorn computes retention_until = ended_at + dvr_retention_days*24h
  // from the persisted policy snapshot and pushes it to Commodore so the
  // business registry's expires_at reflects post-end retention. Active
  // recordings carry NULL retention_until until they finalize.
  rpc UpdateDVRRetention(UpdateDVRRetentionRequest) returns (UpdateDVRRetentionResponse);

  // MarkArtifactThumbnailsReady flips has_thumbnails to TRUE and stamps the
  // authoritative storage_cluster_id after Foghorn confirms the thumbnail
  // bytes landed. Live streams are excluded — they derive URLs from
  // active_ingest_cluster_id.
  rpc MarkArtifactThumbnailsReady(MarkArtifactThumbnailsReadyRequest) returns (MarkArtifactThumbnailsReadyResponse);

  // UpdateArtifactStorageCluster updates storage_cluster_id only. It never
  // touches has_thumbnails — a storage move on a thumbnail-less artifact must
  // not falsely flip readiness. Called whenever Foghorn mutates
  // foghorn.artifacts.storage_cluster_id.
  rpc UpdateArtifactStorageCluster(UpdateArtifactStorageClusterRequest) returns (UpdateArtifactStorageClusterResponse);

  // UpdateArtifactSize projects Foghorn's authoritative artifact byte count
  // into Commodore's registry rows for catalog pagination and sorting.
  rpc UpdateArtifactSize(UpdateArtifactSizeRequest) returns (UpdateArtifactSizeResponse);

  // Resolve clip hash to tenant context (for analytics enrichment and playback)
  rpc ResolveClipHash(ResolveClipHashRequest) returns (ResolveClipHashResponse);

  // Resolve DVR hash to tenant context (for analytics enrichment and playback)
  rpc ResolveDVRHash(ResolveDVRHashRequest) returns (ResolveDVRHashResponse);

// Resolve artifact playback ID to artifact identity (clip/dvr/vod)
  rpc ResolveArtifactPlaybackID(ResolveArtifactPlaybackIDRequest) returns (ResolveArtifactPlaybackIDResponse);

  // Resolve artifact internal routing name to artifact identity (clip/dvr/vod)
  rpc ResolveArtifactInternalName(ResolveArtifactInternalNameRequest) returns (ResolveArtifactInternalNameResponse);

  // Unified identifier resolution - checks streams, clips, and DVR in one call
  // Used by Foghorn for analytics enrichment when local state cache misses
  rpc ResolveIdentifier(ResolveIdentifierRequest) returns (ResolveIdentifierResponse);

  // ============================================================================
  // VOD REGISTRY (Foghorn → Commodore)
  // Business registry for VOD assets. Mirrors clip/DVR pattern.
  // ============================================================================

  // Register a new VOD asset in the business registry (called by Foghorn during CreateVodUpload)
  rpc RegisterVod(RegisterVodRequest) returns (RegisterVodResponse);

  // Resolve VOD hash to tenant context (for analytics enrichment and playback)
  rpc ResolveVodHash(ResolveVodHashRequest) returns (ResolveVodHashResponse);
  // Resolve VOD relay ID (vod_assets.id) to VOD hash + tenant context
  rpc ResolveVodID(ResolveVodIDRequest) returns (ResolveVodIDResponse);

  // ============================================================================
  // DVR CHAPTER PLAYBACK ID REGISTRY (Foghorn → Commodore)
  // Hidden chapter artifacts (origin_type='dvr_chapter', library_visible=false)
  // get real Commodore-minted playback IDs so chapter playback goes through the
  // same public-ID boundary as VOD. The mapping is keyed by chapter_id; mint is
  // idempotent (returns the existing playback_id on retry).
  // ============================================================================

  // Mint (or fetch existing) public playback_id for a DVR chapter artifact.
  // Called by Foghorn at chapter finalization dispatch.
  rpc MintChapterPlaybackID(MintChapterPlaybackIDRequest) returns (MintChapterPlaybackIDResponse);

  // Resolve a chapter playback_id back to its tenant + chapter + artifact hash.
  // Used by Foghorn's playback resolver to map the public ID to the internal
  // artifact identity.
  rpc ResolveChapterPlaybackID(ResolveChapterPlaybackIDRequest) returns (ResolveChapterPlaybackIDResponse);

  // GetTenantProcessesJSON returns the resolved MistServer process config for
  // a tenant + lifecycle. Foghorn calls this from internal materialization
  // queues and stores/applies the returned snapshot verbatim.
  rpc GetTenantProcessesJSON(GetTenantProcessesJSONRequest) returns (GetTenantProcessesJSONResponse);

  // Internal registry projection used by Bridge's GraphQL
  // storageArtifactsConnection resolver. This is not a public HTTP surface.
  rpc ListStorageArtifacts(ListStorageArtifactsRequest) returns (ListStorageArtifactsResponse);

  // ============================================================================
  // WALLET IDENTITY (x402 / Agent Access)
  // Service-to-service call for x402 middleware to lookup/create wallet tenant
  // ============================================================================

  // Lookup or create a tenant/user for a verified wallet address.
  // Called by x402 middleware after verifying ERC-3009 payment signature.
  // If wallet is unknown, creates: tenant (prepaid) + user (email=NULL) + wallet_identity
  rpc GetOrCreateWalletUser(GetOrCreateWalletUserRequest) returns (GetOrCreateWalletUserResponse);

  // ============================================================================
  // TENANT STREAM TERMINATION (Purser → Commodore → Foghorn)
  // Called when a tenant is suspended due to insufficient prepaid balance.
  // Commodore forwards to Foghorn which stops all sessions on affected nodes.
  // ============================================================================
  rpc TerminateTenantStreams(foghorn_control.TerminateTenantStreamsRequest) returns (foghorn_control.TerminateTenantStreamsResponse);

  // ============================================================================
  // TENANT CACHE INVALIDATION (Purser → Commodore → Foghorn)
  // Called when a tenant is reactivated after payment.
  // Commodore forwards to Foghorn which clears cached suspension status.
  // ============================================================================
  rpc InvalidateTenantCache(foghorn_control.InvalidateTenantCacheRequest) returns (foghorn_control.InvalidateTenantCacheResponse);

  // ============================================================================
  // CROSS-SERVICE: BILLING DATA ACCESS
  // Called by Purser to avoid cross-service database access.
  // ============================================================================

  // Get active user count for a tenant (for billing calculation)
  rpc GetTenantUserCount(GetTenantUserCountRequest) returns (GetTenantUserCountResponse);

  // Get primary user info for a tenant (for billing notifications/invoices)
  rpc GetTenantPrimaryUser(GetTenantPrimaryUserRequest) returns (GetTenantPrimaryUserResponse);

  // Create a user in an existing tenant (bootstrap/admin provisioning)
  // Requires SERVICE_TOKEN auth. Skips tenant creation and verification.
  rpc CreateUserInTenant(CreateUserInTenantRequest) returns (CreateUserInTenantResponse);

  // Customer-tunable retention defaults + per-asset overrides. Cascade order
  // at StartDVR is: per-asset override → tenant default → Purser entitlement.
  // The resolved value is snapshotted onto foghorn.artifacts at start; the
  // existing RetentionJob in Foghorn enforces it. Per-asset overrides applied
  // after finalize push a new retention_until into Foghorn via
  // foghorn.DVRControlService.OverrideArtifactRetention.
  rpc GetMediaRetentionPolicy(GetMediaRetentionPolicyRequest) returns (GetMediaRetentionPolicyResponse);
  rpc SetMediaRetentionPolicy(SetMediaRetentionPolicyRequest) returns (SetMediaRetentionPolicyResponse);
  rpc UpdateAssetRetention(UpdateAssetRetentionRequest) returns (UpdateAssetRetentionResponse);
  rpc ResetAssetRetention(ResetAssetRetentionRequest) returns (UpdateAssetRetentionResponse);
  // Per-stream retention overrides (DVR + clip only — VOD uploads aren't
  // stream-bound). NULL on a field clears the override and falls back to
  // the tenant default.
  rpc SetStreamRetentionOverrides(SetStreamRetentionOverridesRequest) returns (SetStreamRetentionOverridesResponse);

  // Dry-run policy evaluation against a caller-supplied JWT or webhook test.
  // Commodore validates tenant ownership of the playback target and forwards
  // to the owning Foghorn — auth logic is NOT reimplemented here.
  rpc TestPlaybackAccess(foghorn_control.TestPlaybackAccessRequest) returns (foghorn_control.TestPlaybackAccessResponse);

  // Foghorn writes one pull_source_events row per STREAM_SOURCE resolution
  // against a pull+ stream. The list query feeds the webapp's "pull source
  // health" view.
  rpc RecordPullSourceEvent(RecordPullSourceEventRequest) returns (google.protobuf.Empty);
  rpc ListPullSourceEvents(ListPullSourceEventsRequest) returns (ListPullSourceEventsResponse);
}

// ============================================================================
// STREAM KEY VALIDATION (Foghorn → Commodore)
// Source: pkg/api/commodore/types.go lines 12-19
// ============================================================================

message ValidateStreamKeyRequest {
  string stream_key = 1;
  string cluster_id = 2;  // Cluster where Foghorn is processing this ingest (for stream→cluster tracking)
}

// StreamKeyRejectionReason categorizes ValidateStreamKey rejections so
// Foghorn admission and operator dashboards can present a structured
// error rather than parsing the free-text `error` field.
enum StreamKeyRejectionReason {
  STREAM_KEY_REJECTION_UNSPECIFIED = 0;
  STREAM_KEY_REJECTION_INVALID_KEY = 1;
  STREAM_KEY_REJECTION_USER_INACTIVE = 2;
  STREAM_KEY_REJECTION_PULL_MODE = 3;
  STREAM_KEY_REJECTION_TENANT_SUSPENDED = 4;
  STREAM_KEY_REJECTION_BALANCE_NEGATIVE = 5;
  STREAM_KEY_REJECTION_CLUSTER_NOT_ENTITLED = 6;
  STREAM_KEY_REJECTION_CLUSTER_CLASS_MISMATCH = 7;
  STREAM_KEY_REJECTION_PROTOCOL_NOT_SUPPORTED = 8;
  STREAM_KEY_REJECTION_CLUSTER_UNHEALTHY = 9;
  STREAM_KEY_REJECTION_DUPLICATE_INGEST = 10;
}

// Matches pkg/api/commodore/types.go:ValidateStreamKeyResponse exactly
message ValidateStreamKeyResponse {
  bool valid = 1;                       // json:"valid"
  string user_id = 2;                   // json:"user_id,omitempty"
  string tenant_id = 3;                 // json:"tenant_id,omitempty"
  string internal_name = 4;             // json:"internal_name,omitempty"
  string error = 5;                     // json:"error,omitempty"
  bool is_recording_enabled = 6;        // json:"is_recording_enabled,omitempty"
  string stream_id = 7;                 // Public stream ID (UUID)
  // rejection_reason is set when Valid=false. Foghorn admission consults
  // this for structured logging and metrics labels; the `error` field
  // remains the human-readable detail.
  StreamKeyRejectionReason rejection_reason = 30;

  // ===== BILLING MODEL & SUSPENSION =====
  // billing_model: "postpaid" (default) or "prepaid"
  // Used by Foghorn to determine cache TTL (1 min for prepaid, 10 min for postpaid)
  string billing_model = 8;

  // is_suspended: true if tenant is suspended due to negative prepaid balance (< -$10)
  // When true, Foghorn should reject the ingest with error
  bool is_suspended = 9;

  // is_balance_negative: true if prepaid balance <= 0 (but not yet suspended)
  // When true, Foghorn should return 402 for new ingests
  bool is_balance_negative = 10;

  optional string origin_cluster_id = 11; // Cluster where this stream ingests (for cross-cluster routing)
  optional string official_cluster_id = 12; // Billing-tier cluster providing geographic coverage
  repeated cluster_peer.TenantClusterPeer cluster_peers = 13; // Tenant's full cluster context for demand-driven peering
  string playback_id = 14; // Public playback key (for StreamAdvertisement reverse index)

  // ===== MULTISTREAM PUSH TARGETS =====
  // Enabled push targets for this stream (loaded during validation).
  // Foghorn sends these to Helmsman as ActivatePushTargets when the stream goes live.
  repeated PushTargetInternal push_targets = 15;

  // ===== PROCESSING CONFIG =====
  // MistServer process config JSON array for live STREAM_PROCESS.
  // Commodore determines this based on stream/tenant/tier lifecycle policy.
  string processes_json = 16;
  // MistServer process config JSON array for rolling DVR STREAM_PROCESS.
  // Foghorn stores this snapshot when starting an auto/manual DVR.
  string dvr_processes_json = 31;

  // ===== DVR POLICY =====
  // Resolved DVR window/segment policy for this tenant (from billing tier +
  // cluster overrides). Foghorn caches this with the stream context and
  // applies it on auto-record (record:true) without an extra Commodore
  // round-trip. Manual startDVR resolves the same policy in Commodore.
  shared.DVRPolicy dvr_policy = 17;

  // ===== BILLING ALLOWANCES =====
  // Per-meter current-period allowance snapshots forwarded from Purser
  // GetTenantBillingStatus. Foghorn uses these for load-aware admission
  // (free-tier over-allowance rejected only when cluster is under load).
  repeated metering.MeterAllowance allowances = 18;

  // ===== RUNTIME RESOURCE CAPS =====
  // Per-tenant concurrent-stream/viewer caps resolved from Purser tier
  // entitlements, optionally overridden by Quartermaster cluster access
  // resource_limits. Forwarded so Foghorn can apply them at trigger time
  // without another RPC. nil or zero-valued fields mean unlimited.
  optional tenant_limits.TenantResourceLimits tenant_resource_limits = 19;
}

// ============================================================================
// STREAM CONTEXT RESOLUTION (Foghorn → Commodore, mist_native / non-key paths)
//
// Authoritative admission/materialization RPC keyed by stream identifier
// (stream_id / playback_id / internal_name) rather than stream key. Returns
// the same fact set ValidateStreamKey does so Foghorn can populate
// PUSH_REWRITE-equivalent caches (tenantId:internalName, process:internalName)
// for ingest modes that never fire PUSH_REWRITE.
//
// Admission scope is intentionally narrower than ValidateStreamKey: see
// the `admitted` field doc on ResolveStreamContextResponse. Free-tier load
// and per-tenant stream caps are NOT enforced here; today this RPC is
// render-gated to the operator/system tenant, so the missing gates do
// not affect customer billing. Layer caller-side gates before widening.
// ============================================================================

message ResolveStreamContextRequest {
  oneof identifier {
    string stream_id = 1;
    string playback_id = 2;
    string internal_name = 3;
  }
  string cluster_id = 4;  // Cluster context for routing-aware fields (origin/official cluster, peers)
}

message ResolveStreamContextResponse {
  // ===== ADMISSION =====
  bool admitted = 1;                     // false ⇒ caller must omit the stream from the seed
  string admission_reason = 2;           // human-readable detail (free text)
  StreamKeyRejectionReason rejection_reason = 3;  // reused enum; structured form of admission_reason

  // ===== STREAM IDENTITY =====
  string stream_id = 4;
  string playback_id = 5;
  string internal_name = 6;
  string ingest_mode = 7;                // "push" | "pull" | "mist_native"
  string tenant_id = 8;
  string user_id = 9;
  bool is_recording_enabled = 10;
  // requires_auth lets Foghorn's stream registry cache the playback-auth bit
  // alongside the rest of the stream identity, so the live PLAY_REWRITE resolve
  // path can serve a stale-but-known entry (and its auth decision) while
  // Commodore is transiently unreachable. Same column ResolvePlaybackID reads.
  bool requires_auth = 22;

  // ===== BILLING MODEL & SUSPENSION =====
  // Same semantics as ValidateStreamKeyResponse: billing_model selects cache
  // TTL (1m prepaid / 10m postpaid); is_suspended / is_balance_negative
  // gate admission.
  string billing_model = 11;
  bool is_suspended = 12;
  bool is_balance_negative = 13;

  // ===== ROUTING =====
  optional string origin_cluster_id = 14;
  optional string official_cluster_id = 15;
  repeated cluster_peer.TenantClusterPeer cluster_peers = 16;

  // ===== PROCESSING / DVR POLICY =====
  // Same lifecycle-aware resolution path ValidateStreamKey uses. For
  // mist_native, Foghorn writes processes_json into the streamCache under
  // "process:<internal_name>" so live STREAM_PROCESS finds it; DVR starts
  // store dvr_processes_json on the DVR artifact snapshot.
  string processes_json = 17;
  shared.DVRPolicy dvr_policy = 18;
  string dvr_processes_json = 21;

  // ===== BILLING ALLOWANCES =====
  repeated metering.MeterAllowance allowances = 19;

  // ===== RUNTIME RESOURCE CAPS =====
  optional tenant_limits.TenantResourceLimits tenant_resource_limits = 20;
}

// ============================================================================
// MANAGED STREAMS (Foghorn → Commodore, mist_native reconciler)
//
// Cluster-scoped listing for Foghorn's managed-stream reconciler. Returns
// the desired-state set; per-stream admission/cache materialization uses
// ResolveStreamContext above. Not a per-tick policy authority — the
// reconciler caches the result and re-fetches on its own cadence + on
// reactive triggers (Helmsman connect/disconnect, manual flush).
// ============================================================================

message ListManagedStreamsRequest {
  string cluster_id = 1;
}

message ManagedStreamRow {
  string stream_id = 1;
  string playback_id = 2;
  string internal_name = 3;
  string tenant_id = 4;
  string ingest_mode = 5;             // "mist_native" today; extensible
  string source_spec = 6;             // literal Mist source (ts-exec:..., etc.)
  string source_kind = 7;             // "file" | "playlist" | "exec"
  bool   always_on = 8;
  int32  placement_count = 9;
  repeated string allowed_cluster_ids = 10; // exactly one source cluster for mist_native today
}

message ListManagedStreamsResponse {
  repeated ManagedStreamRow streams = 1;
}

// Per-stream Skipper monitoring toggle. Self-describing on the wire (vs the
// optional bool used on Stream/UpdateStreamRequest) so Skipper's 3-way
// decision reads cleanly. Server maps the nullable column: NULL -> INHERIT,
// true -> ON, false -> OFF.
enum MonitoringToggle {
  MONITORING_TOGGLE_INHERIT = 0;  // follow the tenant's tier entitlement
  MONITORING_TOGGLE_ON = 1;       // monitor regardless of tier
  MONITORING_TOGGLE_OFF = 2;      // never monitor
}

message ListStreamMonitoringRequest {
  string tenant_id = 1;   // required; all queries filter tenant_id
}

message StreamMonitoringRow {
  string stream_id = 1;             // public UUID
  string internal_name = 2;         // Mist identifier (logging only; Periscope keys on stream_id UUID)
  MonitoringToggle monitoring_toggle = 3;
}

message ListStreamMonitoringResponse {
  repeated StreamMonitoringRow streams = 1;
}

message RecordStreamActiveClusterRequest {
  string stream_id = 1;
  string cluster_id = 2;
}

message RecordStreamActiveClusterResponse {
  // updated=false when the row already records the requested cluster (noop),
  // or when a fresher claim from a different cluster holds the column.
  bool updated = 1;
}

message ClearStreamActiveClusterRequest {
  string stream_id = 1;
  // expected_cluster_id guards against clobbering a fresher claim from a
  // peer cluster. Required: clear only when the recorded value matches.
  string expected_cluster_id = 2;
}

message ClearStreamActiveClusterResponse {
  bool cleared = 1;
}

// ============================================================================
// PLAYBACK ID RESOLUTION (Edge → Commodore)
// Source: pkg/api/commodore/types.go lines 22-27
// ============================================================================

message ResolvePlaybackIDRequest {
  string playback_id = 1;
}

// Matches pkg/api/commodore/types.go:ResolvePlaybackIDResponse exactly
message ResolvePlaybackIDResponse {
  string internal_name = 1;             // json:"internal_name"
  string tenant_id = 2;                 // json:"tenant_id"
  string status = 3;                    // json:"status"
  string playback_id = 4;               // json:"playbook_id" (note: typo in original)
  string stream_id = 5;                 // Public stream ID (UUID)
  string billing_model = 6;             // 'postpaid' or 'prepaid'
  bool is_suspended = 7;                // true if tenant suspended
  bool is_balance_negative = 8;         // true if prepaid balance <= 0
  optional string origin_cluster_id = 9; // Cluster where this stream ingests (for cross-cluster routing)
  optional string official_cluster_id = 10; // Billing-tier cluster providing geographic coverage
  repeated cluster_peer.TenantClusterPeer cluster_peers = 11; // Tenant's full cluster context for demand-driven peering
  // requires_auth is the local marker Foghorn uses for fail-closed playback
  // enforcement during a Commodore outage. true if a non-public playback
  // policy is set on this object (live stream / vod_asset / clip).
  // The full policy is fetched separately via ResolvePlaybackPolicy.
  bool requires_auth = 12;
  // ingest_mode discriminates between push (encoder pushes RTMP/WHIP/SRT) and
  // pull (Mist pulls from a configured upstream URI). Drives the prefix the
  // resolver applies (live+ vs pull+) and the cold-start routing path.
  // Source for pull streams: commodore.stream_pull_sources, fetched via
  // ResolvePullSourceByInternalName.
  string ingest_mode = 13;
}

// ============================================================================
// PULL SOURCE RESOLUTION (Foghorn → Commodore)
// Foghorn calls this from STREAM_SOURCE for pull+<internal_name> and from the
// /source origin-selector. Foghorn must NOT trust query-param fallbacks for
// pull streams — the upstream URI is server-side-resolved here.
// ============================================================================

message ResolvePullSourceByInternalNameRequest {
  string internal_name = 1; // bare internal_name (the part after pull+)
}

message ResolvePullSourceByInternalNameResponse {
  bool found = 1;
  string source_uri = 2;   // decrypted upstream URI; empty if !found or !enabled
  bool enabled = 3;        // tenant-controlled; false means honour the row but don't pull
  string tenant_id = 4;    // for trigger-envelope attribution at the caller
  string stream_id = 5;    // public stream UUID
  // allowed_cluster_ids pins this pull source to a specific cluster set.
  // Empty + public source ⇒ any media (edge) cluster (legacy behavior).
  // Empty + private/multicast source ⇒ refused at every chokepoint.
  // Non-empty ⇒ caller (Foghorn viewer routing, /source, STREAM_SOURCE) must
  // intersect candidates with this list.
  repeated string allowed_cluster_ids = 6;
}

// ============================================================================
// PLAYBACK POLICY RESOLUTION
// Public reads receive the policy shape without plaintext webhook secrets.
// Enforcement callers set include_webhook_secret when evaluating USER_NEW or
// Gateway resolve authorization.
// ============================================================================

message ResolvePlaybackPolicyRequest {
  // Provide exactly one of:
  string playback_id = 1;
  string internal_name = 2; // MistServer internal stream name (USER_NEW trigger has this, not playback_id)
  bool include_webhook_secret = 3; // enforcement-only; public reads leave false
}

// Signed policy bundle issuance (Foghorn → Commodore). Bundle carries a
// monotonic bundle_version, soft + hard expiry, and a signed JWT payload
// with the tenant plan, allowed cluster IDs, and the playback policy.
message GetSignedPolicyBundleRequest {
  string tenant_id = 1;
  string stream_id = 2; // Public stream UUID
}

message SignedPolicyBundle {
  string bundle_jwt = 1;
  int64 bundle_version = 2;
  google.protobuf.Timestamp issued_at = 3;
  // soft_expires_at: after this point Foghorn should background-refresh
  // but may continue serving the cached bundle.
  google.protobuf.Timestamp soft_expires_at = 4;
  // expires_at: hard ceiling. Foghorn must not use the bundle past this
  // point even under central outage.
  google.protobuf.Timestamp expires_at = 5;
  string tenant_id = 6;
  string stream_id = 7;
}

message GetSignedPolicyBundleResponse {
  SignedPolicyBundle bundle = 1;
}

message RecordSigningKeyUseRequest {
  string tenant_id = 1;
  string kid = 2;
}

message PlaybackSigningKey {
  string kid = 1;
  string algorithm = 2;       // ES256 only for v1
  string public_key_pem = 3;  // PEM-encoded public key
}

message PlaybackJwtPolicy {
  repeated string allowed_kids = 1;       // empty = any active tenant key
  repeated string required_audience = 2;  // empty = no aud check
  // required_claims is exact-match key/value(s). Repeated string per claim
  // expressed as JSON-encoded values keeps proto schema simple.
  map<string, string> required_claims_json = 3;
  repeated PlaybackSigningKey active_keys = 4;
}

message PlaybackWebhookPolicy {
  string url = 1;          // https://customer.example/access-control
  int32 timeout_ms = 2;    // capped server-side
  string secret_pt = 3;    // set only for enforcement callers
}

// type:
//   "public"  -> requires_auth was false; full policy fetch was unnecessary
//                (still returned for completeness if Foghorn calls anyway)
//   "jwt"     -> jwt_policy populated
//   "webhook" -> webhook_policy populated
message ResolvePlaybackPolicyResponse {
  string type = 1;
  string tenant_id = 2;
  PlaybackJwtPolicy jwt_policy = 3;
  PlaybackWebhookPolicy webhook_policy = 4;
}

// ============================================================================
// INTERNAL NAME RESOLUTION (Decklog → Commodore)
// Source: pkg/api/commodore/types.go lines 249-255
// ============================================================================

message ResolveInternalNameRequest {
  string internal_name = 1;
}

// Matches pkg/api/commodore/types.go:InternalNameResponse exactly
message ResolveInternalNameResponse {
  string internal_name = 1;             // json:"internal_name"
  string tenant_id = 2;                 // json:"tenant_id"
  string user_id = 3;                   // json:"user_id"
  bool is_recording_enabled = 4;        // json:"is_recording_enabled,omitempty"
  string stream_id = 5;                 // Public stream ID (UUID)
  repeated cluster_peer.TenantClusterPeer cluster_peers = 6;
  string origin_cluster_id = 7;           // cluster that owns the stream (for federation source lookup)
  bool requires_auth = 8;
}

// ============================================================================
// API TOKEN VALIDATION (Gateway middleware → Commodore)
// Source: pkg/api/commodore/types.go lines 310-318
// ============================================================================

message ValidateAPITokenRequest {
  string token = 1;
}

// Matches pkg/api/commodore/types.go:ValidateAPITokenResponse exactly
message ValidateAPITokenResponse {
  bool valid = 1;                       // json:"valid"
  string user_id = 2;                   // json:"user_id,omitempty"
  string tenant_id = 3;                 // json:"tenant_id,omitempty"
  string email = 4;                     // json:"email,omitempty"
  string role = 5;                      // json:"role,omitempty"
  repeated string permissions = 6;      // json:"permissions,omitempty"
  string token_id = 7;                  // json:"token_id,omitempty"
  bool platform_operator = 8;           // json:"platform_operator,omitempty" - computed from the token's user row
}

// ============================================================================
// MIST ADMIN SESSION (Gateway -> Commodore; Foghorn -> Commodore)
// Short-TTL signed session token authorizing access to the /_mist/* admin
// proxy on a specific edge node. Minted by Commodore after the Gateway
// resolver authorizes the caller. Validated by Foghorn (over the Helmsman
// control stream) which injects the connected node_id so a token issued
// for one node cannot be used against another.
// ============================================================================

// Mint request carries only the target node. Identity (user_id / tenant_id
// / role) is taken from trusted gRPC metadata set by the gateway auth
// middleware — never from the request body — so callers cannot claim an
// identity they don't have.
// Cluster ID is resolved server-side from the node, also never trusted
// from the caller.
message MintMistAdminSessionRequest {
  string node_id = 1; // The edge node the operator wants to admin
}

message MintMistAdminSessionResponse {
  string token = 1;
  int64 expires_at = 2;   // Unix seconds; lets the cookie Max-Age match the JWT exp
  // Public edge FQDN derived from the resolved cluster + node, e.g.
  // "edge-us-1.media-us-1.frameworks.network". Returned here so the
  // caller (Gateway) doesn't duplicate the {edge-<node>}.{cluster}.{root}
  // string formatting that Foghorn already does.
  string edge_domain = 3;
}

message ValidateMistAdminSessionRequest {
  string token = 1;
  // Foghorn injects this from the connected Helmsman's nodeID. Commodore
  // rejects the request when expected_node_id != claims.node_id.
  string expected_node_id = 2;
}

message ValidateMistAdminSessionResponse {
  bool valid = 1;
  string user_id = 2;
  string tenant_id = 3;
  string role = 4;
  string node_id = 5;
  string cluster_id = 6;
  int64 expires_at = 7;   // Unix seconds
}

// ============================================================================
// CLIP/DVR BUSINESS REGISTRY (Foghorn → Commodore)
// See: docs/architecture/clips-dvr.md
// ============================================================================

// Register a new clip in the business registry
// Called by Foghorn during CreateClip flow
message RegisterClipRequest {
  string tenant_id = 1;                 // Tenant context (from stream lookup)
  string user_id = 2;                   // User who created the clip
  string stream_id = 3;                 // Source stream UUID
  string title = 4;                     // Optional clip title
  string description = 5;               // Optional clip description
  int64 start_time = 6;                 // Start timestamp (unix ms)
  int64 duration = 7;                   // Duration (ms)
  string clip_mode = 8;                 // absolute, relative, duration, clip_now
  string requested_params = 9;          // Original request JSON for audit
  optional google.protobuf.Timestamp retention_until = 10; // Artifact expiration
  string origin_cluster_id = 11;        // Cluster where clip was created
  string storage_cluster_id = 12;       // Cluster owning S3 backing (empty when same as origin)
}

message RegisterClipResponse {
  string clip_hash = 1;                 // Generated hash (use as artifact_hash in Foghorn)
  string clip_id = 2;                   // Commodore clips table UUID
  string playback_id = 3;              // Public playback key
  string internal_name = 4;   // Artifact routing name (internal)
}

// Register a new DVR recording in the business registry
// Called by Foghorn during StartDVR flow
message RegisterDVRRequest {
  string tenant_id = 1;                 // Tenant context
  string user_id = 2;                   // User who owns the recording
  string stream_id = 3;                 // Source stream UUID (optional for legacy)
  string stream_internal_name = 4;       // Source stream's MistServer routing name (for stream_id lookup)
  optional google.protobuf.Timestamp retention_until = 5; // Recording expiration
  string origin_cluster_id = 6;         // Cluster where DVR recording started
  string storage_cluster_id = 7;        // Cluster owning S3 backing (empty when same as origin)
}

message RegisterDVRResponse {
  string dvr_hash = 1;                  // Generated hash (use as artifact_hash in Foghorn)
  string dvr_id = 2;                    // Commodore dvr_recordings table UUID
  string playback_id = 3;              // Public playback key
  string internal_name = 4;   // Artifact routing name (internal)
  string stream_id = 5;                // Source stream UUID for storage path
}

// Back-fill retention_until on a DVR recording at finalize time.
message UpdateDVRRetentionRequest {
  string tenant_id = 1;
  string dvr_hash = 2;
  // Absolute UTC timestamp when the recording becomes eligible for deletion.
  // Foghorn computes this from the persisted dvr_retention_days snapshot.
  // Pass null to leave it unchanged.
  optional google.protobuf.Timestamp retention_until = 3;
}

message UpdateDVRRetentionResponse {
  bool updated = 1;
}

// asset_type values for the thumbnail/storage projection RPCs.
enum ArtifactAssetType {
  ARTIFACT_ASSET_TYPE_UNSPECIFIED = 0;
  ARTIFACT_ASSET_TYPE_CLIP = 1;
  ARTIFACT_ASSET_TYPE_DVR = 2;
  ARTIFACT_ASSET_TYPE_VOD = 3;
}

// MarkArtifactThumbnailsReady flips has_thumbnails=TRUE and stamps
// storage_cluster_id on the matching artifact row in commodore.{clips,
// dvr_recordings, vod_assets}. asset_key is the row's hash column
// (clip_hash, dvr_hash, vod_hash/artifact_hash).
