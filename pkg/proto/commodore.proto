// ============================================================================
// USER SERVICE (Gateway → Commodore for auth flows)
// ============================================================================

service UserService {
  // Authentication
  rpc Login(LoginRequest) returns (AuthResponse);
  rpc Register(RegisterRequest) returns (RegisterResponse);
  rpc Logout(LogoutRequest) returns (LogoutResponse);
  rpc RefreshToken(RefreshTokenRequest) returns (AuthResponse);

  // Email verification
  rpc VerifyEmail(VerifyEmailRequest) returns (VerifyEmailResponse);
  rpc ResendVerification(ResendVerificationRequest) returns (ResendVerificationResponse);

  // Password reset
  rpc ForgotPassword(ForgotPasswordRequest) returns (ForgotPasswordResponse);
  rpc ResetPassword(ResetPasswordRequest) returns (ResetPasswordResponse);

  // Profile
  rpc GetMe(GetMeRequest) returns (User);
  rpc UpdateMe(UpdateMeRequest) returns (User);
  rpc UpdateNewsletter(UpdateNewsletterRequest) returns (UpdateNewsletterResponse);
  rpc GetNewsletterStatus(GetNewsletterStatusRequest) returns (GetNewsletterStatusResponse);

  // Wallet authentication (x402 / agent access)
  rpc WalletLogin(WalletLoginRequest) returns (AuthResponse);
  rpc WalletLoginWithX402(WalletLoginWithX402Request) returns (WalletLoginWithX402Response);
  rpc LinkWallet(LinkWalletRequest) returns (WalletIdentity);
  rpc UnlinkWallet(UnlinkWalletRequest) returns (UnlinkWalletResponse);
  rpc ListWallets(ListWalletsRequest) returns (ListWalletsResponse);

  // Email linking (for wallet-only users to add email for postpaid upgrade)
  rpc LinkEmail(LinkEmailRequest) returns (LinkEmailResponse);

  // Browser-handoff login for native clients such as the macOS tray. The webapp /authorize
  // page completes Turnstile + password in the browser, then mints a one-time
  // PKCE code which the native client exchanges for an AuthResponse session.
  // See RFC 7636 (PKCE) + RFC 8252 (loopback).
  rpc CompleteAuthorization(CompleteAuthorizationRequest) returns (CompleteAuthorizationResponse);
  rpc ExchangeAuthorizationCode(ExchangeAuthorizationCodeRequest) returns (AuthResponse);

  // Device Authorization Grant (RFC 8628) — CLI / headless interactive login.
  // CLI starts the flow, the user confirms a short user_code in any browser,
  // CLI polls until approved and receives an AuthResponse session.
  rpc StartDeviceAuthorization(StartDeviceAuthorizationRequest) returns (StartDeviceAuthorizationResponse);
  rpc PollDeviceAuthorization(PollDeviceAuthorizationRequest) returns (AuthResponse);
  rpc LookupDeviceAuthorization(LookupDeviceAuthorizationRequest) returns (LookupDeviceAuthorizationResponse);
  rpc ApproveDeviceAuthorization(ApproveDeviceAuthorizationRequest) returns (ApproveDeviceAuthorizationResponse);
}

