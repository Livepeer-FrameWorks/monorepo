  rpc StopDVR(shared.StopDVRRequest) returns (shared.StopDVRResponse);
  rpc DeleteDVR(shared.DeleteDVRRequest) returns (shared.DeleteDVRResponse);
  rpc ListDVRRequests(shared.ListDVRRecordingsRequest) returns (shared.ListDVRRecordingsResponse);
}

// ============================================================================
// VIEWER ENDPOINT SERVICE (Gateway/Player → Commodore → Foghorn proxy)
// Uses shared types from shared.proto
// ============================================================================

service ViewerService {
  rpc ResolveViewerEndpoint(shared.ViewerEndpointRequest) returns (shared.ViewerEndpointResponse);
  rpc ResolveIngestEndpoint(shared.IngestEndpointRequest) returns (shared.IngestEndpointResponse);
}

// ============================================================================
// VOD SERVICE (Gateway → Commodore → Foghorn proxy)
// User-initiated video uploads (distinct from clips/DVR which are stream-derived)
// Uses shared types from shared.proto
service VodService {
  // Initiate multipart upload - returns presigned URLs for direct S3 upload
  rpc CreateVodUpload(shared.CreateVodUploadRequest) returns (shared.CreateVodUploadResponse);
  // Finalize upload after all parts uploaded
  rpc CompleteVodUpload(shared.CompleteVodUploadRequest) returns (shared.CompleteVodUploadResponse);
  // Cancel in-progress upload
  rpc AbortVodUpload(shared.AbortVodUploadRequest) returns (shared.AbortVodUploadResponse);
  // Read upload status (proxies to Foghorn; tenant_id from auth context).
  rpc GetVodUploadStatus(shared.GetVodUploadStatusRequest) returns (shared.GetVodUploadStatusResponse);
  // Get single VOD asset
  rpc GetVodAsset(shared.GetVodAssetRequest) returns (shared.VodAssetInfo);
  // List VOD assets with pagination
  rpc ListVodAssets(shared.ListVodAssetsRequest) returns (shared.ListVodAssetsResponse);
  // Delete VOD asset
  rpc DeleteVodAsset(shared.DeleteVodAssetRequest) returns (shared.DeleteVodAssetResponse);
}

service NodeManagementService {
  // Set a node's operational mode (normal, draining, maintenance)
  rpc SetNodeOperationalMode(foghorn_control.SetNodeModeRequest) returns (foghorn_control.SetNodeModeResponse);
  // Get real-time health and routing state for a node
  rpc GetNodeHealth(foghorn_control.GetNodeHealthRequest) returns (foghorn_control.GetNodeHealthResponse);
}

service PlaybackAccessControlService {
  // Create a new ES256 signing keypair for the tenant. Generates the keypair
  // server-side; returns the private PEM in the response ONCE (never stored,
  // never logged, never returned again).
  rpc CreateSigningKey(CreateSigningKeyRequest) returns (CreateSigningKeyResponse);
  rpc GetSigningKey(GetSigningKeyRequest) returns (SigningKey);
  rpc ListSigningKeys(ListSigningKeysRequest) returns (ListSigningKeysResponse);
  rpc RevokeSigningKey(RevokeSigningKeyRequest) returns (SigningKey);
  // Set or clear the playback policy on a stream / vod_asset / clip.
  // Exactly one of stream_id / vod_asset_id / clip_id must be set.
  // Mutation order in the handler: persist the DB row and enqueue a
  // durable invalidation outbox entry in the same transaction; an
  // immediate best-effort dispatch fans the invalidation out to Foghorn,
  // and any clusters that fail are retried by the outbox worker.
  rpc SetPlaybackPolicy(SetPlaybackPolicyRequest) returns (SetPlaybackPolicyResponse);
}

message SigningKey {
  string id = 1;
  string kid = 2;
  string name = 3;
  string algorithm = 4;       // ES256
  string public_key_pem = 5;
  string status = 6;          // active | revoked
  string created_at = 7;      // RFC3339
  string last_used_at = 8;    // RFC3339, empty if never
  string revoked_at = 9;      // RFC3339, empty if active
}

// Tenant + user identity is extracted from the gRPC context for these
// Gateway-called RPCs (matches CreateStream, CreatePushTarget, etc.).

message CreateSigningKeyRequest {
  string name = 1;
}

message CreateSigningKeyResponse {
  SigningKey signing_key = 1;
  string private_key_pem = 2; // shown ONCE, never stored, never logged
}

message GetSigningKeyRequest {
  string id = 1;
}

message ListSigningKeysRequest {
  string status_filter = 1;   // empty | "active" | "revoked"
  int32 limit = 2;
  string after_id = 3;
}

message ListSigningKeysResponse {
  repeated SigningKey signing_keys = 1;
  string next_after_id = 2;
}

message RevokeSigningKeyRequest {
  string id = 1;
}

// SetPlaybackPolicyRequest carries the policy and (for webhook policies) the
// plaintext webhook secret. Commodore encrypts the secret via fieldcrypt
// before persisting and never returns it on read.
message SetPlaybackPolicyRequest {
  // Exactly one of:
  string stream_id = 1;
  string vod_asset_id = 2;
  string clip_id = 3;
  // Policy:
  string type = 4;            // "public" | "jwt" | "webhook"
  PlaybackJwtPolicy jwt = 5;  // populated when type == "jwt" (active_keys ignored on input)
  PlaybackWebhookPolicy webhook = 6; // populated when type == "webhook"; secret_pt is the plaintext secret
}

message SetPlaybackPolicyResponse {
  // Echoes back which object was updated.
  string stream_id = 1;
  string vod_asset_id = 2;
  string clip_id = 3;
  bool requires_auth = 4;
}

message RecordPullSourceEventRequest {
  string tenant_id = 1;
  string stream_id = 2;            // optional — empty when resolution couldn't reach a tenant
  string internal_name = 3;
  // 'resolved' | 'not_found' | 'disabled' | 'blocked_uri' | 'private_not_allowed' | 'commodore_error' | 'foghorn_base_unresolved'
  string event_kind = 4;
  string detail = 5;
}

message ListPullSourceEventsRequest {
  string stream_id = 1;            // either stream_id or internal_name required
  string internal_name = 2;
  int32 limit = 3;                 // default 50, max 200
}

message PullSourceEvent {
  string id = 1;
  string stream_id = 2;
  string internal_name = 3;
  string event_kind = 4;
  string detail = 5;
  google.protobuf.Timestamp created_at = 6;
}

message ListPullSourceEventsResponse {
  repeated PullSourceEvent events = 1;
}

message MediaRetentionBounds {
  // Tier entitlement upper bound for customer-set retention (days). Read
  // from Purser at request time. 0 = no cap (paid-tier baseline); Free
  // sets a finite cap as the anti-abuse guardrail.
  int32 max_recording_retention_days = 1;
}

message GetMediaRetentionPolicyRequest {
  string tenant_id = 1;
}

message GetMediaRetentionPolicyResponse {
  // Per-class tenant defaults. Unset = inherit the per-class system default
  // (VOD: keep forever, DVR/clip: 30d) clamped by the tier cap. 0 = no
  // auto-expire (paid-tier override). >0 = days.
  optional int32 default_vod_retention_days  = 1;
  optional int32 default_dvr_retention_days  = 2;
  optional int32 default_clip_retention_days = 3;
  // Effective per-class horizon the cascade would resolve to today for a
  // newly-created artifact (per-stream omitted — these are tenant-level).
  // 0 means "keep forever"; >0 the resolved finite day count.
  int32 effective_vod_retention_days  = 4;
  int32 effective_dvr_retention_days  = 5;
  int32 effective_clip_retention_days = 6;
  MediaRetentionBounds bounds = 7;
  string updated_by = 8;
  google.protobuf.Timestamp updated_at = 9;
}

message SetMediaRetentionPolicyRequest {
  string tenant_id = 1;
  string updated_by = 2;
  // Which asset class to write. UNSPECIFIED is rejected — callers must
  // pick VOD, DVR, or CLIP.
  MediaRetentionTarget target_type = 3;
  // Days to write. Range: 0 ≤ value ≤ tier_cap (cap=0 means uncapped). 0
  // means "no auto-expire" (only meaningful on uncapped tiers; Free clamps
  // 0 up to its cap at write time). Ignored when clear is true.
  int32 days = 4;
  // When true, NULLs out the target column and the tenant inherits the
  // per-class system default. days is ignored.
  bool clear = 5;
}

message SetMediaRetentionPolicyResponse {
  GetMediaRetentionPolicyResponse policy = 1;
}

enum MediaRetentionTarget {
  MEDIA_RETENTION_TARGET_UNSPECIFIED = 0;
  MEDIA_RETENTION_TARGET_DVR = 1;
  MEDIA_RETENTION_TARGET_CLIP = 2;
  MEDIA_RETENTION_TARGET_VOD = 3;
}

message UpdateAssetRetentionRequest {
  string tenant_id = 1;
  MediaRetentionTarget target_type = 2;
  // Canonical asset ID: dvr_id (UUID) or dvr_hash for DVR targets. Either is
  // accepted; resolver picks the right column.
  string target_id = 3;
  // Exactly one of retention_days (relative to NOW; 0 = keep forever) or
  // retention_until (absolute) must be set.
  optional int32 retention_days = 4;
  google.protobuf.Timestamp retention_until = 5;
}

message ResetAssetRetentionRequest {
  string tenant_id = 1;
  MediaRetentionTarget target_type = 2;
  string target_id = 3;
}

message UpdateAssetRetentionResponse {
  string target_id = 1;
  int32 retention_days = 2;            // Effective horizon in days from now (informational; 0 = keep forever)
  optional google.protobuf.Timestamp retention_until = 3; // Unset when retention_days = 0 (keep forever).
  // 'tenant_default' | 'per_asset_override' | 'tier_entitlement'
  string source = 4;
}

message SetStreamRetentionOverridesRequest {
  string tenant_id = 1;
  string stream_id = 2;
  // Unset leaves the corresponding column alone. Set writes the override
  // (0 = keep forever, >0 = days). To clear a column, set the matching
  // clear bool — clear takes precedence if both are provided.
  optional int32 dvr_retention_days_override  = 3;
  optional int32 clip_retention_days_override = 4;
  bool clear_dvr_retention_override  = 5;
  bool clear_clip_retention_override = 6;
  string updated_by = 7;
}

message SetStreamRetentionOverridesResponse {
  string stream_id = 1;
  optional int32 dvr_retention_days_override  = 2;
  optional int32 clip_retention_days_override = 3;
}

// ============================================================================
// BROWSER-HANDOFF + DEVICE LOGIN (Tray / CLI)
// ============================================================================
// Identity-bearing fields (user_id, tenant_id) on session-protected RPCs are
// derived from the gateway's verified JWT context — never from the client's
// JSON body. The webapp must not send user_id; Commodore trusts only what the
// gateway forwards after RequireJWTAuth has run.
// ============================================================================

// CompleteAuthorization: called by the gateway on behalf of the webapp
// /authorize page after the signed-in user clicks "Approve". Persists a
// single-use authorization code bound to the caller's PKCE code_challenge.
message CompleteAuthorizationRequest {
  string user_id = 1;                  // derived from gateway session, NOT body
  string tenant_id = 2;                // derived from gateway session, NOT body
  string client_id = 3;                // e.g. "tray-mac", "cli"
  string redirect_uri = 4;             // loopback URL the tray is listening on
  string code_challenge = 5;           // base64url(SHA256(verifier))
  string code_challenge_method = 6;    // must be "S256"
  string scope = 7;                    // e.g. "account"
  string state = 8;                    // opaque client nonce (passed through, not validated server-side)
}

message CompleteAuthorizationResponse {
  string code = 1;                     // opaque single-use authorization code (~600s TTL)
  google.protobuf.Timestamp expires_at = 2;
}

// ExchangeAuthorizationCode: called by the tray loopback receiver after the
// browser redirects back with ?code=... Returns the same AuthResponse shape
// as Login — short-lived access token + long-lived refresh token. PKCE
// verifier check binds the code to the originating tray process.
message ExchangeAuthorizationCodeRequest {
  string code = 1;
  string code_verifier = 2;            // raw verifier (server SHA256s and compares to stored challenge)
  string client_id = 3;
  string redirect_uri = 4;             // must match the redirect_uri from CompleteAuthorization
}

// StartDeviceAuthorization: called by the CLI to begin a device-code login.
// Returns a (device_code, user_code) pair plus the URL the user should open.
// RFC 8628 §3.2.
message StartDeviceAuthorizationRequest {
  string client_id = 1;
  string scope = 2;
}

message StartDeviceAuthorizationResponse {
  string device_code = 1;              // opaque high-entropy string; hashed at rest
  string user_code = 2;                // short, dash-formatted (e.g. "ABCD-EFGH")
  string verification_uri = 3;         // base URL, e.g. "https://app/device"
  string verification_uri_complete = 4;// includes ?user_code=...
  int32 expires_in_seconds = 5;        // typically 600
  int32 interval_seconds = 6;          // minimum poll interval (typically 5)
}

// PollDeviceAuthorization: called by the CLI on the interval returned above.
// While the user_code is still pending, returns gRPC status with one of the
// RFC 8628 §3.5 markers in the message: AUTHORIZATION_PENDING, SLOW_DOWN,
// ACCESS_DENIED, EXPIRED_TOKEN. On approval, returns a normal AuthResponse.
message PollDeviceAuthorizationRequest {
  string device_code = 1;
  string client_id = 2;
}

// LookupDeviceAuthorization: called by the gateway on behalf of the webapp
// /device page before approval, so the consent UI can name the requesting
// client. Requires a signed-in browser session.
message LookupDeviceAuthorizationRequest {
  string user_code = 1;
}

message LookupDeviceAuthorizationResponse {
  string client_id = 1;
  string scope = 2;
  google.protobuf.Timestamp expires_at = 3;
}

// ApproveDeviceAuthorization: called by the gateway on behalf of the webapp
// /device page after the signed-in user confirms the displayed user_code.
message ApproveDeviceAuthorizationRequest {
  string user_id = 1;                  // derived from gateway session, NOT body
  string tenant_id = 2;                // derived from gateway session, NOT body
  string user_code = 3;
}

message ApproveDeviceAuthorizationResponse {
  bool success = 1;
  string client_id = 2;
}
