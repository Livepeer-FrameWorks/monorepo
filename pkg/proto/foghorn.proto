syntax = "proto3";

package foghorn;

option go_package = "github.com/Livepeer-FrameWorks/monorepo/pkg/proto/foghorn;foghornpb";

import "common.proto";
import "shared.proto";
import "google/protobuf/timestamp.proto";

// FOGHORN CONTROL PLANE SERVICES
// These are control-plane operations exposed by Foghorn for Commodore to call.
// Media-plane operations (MistServer control, stream state) remain in ipc.proto.

// ClipService handles clip creation and management
service ClipControlService {
  // CreateClip creates a new clip from a stream
  rpc CreateClip(shared.CreateClipRequest) returns (shared.CreateClipResponse);
  // DeleteClip deletes a clip
  rpc DeleteClip(shared.DeleteClipRequest) returns (shared.DeleteClipResponse);
}

// DVRControlService handles DVR recording management
service DVRControlService {
  // StartDVR initiates DVR recording for a stream
  rpc StartDVR(shared.StartDVRRequest) returns (shared.StartDVRResponse);
  // StopDVR stops an active DVR recording
  rpc StopDVR(shared.StopDVRRequest) returns (shared.StopDVRResponse);
  // DeleteDVR deletes a DVR recording and its files
  rpc DeleteDVR(shared.DeleteDVRRequest) returns (shared.DeleteDVRResponse);

  // Chapters are produced by the finalization queue as canonical .mkv
  // VOD artifacts (origin_type='dvr_chapter', library_visible=false).
  // RetrieveDVRChapter returns the chapter row's range metadata + the
  // playback artifact reference; ListDVRChapters paginates chapter
  // rows for player navigation.
  //
  // Chapter mode is configured on commodore.streams and snapshotted
  // onto the DVR artifact at StartDVR; there is no in-flight policy
  // mutation RPC.

  rpc RetrieveDVRChapter(RetrieveDVRChapterRequest) returns (RetrieveDVRChapterResponse);
  rpc ListDVRChapters(ListDVRChaptersRequest) returns (ListDVRChaptersResponse);

  // OverrideArtifactRetention pushes a per-asset retention horizon into
  // foghorn.artifacts so the existing RetentionJob picks up the new value
  // on its next tick. Called by Commodore.UpdateAssetRetention /
  // ResetAssetRetention after the customer-facing override mutation lands.
  // Tenant ownership is verified upstream (Commodore-side query); this RPC
  // trusts the (tenant_id, dvr_hash) pair.
  rpc OverrideArtifactRetention(OverrideArtifactRetentionRequest) returns (OverrideArtifactRetentionResponse);

  // TestPlaybackAccess runs the same policy evaluator the live USER_NEW
  // path uses, but against a caller-supplied JWT (or a webhook test
  // request) without registering a viewer session. Returns the structured
  // PlaybackDecision so the operator sees Allow/Deny + reason + kid +
  // claims (JWT) or HTTP status + latency (webhook).
  //
  // Webhook mode fires a real outbound HTTPS request to the customer URL
  // — Commodore enforces tenant ownership of the playback target before
  // routing the call here so unauthenticated callers can't use this to
  // probe arbitrary endpoints.
  rpc TestPlaybackAccess(TestPlaybackAccessRequest) returns (TestPlaybackAccessResponse);
}

message RetrieveDVRChapterRequest {
  string dvr_artifact_id = 1;
  string mode = 2;                   // 'window_sized_chapters' | 'fixed_interval' | '' (auto from policy)
  int32 interval_seconds = 3;        // required for fixed_interval
  int64 start_ms = 4;                // UTC epoch ms
  int64 end_ms = 5;                  // UTC epoch ms
  string tenant_id = 6;              // for tenant-isolation enforcement
}

message RetrieveDVRChapterResponse {
  string chapter_id = 1;
  string playback_artifact_hash = 2; // Internal artifact hash. Mist routing uses this; public clients use playback_id.
  string state = 3;                  // open | closed | finalizing | finalized | frozen | reclaimed | failed_source_missing | failed_permanent
  bool is_current = 4;
  bool has_gaps = 5;
  int32 segment_count = 6;
  int64 start_ms = 7;
  int64 end_ms = 8;
  string last_failure_reason = 9;
  reserved 10;
  reserved "manifest_s3_key", "manifest_url", "error";
  string playback_id = 11;           // Commodore-minted public playback key; empty until the finalization queue dispatches.
  // Actual MKV span = [first owned segment's media_start, last owned
  // segment's media_end). May differ from start_ms/end_ms when chapter
  // boundaries don't align with segment boundaries. 0 until the chapter
  // finalizes. Players anchor video.currentTime to wall-clock using
  // these so the timeline doesn't drift against the scheduled bounds.
  int64 actual_media_start_ms = 12;
  int64 actual_media_end_ms   = 13;
}

message ListDVRChaptersRequest {
  string dvr_artifact_id = 1;
  string mode = 2;                   // restrict to chapters of this mode; empty = all
  int32 interval_seconds = 3;
  int64 range_start_ms = 4;          // 0 = no lower bound
  int64 range_end_ms = 5;            // 0 = no upper bound
  int32 page_size = 6;               // default 200, max 1000
  string page_token = 7;             // keyset cursor (start_ms as decimal text)
  string tenant_id = 8;
}

message ChapterRef {
  string chapter_id = 1;
  string mode = 2;
  int32 interval_seconds = 3;
  int64 start_ms = 4;
  int64 end_ms = 5;
  bool is_current = 6;
  string playback_artifact_hash = 7; // Internal artifact hash; public clients use playback_id.
  bool has_gaps = 8;
  int32 segment_count = 9;
  string state = 10;
  string last_failure_reason = 11;
  string playback_id = 12;           // Commodore-minted public playback key; empty until the finalization queue dispatches.
  int64 actual_media_start_ms = 13;
  int64 actual_media_end_ms   = 14;
}

message ListDVRChaptersResponse {
  repeated ChapterRef chapters = 1;
  string next_page_token = 2;        // empty when no more pages
}

// ViewerControlService handles viewer and ingest endpoint resolution
service ViewerControlService {
  // ResolveViewerEndpoint resolves the best endpoint(s) for a viewer
  rpc ResolveViewerEndpoint(shared.ViewerEndpointRequest) returns (shared.ViewerEndpointResponse);
  // ResolveIngestEndpoint resolves the best endpoint(s) for StreamCrafter ingest
  rpc ResolveIngestEndpoint(shared.IngestEndpointRequest) returns (shared.IngestEndpointResponse);
}

// VodControlService handles VOD upload management (user-initiated video uploads)
service VodControlService {
  // CreateVodUpload initiates a multipart upload and returns presigned URLs
  rpc CreateVodUpload(shared.CreateVodUploadRequest) returns (shared.CreateVodUploadResponse);
  // CompleteVodUpload finalizes the multipart upload after all parts are uploaded
  rpc CompleteVodUpload(shared.CompleteVodUploadRequest) returns (shared.CompleteVodUploadResponse);
  // AbortVodUpload cancels an in-progress multipart upload
  rpc AbortVodUpload(shared.AbortVodUploadRequest) returns (shared.AbortVodUploadResponse);
  // GetVodUploadStatus reports server-authoritative state of an in-flight multipart upload,
  // including which parts S3 has already received (via ListParts).
  rpc GetVodUploadStatus(shared.GetVodUploadStatusRequest) returns (shared.GetVodUploadStatusResponse);
  // GetVodAsset returns a single VOD asset by hash
  rpc GetVodAsset(shared.GetVodAssetRequest) returns (shared.VodAssetInfo);
  // ListVodAssets returns paginated list of VOD assets for a tenant
  rpc ListVodAssets(shared.ListVodAssetsRequest) returns (shared.ListVodAssetsResponse);
  // DeleteVodAsset deletes a VOD asset
  rpc DeleteVodAsset(shared.DeleteVodAssetRequest) returns (shared.DeleteVodAssetResponse);
}

// EdgeProvisioningService handles pre-registration of edge nodes during CLI provisioning.
// Uses enrollment tokens for auth (no service token required).
service EdgeProvisioningService {
  // PreRegisterEdge validates an enrollment token and returns an assigned domain for the edge.
  rpc PreRegisterEdge(PreRegisterEdgeRequest) returns (PreRegisterEdgeResponse);
}

message PreRegisterEdgeRequest {
  string enrollment_token = 1;  // Bootstrap token for edge enrollment
  string external_ip = 2;       // Edge's public IP (detected by CLI)
  string preferred_node_id = 3; // Optional human-friendly node ID/hostname hint
}

message PreRegisterEdgeResponse {
  string node_id = 1;           // Assigned node ID
  string edge_domain = 2;       // e.g., {node_label}.{cluster_slug}.{root_domain}; node_label is node_id with a single edge- prefix
  string pool_domain = 3;       // e.g., edge.{cluster_slug}.{root_domain}
  string cluster_slug = 4;
  string foghorn_grpc_addr = 5; // Address for Helmsman's FOGHORN_CONTROL_ADDR
  string cert_pem = 6 [deprecated = true];  // Deprecated: certs now delivered via ConfigSeed only
  string key_pem = 7 [deprecated = true];   // Deprecated: certs now delivered via ConfigSeed only
  string cluster_id = 8;        // Raw cluster ID (may differ from DNS-safe cluster_slug)
  bytes internal_ca_bundle = 9; // Optional internal CA bundle for pre-Connect trust bootstrap
  common.EdgeTelemetryConfig telemetry = 10; // Optional per-edge telemetry remote_write config
}

// NodeControlService exposes node lifecycle operations.
// Fronts the existing HTTP handlers with tenant ownership validation.
// Commodore proxies this as NodeManagementService for Gateway access.
service NodeControlService {
  // SetNodeOperationalMode changes a node's operational mode (normal, draining, maintenance).
  rpc SetNodeOperationalMode(SetNodeModeRequest) returns (SetNodeModeResponse);
  // GetNodeHealth returns real-time health and routing state for a node.
  rpc GetNodeHealth(GetNodeHealthRequest) returns (GetNodeHealthResponse);
}

message SetNodeModeRequest {
  string node_id = 1;
  string mode = 2;    // "normal", "draining", "maintenance"
  string set_by = 3;  // caller identity for audit trail
}

enum SetNodeModeStatus {
  SET_NODE_MODE_STATUS_UNSPECIFIED = 0;
  SET_NODE_MODE_STATUS_SUCCESS = 1;
  SET_NODE_MODE_STATUS_INVALID_MODE = 2;
  SET_NODE_MODE_STATUS_NOT_FOUND = 3;
  SET_NODE_MODE_STATUS_ALREADY_IN_MODE = 4;
}

message SetNodeModeResponse {
  string node_id = 1;
  string mode = 2;
  string message = 3;
  SetNodeModeStatus status = 4;
}

message GetNodeHealthRequest {
  string node_id = 1;
}

message GetNodeHealthResponse {
  string node_id = 1;
  string operational_mode = 2;
  bool is_healthy = 3;
  int32 active_viewers = 4;
  int32 active_streams = 5;
  string last_heartbeat = 6;  // ISO8601
  string cluster_id = 7;
  string tenant_id = 8;       // owning tenant (empty for operator nodes)
  double cpu_percent = 9;
  double ram_used_mb = 10;
  double ram_max_mb = 11;
  double bandwidth_up_mbps = 12;
  double bandwidth_down_mbps = 13;
  double bw_limit_mbps = 14;
  uint64 disk_total_bytes = 15;
  uint64 disk_used_bytes = 16;
  string location = 17;
  optional double latitude = 18;
  optional double longitude = 19;
  repeated NodeComponentVersion component_versions = 20;
}

message NodeComponentVersion {
  string component = 1;
  string version = 2;
}

// TenantControlService handles tenant-level operations called by Purser
service TenantControlService {
  // TerminateTenantStreams stops all active streams for a tenant (called when suspended)
  rpc TerminateTenantStreams(TerminateTenantStreamsRequest) returns (TerminateTenantStreamsResponse);
  // InvalidateTenantCache clears cached suspension status for a tenant (called on reactivation)
  rpc InvalidateTenantCache(InvalidateTenantCacheRequest) returns (InvalidateTenantCacheResponse);
  // InvalidatePlaybackAuth tells Foghorn to send invalidate_sessions to every
  // Helmsman whose nodes hold the listed streams. Called by Commodore after
  // a playback-policy or signing-key mutation. Does NOT disconnect viewers;
  // valid auth survives, invalid auth gets denied on the re-fired USER_NEW.
  rpc InvalidatePlaybackAuth(InvalidatePlaybackAuthRequest) returns (InvalidatePlaybackAuthResponse);
}

message InvalidatePlaybackAuthRequest {
  string tenant_id = 1;
  // internal_names is the list of MistServer internal stream names whose
  // active sessions need re-evaluating. Empty means "every protected
  // stream/artifact for the tenant" (used on signing-key revoke when the
  // policy may reference the revoked kid on any object).
  repeated string internal_names = 2;
  string reason = 3; // e.g., "policy_change", "key_revoked", "webhook_rotated", "bundle_revoke"

  // Signed-policy-bundle revocation fields. When reason == "bundle_revoke",
  // Foghorn calls policybundle.Cache.BumpWatermark(tenant_id, stream_id,
  // bundle_min_version) on receipt, invalidating cached bundles below the
  // watermark. stream_id empty means "all streams for this tenant" (used on
  // tenant-wide plan downgrades; Foghorn loops over its cache).
  string stream_id = 4;
  int64 bundle_min_version = 5;
}

message InvalidatePlaybackAuthResponse {
  int32 streams_invalidated = 1; // Number of internal_names dispatched
  int32 nodes_dispatched = 2;    // Number of Helmsmen successfully contacted
  int32 nodes_attempted = 3;     // Total Helmsmen targeted (dispatched + failed)
  int32 nodes_failed = 4;        // Helmsmen the dispatch could not reach; >0 means caller must retry
  repeated string failed_node_ids = 5; // Identifiers of unreachable Helmsmen, for diagnostic logging
}

// InvalidateTenantCacheRequest is sent when a tenant's suspension status changes
message InvalidateTenantCacheRequest {
  string tenant_id = 1;
  string reason = 2; // e.g., "reactivated", "balance_topped_up"
}

// InvalidateTenantCacheResponse indicates cache entries invalidated
message InvalidateTenantCacheResponse {
  int32 entries_invalidated = 1;
}

// TerminateTenantStreamsRequest is sent by Purser when a tenant is suspended
message TerminateTenantStreamsRequest {
  string tenant_id = 1;
  string reason = 2; // e.g., "insufficient_balance", "suspended"
}

// TerminateTenantStreamsResponse indicates the result of termination
message TerminateTenantStreamsResponse {
  int32 streams_terminated = 1;   // Number of streams that were stopped
  int32 sessions_terminated = 2;  // Total number of sessions stopped
  repeated string stream_names = 3; // Names of streams that were stopped
}

// OverrideArtifactRetentionRequest pushes a new retention horizon onto a
// foghorn.artifacts row. Used by Commodore.UpdateAssetRetention after a
// customer adjusts retention on a finalized DVR / clip / VOD. Active
// artifacts are rejected (retention applies post-finalize only).
//
message OverrideArtifactRetentionRequest {
  string tenant_id = 1;
  string dvr_hash = 2;       // dvr_hash | clip_hash | vod_hash; matched against foghorn.artifacts.artifact_hash
  google.protobuf.Timestamp retention_until = 3;
  // Empty string defaults to "dvr"; callers that handle clips or VOD set this
  // explicitly so Foghorn filters the matching artifact type.
  string artifact_type = 4;  // 'dvr' | 'clip' | 'vod'
  int32 retention_days = 5;  // used with anchor_to_ended_at
  bool anchor_to_ended_at = 6;
  int32 max_retention_days = 7; // tier entitlement bound, enforced against ended_at
}

message OverrideArtifactRetentionResponse {
  bool applied = 1;
  google.protobuf.Timestamp retention_until = 2;
}

// TestPlaybackAccessRequest carries the policy target plus the variant the
// caller wants to test. tenant_id is set by Commodore after ownership
// validation; this RPC trusts it.
message TestPlaybackAccessRequest {
  string tenant_id = 1;
  // Exactly one of playback_id / internal_name must be set. internal_name
  // is what the live USER_NEW path keys on; playback_id is the public
  // identifier customers use everywhere else.
  string playback_id = 2;
  string internal_name = 3;
  // JWT mode: caller-supplied token + optional viewer context that the
  // evaluator would ordinarily get from the MistServer trigger payload.
  // viewer_token must be set; the rest are optional and surface only in
  // the deny detail / webhook payload path.
  string viewer_token = 4;
  string viewer_ip = 5;
  string request_url = 6;
  string connector = 7;
  string session_id = 8;
  // Webhook mode: when true and the resolved policy is type=webhook, the
  // evaluator fires a real outbound request to the customer URL. Caller
  // is responsible for showing a confirmation in the UI before setting
  // this — webhooks have side effects.
  bool fire_webhook = 9;
}

message TestPlaybackAccessResponse {
  bool allowed = 1;
  string policy_type = 2;          // "public" | "jwt" | "webhook" | ""
  string reason = 3;               // empty on allow; deny reason token otherwise
  string detail = 4;               // free-form context (verifier error, status code as text)
  string kid = 5;                  // JWT key ID claimed by the token (if any)
  string claims_json = 6;          // JSON-encoded claims map (verified or not)
  int32 webhook_status = 7;        // HTTP status from the customer URL (webhook mode)
  int32 webhook_latency_ms = 8;    // RTT for the webhook call
  // Echo of which policy target the evaluator resolved against. Useful
  // when Commodore mapped a public playback_id to an internal_name for
  // the caller.
  string resolved_internal_name = 9;
}
