syntax = "proto3";

package foghorn_relay;

option go_package = "github.com/Livepeer-FrameWorks/monorepo/pkg/proto/foghorn_relay;foghornrelaypb";

import "ipc.proto";

// FoghornRelay enables intra-cluster command forwarding between Foghorn HA instances.
// When a Foghorn instance receives a control-plane command for a node whose
// bidirectional stream is held by a different instance, it forwards the command
// via this service. Authenticated with service tokens (same as federation).
service FoghornRelay {
  // ForwardCommand relays a control command to the instance holding the target node's stream.
  rpc ForwardCommand(ForwardCommandRequest) returns (ForwardCommandResponse);
}

message ForwardCommandRequest {
  reserved 17;
  reserved "defrost";
  reserved 11;          // retired clip_pull — clip creation enqueues a processing job, never forwards a ClipPull
  reserved "clip_pull";
  string target_node_id = 1;
  oneof command {
    helmsmancontrol.ConfigSeed config_seed = 10;
    helmsmancontrol.DVRStartRequest dvr_start = 12;
    helmsmancontrol.DVRStopRequest dvr_stop = 13;
    helmsmancontrol.ClipDeleteRequest clip_delete = 14;
    helmsmancontrol.DVRDeleteRequest dvr_delete = 15;
    helmsmancontrol.VodDeleteRequest vod_delete = 16;
    helmsmancontrol.DtshSyncRequest dtsh_sync = 18;
    helmsmancontrol.StopSessionsRequest stop_sessions = 19;
    helmsmancontrol.ActivatePushTargets activate_push_targets = 20;
    helmsmancontrol.DeactivatePushTargets deactivate_push_targets = 21;
    helmsmancontrol.ProcessingJobRequest processing_job = 22;
    helmsmancontrol.FreezeRequest freeze = 23;
    helmsmancontrol.DesiredStateUpdate desired_state_update = 24;
    helmsmancontrol.InvalidateSessionsRequest invalidate_sessions = 25;
    // Managed-stream Apply/Retract: routed via the relay when the elected
    // node is connected to a peer Foghorn. Same local-first-then-relay
    // pattern as ClipPull/DVRStart so multi-Foghorn-per-cluster deployments
    // work correctly.
    helmsmancontrol.ApplyManagedStream apply_managed_stream = 26;
    helmsmancontrol.RetractManagedStream retract_managed_stream = 27;
    // Old-owner drain on PUSH_REWRITE takeover. The new owner's PUSH_REWRITE
    // may arrive at a Foghorn instance that doesn't hold the old owner's
    // bidi stream; relay so the unload + session-disconnect lands on the
    // right Helmsman.
    helmsmancontrol.DrainStreamRequest drain_stream = 28;
    // Storage-node DVR source refresh on takeover. The DVR's recording
    // node may not be connected to the same Foghorn that handled the
    // takeover PUSH_REWRITE; relay so the override refresh + push
    // recreate lands on the right Helmsman.
    helmsmancontrol.DVRUpdateSourceRequest dvr_update_source = 29;
  }
}

message ForwardCommandResponse {
  bool delivered = 1;
  string error = 2;
}
