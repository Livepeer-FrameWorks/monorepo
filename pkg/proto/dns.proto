syntax = "proto3";

package navigator;

option go_package = "github.com/Livepeer-FrameWorks/monorepo/pkg/proto";

// NavigatorService manages public DNS records and certificates.
service NavigatorService {
  // SyncDNS requests Navigator to synchronize DNS records for a given service type.
  rpc SyncDNS(SyncDNSRequest) returns (SyncDNSResponse);
  // IssueCertificate requests Navigator to issue or renew a certificate for a domain.
  rpc IssueCertificate(IssueCertificateRequest) returns (IssueCertificateResponse);
  // GetCertificate retrieves an existing certificate for a domain.
  rpc GetCertificate(GetCertificateRequest) returns (GetCertificateResponse);
  // GetTLSBundle retrieves the current certificate material for a managed TLS bundle.
  rpc GetTLSBundle(GetTLSBundleRequest) returns (GetTLSBundleResponse);
  // GetCABundle retrieves the current internal CA bundle used for internal gRPC.
  rpc GetCABundle(GetCABundleRequest) returns (GetCABundleResponse);
  // IssueInternalCert issues or renews a node-scoped internal gRPC certificate.
  rpc IssueInternalCert(IssueInternalCertRequest) returns (IssueInternalCertResponse);
  // EnsureTenantAlias signals Navigator that a paying tenant should have
  // a public alias under the configured tenant zone (cdn.{root}). Idempotent.
  // Quartermaster calls this on paid tier activation. Returns immediately;
  // Navigator persists intent and queues ACME work asynchronously. Check
  // status via GetTenantAliasStatus.
  rpc EnsureTenantAlias(EnsureTenantAliasRequest) returns (EnsureTenantAliasResponse);
  // RemoveTenantAlias signals Navigator that a tenant alias should be
  // torn down (tenant downgraded/cancelled). Idempotent. DNS records are
  // removed first; cert files on edges are dropped on the next
  // ConfigSeed cycle.
  rpc RemoveTenantAlias(RemoveTenantAliasRequest) returns (RemoveTenantAliasResponse);
  // GetTenantAliasStatus returns the current lifecycle state for a
  // tenant alias. Used by webapp status display and Commodore gating
  // tenant_* domain fields in CreateStreamResponse.
  rpc GetTenantAliasStatus(GetTenantAliasStatusRequest) returns (GetTenantAliasStatusResponse);
  // ReportConfigSeedApplyResult records Helmsman's ConfigSeed apply ACK
  // as observed by Foghorn. Navigator owns durable per-edge cert readiness
  // because DNS membership is derived from it.
  rpc ReportConfigSeedApplyResult(ReportConfigSeedApplyResultRequest) returns (ReportConfigSeedApplyResultResponse);
  // RemoveTenantAliasCluster removes one cluster's edges from a tenant
  // alias DNS pool before Foghorn drops that tenant's cert from future
  // ConfigSeeds.
  rpc RemoveTenantAliasCluster(RemoveTenantAliasClusterRequest) returns (RemoveTenantAliasClusterResponse);
  // RemoveTenantAliasSubdomain retires one specific subdomain label without
  // touching the tenant's active alias intent row. Quartermaster calls this
  // for the old label on a subdomain rename so its Bunny records are cleared
  // independently. Idempotent on (tenant_id, subdomain).
  rpc RemoveTenantAliasSubdomain(RemoveTenantAliasSubdomainRequest) returns (RemoveTenantAliasSubdomainResponse);

  // EnsureCustomDomain signals Navigator that a paying tenant is bringing
  // their own domain (e.g. media.acme-inc.com). Navigator persists the row
  // and asynchronously verifies the customer's CNAMEs + runs ACME issuance
  // via ACME-DNS-01 delegation. Idempotent on (tenant_id, domain): the
  // assigned acme_dns_subdomain is stable across calls so the customer
  // never has to re-create the challenge CNAME.
  rpc EnsureCustomDomain(EnsureCustomDomainRequest) returns (EnsureCustomDomainResponse);
  // RemoveCustomDomain signals teardown. Navigator transitions the row to
  // tearing_down and the worker clears state.
  rpc RemoveCustomDomain(RemoveCustomDomainRequest) returns (RemoveCustomDomainResponse);
  // GetCustomDomainStatus returns the verification/cert lifecycle state
  // for a single (tenant_id, domain) pair. Used by the dashboard to render
  // the per-CNAME instructions and verification progress.
  rpc GetCustomDomainStatus(GetCustomDomainStatusRequest) returns (GetCustomDomainStatusResponse);
}

// EnsureTenantAliasRequest signals an intent. Navigator persists the
// row and runs ACME asynchronously.
message EnsureTenantAliasRequest {
  string tenant_id = 1;
  // DNS-safe label for the tenant inside the tenant alias zone, e.g.
  // "acme" becomes acme.cdn.frameworks.network. Must pass tenant slug
  // validation in pkg/dns.ReservedTenantSlugs.
  string subdomain = 2;
}

message EnsureTenantAliasResponse {
  bool accepted = 1;
  string status = 2;  // cert_issuing | cert_issued | cert_failed | tearing_down
  string error = 3;
}

message RemoveTenantAliasRequest {
  string tenant_id = 1;
}

message RemoveTenantAliasResponse {
  bool accepted = 1;
}

message GetTenantAliasStatusRequest {
  string tenant_id = 1;
}

message GetTenantAliasStatusResponse {
  bool found = 1;
  string tenant_id = 2;
  string subdomain = 3;  // current active alias label
  string status = 4;
  int64 cert_issued_at = 5;
  string last_error = 6;
  bool dns_ready = 7;
  // Labels with a pending retirement (rename old-labels not yet cleared from
  // Bunny). The Quartermaster backstop consults this to avoid re-enqueuing a
  // retire that is already in flight.
  repeated string pending_retirements = 8;
}

message ReportConfigSeedApplyResultRequest {
  string node_id = 1;
  string cluster_id = 2;
  uint64 seed_version = 3;
  repeated string applied_bundle_ids = 4;
  repeated string failed_bundle_ids = 5;
  bool success = 6;
  string error = 7;
  int64 applied_at = 8;
}

message ReportConfigSeedApplyResultResponse {
  bool accepted = 1;
  repeated string affected_tenant_ids = 2;
}

message RemoveTenantAliasClusterRequest {
  string tenant_id = 1;
  string cluster_id = 2;
}

message RemoveTenantAliasClusterResponse {
  bool accepted = 1;
}

message RemoveTenantAliasSubdomainRequest {
  string tenant_id = 1;
  string subdomain = 2;  // the specific label to retire (the old label on a rename)
}

message RemoveTenantAliasSubdomainResponse {
  bool accepted = 1;
  string error = 2;
}

message EnsureCustomDomainRequest {
  string tenant_id = 1;
  string domain = 2; // Customer-owned FQDN, e.g. "media.acme-inc.com"
}

message EnsureCustomDomainResponse {
  bool accepted = 1;
  string status = 2;
  // Customer must set two CNAMEs (one-time setup):
  //   {domain}                       CNAME  {required_traffic_cname}
  //   _acme-challenge.{domain}       CNAME  {required_acme_challenge_cname}
  // Stable across re-issuance / renewal; no rotation required.
  string required_traffic_cname = 3;
  string required_acme_challenge_cname = 4;
  string error = 5;
}

message RemoveCustomDomainRequest {
  string tenant_id = 1;
  string domain = 2;
}

message RemoveCustomDomainResponse {
  bool accepted = 1;
}

message GetCustomDomainStatusRequest {
  string tenant_id = 1;
  string domain = 2;
}

message GetCustomDomainStatusResponse {
  bool found = 1;
  string tenant_id = 2;
  string domain = 3;
  string status = 4; // pending_verification | verified | cert_issuing | cert_issued | cert_failed | tearing_down
  string required_traffic_cname = 5;
  string required_acme_challenge_cname = 6;
  int64 last_verified_at = 7;
  int64 cert_issued_at = 8;
  int64 cert_expires_at = 9;
  string last_error = 10;
}

// SyncDNSRequest is sent by Quartermaster to trigger DNS synchronization.
message SyncDNSRequest {
  optional string tenant_id = 1; // Optional: tenant context for tenant-specific DNS records
  string service_type = 2;       // e.g., "bridge", "foghorn", "helmsman"
  string root_domain = 3;        // e.g., "frameworks.network"
  // When set, Navigator reconciles only the {service_type}.{clusterSlug}.{root_domain}
  // record set (and any per-node edge-<node_id> records for that cluster), and treats
  // an empty healthy-node set as authoritative: the cluster service record is cleared.
  // When unset, Navigator falls back to root-scoped SyncService behaviour.
  optional string cluster_id = 4;
}

// SyncDNSResponse is returned by Navigator after attempting DNS synchronization.
message SyncDNSResponse {
  bool success = 1;
  string message = 2; // Details of the operation, e.g., "Updated 3 records"
  map<string, string> errors = 3; // Map of FQDN to error message
}

// IssueCertificateRequest is sent to request a certificate.
message IssueCertificateRequest {
  optional string tenant_id = 1; // Optional: tenant context for platform-managed tenant domains (subdomains)
  string domain = 2;             // The domain to issue the certificate for, e.g., "api.example.com" or "*.example.com"
  string email = 3;              // Email for ACME registration
}

// IssueCertificateResponse is returned after attempting certificate issuance.
message IssueCertificateResponse {
  bool success = 1;
  string message = 2;            // Details of the operation
  optional string tenant_id = 3; // Echo back tenant context
  string domain = 4;             // The domain the certificate was issued for
  string cert_pem = 5;           // The issued certificate in PEM format
  string key_pem = 6;            // The private key in PEM format
  int64 expires_at = 7;          // Certificate expiration timestamp (Unix)
  string error = 8;              // Error message if issuance failed
}

// GetCertificateRequest retrieves an existing certificate.
message GetCertificateRequest {
  optional string tenant_id = 1; // Optional: tenant context for filtering
  string domain = 2;             // The domain to retrieve the certificate for
}

// GetCertificateResponse returns the certificate if found.
message GetCertificateResponse {
  bool found = 1;
  optional string tenant_id = 2; // Tenant that owns the certificate (if any)
  string domain = 3;             // The domain
  string cert_pem = 4;           // The certificate in PEM format
  string key_pem = 5;            // The private key in PEM format
  int64 expires_at = 6;          // Certificate expiration timestamp (Unix)
  string error = 7;              // Error message if retrieval failed
}

message GetTLSBundleRequest {
  string bundle_id = 1;
}

message GetTLSBundleResponse {
  bool found = 1;
  string bundle_id = 2;
  repeated string domains = 3;
  string cert_pem = 4;
  string key_pem = 5;
  int64 expires_at = 6;
  string version = 7;
  string error = 8;
}

message GetCABundleRequest {}

message GetCABundleResponse {
  bool found = 1;
  string ca_pem = 2;
  string error = 3;
}

message IssueInternalCertRequest {
  string node_id = 1;
  string service_type = 2;
  string issue_token = 3;
}

message IssueInternalCertResponse {
  bool success = 1;
  string node_id = 2;
  string service_type = 3;
  string cert_pem = 4;
  string key_pem = 5;
  int64 expires_at = 6;
  string error = 7;
}
