syntax = "proto3";

package helmsmancontrol;

option go_package = "github.com/Livepeer-FrameWorks/monorepo/pkg/proto";

import "google/protobuf/timestamp.proto";
import "google/protobuf/empty.proto";
import "common.proto";

// Coarse geospatial bucket (H3 index + resolution)
message GeoBucket {
  uint64 h3_index = 1;   // H3 cell id encoded as uint64
  uint32 resolution = 2; // H3 resolution (e.g., 5)
}

// Bidirectional control channel between Helmsman (client) and Foghorn (server)
// Helmsman dials Foghorn and sends Register/NodeLifecycleUpdate; Foghorn sends ClipPullRequest

service HelmsmanControl {
  rpc Connect(stream ControlMessage) returns (stream ControlMessage);
  rpc ResolveClipHash(ClipHashRequest) returns (ClipHashResponse);
}

// Service for sending events to Decklog (Foghorn -> Decklog/api_firehose)
// - MistTrigger: media-plane analytics/events
// - ServiceEvent: service-plane telemetry (API usage, messaging, etc.)
// - GatewayTelemetryEvent: per-orchestrator discovery / state / outcome
//   telemetry from Livepeer gateways (cluster-scoped or session-scoped).
// All producers MUST preserve the original payload (no rewriting).
service DecklogService {
  // Unified entrypoint for media-plane events.
  rpc SendEvent(MistTrigger) returns (google.protobuf.Empty);
  // Service-plane events (non-media).
  rpc SendServiceEvent(ServiceEvent) returns (google.protobuf.Empty);
  // Livepeer gateway telemetry. Cluster-scoped events (discovery, state) are
  // attributed to cluster_owner_tenant_id. Session-scoped events
  // (transcode/AI outcomes) require both stream_tenant_id and
  // cluster_owner_tenant_id.
  rpc SendGatewayTelemetry(GatewayTelemetryEvent) returns (google.protobuf.Empty);
}

// ServiceEvent represents service-level telemetry emitted by core services.
//
// Envelope v2 fields (50-56) stamp event provenance for multi-region
// MirrorMaker fan-in: source_region/source_cluster_id identify where the
// event was produced; stream_origin_region/stream_origin_cluster_id identify
// the originating region/cluster of the stream this event references (empty
// for non-stream-scoped events). event_id should be a UUIDv7 so dedupe at
// the aggregate consumer side is time-ordered. Decklog backfills any
// envelope field a legacy producer left empty.
message ServiceEvent {
  string event_id = 1;
  string event_type = 2;
  google.protobuf.Timestamp timestamp = 3;
  string source = 4;
  string tenant_id = 5;
  string user_id = 6;
  string resource_type = 7;
  string resource_id = 8;
  oneof payload {
    APIRequestBatch api_request_batch = 20;
    AuthEvent auth_event = 21;
    TenantEvent tenant_event = 22;
    ClusterEvent cluster_event = 23;
    StreamChangeEvent stream_change_event = 24;
    StreamKeyEvent stream_key_event = 25;
    BillingEvent billing_event = 26;
    MessageLifecycleData support_event = 27;
    ArtifactEvent artifact_event = 28;
  }

  // ===== Envelope v2 =====
  string source_region = 50;
  string source_cluster_id = 51;
  string stream_origin_region = 52;
  string stream_origin_cluster_id = 53;
  int32  schema_version = 54;
  string correlation_id = 55;
  string causation_id = 56;
}

message AuthEvent {
  string user_id = 1;
  string tenant_id = 2;
  string auth_type = 3;
  string wallet_id = 4;
  string token_id = 5;
  string error = 6;
  string ip_bucket = 7;
}

message TenantEvent {
  string tenant_id = 1;
  repeated string changed_fields = 2;
  common.SignupAttribution attribution = 3;
}

// ClusterRejectReason standardizes rejection reasons for audit trails.
enum ClusterRejectReason {
  CLUSTER_REJECT_REASON_UNSPECIFIED = 0;
  CLUSTER_REJECT_REASON_CAPACITY = 1;
  CLUSTER_REJECT_REASON_POLICY = 2;
  CLUSTER_REJECT_REASON_ELIGIBILITY = 3;
  CLUSTER_REJECT_REASON_DUPLICATE = 4;
  CLUSTER_REJECT_REASON_WITHDRAWN = 5;
  CLUSTER_REJECT_REASON_OTHER = 99;
}

message ClusterEvent {
  string cluster_id = 1;
  string tenant_id = 2;
  string invite_id = 3;
  string subscription_id = 4;
  string reason = 5;
  ClusterRejectReason reject_reason_code = 6;
}

// StreamChangeEvent signals that a stream's metadata was updated.
// Used by Signalman subscriptions for real-time change notifications.
message StreamChangeEvent {
  string stream_id = 1;
  repeated string changed_fields = 2;
}

message StreamKeyEvent {
  string stream_id = 1;
  string key_id = 2;
}

message BillingEvent {
  string tenant_id = 1;
  string payment_id = 2;
  string subscription_id = 3;
  string invoice_id = 4;
  string topup_id = 5;
  double amount = 6;
  string currency = 7;
  string provider = 8;
  string status = 9;
  string asset = 10;     // "ETH" | "USDC" for crypto top-ups; empty otherwise
  string tx_hash = 11;   // On-chain tx hash for crypto credits
  string network = 12;   // "ethereum" | "arbitrum" | "base"
}

// ArtifactEvent represents audit/lifecycle events for clip/DVR/VOD artifacts.
message ArtifactEvent {
  enum ArtifactType {
    ARTIFACT_TYPE_UNSPECIFIED = 0;
    ARTIFACT_TYPE_CLIP = 1;
    ARTIFACT_TYPE_DVR = 2;
    ARTIFACT_TYPE_VOD = 3;
  }
  ArtifactType artifact_type = 1;
  string artifact_id = 2;          // clip_hash, dvr_hash, or vod_hash
  string stream_id = 3;            // Public stream ID (UUID), when applicable
  string status = 4;               // requested, started, processing, completed, failed, deleted, etc.
  optional int64 started_at = 5;   // Unix timestamp (if available)
  optional int64 completed_at = 6; // Unix timestamp (if available)
  optional int64 expires_at = 7;   // Retention expiration (if available)
}

message ControlMessage {
  reserved 22, 23;
  reserved "dvr_ready_request", "dvr_ready_response";
  reserved 44, 45, 46;
  reserved "defrost_request", "defrost_progress", "defrost_complete";

  string request_id = 1; // Correlates requests/responses
  google.protobuf.Timestamp sent_at = 2;
  oneof payload {
    Register register = 10;
    ClipPullRequest clip_pull_request = 12;
    ClipProgress clip_progress = 13;
    ClipDone clip_done = 14;
    ControlError error = 15;
    Heartbeat heartbeat = 16;
    DVRStartRequest dvr_start_request = 18;
    DVRProgress dvr_progress = 19;
    DVRStopped dvr_stopped = 20;
    DVRStopRequest dvr_stop_request = 21;
    MistTrigger mist_trigger = 24;
    MistTriggerResponse mist_trigger_response = 25;
    // Foghorn → Helmsman: durable ack for non-blocking final/accounting
    // triggers (USER_END, STREAM_END, PUSH_END, RECORDING_END,
    // RECORDING_SEGMENT, LIVEPEER_SEGMENT_COMPLETE,
    // PROCESS_AV_VIRTUAL_SEGMENT_COMPLETE). Sent only after Decklog's
    // SendEvent returns success, which only happens after the Kafka publish
    // commits — so a positive ack means the trigger is durably ingested.
    // Helmsman keeps its WAL entry pending until this lands; on negative
    // retryable ack, backoff+resend with the same stable RequestId.
    MistTriggerAck mist_trigger_ack = 150;
    ConfigSeed config_seed = 29;
    // Helmsman to Foghorn: per-seed apply result for TLS/Caddy activation.
    // Gates Navigator's DNS membership decisions.
    ConfigSeedApplyResult config_seed_apply_result = 34;
    ArtifactDeleted artifact_deleted = 30;
    ClipDeleteRequest clip_delete = 31;
    DVRDeleteRequest dvr_delete = 32;
    VodDeleteRequest vod_delete = 33;
    // Cold storage (S3) operations
    FreezePermissionRequest freeze_permission_request = 40;
    FreezePermissionResponse freeze_permission_response = 41;
    FreezeProgress freeze_progress = 42;
    FreezeComplete freeze_complete = 43;
    // Dual-storage sync operations (sync to S3 while keeping local)
    CanDeleteRequest can_delete_request = 47;
    CanDeleteResponse can_delete_response = 48;
    SyncComplete sync_complete = 49;
    // Incremental .dtsh sync (Foghorn -> Helmsman)
    DtshSyncRequest dtsh_sync_request = 50;
    // Proactive freeze (Foghorn -> Helmsman: sync local artifact to S3)
    FreezeRequest freeze_request = 51;
    // Transcode job operations (Foghorn <-> Helmsman)
    TranscodeJobRequest transcode_job_request = 60;
    TranscodeJobProgress transcode_job_progress = 61;
    TranscodeJobComplete transcode_job_complete = 62;
    // VOD processing jobs (Foghorn <-> Helmsman)
    ProcessingJobRequest processing_job_request = 63;
    ProcessingJobResult processing_job_result = 64;
    ProcessingJobProgress processing_job_progress = 65;
    // Session termination (Foghorn -> Helmsman for billing suspension)
    StopSessionsRequest stop_sessions_request = 70;
    // Session invalidation (Foghorn -> Helmsman for re-running USER_NEW
    // after a playback-policy or signing-key change). Does NOT disconnect viewers.
    InvalidateSessionsRequest invalidate_sessions_request = 72;
    // Node mode change request (Helmsman -> Foghorn, from local agent/CLI)
    ModeChangeRequest mode_change_request = 71;
    // Multistream push target lifecycle (Foghorn <-> Helmsman)
    ActivatePushTargets activate_push_targets = 80;
    DeactivatePushTargets deactivate_push_targets = 81;
    PushTargetStatusReport push_target_status = 82;
    // Edge API token validation (Helmsman -> Foghorn -> Commodore/JWT)
    ValidateEdgeTokenRequest validate_edge_token_request = 90;
    ValidateEdgeTokenResponse validate_edge_token_response = 91;
    // Mist-admin session validation (Helmsman -> Foghorn -> Commodore).
    // Distinct from validate_edge_token because the session token is
    // bound to the connected node_id and carries different claims (the
    // operator-admin purpose, cluster_id, exp). Foghorn injects the
    // expected node_id at the relay so Helmsman cannot spoof it.
    EdgeMistAdminSessionRequest edge_mist_admin_session_request = 92;
    EdgeMistAdminSessionResponse edge_mist_admin_session_response = 93;
    // Thumbnail asset upload (Helmsman -> Foghorn -> S3)
    ThumbnailUploadRequest thumbnail_upload_request = 100;
    ThumbnailUploadResponse thumbnail_upload_response = 101;
    ThumbnailUploaded thumbnail_uploaded = 102;
    // Edge component desired-state updates
    DesiredStateUpdate desired_state_update = 110;
    UpdateApplyResult update_apply_result = 111;
    // DVR per-segment ledger (Helmsman <-> Foghorn) — see docs/architecture/clips-dvr.md
    RecordDVRSegmentRequest record_dvr_segment_request = 120;
    RecordDVRSegmentResponse record_dvr_segment_response = 121;
    MarkDVRSegmentUploaded mark_dvr_segment_uploaded = 122;
    DVRSegmentDropped dvr_segment_dropped = 123;
    EvictableSegmentsRequest evictable_segments_request = 124;
    EvictableSegmentsResponse evictable_segments_response = 125;
    RetryDVRSegmentUpload retry_dvr_segment_upload = 126;
    // Foghorn -> Helmsman: delete a specific local TS segment file
    // after the chapter that owned it has reached state=frozen. The
    // recovery-bridge S3 object is deleted by Foghorn directly.
    ReclaimDVRSegment reclaim_dvr_segment = 129;
    // Sidecar restart reconciliation: bounded by request size (sidecar
    // batches discovered (artifact_hash, segment_name) pairs from local
    // disk into pages of ~500). Foghorn answers with current ledger state
    // for each requested name; sidecar repopulates its in-memory local
    // cache index from the responses.
    RestoreLocalSegmentIndexRequest restore_local_segment_index_request = 127;
    RestoreLocalSegmentIndexResponse restore_local_segment_index_response = 128;
    // Read-through relay resolution: sidecar asks Foghorn for the durable
    // source coordinates (presigned media GET, .dtsh GET/PUT, expected size,
    // DVR chapter segment refs) of an artifact it is about to serve via the
    // /internal/artifact/* HTTP relay. Same pattern as CanDelete /
    // FreezePermission: sidecar-originated request, Foghorn responds on the
    // same stream.
    RelayResolveRequest relay_resolve_request = 140;
    RelayResolveResponse relay_resolve_response = 141;
    // Foghorn -> Helmsman: concrete mist_native stream sync/unsync. Driven
    // by Foghorn's managed-stream reconciler, not by ConfigSeed. Apply means
    // "add/update this concrete Mist stream on this node now"; Retract means
    // "remove it now". Sidecar handlers map to mist.AddStreams / DelStreams.
    // Idempotent: re-Applying with identical fields is a no-op.
    ApplyManagedStream apply_managed_stream = 160;
    RetractManagedStream retract_managed_stream = 161;
    // Foghorn -> Helmsman: drain a specific runtime stream from the local
    // Mist process. Issued from the AdmitAndReserve takeover path before
    // the new owner is admitted, so old viewer sessions don't keep talking
    // to the stale lingering buffer. Idempotent — missing stream is success.
    DrainStreamRequest drain_stream_request = 162;
    DrainStreamResponse drain_stream_response = 163;
    // Foghorn -> Helmsman: refresh the DVR source override on the storage
    // node when the source publisher takes over to a different ingest
    // node. Without this, the DVR's registered override keeps pointing at
    // the now-dead source URL and the push pull stalls until retry budget
    // exhausts. Idempotent — missing job is a no-op success.
    DVRUpdateSourceRequest dvr_update_source_request = 164;
    DVRUpdateSourceResponse dvr_update_source_response = 165;
  }
}

// ApplyManagedStream is sent by Foghorn to instruct Helmsman to add (or
// update, if name already configured) a concrete mist_native stream config
// on this node. Driven by Foghorn's reconciler after placement elects the
// node for the stream and ResolveStreamContext admits it. Sidecar maps to
// mist.AddStreams with `name` as the bare internal name (no live+/pull+
// prefix — concrete configs use bare names, prefixes are reserved for
// wildcard adapters), the literal `source`, and the tag set (always
// includes "fw:managed:foghorn" so the sidecar can scope ownership).
message ApplyManagedStream {
  string name = 1;                // bare Mist stream name (== commodore.streams.internal_name)
  string source = 2;              // literal Mist source string (ts-exec:..., file://..., etc.)
  bool   always_on = 3;
  bool   realtime = 4;
  bool   stop_sessions = 5;
  repeated string tags = 6;       // includes "fw:managed:foghorn" owner marker
  string ingest_mode = 7;         // "mist_native" today
  string stream_id = 8;           // commodore.streams.id; for logging/correlation
  string tenant_id = 9;
}

// RetractManagedStream is sent by Foghorn to instruct Helmsman to remove a
// concrete mist_native stream config. Sidecar maps to mist.DelStreams.
// Idempotent: removing an absent stream is a no-op. Sidecar must only
// retract names it Applied (sanity check via owner tag) — tenant push/pull
// streams stay untouched even if a stale Retract for them is received.
message RetractManagedStream {
  string name = 1;                // bare Mist stream name
  string stream_id = 2;           // commodore.streams.id; for logging/correlation
}

// DrainStreamRequest is sent by Foghorn when admission moves ingest
// ownership to a different node (takeover). The old owner must unload its
// lingering Mist buffer and disconnect viewer sessions for that runtime
// name so viewers don't keep talking to the stale buffer. Idempotent —
// when the stream is absent locally, Helmsman returns unloaded=false with
// sessions_disconnected=0 and no error.
message DrainStreamRequest {
  string runtime_name = 1;        // exact Mist source name to nuke
  string reason = 2;              // e.g. "takeover_by_node:edge-us-2"
}

// DVRUpdateSourceRequest is sent by Foghorn when the source publisher
// moves to a different ingest node mid-recording. The storage node has
// a registered DVR source override pinning the push to the old source's
// DTSC URL; this message refreshes that override so the next
// createOrRecreatePush succeeds against the new owner. Idempotent —
// missing dvr_hash is success.
message DVRUpdateSourceRequest {
  string dvr_hash = 1;            // identifies the in-flight recording job
  string source_runtime_name = 2; // new Mist runtime name (live+<x> / pull+<x> / bare native)
  string source_base_url = 3;     // new DTSC URL captured by Foghorn from the new source node
}

message DVRUpdateSourceResponse {
  string dvr_hash = 1;
  bool   refreshed = 2;           // true if the override was updated; false if no active job
  string error = 3;               // empty on success; populated on partial failure
}

message DrainStreamResponse {
  string runtime_name = 1;
  bool   unloaded = 2;
  uint32 sessions_disconnected = 3;
  string error = 4;               // empty on success; populated on partial failure
}

// ModeChangeRequest is sent by Helmsman when a local agent or CLI requests
// an operational mode change. Foghorn validates and applies the change,
// then pushes an updated ConfigSeed back with the new mode.
message ModeChangeRequest {
  NodeOperationalMode requested_mode = 1;
  string reason = 2;  // e.g. "agent_requested", "scheduled_maintenance"
}

message EdgeComponentVersion {
  string component = 1;
  string version = 2;
}

message DesiredComponent {
  string component = 1;
  string version = 2;
  string artifact_url = 3;
  string checksum = 4;
  bool drain_required = 5;
  string swap_strategy = 6;
}

message DesiredStateUpdate {
  string cluster_id = 1;
  string node_id = 2;
  string target_release = 3;
  repeated DesiredComponent components = 4;
  string cordon_token = 5;
  google.protobuf.Timestamp cordon_token_expires_at = 6;
}

message ComponentApplyResult {
  string component = 1;
  string version = 2;
  bool success = 3;
  string detail = 4;
}

message UpdateApplyResult {
  string node_id = 1;
  string target_release = 2;
  repeated ComponentApplyResult components = 3;
}

// StopSessionsRequest tells Helmsman to stop all sessions for the given streams
// Used when a tenant is suspended due to insufficient balance
message StopSessionsRequest {
  repeated string stream_names = 1; // Internal stream names to stop
  string tenant_id = 2;             // For logging/audit
  string reason = 3;                // e.g., "insufficient_balance", "suspended"
}

// InvalidateSessionsRequest tells Helmsman to re-run USER_NEW for active
// sessions on the given streams without disconnecting them.
// Used after a playback-policy or signing-key change so MistServer's
// per-session cache is rebuilt against the fresh policy.
// Maps to MistServer's `invalidate_sessions` JSON API.
message InvalidateSessionsRequest {
  repeated string stream_names = 1; // Internal stream names whose sessions need re-evaluating
  string tenant_id = 2;             // For logging/audit
  string reason = 3;                // e.g., "policy_change", "key_revoked", "webhook_rotated"
}

// ActivatePushTargets tells Helmsman to start pushing a stream to external targets.
// Sent by Foghorn when a stream goes live (after PUSH_REWRITE validation).
message ActivatePushTargets {
  string stream_name = 1;                  // MistServer stream name (e.g., "live+abc123")
  repeated PushTargetSpec targets = 2;
}

// PushTargetSpec is a single push destination for Helmsman to activate.
message PushTargetSpec {
  string target_id = 1;                    // Commodore push_targets.id (for status reporting)
  string target_uri = 2;                   // Full RTMP/SRT URI
  string name = 3;                         // User-friendly label (for logging)
}

// DeactivatePushTargets tells Helmsman to stop all pushes for a stream.
// Sent by Foghorn when a stream ends (STREAM_END trigger).
message DeactivatePushTargets {
  string stream_name = 1;                  // MistServer stream name
}

// PushTargetStatusReport is sent by Helmsman to Foghorn to report push lifecycle events.
// Foghorn uses this to update status in Commodore.
message PushTargetStatusReport {
  string target_id = 1;                    // Commodore push_targets.id
  string stream_name = 2;
  string status = 3;                       // pushing, idle, failed
  string error = 4;                        // Error message if failed
  int64 mist_push_id = 5;                 // MistServer's internal push ID (for PushStop)
}

message ArtifactDeleted {
  reserved 1;
  reserved "clip_hash";
  string file_path = 2;
  string reason = 3;         // "cleanup", "eviction", "manual"
  string node_id = 4;
  uint64 size_bytes = 5;
  string artifact_hash = 6;  // Generic artifact hash (clip, dvr, vod)
  string artifact_type = 7;  // "clip", "dvr", "vod"
}

message Register {
  string node_id = 1;
  repeated string roles = 2; // e.g., ingest, edge, storage, processing
  bool cap_ingest = 3;
  bool cap_edge = 4;
  bool cap_storage = 5;
  bool cap_processing = 6;
  // Storage hints
  string storage_local = 7;
  string storage_bucket = 8;
  string storage_prefix = 9;
  // Edge enrollment token (optional). Sent by Helmsman on first connect for Foghorn to enroll the node with Quartermaster.
  string enrollment_token = 10;
  // Optional stable fingerprint signals to aid node identity resolution.
  // Do not include volatile/process-specific values. Client-provided; server will add peer_ip & Geo.
  NodeFingerprint fingerprint = 11;
  // Hardware specs detected at startup (for load balancing and capacity planning)
  optional int32 cpu_cores = 12;      // Detected CPU cores (runtime.NumCPU)
  optional int32 memory_gb = 13;      // Total RAM in GB
  optional int32 disk_gb = 14;        // Total disk capacity in GB
  // Requested operational mode (selfhosters can request drain/maintenance on connect).
  // Foghorn may honor or override based on DB-persisted state.
  NodeOperationalMode requested_mode = 15;
  // Base URL Mist on this node uses to reach the /internal/artifact/* relay
  // on this Helmsman. In production where Mist and Helmsman are colocated
  // this is http://127.0.0.1:18007; in container deployments where Mist and
  // Helmsman are separate services this is the inter-container address
  // (e.g. http://helmsman:18007). Foghorn stamps STREAM_SOURCE responses
  // with this prefix so Mist always resolves to the right Helmsman.
  string relay_base_url = 16;
  // Owner-tagged Mist streams currently configured on this node, as known
  // to Helmsman after sidecar hydration. Foghorn uses this to seed its
  // managed-stream lastSent map on (re)connect so a Foghorn restart does
  // not lose track of streams it already provisioned. Without this, a
  // restart + DB-row removal sequence would leave the Mist config in
  // place forever because no Retract would ever fire.
  repeated AppliedManagedStream applied_managed_streams = 17;
}

// AppliedManagedStream is a sidecar→Foghorn snapshot at (re)connect of one
// managed Mist stream currently configured on the node. The Foghorn-side
// reconciler seeds its lastSent map from this set so the next tick's
// elected-vs-applied diff sees the stream and can issue a Retract if the
// desired-state set no longer contains it.
//
// stream_id is the Foghorn lastSent map key. Without it, hydration would
// land under the bare Mist name while the reconciler keys by stream_id,
// and the next tick would Apply (under stream_id) then Retract (the
// hydrated bare-name entry) the same physical stream — race-free path
// requires the keys to match. Sidecar parses stream_id from the
// `fw:stream:<stream_id>` tag both Apply and Mist-config hydration write.
message AppliedManagedStream {
  string name = 1;          // bare Mist stream name (== commodore.streams.internal_name)
  string source = 2;        // literal Mist source string
  bool   always_on = 3;
  string ingest_mode = 4;
  string stream_id = 5;     // commodore.streams.id; required when known
}

// NodeFingerprint carries stable identity hints from Helmsman.
message NodeFingerprint {
  // Local interface IPs (best-effort). Helps disambiguate nodes behind NAT.
  repeated string local_ipv4 = 1;
  repeated string local_ipv6 = 2;
  // Deterministic aggregate hash of MAC addresses (sorted, lowercase, SHA-256 hex).
  // Avoids exposing raw MACs while remaining stable.
  optional string macs_sha256 = 3;
  // Optional machine-id hash when available (e.g., /etc/machine-id), SHA-256 hex.
  optional string machine_id_sha256 = 4;
}

message ClipPullRequest {
  // Security: Use opaque identifiers, never expose tenant_id on edge nodes
  string clip_hash = 1;           // Opaque identifier for the clip
  // stream_name is the Mist routing name Helmsman pulls FROM. For live
  // sources this is the live stream's internal_name; for DVR_ROLLING
  // it is dvr+<dvr_internal_name>; for CHAPTER it is
  // vod+<chapter_artifact_hash>. Helmsman uses this for /view/...
  // when cutting the clip — it MUST NOT be used as a storage
  // namespace for the output file (the chapter/DVR-rolling cases
  // would otherwise scatter clips under chapter-artifact-hashed dirs
  // that don't match the owning stream).
  string stream_name = 2;
  // Timing (one of):
  optional int64 start_unix = 3;   // seconds
  optional int64 stop_unix = 4;    // seconds
  optional int64 start_ms = 5;     // since stream start
  optional int64 stop_ms = 6;      // since stream start
  optional int64 duration_sec = 7; // seconds
  // Output
  string format = 8;              // mp4 default
  string output_name = 9;         // suggested basename
  // Optional explicit Mist HTTP base (e.g., http://node:8080) to pull from
  string source_base_url = 10;
  // Request tracking
  string request_id = 11;         // Unique request ID for tracking
  // The clip artifact's Mist routing name — what Mist will use as
  // vod+<internal_name> when serving playback for this clip. Foghorn
  // populates from foghorn.artifacts.internal_name at clip-create time.
  // Helmsman uses it to boot the clip post-download for .dtsh
  // generation; an empty value disables proactive sidecar creation.
  string internal_name = 12;

  // Source dispatch — Foghorn picks at CreateClip time based on the
  // requested range. Helmsman branches on source_kind:
  //   LIVE          — pull from the live MistServer process
  //   DVR_ROLLING   — pull from local TS segments under the rolling
  //                   DVR window; source_dvr_hash names the DVR row
  //   CHAPTER       — pull from the chapter artifact's canonical .mkv
  //                   via the relay; source_chapter_artifact_hash
  //                   names the artifact
  enum SourceKind {
    SOURCE_KIND_UNSPECIFIED = 0;
    SOURCE_KIND_LIVE = 1;
    SOURCE_KIND_DVR_ROLLING = 2;
    SOURCE_KIND_CHAPTER = 3;
  }
  SourceKind source_kind = 20;
  string source_dvr_hash = 21;
  string source_chapter_artifact_hash = 22;
  // output_stream_name is the owning stream's internal_name — where
  // Helmsman writes clips/{output_stream_name}/{clip_hash}.{format}.
  // For LIVE sources this matches stream_name; for DVR_ROLLING and
  // CHAPTER it is the DVR artifact's stream_internal_name, so all
  // clips of one stream stay under one directory regardless of which
  // historical surface they were cut from. Required — Helmsman
  // rejects clip pulls with an empty value.
  string output_stream_name = 23;
  // Foghorn-authoritative runtime name for the clip ARTIFACT, used by
  // Helmsman to boot the clip post-download for .dtsh generation. Always
  // vod+<clip_internal_name> today (clips are frozen VOD), but populated
  // from Foghorn's registry so Helmsman never derives runtime names.
  string artifact_runtime_name = 24;
}

message ClipProgress {
  string request_id = 1;
  uint32 percent = 2;        // 0..100
  string message = 3;
}

message ClipDone {
  string request_id = 1;
  string file_path = 2;     // local path on storage node (if applicable)
  string s3_url = 3;        // s3://bucket/key or https URL (if applicable)
  uint64 size_bytes = 4;
  string status = 5;        // success|failed
  string error = 6;         // filled when failed
}

message ControlError {
  string code = 1;
  string message = 2;
}

message Heartbeat {
  string node_id = 1;
  // Currently-applied managed Mist streams on this node. Foghorn's
  // managed-stream reconciler uses this as ground truth (verified
  // applied) — Apply / Retract are fire-and-forget on the control
  // channel, so the reconciler gates active-cluster pinning and
  // retract-completion on the next heartbeat's snapshot rather than
  // assuming the wire-send means Mist actually landed the config.
  repeated AppliedManagedStream applied_managed_streams = 2;
}

message MistTrigger {
  string trigger_type = 1;    // e.g., PUSH_REWRITE, PLAY_REWRITE, VIEWER_CONNECT, STREAM_BUFFER
  string node_id = 3;         // Node that received the trigger
  int64 timestamp = 4;        // When trigger was received
  bool blocking = 5;          // Does this trigger need a response from Foghorn?
  string request_id = 6;      // For correlating responses
  optional string tenant_id = 7; // Tenant context (enriched by Foghorn)
  optional string user_id = 8;   // User context (enriched by Foghorn)
  optional string stream_id = 9; // Public stream ID (enriched by Foghorn)

  // Typed trigger payloads (one of these will be set based on trigger_type)
  oneof trigger_payload {
    PushRewriteTrigger push_rewrite = 10;
    ViewerResolveTrigger play_rewrite = 11;          // formerly DefaultStreamTrigger
    StreamSourceTrigger stream_source = 12;            // VOD source resolution
    PushOutStartTrigger push_out_start = 13;
    PushEndTrigger push_end = 14;
    ViewerConnectTrigger viewer_connect = 15;          // formerly UserNewTrigger
    ViewerDisconnectTrigger viewer_disconnect = 16;    // formerly UserEndTrigger
    StreamBufferTrigger stream_buffer = 17;
    StreamEndTrigger stream_end = 18;
    StreamTrackListTrigger track_list = 19;            // formerly LiveTrackListTrigger
    RecordingCompleteTrigger recording_complete = 21;  // formerly RecordingEndTrigger
    StreamLifecycleUpdate stream_lifecycle_update = 22;
    ClientLifecycleUpdate client_lifecycle_update = 23;
    NodeLifecycleUpdate node_lifecycle_update = 24;
    LoadBalancingData load_balancing_data = 25;
    ClipLifecycleData clip_lifecycle_data = 26;
    DVRLifecycleData dvr_lifecycle_data = 27;
    StorageSnapshot storage_snapshot = 28;
    StorageLifecycleData storage_lifecycle_data = 29;
    RecordingSegmentTrigger recording_segment = 30;
    ProcessBillingEvent process_billing = 31;
    VodLifecycleData vod_lifecycle_data = 32;
    APIRequestBatch api_request_batch = 34;
    MessageLifecycleData message_lifecycle_data = 35;
    FederationEventData federation_event_data = 36;
    StreamProcessTrigger stream_process = 38;
    ClientLifecycleBatch client_lifecycle_batch = 39;
    RawMistWebhookTrigger raw_mist_webhook = 40;
    PushInputCloseTrigger push_input_close = 41;
  }

  optional string cluster_id = 33; // Emitting cluster identifier (source_cluster_id in envelope v2 terms)
  optional string origin_cluster_id = 37; // Cluster where stream was originally ingested (stream_origin_cluster_id in envelope v2 terms)

  // ===== Envelope v2 (region pair + schema/version + correlation) =====
  // cluster_id (33) and origin_cluster_id (37) already play the
  // source_cluster_id / stream_origin_cluster_id roles. These fields add the
  // region pair plus schema/correlation metadata so MirrorMaker fan-in can
  // dedupe and route without inspecting payload JSON.
  string source_region = 50;
  string stream_origin_region = 52;
  int32  schema_version = 54;
  string correlation_id = 55;
  string causation_id = 56;
  // event_id: UUIDv7 producer-stamped event identifier — the dedup key
  // downstream consumers (Periscope, MirrorMaker peers) use to drop
  // duplicates after at-least-once replication. Producers stamp at emit;
  // Decklog backfills on ingest for backward compat.
  string event_id = 57;

  reserved 20;               // Legacy: removed stream_bandwidth field
  reserved "stream_bandwidth";
}

// RawMistWebhookTrigger preserves a final/accounting Mist webhook that
// Helmsman could not parse into its typed protobuf payload. It exists so
// final triggers are still durably journaled and operator-visible instead
// of being acknowledged and lost when the local parser lags MistServer.
message RawMistWebhookTrigger {
  bytes payload_raw = 1;
  string parse_error = 2;
}

message MistTriggerResponse {
  string request_id = 1;      // Correlates to MistTrigger.request_id
  string response = 2;        // What to return to MistServer (empty string aborts for blocking triggers)
  bool abort = 3;             // Explicit abort flag
  IngestErrorCode error_code = 4;
}

// MistTriggerAck is Foghorn's durable acknowledgement for non-blocking
// final-event triggers. Helmsman persists each such trigger to its local
// WAL before responding 200 OK to Mist and waits for this ack before
// truncating the WAL row.
//
// Positive ack (success=true) means Decklog's SendEvent returned nil for
// this trigger, which itself only happens after the Kafka publish commits —
// the trigger is durably ingested.
//
// Negative ack (success=false) carries retryable + error_code so Helmsman
// can decide whether to backoff+resend (same request_id) or move the row
// to dead-letter. Transient failures (timeout, downstream unavailable,
// Kafka publish error) are retryable=true; permanent failures (parse
// error, schema violation, tenant deleted) are retryable=false.
message MistTriggerAck {
  string request_id = 1;       // Stable source_event_id from the originating MistTrigger
  bool success = 2;
  bool retryable = 3;          // Only meaningful when success=false
  TriggerAckErrorCode error_code = 4;
  string error_message = 5;    // Operator-facing detail; never customer-visible
}

enum TriggerAckErrorCode {
  TRIGGER_ACK_ERROR_NONE = 0;
  TRIGGER_ACK_ERROR_INTERNAL = 1;          // Retryable
  TRIGGER_ACK_ERROR_DOWNSTREAM_UNAVAILABLE = 2; // Retryable
  TRIGGER_ACK_ERROR_KAFKA_PUBLISH = 3;     // Retryable
  TRIGGER_ACK_ERROR_PARSE = 4;             // Non-retryable
  TRIGGER_ACK_ERROR_SCHEMA = 5;            // Non-retryable
  TRIGGER_ACK_ERROR_TENANT_MISSING = 6;    // Non-retryable
}

enum IngestErrorCode {
  INGEST_ERROR_NONE = 0;
  INGEST_ERROR_INVALID_STREAM_KEY = 1;
  INGEST_ERROR_ACCOUNT_SUSPENDED = 2;
  INGEST_ERROR_PAYMENT_REQUIRED = 3;
  INGEST_ERROR_INTERNAL = 4;
  INGEST_ERROR_TIMEOUT = 5;
  INGEST_ERROR_DUPLICATE_INGEST = 6;
  // Free-tier billing allowance exhausted AND cluster is at load — admission
  // gated to preserve capacity for paying tenants. Tenant should upgrade or
  // retry off-peak; existing live streams are not killed.
  INGEST_ERROR_FREE_TIER_EXHAUSTED = 7;
  // Tenant is at their per-tenant concurrent-stream cap. Plan defaults come
  // from Purser tier entitlements; Quartermaster cluster access may override.
  // Distinct from FREE_TIER_EXHAUSTED — this fires regardless of cluster load.
  INGEST_ERROR_TENANT_STREAM_CAP = 8;
}

message StorageSnapshot {
  string node_id = 1;
  int64 timestamp = 2;
  optional string tenant_id = 3; // Node Owner (Supplier)
  optional string location = 4;
  optional NodeCapabilities capabilities = 5;
  repeated TenantStorageUsage usage = 6;
  // hot = node-local cache (operational by default), cold = S3 (frozen,
  // rated by default). See docs/architecture/meter-contracts.md.
  optional string storage_scope = 7;

  // Provider attribution for marketplace settlement. The customer's
  // `tenant_id` on TenantStorageUsage is the *usage* tenant. These
  // fields identify who owns the underlying *storage capacity*:
  //   - cold/S3 snapshots emitted by Foghorn: provider = the platform
  //     tenant operating the S3 bucket (typically frameworks).
  //   - hot edge snapshots: provider = the cluster/node owner; on the
  //     marketplace this may be a third-party operator, not frameworks.
  // Customer billing rates the usage tenant; marketplace settlement uses
  // these provider dimensions to route payouts/credits to the capacity owner.
  optional string storage_provider_tenant_id = 8;
  optional string storage_provider_cluster_id = 9;
  optional string storage_backend = 10; // 's3' | 'edge_disk' | 'r2' | 'gcs' | 'unknown'
}

message TenantStorageUsage {
  string tenant_id = 1; // Resource Consumer
  uint64 total_bytes = 2;
  uint32 file_count = 3;
  uint64 dvr_bytes = 4;
  uint64 clip_bytes = 5;
  uint64 vod_bytes = 6;
  // Frozen storage breakdown (cold storage in S3)
  uint64 frozen_dvr_bytes = 7;
  uint64 frozen_clip_bytes = 8;
  uint64 frozen_vod_bytes = 9;
}

message ClipHashRequest {
  string clip_hash = 1;
}

message ClipHashResponse {
  string clip_hash = 1;
  string tenant_id = 2;
  string stream_name = 3;
}

// DVR (Digital Video Recording) messages
message DVRStartRequest {
  string dvr_hash = 1;           // Unique DVR identifier (32-char hex) - generated by Foghorn
  string internal_name = 2;      // Stream internal name (same as stream name)
  string source_base_url = 3;    // DTSC source URL to pull from - filled by Foghorn
  string request_id = 4;         // Unique request ID for tracking
  DVRConfig config = 5;          // Recording configuration
  string tenant_id = 6;          // Tenant ID for the stream
  string user_id = 7;            // User ID for the stream
  string stream_id = 8;          // Public stream ID (UUID) - used for storage path
  // Foghorn-authoritative runtime name for the source stream Helmsman will
  // PUSH from. Derived by Foghorn's stream registry from
  // (ingest_mode, internal_name): live+<x> for push, pull+<x> for pull, bare
  // <x> for mist_native. Helmsman uses verbatim — never re-derives.
  string source_runtime_name = 9;
}

// DVRConfig is the resolved per-session DVR configuration Foghorn passes to
// the sidecar at push start. All values are resolved policy outputs from
// pkg/dvrpolicy.Resolve - the sidecar applies them verbatim and never
// interprets tier or cluster context.
message DVRConfig {
  bool enabled = 1;
  reserved 2;                              // was retention_days
  reserved "retention_days";
  string format = 3;                       // ts, mp4, etc.
  int32 segment_duration = 4;              // Mist split (seconds)
  // Live DVR rolling-window controls (Mist push parameters).
  int32 dvr_window_seconds = 5;            // Mist targetAge for the rolling playlist
  int32 max_entries = 6;                   // Mist maxEntries cap on playlist size
  // Legacy unused field. DVR sessions have no absolute expiry; Foghorn computes
  // artifact retention at FinalizeDVR from the persisted dvr_retention_days
  // snapshot and sends this as 0.
  int64 retention_until = 7;
}

message DVRProgress {
  string request_id = 1;
  string dvr_hash = 2;           // DVR identifier
  string status = 3;             // recording, segments_available, etc.
  int64 started_at = 4;          // Unix timestamp when recording started
  int32 segment_count = 5;       // Number of segments recorded so far
  uint64 size_bytes = 6;         // Total size of recording so far
  string message = 7;            // Optional progress message
}

message DVRStopped {
  string request_id = 1;
  string dvr_hash = 2;           // DVR identifier
  string status = 3;             // completed, failed, terminated
  string error = 4;              // Error message if failed
  int64 started_at = 5;          // Unix timestamp when recording started
  int64 ended_at = 6;            // Unix timestamp when recording ended
  int32 duration_seconds = 7;    // Total duration of the recording
  uint64 size_bytes = 8;         // Total size of the recording
  string manifest_path = 9;      // Path to the m3u8 manifest for playback
}

message DVRStopRequest {
  string dvr_hash = 1;           // Unique DVR identifier to stop (empty = stop all for internal_name)
  string request_id = 2;         // Request ID for tracking
  optional string internal_name = 3;  // Stream internal name (for stopping all DVR recordings for a stream)
}

// On every Mist RECORDING_SEGMENT, the sidecar records the segment with
// Foghorn before uploading. Foghorn assigns a monotonic sequence and mints
// a presigned PUT URL (recovery bridge only — chapter finalization may
// need to fetch the segment from S3 if the local TS file is gone). After
// upload, sidecar marks the row uploaded. If a segment must be evicted
// before upload (disk pressure, retention expiry), the sidecar emits
// DVRSegmentDropped(was_uploaded=false) and any chapter whose range
// overlaps the lost segment moves to state='failed_source_missing'.

// Sidecar -> Foghorn: report a new segment from RECORDING_SEGMENT.
message RecordDVRSegmentRequest {
  string request_id = 1;
  string dvr_hash = 2;            // = artifact_hash
  string segment_name = 3;        // e.g. "0001.ts"
  int64 media_start_ms = 4;       // RECORDING_SEGMENT time_started
  int64 media_end_ms = 5;         // RECORDING_SEGMENT time_ended
  int64 duration_ms = 6;          // RECORDING_SEGMENT duration_ms
  string local_path = 7;          // Absolute local file path (for retry/upload)
  string node_id = 8;
  // True only for sidecar startup reconciliation rebuilding rows from a local
  // DVR manifest with trusted PDT timing. Live RECORDING_SEGMENT writes leave
  // this false so terminal artifacts still reject new media.
  bool recovery_insert = 9;
}

// Foghorn -> sidecar: ledger row inserted, here is the upload URL.
message RecordDVRSegmentResponse {
  string request_id = 1;
  string dvr_hash = 2;
  string segment_name = 3;
  bool accepted = 4;              // false if DVR is in a terminal state (rejected)
  string reason = 5;              // populated if !accepted
  int64 sequence = 6;             // Foghorn-assigned monotonic sequence
  string s3_key = 7;
  string presigned_put_url = 8;
  int64 url_expiry_seconds = 9;
}

// Sidecar -> Foghorn: S3 upload completed; transition row to 'uploaded'.
// Fire-and-forget report; Foghorn updates the ledger row.
message MarkDVRSegmentUploaded {
  string request_id = 1;
  string dvr_hash = 2;
  string segment_name = 3;
  uint64 size_bytes = 4;          // Confirmed final size on S3
}

// Sidecar -> Foghorn: a segment has been evicted from local disk. Foghorn
// updates the ledger row to deleted_local (was_uploaded=true; chapter
// finalization can recover from S3) or lost_local (was_uploaded=false;
// any chapter overlapping the lost segment moves to
// failed_source_missing).
message DVRSegmentDropped {
  string request_id = 1;
  string dvr_hash = 2;
  string segment_name = 3;
  string reason = 4;              // disk_pressure | retention_expired | operator_cleanup
  int64 duration_ms = 5;
  int64 media_start_ms = 6;
  int64 media_end_ms = 7;
  uint64 size_bytes = 8;
  int64 dropped_at = 9;           // Unix seconds
  bool was_uploaded = 10;
  string local_path = 11;
}

// Sidecar -> Foghorn: ask for the authoritative list of segments that are
// safe to evict locally for this DVR. Used during storage-pressure passes
// so the sidecar does not guess from its local uploaded cache alone.
message EvictableSegmentsRequest {
  string request_id = 1;
  string dvr_hash = 2;
  int32 max_count = 3;            // 0 = server default; Foghorn always caps the response
}

// Foghorn -> sidecar: list of segment names safe to delete (status='uploaded'
// AND media_end_ms < now - effective_window).
message EvictableSegmentsResponse {
  string request_id = 1;
  string dvr_hash = 2;
  repeated string segment_names = 3;
}

// Foghorn -> sidecar: during finalization, ask the recording node to retry
// upload for specific pending/failed_upload segments. `segments` carries the
// authoritative ledger timing so RecordDVRSegment's strict timing match still
// protects chapter placement. `segment_names` is accepted from older callers
// only when no refs are present.
message RetryDVRSegmentUpload {
  string request_id = 1;
  string dvr_hash = 2;
  repeated string segment_names = 3;
  repeated DVRSegmentRef segments = 4;
}

// Foghorn -> Helmsman: delete local TS segment file(s) for a DVR
// recording. Issued by the chapter reclaim sweep once every chapter
// covering a segment range has reached state=frozen. Helmsman deletes
// the local files via the existing eviction primitive; the matching
// recovery-bridge S3 objects are deleted by Foghorn directly.
//
// Idempotent: missing-file responses are treated as success by Foghorn.
message ReclaimDVRSegment {
  string request_id = 1;
  string dvr_hash = 2;
  repeated string segment_names = 3;
}

// Sidecar -> Foghorn: restart reconciliation. After a sidecar restart, the
// in-memory local segment index is empty; the sidecar walks its DVR
// directories and asks Foghorn for current ledger state for each batch of
// discovered segments. Bounded by request size (the sidecar caps the batch
// at ~500 names per call) — this is the only sanctioned restart path.
// Foghorn responds with one DVRSegmentRef per requested name (status,
// uploaded_at, size, s3_key). Names not found in the ledger are omitted.
message RestoreLocalSegmentIndexRequest {
  string request_id = 1;
  string dvr_hash = 2;                // = artifact_hash
  repeated string segment_names = 3;
  string node_id = 4;
}

message RestoreLocalSegmentIndexResponse {
  string request_id = 1;
  string dvr_hash = 2;
  repeated DVRSegmentRef segments = 3;
}

// ClipDeleteRequest tells Helmsman to delete clip files from storage
message ClipDeleteRequest {
  string clip_hash = 1;          // Clip identifier to delete
  string request_id = 2;         // Request ID for tracking
}

// DVRDeleteRequest tells Helmsman to delete DVR recording files from storage
message DVRDeleteRequest {
  string dvr_hash = 1;           // DVR identifier to delete
  string request_id = 2;         // Request ID for tracking
}

// VodDeleteRequest tells Helmsman to delete VOD asset files from storage
message VodDeleteRequest {
  string vod_hash = 1;           // VOD artifact hash to delete
  string request_id = 2;         // Request ID for tracking
}

// FreezePermissionRequest is sent by Helmsman to request presigned URLs for freezing.
// Helmsman detects storage pressure but cannot access S3 directly.
message FreezePermissionRequest {
  string request_id = 1;
  string asset_type = 2;         // "clip" or "dvr"
  string asset_hash = 3;         // clip_hash or dvr_hash
  string local_path = 4;         // Local path to the asset
  uint64 size_bytes = 5;         // Size of the asset to freeze
  string node_id = 6;            // Node requesting the freeze
  repeated string filenames = 7; // For DVR: list of relative filenames to upload (e.g., "segments/0_0.ts")
}

// FreezePermissionResponse is sent by Foghorn with presigned URLs for freezing.
// If approved=false, Helmsman should not proceed (asset may be in use, etc.)
message FreezePermissionResponse {
  string request_id = 1;
  string asset_hash = 2;
  bool approved = 3;             // Whether freeze is approved
  string presigned_put_url = 4;  // Presigned PUT URL (only if approved)
  int64 url_expiry_seconds = 5;  // URL expiry time
  string reason = 6;             // Reason if not approved
  // For DVR: map of relative path -> presigned PUT URL
  map<string, string> segment_urls = 7;
  bool skip_upload = 10;         // True = evict without uploading (origin S3 has authoritative copy)
}

// Storage location enum for cold storage tracking
enum StorageLocation {
  STORAGE_LOCATION_UNSPECIFIED = 0;
  STORAGE_LOCATION_LOCAL = 1;      // Asset is on local storage only
  STORAGE_LOCATION_S3 = 2;         // Asset is on S3 only (frozen)
  STORAGE_LOCATION_FREEZING = 3;   // Asset is being uploaded to S3
  reserved 4;
  reserved "STORAGE_LOCATION_DEFROSTING";
}

// FreezeRequest tells Helmsman to upload an asset to S3 cold storage.
// Foghorn generates presigned URLs - Helmsman never sees S3 credentials.
message FreezeRequest {
  string request_id = 1;         // Request ID for tracking
  string asset_type = 2;         // "clip", "dvr", or "vod"
  string asset_hash = 3;         // clip_hash, dvr_hash, or vod_hash
  string tenant_id = 4;          // Tenant owning the asset
  string internal_name = 5;      // Stream internal name
  string local_path = 6;         // Current local file/directory path
  string presigned_put_url = 7;  // Presigned PUT URL for single-file upload
  bool delete_after_upload = 8;  // Delete local copy after successful upload
  int64 url_expiry_seconds = 9;  // When the presigned URL expires
  map<string, string> segment_urls = 10; // For DVR: relative path -> presigned PUT URL
}

// FreezeProgress reports upload progress for freezing operations
message FreezeProgress {
  string request_id = 1;
  string asset_hash = 2;
  uint32 percent = 3;            // 0..100
  uint64 bytes_uploaded = 4;
  string message = 5;
}

// FreezeComplete indicates freeze operation has finished
message FreezeComplete {
  string request_id = 1;
  string asset_hash = 2;
  string status = 3;             // "success" or "failed"
  string s3_url = 4;             // Full S3 URL (s3://bucket/key)
  uint64 size_bytes = 5;
  string error = 6;              // Error message if failed
  // local_missing=true signals the local source file is gone (ENOENT) before
  // any S3 sync. Foghorn transitions sync_status='lost_local' (terminal) and
  // stops retries. status will be "failed" in this case.
  bool local_missing = 7;
}

// DVRSegmentRef is one segment in the chapter-finalize segment list
// Foghorn hands to Helmsman. Helmsman reads the local TS file when
// available, falls back to presigned_get_url when the local copy is
// gone (recovery bridge). status semantics:
//   uploaded       : local file present + S3 freeze object exists
//   deleted_local  : local file evicted post-upload; S3 freeze is the
//                    sole source — presigned_get_url is required
//   lost_local     : local file gone before upload; presigned_get_url
//                    may be empty (terminal source loss). Chapters
//                    overlapping a lost_local row without a recovery
//                    URL move to state='failed_source_missing'.
message DVRSegmentRef {
  string segment_name = 1;
  string s3_key = 2;
  string presigned_get_url = 3;       // empty for lost_local
  int64  media_start_ms = 4;
  int64  media_end_ms = 5;
  int64  duration_ms = 6;
  string status = 7;                  // 'uploaded' | 'lost_local' | 'deleted_local' | 'orphan_unreachable'
  int64  sequence = 8;                // foghorn.dvr_segments.sequence for HLS media sequence
  int64  size_bytes = 9;              // foghorn.dvr_segments.size_bytes; 0 = unknown
}

// CanDeleteRequest is sent by Helmsman to check if a local asset can be safely deleted.
// Under dual-storage model, deletion is only safe if the asset is synced to S3.
message CanDeleteRequest {
  string asset_hash = 1;         // clip_hash or dvr_hash
  string node_id = 2;            // Node asking to delete
}

// CanDeleteResponse tells Helmsman whether local deletion is safe
message CanDeleteResponse {
  string asset_hash = 1;
  bool safe_to_delete = 2;       // True if asset is synced to S3
  string reason = 3;             // "synced", "sync_pending", "sync_failed", "not_found"
  int64 warm_duration_ms = 4;    // How long asset was cached (for EVICTED lifecycle events)
}

// RelayResolveRequest is sent by Helmsman to Foghorn to look up the durable
// source coordinates of an artifact for the /internal/artifact/* HTTP relay.
// The relay URL only encodes (kind, hash, ext); the actual S3 presigned URLs,
// expected size, and (for DVR) chapter segment refs come from this resolve.
//
// Lifecycle: relay HTTP server calls this on first request per (asset, session)
// and caches the response in memory for url_ttl_seconds * 0.8, then refreshes
// mid-playback on TTL expiry to handle sessions outliving the first presigned
// URL.
message RelayResolveRequest {
  string request_id = 1;
  string asset_kind = 2;         // "vod" | "clip" | "dvr" | "upload"
  string asset_hash = 3;         // artifact_hash / upload_hash / dvr_hash
  reserved 4;                    // retired chapter_id — chapter playback is addressed as the chapter's own VOD artifact
  reserved "chapter_id";
  string ext = 5;                // "mp4" | "mkv" | "m3u8" | ...
  // Read-pattern hint for sidecar admission policy. Foghorn echoes this back
  // in policy_hint when it has a stronger opinion (e.g., processing input is
  // always sequential one-shot regardless of caller).
  enum RelayHint {
    RELAY_HINT_UNSPECIFIED        = 0;
    RELAY_HINT_RANDOM_ACCESS      = 1; // playback — seekable, replayable
    RELAY_HINT_SEQUENTIAL_ONESHOT = 2; // processing input — read once
  }
  RelayHint hint = 6;
  string node_id = 7;            // For locality decisions
}

// RelayResolveResponse carries the durable source plus optional sidecar/.dtsh
// URLs and (for DVR) the full chapter segment ref list. AssetState lets the
// relay handle missing/active/gap cases without inferring from absent fields.
message RelayResolveResponse {
  string request_id = 1;
  string asset_hash = 2;
  AssetState state = 3;
  string media_presigned_url = 4; // S3 GET, range-capable (HEAD + Range)
  string dtsh_presigned_get = 5;  // empty if no sidecar yet
  string dtsh_presigned_put = 6;  // for Mist-generated .dtsh write-back
  uint64 expected_size_bytes = 7;
  string content_type = 8;
  int64 url_ttl_seconds = 9;      // for refresh on long playbacks
  reserved 10;                       // retired chapter_segments — chapter playback is the chapter VOD artifact, not a synthesized HLS manifest
  reserved "chapter_segments";
  // Foghorn's recommendation for admission policy. Sidecar honors as a hint;
  // local pressure/intent still overrides.
  enum CacheDecisionHint {
    CACHE_HINT_UNSPECIFIED = 0;
    CACHE_HINT_PREFER_DISK = 1;   // playback, replayable
    CACHE_HINT_PREFER_MEM  = 2;   // processing input, one-shot
  }
  CacheDecisionHint policy_hint = 11;
  string error = 12;              // populated when state != ASSET_STATE_PLAYABLE
  // Mist routing name owning this artifact. For DVR this is the stream the
  // recording belongs to; on-disk DVR layout nests as
  // storage/dvr/<stream_internal_name>/<dvr_hash>/{chapters,segments} so the
  // relay needs this value to find warm local files and write cold fills to
  // the same canonical location the freeze/relay paths use. For VOD/clip
  // this is the Mist internal_name (vod+<name>) that addresses the artifact.
  string stream_internal_name = 13;

  // Peer-relay fallback: when an artifact is hot on its origin node but
  // not yet synced to S3, Foghorn returns a URL pointing at that origin
  // node's Helmsman in place of media_presigned_url. The block-cache
  // fetcher uses this URL exactly like an S3 URL but attaches the
  // accompanying token as Authorization: Bearer. When peer_relay_url
  // is set, media_presigned_url is empty.
  string peer_relay_url = 14;
  string peer_relay_auth_token = 15;
}

// AssetState tells the relay how to dispose of a resolve. Drives the
// active-DVR refuse-S3 rule and HLS gap marker rendering.
enum AssetState {
  ASSET_STATE_UNSPECIFIED    = 0;
  ASSET_STATE_PLAYABLE       = 1; // resolved; media_presigned_url is valid
  ASSET_STATE_SOURCE_MISSING = 2; // no durable source → 404/500
  ASSET_STATE_ACTIVE_DVR     = 3; // active DVR; rolling-window playback rules
  reserved 4;                     // retired ASSET_STATE_GAP — chapter artifacts are all-or-nothing; lost segments move the chapter to state='failed_source_missing' instead of emitting a per-segment gap
  reserved "ASSET_STATE_GAP";
}

// SyncComplete indicates a sync (upload to S3 while keeping local) has finished.
// Semantically different from FreezeComplete: sync keeps local copy.
message SyncComplete {
  string request_id = 1;
  string asset_hash = 2;
  string status = 3;             // "success" or "failed"
  string s3_url = 4;             // Full S3 URL (s3://bucket/key)
  uint64 size_bytes = 5;
  string error = 6;              // Error message if failed
  string node_id = 7;            // Node that initiated the sync
  bool dtsh_included = 8;        // True if .dtsh index file was included in sync
  // local_missing=true signals the local source file is gone (ENOENT). Foghorn
  // transitions sync_status='lost_local' (terminal) and stops retries. status
  // will be "failed" in this case.
  bool local_missing = 9;
}

// DtshSyncRequest is sent by Foghorn to Helmsman to request uploading just the .dtsh file.
// This is used when .dtsh appeared after the main asset was already synced to S3.
message DtshSyncRequest {
  string request_id = 1;         // Request ID for tracking
  string asset_type = 2;         // "clip" or "dvr"
  string asset_hash = 3;         // clip_hash or dvr_hash
  string local_path = 4;         // Path to the main asset (append .dtsh for clip, or directory for DVR)
  string presigned_put_url = 5;  // Presigned PUT URL for uploading the .dtsh file
  int64 url_expiry_seconds = 6;  // When the presigned URL expires
  // For DVR: map of .dtsh filename -> presigned URL (since DVR can have multiple .dtsh files)
  map<string, string> dtsh_urls = 7;
}

// StorageLifecycleData is emitted for analytics/observability of storage sync operations
// Dual-storage model: S3 is authoritative backup, local disk is cache
message StorageLifecycleData {
  enum Action {
    ACTION_UNSPECIFIED = 0;
    ACTION_SYNC_STARTED = 1;  // Upload to S3 started (local copy retained)
    ACTION_SYNCED = 2;        // Upload to S3 completed (local copy retained)
    ACTION_EVICTED = 3;       // Local copy deleted (S3 has authoritative copy)
    ACTION_CACHE_STARTED = 4; // Download from S3 started (refilling local cache)
    ACTION_CACHED = 5;        // Downloaded from S3 to local cache (S3 copy retained)
    ACTION_DELETED = 6;       // Asset deleted from both S3 and local (permanent removal)
    ACTION_SYNC_FAILED = 7;   // Upload to S3 failed (local copy retained)
    ACTION_EVICT_FAILED = 8;  // Local cache eviction failed
    ACTION_CACHE_FAILED = 9;  // Read-through cache fill from S3 failed
    ACTION_LOCAL_MISSING = 10; // Local source file is gone before any sync; terminal.
                               // Foghorn transitions sync_status='lost_local' and stops retries.
  }
  Action action = 1;
  string asset_type = 2;         // "clip" or "dvr"
  string asset_hash = 3;         // clip_hash or dvr_hash
  optional string tenant_id = 4;
  optional string internal_name = 5;
  optional string stream_id = 13;      // Enriched by Foghorn (UUID)
  uint64 size_bytes = 6;
  optional string s3_url = 7;
  optional string local_path = 8;
  optional string node_id = 9;
  optional string error = 10;
  optional int64 duration_ms = 11;      // How long the operation took (sync/cache fill duration)
  optional int64 warm_duration_ms = 12; // For EVICTED: how long asset was cached before eviction
  optional string cluster_id = 14;          // Cluster where the storage operation happened
  optional string origin_cluster_id = 15;   // Cluster that originally created the artifact
  optional bool dtsh_included = 17;         // True when the S3 sync included a Mist .dtsh index.
  // Typed failure reason for CACHE_FAILED rows so analytics can
  // distinguish "out of space" from "S3 5xx'd" from "local IO error."
  enum CacheFailureReason {
    CACHE_REASON_UNSPECIFIED        = 0;
    CACHE_REASON_INSUFFICIENT_SPACE = 1;  // Eviction tried; still not enough room
    CACHE_REASON_DOWNLOAD_ERROR     = 2;  // presigned GET / network / S3
    CACHE_REASON_LOCAL_IO           = 3;  // mkdir/create/rename failed for non-space reasons
    CACHE_REASON_PRESIGNED_INVALID  = 4;  // missing/expired URL
  }
  optional CacheFailureReason reason = 16;
}

// Typed MistServer trigger messages (matches mist package structures)

message PushRewriteTrigger {
  string push_url = 1;
  string hostname = 2;
  string stream_name = 3;

  // Enrichment fields for analytics (populated by Foghorn)
  optional string protocol = 4;
  optional string encoder = 5;
  optional string stream_settings = 6;
  optional string node_id = 7;
  optional double latitude = 8;          // Node latitude
  optional double longitude = 9;         // Node longitude
  optional string location = 10;         // Node location name

  // Publisher GeoIP enrichment (from hostname IP)
  optional string publisher_country_code = 11;
  optional string publisher_city = 12;
  optional double publisher_latitude = 13;
  optional double publisher_longitude = 14;
  optional GeoBucket publisher_bucket = 15;
  optional GeoBucket node_bucket = 16;
  optional string stream_id = 17; // Enriched by Foghorn (UUID)
}

// ViewerResolveTrigger represents a viewer-side resolve of a playback request.
// This is NOT publisher ingest. It fires when a viewer requests a stream by
// playback ID or artifact hash; enrichment may include geo and node context.
message ViewerResolveTrigger {
  string requested_stream = 2; // playback ID or artifact hash (original request)
  string viewer_host = 3;      // viewer IP/host
  string output_type = 4;      // HLS/DASH/WebRTC
  string request_url = 5;

  // Enrichment (by Foghorn). Do not replace the payload type; enrich in-place.
  optional string node_id = 6;
  optional string country_code = 7;
  optional string city = 8;
  optional double latitude = 9;
  optional double longitude = 10;
  optional GeoBucket client_bucket = 11;
  optional GeoBucket node_bucket = 12;

  // Resolved internal name (UUID format, no live+ prefix) for analytics correlation.
  // This is the canonical stream identifier that matches across all analytics tables.
  optional string resolved_internal_name = 13;

  // Node location name (e.g., "us-east-1", "Frankfurt") - enriched by Foghorn
  optional string node_location = 14;

  // Public stream ID (UUID) for external correlation
  optional string stream_id = 15;
}

message StreamSourceTrigger {
  string stream_name = 1;
  optional string stream_id = 2; // Public stream ID (UUID) if known
}

message StreamProcessTrigger {
  string stream_name = 1;
}

message PushOutStartTrigger {
  string stream_name = 1;
  string push_target = 2;
  optional string node_id = 3;
  optional string stream_id = 4; // Enriched by Foghorn (UUID)
}

message PushEndTrigger {
  int64 push_id = 1;
  string stream_name = 2;
  string target_uri_before = 3;
  string target_uri_after = 4;
  string log_messages = 5;
  string push_status = 6;
  optional string node_id = 7;
  optional string stream_id = 8; // Enriched by Foghorn (UUID)
}

// PushInputCloseTrigger is emitted by MistServer when a publisher input
// process exits (RTMP/SRT/WebRTC publisher disconnected or pushed input
// closed). This is the source-presence "publisher gone" edge Foghorn's
// admission state machine uses to flip source_active=false on the owner
// entry. Distinct from PUSH_END (which fires for outbound push targets)
// and from STREAM_END (which fires only after viewer activity also drains).
//
// Payload order verified against MistServer source
// (src/controller/controller_capabilities.cpp:457 and
// src/output/output.cpp:2209):
//   stream name (string), remote host (string), binary name (string),
//   pid (integer), machine-readable reason (string, enum),
//   human-readable reason (string), tracks JSON (object).
message PushInputCloseTrigger {
  string stream_name = 1;
  string remote_host = 2;
  string binary_name = 3;    // e.g. "MistInRTMP", "MistInDTSC"
  int64  pid = 4;
  string machine_reason = 5; // short programmatic token
  string human_reason = 6;   // free-text
  string tracks_json = 7;    // raw JSON Mist provides; parsed downstream only if needed
  optional string node_id = 8;
  optional string stream_id = 9; // Enriched by Foghorn (UUID)
}

// ViewerConnectTrigger (formerly USER_NEW) indicates a viewer connection.
message ViewerConnectTrigger {
  string stream_name = 1;
  // host contains the client's connection IP address from MistServer.
  // Used for GeoIP enrichment; geographic data is preserved while
  // raw IP is redacted downstream for privacy.
  string host = 2;
  // viewer_token is the bearer token MistServer extracted from the viewer
  // request: ?jwt=, ?tkn=, ?sid=, ?sessId=, Cookie: jwt=/tkn=, or
  // Authorization: Bearer. Source: MistServer session.cpp:272 (USER_NEW
  // payload field 3). Used by Foghorn's playback-policy enforcer.
  string viewer_token = 3;
  string connector = 4;
  string request_url = 5;
  string session_id = 6;

  // Enrichment fields (populated by Foghorn)
  optional string node_id = 7;
  reserved 8;  // Removed: client_ip was never populated (IP lives in 'host')
  optional string client_country = 9;
  optional string client_city = 10;
  optional double client_latitude = 11;
  optional double client_longitude = 12;
  optional GeoBucket client_bucket = 13;
  optional GeoBucket node_bucket = 14;
  optional string stream_id = 15; // Enriched by Foghorn (UUID)
}

// ViewerDisconnectTrigger (formerly USER_END) indicates a viewer disconnect.
message ViewerDisconnectTrigger {
  string session_id = 1;
  string stream_name = 2;
  string connector = 3;
  string host = 4;
  int64 duration = 5;
  int64 up_bytes = 6;
  int64 down_bytes = 7;
  string tags = 8;
  
  // Enrichment fields for analytics (populated by Foghorn)
  optional string node_id = 9;
  optional string country_code = 10;
  optional string city = 11;
  optional double latitude = 12;
  optional double longitude = 13;
  optional string session_identifier = 14;
  optional uint64 seconds_connected = 15;
  optional GeoBucket client_bucket = 16;
  optional GeoBucket node_bucket = 17;
  optional string stream_id = 18; // Enriched by Foghorn (UUID)

  // MistServer USER_END breakdown arrays (preserved from
  // src/session.cpp's emission of streamSummary / connectorSummary /
  // hostSummary alongside streamTimes / connectorTimes / hostTimes).
  // For multi-stream sessions the scalar `stream_name`, `connector`,
  // and `host` fields above carry the comma-joined summary string;
  // these arrays expose the actual per-element seconds so downstream
  // attribution can split a single session across the streams /
  // connectors / hosts it touched.
  repeated SessionTimeShare stream_times = 19;
  repeated SessionTimeShare connector_times = 20;
  repeated SessionTimeShare host_times = 21;
}

// SessionTimeShare is one (name, seconds) entry from a MistServer
// USER_END breakdown array. `name` is the stream / connector / host
// identifier; `seconds` is the time the viewer spent on it.
message SessionTimeShare {
  string name = 1;
  uint32 seconds = 2;
}

message StreamBufferTrigger {
  string stream_name = 1;
  string buffer_state = 2;
  // Fully typed stream details (no more JSON strings)
  repeated StreamTrack tracks = 3;
  // REMOVED: health_score = 4 (derived metric, use raw signals instead)
  optional bool has_issues = 5;
  optional string issues_description = 6;
  optional int32 track_count = 7;
  optional string quality_tier = 8;
  // Top-level health wrapper fields from MistServer (stream-wide summary)
  optional int32 stream_buffer_ms = 9;      // health.buffer (overall buffer in ms)
  optional int32 stream_jitter_ms = 10;     // health.jitter (max jitter across tracks)
  optional string mist_issues = 11;         // health.issues (Mist's issue string, e.g. "HLSnoaudio!")
  optional int32 max_keepaway_ms = 12;      // health.maxkeepaway (max viewer distance from live)
  optional string stream_id = 13;          // Enriched by Foghorn (UUID)
}

message StreamEndTrigger {
  string stream_name = 1;
  optional int64 downloaded_bytes = 2;
  optional int64 uploaded_bytes = 3;
  optional int64 total_viewers = 4;
  optional int64 total_inputs = 5;
  optional int64 total_outputs = 6;
  optional int64 viewer_seconds = 7;
  optional string node_id = 8;
  optional string stream_id = 9;           // Enriched by Foghorn (UUID)
}

// StreamTrackListTrigger (formerly LIVE_TRACK_LIST) provides track inventory.
message StreamTrackListTrigger {
  string stream_name = 1;
  // Fully typed track list (no more JSON strings)
  repeated StreamTrack tracks = 2;
  optional int32 total_tracks = 3;
  optional int32 video_track_count = 4;
  optional int32 audio_track_count = 5;
  optional string quality_tier = 6;
  // Primary video track info
  optional int32 primary_width = 7;
  optional int32 primary_height = 8;
  optional double primary_fps = 9;
  optional int32 primary_video_bitrate = 10;
  optional string primary_video_codec = 11;
  // Primary audio track info
  optional int32 primary_audio_bitrate = 12;
  optional string primary_audio_codec = 13;
  optional int32 primary_audio_channels = 14;
  optional int32 primary_audio_sample_rate = 15;
  optional string stream_id = 16;          // Enriched by Foghorn (UUID)
}

// RecordingCompleteTrigger (formerly RECORDING_END) indicates recorder completion.
message RecordingCompleteTrigger {
  string stream_name = 1;
  string file_path = 2;
  string output_protocol = 3;
  int64 bytes_written = 4;
  int64 seconds_writing = 5;
  int64 time_started = 6;
  int64 time_ended = 7;
  int64 media_duration_ms = 8;
  
  // Enrichment fields for analytics (populated by Foghorn)
  optional string node_id = 9;
  optional string stream_id = 10;       // Enriched by Foghorn (UUID)
}

// RecordingSegmentTrigger (RECORDING_SEGMENT) indicates a new segment has been written.
message RecordingSegmentTrigger {
  string stream_name = 1;
  string file_path = 2;
  int64 duration_ms = 3;
  int64 time_started = 4;
  int64 time_ended = 5;
  optional string stream_id = 6;        // Enriched by Foghorn (UUID)
}

// Analytics event messages for forwarding to Decklog
message StreamLifecycleUpdate {
  string node_id = 1;
  optional string tenant_id = 2;        // Optional - enriched by Foghorn via Commodore lookup
  string internal_name = 3;
  string status = 4;                    // "live", "offline"
  optional string buffer_state = 5;     // "FULL", "EMPTY", "DRY", "RECOVER"
  optional uint64 uploaded_bytes = 6;
  optional uint64 downloaded_bytes = 7;
  optional uint32 total_viewers = 8;
  optional uint32 total_inputs = 9;
  optional uint64 viewer_seconds = 10;
  optional string stream_details = 11;  // JSON health data
  int64 timestamp = 12;

  // Quality metrics (calculated by Helmsman from MistServer data)
  // REMOVED: health_score = 13 (derived metric, use raw signals instead)
  optional bool has_issues = 14;
  optional string issues_description = 15;
  optional int32 track_count = 16;
  optional string quality_tier = 17;    // "2160p", "1440p", "1080p", "720p", "480p", "SD"
  optional int32 primary_width = 18;
  optional int32 primary_height = 19;
  optional float primary_fps = 20;
  optional string primary_codec = 21;
  optional int32 primary_bitrate = 22;

  // Stream timing (populated by Foghorn from state manager)
  optional int64 started_at = 23;       // Unix timestamp when stream went live

  // Packet statistics (from MistServer active_streams API - packsent/packloss/packretrans)
  optional uint64 packets_sent = 24;
  optional uint64 packets_lost = 25;

  // Replication status (true if this is a pull/replicated stream)
  optional bool replicated = 26;

  // Additional packet stat (packretrans from MistServer active_streams API)
  optional uint64 packets_retransmitted = 27;

  // Buffer health metrics (from health blob - top level fields)
  optional uint32 buffer_ms = 28;          // health.buffer - available buffer in ms
  optional uint32 jitter_ms = 29;          // health.jitter - highest jitter across tracks
  optional uint32 max_keepaway_ms = 30;    // health.maxkeepaway - max distance from live point

  // Full track details as JSON (serialized trackDetails array for storage)
  optional string track_details_json = 31;

  // Primary audio track metrics (first audio track found)
  optional uint32 audio_channels = 32;
  optional uint32 audio_sample_rate = 33;
  optional string audio_codec = 34;
  optional uint32 audio_bitrate = 35;

  // Per-track buffer/jitter for primary video track
  optional uint32 video_buffer_ms = 36;
  optional uint32 video_jitter_ms = 37;
  optional string stream_id = 38;          // Enriched by Foghorn (UUID); REQUIRED for analytics joins
}

message ClientLifecycleUpdate {
  string node_id = 1;
  optional string tenant_id = 2;        // Optional - enriched by Foghorn via Commodore lookup
  string internal_name = 3;
  string action = 4;                    // "connect", "disconnect"
  string protocol = 5;
  // host contains the client's connection IP address.
  // Used for GeoIP enrichment before downstream redaction.
  string host = 6;
  optional string session_id = 7;
  optional float connection_time = 8;
  optional float position = 9;
  optional uint64 bandwidth_in_bps = 10;
  optional uint64 bandwidth_out_bps = 11;
  optional uint64 bytes_downloaded = 12;
  optional uint64 bytes_uploaded = 13;
  optional uint64 packets_sent = 14;
  optional uint64 packets_lost = 15;
  optional uint64 packets_retransmitted = 16;
  int64 timestamp = 17;

  // Client geo fields (enriched by Foghorn from 'host' field)
  reserved 18;  // Removed: client_ip was never populated (IP lives in 'host')
  optional string client_country = 19;  // GeoIP enriched country
  optional string client_city = 20;     // GeoIP enriched city  
  optional double client_latitude = 21; // GeoIP enriched latitude
  optional double client_longitude = 22;// GeoIP enriched longitude
  optional string stream_id = 23;       // Enriched by Foghorn (UUID); REQUIRED for analytics joins
  optional string event_id = 24;        // Helmsman-generated UUID per sample; row-level dedup key
}

// ClientLifecycleBatch carries N enriched ClientLifecycleUpdate samples for a
// single (tenant_id, stream_id, node_id) key. Foghorn coalesces enriched
// samples and forwards as one MistTrigger so Decklog/Kafka/ClickHouse handle
// one record per batch instead of one per sample.
message ClientLifecycleBatch {
  optional string tenant_id = 1;
  optional string stream_id = 2;
  string internal_name = 3;
  string node_id = 4;
  int64 window_start = 5;
  int64 window_end = 6;
  repeated ClientLifecycleUpdate samples = 7;
}

enum NodeOperationalMode {
  NODE_OPERATIONAL_MODE_UNSPECIFIED = 0;
  NODE_OPERATIONAL_MODE_NORMAL = 1;
  NODE_OPERATIONAL_MODE_DRAINING = 2;
  NODE_OPERATIONAL_MODE_MAINTENANCE = 3;
}

message NodeLifecycleUpdate {
  string node_id = 1;
  // Resource metrics
  uint32 cpu_tenths = 2;         // 0-1000
  uint64 ram_max = 3;            // bytes
  uint64 ram_current = 4;        // bytes
  uint64 shm_total_bytes = 5;
  uint64 shm_used_bytes = 6;
  uint64 disk_total_bytes = 7;
  uint64 disk_used_bytes = 8;
  uint64 up_speed = 9;           // bytes/sec
  uint64 down_speed = 10;        // bytes/sec
  uint64 bw_limit = 11;          // bytes/sec
  
  // Geo/location
  double latitude = 12;
  double longitude = 13;
  string location = 14;
  uint32 active_streams = 15;
  
  // Extended metrics (matching HTTP payload)
  string base_url = 16;
  bool is_healthy = 17;
  string event_type = 18;
  int64 timestamp = 19;
  
  // Node capabilities
  NodeCapabilities capabilities = 20;
  
  // Storage information
  StorageInfo storage = 21;
  
  // Node limits and usage
  NodeLimits limits = 22;
  
  // Stream metrics
  map<string, StreamData> streams = 23;
  
  // Stored artifacts
  repeated StoredArtifact artifacts = 24;
  
  // MistServer outputs configuration (parsed from the Mist metrics endpoint)
  string outputs_json = 25;
  
  // Enrichment fields added by Foghorn
  optional string tenant_id = 26;

  // Cumulative bandwidth counters (bytes since server start)
  uint64 bandwidth_in_total = 27;   // bw[1] - total bytes received
  uint64 bandwidth_out_total = 28;  // bw[0] - total bytes sent

  // Current active viewer connections
  uint32 connections_current = 29;  // curr[0] - current viewer count

  // Database UUID (enriched by Foghorn via Quartermaster lookup)
  optional string node_uuid = 30;

  repeated EdgeComponentVersion component_versions = 31;

  // MistServer trigger health statistics (for debugging/monitoring)
  string triggers_json = 40;        // {"STREAM_BUFFER": {count, fails, ms}, ...}

  // Extended connection breakdown from MistServer curr array
  uint32 connections_inputs = 41;    // curr[1] - input connections
  uint32 connections_outgoing = 42;  // curr[2] - outgoing connections

  // Operational mode (maintenance/draining) provided by Helmsman.
  NodeOperationalMode operational_mode = 43;

  uint32 connections_cached = 44;    // curr[4] - cached connections

  // Runtime placement metadata for edge release selection.
  string deploy_mode = 45;           // native | docker
  string os = 46;                    // runtime.GOOS
  string arch = 47;                  // runtime.GOARCH
}

// Load balancing specific data (no trigger equivalent - generated by Foghorn routing)
message LoadBalancingData {
