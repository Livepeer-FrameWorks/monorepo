// Clip lifecycle specific data (separate from ClipProgress/ClipDone control messages)
//
// FOGHORN ENRICHMENT REQUIRED:
// When forwarding clip lifecycle events to Decklog, Foghorn must enrich with:
// - tenant_id, internal_name (already done)
// - start_unix, stop_unix, start_ms, stop_ms, duration_sec from original ClipPullRequest
// These fields must be included in ALL lifecycle stages (REQUESTED, PROGRESS, DONE, FAILED)
// so that Periscope can track clip state without needing to merge events.
message ClipLifecycleData {
  enum Stage {
    STAGE_UNSPECIFIED = 0;
    STAGE_REQUESTED = 1;
    STAGE_QUEUED = 2;
    STAGE_PROGRESS = 3;
    STAGE_DONE = 4;
    STAGE_FAILED = 5;
    STAGE_DELETED = 6;
  }
  Stage stage = 1;
  string clip_hash = 2;
  optional string request_id = 3;
  optional uint32 progress_percent = 4;
  optional string file_path = 5;
  optional string s3_url = 6;
  optional uint64 size_bytes = 7;
  optional string error = 8;
  optional int64 started_at = 9;
  optional int64 completed_at = 10;
  optional string node_id = 11;
  // Enrichment fields added by Foghorn
  optional string tenant_id = 12;
  optional string stream_internal_name = 13; // Source stream's MistServer routing name (for analytics attribution)
  // Clip time boundaries (enriched by Foghorn from original ClipPullRequest)
  optional int64 start_unix = 14;
  optional int64 stop_unix = 15;
  optional int64 start_ms = 16;
  optional int64 stop_ms = 17;
  optional int64 duration_sec = 18;
  // Clip creation mode (enriched by Foghorn)
  optional string clip_mode = 19;
  optional int64 expires_at = 20;
  optional string stream_id = 21;      // Public stream ID (UUID)
  optional string user_id = 22;        // User who initiated the clip (if known)
  optional string origin_cluster_id = 23;  // Cluster where clip was originally created
  optional string serving_cluster_id = 24; // Cluster serving the clip to the viewer
  optional string storage_location = 25;
  optional string sync_status = 26;
  optional bool is_hot = 27;
  optional bool is_synced = 28;
  optional bool is_finalized = 29;
  optional bool is_frozen = 30;
}

// DVR lifecycle specific data (separate from DVR control messages)
//
// FOGHORN ENRICHMENT REQUIRED:
// When forwarding DVR lifecycle events to Decklog, Foghorn must enrich with:
// - tenant_id, internal_name (already done)
// - started_at, ended_at from DVRStartRequest/DVRStopped (time boundaries)
// These fields must be included in ALL lifecycle statuses so that Periscope
// can track DVR state without needing to merge events.
message DVRLifecycleData {
  enum Status {
    STATUS_UNSPECIFIED = 0;
    STATUS_STARTED = 1;
    STATUS_RECORDING = 2;
    STATUS_STOPPED = 3;
    STATUS_FAILED = 4;
    STATUS_DELETED = 5;
  }
  Status status = 1;
  string dvr_hash = 2;
  optional string manifest_path = 3;
  optional int64 started_at = 4;       // Unix timestamp when recording started
  optional int64 ended_at = 5;         // Unix timestamp when recording ended
  optional uint64 size_bytes = 6;
  optional int32 segment_count = 7;
  optional string error = 8;
  optional string node_id = 9;
  // Enrichment fields added by Foghorn
  optional string tenant_id = 10;
  optional string stream_internal_name = 11; // Source stream's MistServer routing name (for analytics attribution)
  optional int64 expires_at = 12;
  optional string stream_id = 13;      // Public stream ID (UUID)
  optional string user_id = 14;        // User who initiated the DVR (if known)
  optional string origin_cluster_id = 15;  // Cluster where DVR recording started
  optional string serving_cluster_id = 16; // Cluster serving the DVR to the viewer
  optional string storage_location = 17;
  optional string sync_status = 18;
  optional bool is_hot = 19;
  optional bool is_synced = 20;
  optional bool is_finalized = 21;
  optional bool is_frozen = 22;
}

// VOD lifecycle specific data (for user-uploaded video assets)
//
// VOD uploads differ from clips/DVR:
// - User uploads directly to S3 via presigned URLs (no MistServer involved)
// - Foghorn manages upload state and emits lifecycle events to Decklog
// - Periscope Ingest writes to live_artifacts with content_type='vod'
// - Gateway enriches VOD metadata from Periscope via ArtifactLifecycleLoader
message VodLifecycleData {
  enum Status {
    STATUS_UNSPECIFIED = 0;
    STATUS_REQUESTED = 1;    // Upload session created, presigned URLs generated
    STATUS_UPLOADING = 2;    // Parts being uploaded (optional progress tracking)
    STATUS_PROCESSING = 3;   // Upload complete, validation/transcoding in progress
    STATUS_COMPLETED = 4;    // Asset ready for playback
    STATUS_FAILED = 5;       // Upload or processing failed
    STATUS_DELETED = 6;      // Asset deleted
  }
  Status status = 1;
  string vod_hash = 2;                    // Artifact hash (from Commodore)
  optional string upload_id = 3;          // S3 multipart upload ID
  optional string filename = 4;
  optional string content_type = 5;       // MIME type (video/mp4, etc.)
  optional uint64 size_bytes = 6;         // Expected or actual size
  optional string s3_url = 7;             // Final S3 URL when completed
  optional string file_path = 8;          // Local file path (if applicable)
  optional string error = 9;
  optional int64 started_at = 10;         // When upload started
  optional int64 completed_at = 11;       // When upload/processing completed
  optional string node_id = 12;           // Processing node (if any)
  // Enrichment fields
  optional string tenant_id = 13;
  optional string user_id = 14;
  optional int64 expires_at = 15;         // Retention expiration
  // Media metadata (populated after processing)
  optional int64 duration_ms = 16;
  optional string resolution = 17;        // "1920x1080"
  optional string video_codec = 18;
  optional string audio_codec = 19;
  optional int32 bitrate_kbps = 20;
  optional string origin_cluster_id = 21;  // Cluster where VOD was uploaded
  optional string serving_cluster_id = 22; // Cluster serving the VOD to the viewer
  optional int32 progress_pct = 23;        // 0-100 processing progress (STATUS_PROCESSING only)
  optional string storage_location = 24;
  optional string sync_status = 25;
  optional bool is_hot = 26;
  optional bool is_synced = 27;
  optional bool is_finalized = 28;
  optional bool is_frozen = 29;
}

// MessageLifecycleData tracks support messaging events for real-time UI updates
// Emitted by Deckhand when Chatwoot webhook events are received
message MessageLifecycleData {
  enum EventType {
    EVENT_TYPE_UNSPECIFIED = 0;
    EVENT_TYPE_MESSAGE_CREATED = 1;     // New message in conversation
    EVENT_TYPE_CONVERSATION_CREATED = 2; // New conversation started
    EVENT_TYPE_CONVERSATION_UPDATED = 3; // Status changed (resolved, pending)
    EVENT_TYPE_MESSAGE_UPDATED = 4;      // Message edited
  }
  EventType event_type = 1;
  string conversation_id = 2;           // Chatwoot conversation ID
  optional string message_id = 3;       // Chatwoot message ID (for message events)
  optional string content = 4;          // Message content (for message_created)
  optional string sender = 5;           // "USER" or "AGENT"
  optional string status = 6;           // Conversation status: "OPEN", "RESOLVED", "PENDING"
  optional string subject = 7;          // Conversation subject
  int64 timestamp = 8;                  // When event occurred
  optional string tenant_id = 9;        // Tenant context
  optional string user_id = 10;         // User context
}

// Federation operation events emitted by Foghorn for cross-cluster analytics.
// Covers origin-pull replication lifecycle, peer topology changes,
// QueryStream fan-out, and loop prevention.
enum FederationEventType {
  FEDERATION_EVENT_UNSPECIFIED = 0;
  ORIGIN_PULL_ARRANGED = 1;         // arrangeOriginPull() succeeded; DTSC pull initiated
  ORIGIN_PULL_COMPLETED = 2;        // Replicated stream detected as live on local edge
  ORIGIN_PULL_FAILED = 3;           // arrangeOriginPull() failed (RPC error, rejected, no capacity)
  FEDERATION_QUERY = 4;             // queryStreamFanOut() completed
  PEER_CONNECTED = 5;               // PeerChannel established to remote cluster
  PEER_DISCONNECTED = 6;            // PeerChannel lost (error or missed heartbeats)
  LEADER_ACQUIRED = 7;              // Redis leader lease acquired for PeerManager
  LEADER_LOST = 8;                  // Redis leader lease lost
  REPLICATION_LOOP_PREVENTED = 9;   // Loop check blocked a redundant origin-pull
}

message FederationEventData {
  FederationEventType event_type = 1;
  optional string tenant_id = 2;
  string local_cluster = 3;
  string remote_cluster = 4;
  optional string stream_name = 5;
  optional string stream_id = 6;
  // Replication fields
  optional string source_node = 7;
  optional string dest_node = 8;
  optional string dtsc_url = 9;
  optional float latency_ms = 10;
  optional float time_to_live_ms = 11;
  optional string failure_reason = 12;
  // Query fan-out fields
  optional uint32 queried_clusters = 13;
  optional uint32 responding_clusters = 14;
  optional uint32 total_candidates = 15;
  optional uint64 best_remote_score = 16;
  // Topology fields
  optional string peer_cluster = 17;
  optional string role = 18;
  optional string reason = 19;
  // Loop prevention fields
  optional string blocked_cluster = 20;
  optional string existing_replication_cluster = 21;
  // Geo (from foghorn self-GeoIP + peer geo cache)
  optional double local_lat = 22;
  optional double local_lon = 23;
  optional double remote_lat = 24;
  optional double remote_lon = 25;
}

message NodeCapabilities {
  bool ingest = 1;
  bool edge = 2;
  bool storage = 3;
  bool processing = 4;
  repeated string roles = 5;
}

// Processing configuration sent from Foghorn to Helmsman
// Enables MistProcLivepeer when Gateway is available
message ProcessingConfig {
  bool livepeer_gateway_available = 1;
  string livepeer_gateway_url = 2;      // e.g., "http://livepeer-gateway:8935"
  repeated string gateway_input_codecs = 3;  // ["H264"] - what Gateway accepts
  repeated string local_input_codecs = 4;    // ["H264", "H265", "AV1", "VP9"] - what local MistServer accepts
}

// ProcessBillingEvent tracks transcoding usage for billing purposes
// Emitted by Helmsman when MistServer triggers fire:
// - LIVEPEER_SEGMENT_COMPLETE for Livepeer Gateway transcoding
// - PROCESS_AV_VIRTUAL_SEGMENT_COMPLETE for MistProcAV transcoding
message ProcessBillingEvent {
  string node_id = 1;
  string stream_name = 2;
  string process_type = 3;    // "Livepeer", "AV", "FFmpeg"
  int64 duration_ms = 4;      // Duration in milliseconds (segment duration or since last event)
  int64 timestamp = 5;        // Unix timestamp when event occurred
  optional string tenant_id = 6; // Tenant context (enriched by Foghorn or Helmsman)
  optional string stream_id = 7; // Enriched by Foghorn (UUID)

  // Common fields
  optional string input_codec = 10;
  optional string output_codec = 11;
  optional string track_type = 12;  // "audio" or "video" - KEY FOR BILLING

  // Livepeer-specific (from LIVEPEER_SEGMENT_COMPLETE)
  optional int32 segment_number = 20;
  optional int32 width = 21;          // source width
  optional int32 height = 22;         // source height
  optional int32 rendition_count = 23;
  optional string broadcaster_url = 24;
  optional int64 upload_time_us = 25; // DEPRECATED: use turnaround_ms
  optional string livepeer_session_id = 26;
  optional int64 segment_start_ms = 27;
  optional int64 input_bytes = 28;
  optional int64 output_bytes_total = 29;
  optional int32 attempt_count = 40;
  optional int64 turnaround_ms = 41;
  optional double speed_factor = 42;
  optional string renditions_json = 43;  // JSON array: [{name, bytes}, ...]

  // MistProcAV-specific (from PROCESS_AV_VIRTUAL_SEGMENT_COMPLETE)
  optional int64 input_frames = 30;           // cumulative
  optional int64 output_frames = 31;          // cumulative
  optional int64 decode_us_per_frame = 32;
  optional int64 transform_us_per_frame = 33;
  optional int64 encode_us_per_frame = 34;
  optional bool is_final = 35;
  optional int64 input_frames_delta = 50;     // frames this window
  optional int64 output_frames_delta = 51;    // frames this window
  optional int64 input_bytes_delta = 52;      // bytes this window
  optional int64 output_bytes_delta = 53;     // bytes this window
  optional int32 input_width = 54;
  optional int32 input_height = 55;
  optional int32 output_width = 56;
  optional int32 output_height = 57;
  optional int32 input_fpks = 58;             // frames per 1000s (input)
  optional double output_fps_measured = 59;   // measured output FPS
  optional int32 sample_rate = 60;            // audio sample rate
  optional int32 channels = 61;               // audio channels
  optional int64 source_timestamp_ms = 62;
  optional int64 sink_timestamp_ms = 63;
  optional int64 source_advanced_ms = 64;
  optional int64 sink_advanced_ms = 65;
  optional double rtf_in = 66;                // real-time factor in
  optional double rtf_out = 67;               // real-time factor out
  optional int64 pipeline_lag_ms = 68;
  optional int64 output_bitrate_bps = 69;

  // Cluster attribution for cluster-aware billing. Set by the producer
  // (Helmsman/Foghorn) from the local cluster identity so processing
  // minutes can be billed against the right cluster's pricing model.
  optional string cluster_id = 70;
  optional string origin_cluster_id = 71;
}

message StorageInfo {
  string local_path = 1;
  string s3_bucket = 2;
  string s3_prefix = 3;
}

message NodeLimits {
  int32 max_transcodes = 1;
  uint64 storage_capacity_bytes = 2;
  uint64 storage_used_bytes = 3;
}

message StreamData {
  uint64 total = 1;          // Total viewers
  uint32 inputs = 2;         // Input count
  uint64 bytes_up = 3;       // Upload bytes
  uint64 bytes_down = 4;     // Download bytes
  uint32 bandwidth = 5;      // Bandwidth per viewer
  bool replicated = 6;       // True if this is a replicated (pull) stream

  // Packet stats (for QoS monitoring) - MistServer pkts array
  repeated int64 packet_counts = 7;       // [sent, lost, retransmit]

  // Connection totals - MistServer tot array
  repeated int64 total_connections = 8;   // [total_viewers, total_inputs, total_outputs]
}

// Stream track information (replaces JSON parsing)
message StreamTrack {
  string track_name = 1;     // e.g., "video_1", "audio_1", "meta_1"
  string track_type = 2;     // "video", "audio", "meta", "unknown"
  string codec = 3;          // H264, AAC, JSON, etc.
  optional int32 bitrate_kbps = 4;
  optional int64 bitrate_bps = 5;
  optional int32 buffer = 6;
  optional int32 jitter = 7;
  
  // Video-specific fields
  optional int32 width = 8;
  optional int32 height = 9;
  optional double fps = 10;
  optional string resolution = 11;    // e.g., "1920x1080"
  optional bool has_bframes = 12;
  
  // Audio-specific fields
  optional int32 channels = 13;
  optional int32 sample_rate = 14;
  
  // Frame timing metrics (raw from MistServer keys object)
  optional int32 frames_max = 15;
  optional int32 frames_min = 16;
  optional double frame_ms_max = 17;
  optional double frame_ms_min = 18;
  optional double keyframe_ms_max = 19;  // Raw keyframe interval max (from keys.ms_max)
  optional double keyframe_ms_min = 20;  // Raw keyframe interval min (from keys.ms_min)
}

message StoredArtifact {
  // Security: Use opaque identifiers, never expose tenant_id on edge nodes
  string clip_hash = 1;      // Opaque identifier for the clip
  string stream_name = 2;    // Stream name (safe to expose)
  string file_path = 3;      // Local file path on storage node
  string s3_url = 4;         // S3 URL if uploaded to cloud storage
  uint64 size_bytes = 5;     // File size in bytes
  int64 created_at = 6;      // Creation timestamp (Unix seconds)
  string format = 7;         // File format (mp4, webm, etc.)
  bool has_dtsh = 8;         // True if .dtsh index file exists locally
  uint64 access_count = 9;   // Local access count (best-effort, per node)
  int64 last_accessed = 10;  // Last access timestamp (Unix seconds)
  ArtifactEvent.ArtifactType artifact_type = 11; // Explicit artifact type (clip/dvr/vod)

  // Presence role on this node. ORIGIN = canonical full file written by
  // the recording/processing sidecar; eligible to serve cross-cluster
  // peer-relay reads when is_complete=true. CACHE = sparse blocks
  // fetched from S3; never authoritative for peer-relay. The polling
  // path reports CACHE; finalizer RPCs report ORIGIN. Origin-wins
  // upsert in Foghorn ensures CACHE writes can't downgrade an ORIGIN
  // row.
  enum Role {
    ROLE_UNSPECIFIED = 0;
    ROLE_CACHE       = 1;
    ROLE_ORIGIN      = 2;
  }
  Role role = 12;
  // Writer-authoritative completeness — only true when the finalizer
  // RPC that wrote the file confirms it's fully written. Polling never
  // sets this.
  bool is_complete = 13;
}

message StreamProcess {
  string process = 1;
  string codec = 2;
  int64 bitrate = 3;
  string track_select = 4;
  string track_inhibit = 5;
  string restart_type = 6;
  bool inconsequential = 7;
  bool exit_unmask = 8;
  map<string, string> extra = 100;
}

message StreamDef {
  string name = 1;
  bool realtime = 2;
  bool stop_sessions = 3;
  repeated string tags = 4;
  repeated StreamProcess processes = 5;
}

message StreamTemplate {
  string id = 1;
  StreamDef def = 2;
  repeated string roles = 3;
  repeated string caps = 4;
}

message TLSCertBundle {
  string cert_pem = 1;
  string key_pem = 2;
  string domain = 3;
  int64 expires_at = 4;
  // Stable identity used by Helmsman to key cert/key files on disk and
  // by Foghorn to track per-edge apply state. Examples:
  //   "cluster:media-us-1"
  //   "tenant:acme"
  //   "platform:edge-multi"
  //   "platform:pool-multi"
  string bundle_id = 5;
  // Hostnames this bundle's cert should serve via Caddy SNI. Helmsman
  // renders one Caddy site block per bundle covering these addresses.
  // Examples:
  //   ["*.media-us-1.frameworks.network"]
  //   ["media-us-1.frameworks.network", "*.media-us-1.frameworks.network"]
  //   ["acme.cdn.frameworks.network", "*.acme.cdn.frameworks.network"]
  repeated string site_addresses = 6;
}

message ConfigSeed {
  string node_id = 1;
  double latitude = 2;
  double longitude = 3;
  string location_name = 4;
  // Tenant owning this node (resolved by Foghorn via Quartermaster)
  string tenant_id = 5;
  repeated StreamTemplate templates = 10;
  // Processing configuration (Gateway availability, codec support)
  ProcessingConfig processing = 11;
  // Authoritative operational mode set by Foghorn. Helmsman must apply this.
  NodeOperationalMode operational_mode = 12;
  // Single cluster bundle. Kept populated with the cluster wildcard site
  // address while tls_bundles carries the full SNI set.
  TLSCertBundle tls = 20;
  // Public site configuration for Helmsman Caddyfile rendering (populated by Foghorn)
  SiteConfig site = 21;
  // Optional internal CA bundle for Helmsman gRPC trust bootstrap and rotation.
  bytes ca_bundle = 22;
  // Optional control-plane-managed edge telemetry remote_write settings.
  common.EdgeTelemetryConfig telemetry = 23;
  // Foghorn's public HTTP balancer base (e.g. "https://foghorn-us-west.example.com"
  // or "http://foghorn:18008" in-cluster). Helmsman uses this to wire the
  // MistServer "balance:<base>?fallback=push://" source on stream templates.
  string foghorn_balancer_base = 24;
  // Monotonic version assigned by Foghorn per (node, generation). Helmsman
  // echoes this in ConfigSeedApplyResult so Foghorn can correlate ACKs.
  uint64 seed_version = 25;
  // Multi-cert SNI bundle set. Each entry has a stable bundle_id used to
  // key cert files on disk and track per-edge apply state. Helmsman
  // renders one Caddy site block per bundle.
  repeated TLSCertBundle tls_bundles = 26;
}

// ConfigSeedApplyResult is sent by Helmsman after attempting to apply a
// ConfigSeed (write cert files + reload Caddy). Foghorn uses this to gate
// DNS publishing: Navigator only adds an edge to a tenant's smart record
// set after the edge has acked applying that tenant's bundle.
message ConfigSeedApplyResult {
  string node_id = 1;
  // Echoes ConfigSeed.seed_version so Foghorn knows which seed this acks.
  uint64 seed_version = 2;
  // Bundle IDs that loaded successfully and are serving via Caddy.
  repeated string applied_bundle_ids = 3;
  // Bundle IDs that failed to load (e.g. malformed PEM, key mismatch).
  repeated string failed_bundle_ids = 4;
  // Overall success: true iff all bundles loaded AND Caddy reload succeeded.
  bool success = 5;
  // Populated on failure: error message describing what went wrong.
  string error = 6;
  google.protobuf.Timestamp applied_at = 7;
}

// SiteConfig carries the public-facing site parameters that Helmsman uses to
// render the production Caddyfile after enrollment. Foghorn is the authority.
message SiteConfig {
  string site_address = 1;   // Caddy site block address, e.g. "*.us-west-1.frameworks.network"
  string edge_domain = 2;    // e.g. "edge-abc123.us-west-1.frameworks.network"
  string pool_domain = 3;    // e.g. "edge.us-west-1.frameworks.network"
  string acme_email = 4;     // ACME email for auto-TLS fallback
}


// Transcode profile for ABR ladder generation
message TranscodeProfile {
  string name = 1;           // e.g., "720p", "1080p", "audio_only"
  string codec = 2;          // H264, H265, AAC
  int32 bitrate = 3;         // bps
  int32 width = 4;
  int32 height = 5;
  double fps = 6;
}

// Transcode job request (Foghorn → Helmsman)
message TranscodeJobRequest {
  string job_id = 1;
  string tenant_id = 2;
  string artifact_hash = 3;        // Source artifact
  string source_url = 4;           // Presigned URL for source
  repeated TranscodeProfile profiles = 5;
  bool use_gateway = 6;            // Use Livepeer Gateway if true
  string gateway_url = 7;          // Gateway URL (if use_gateway=true)
}

// Transcode job progress (Helmsman → Foghorn)
message TranscodeJobProgress {
  string job_id = 1;
  int32 percent = 2;               // 0-100
  string status = 3;               // queued, processing, completed, failed
  string message = 4;              // Status message / error
}

// Transcode job completion (Helmsman → Foghorn)
message TranscodeJobComplete {
  string job_id = 1;
  string status = 2;               // success, failed
  string output_artifact_hash = 3; // New artifact hash for output
  string output_s3_url = 4;        // S3 URL of transcoded output
  string error = 5;                // Error message if failed
}

// Generic processing job request (Foghorn → Helmsman)
// Used for probe, process+, DTSH generation, DVR chapter finalization.
message ProcessingJobRequest {
  string job_id = 1;
  string tenant_id = 2;
  string artifact_hash = 3;
  string source_url = 4;          // Presigned HTTPS URL for source
  string job_type = 5;            // "probe" | "process" | "dvr_chapter_finalize"
  string output_path = 6;         // Local disk path for output
  map<string, string> params = 7; // realtime_speed, process config JSON, segment_urls (for HLS)
  string processes_json = 8;      // Pre-computed MistServer process config from Commodore
  string internal_name = 9;       // Artifact routing name (for vod+ stream name construction)

  // Deadline for the whole job. Helmsman aborts and reports timeout if
  // PUSH_END hasn't fired by this absolute Unix-ms wall clock. Chapter
  // intervals can be hours, so Foghorn picks
  // max(2*chapter_duration, 30min) capped at 24h; missing/zero means
  // Helmsman applies its own default.
  int64 deadline_unix_ms = 10;

  // DVR chapter finalization specifics. Only populated when
  // job_type == "dvr_chapter_finalize".
  string source_chapter_id = 20;
  string source_dvr_hash = 21;
  string source_stream_internal_name = 22;
  int64  chapter_start_ms = 23;
  int64  chapter_end_ms   = 24;
  repeated DVRChapterSegmentRef source_segments = 25;
  // Foghorn-authoritative runtime name for the processed OUTPUT artifact's
  // DTSH boot post-transcode. Always vod+<internal_name> today, but
  // populated from Foghorn's registry so Helmsman never derives runtime
  // names.
  string output_runtime_name = 26;
}

// One source segment for a chapter finalize job. local_path is the
// recording origin's filesystem path (preferred). presigned_recovery_url
// is set when the local copy is gone (dvr_segments.status='lost_local'
// but the recovery freeze succeeded) — Helmsman pulls the bytes via
// the existing block-cache machinery before remux.
message DVRChapterSegmentRef {
  string segment_name = 1;
  int64  sequence = 2;
  int64  duration_ms = 3;
  int64  media_start_ms = 4;        // absolute Unix epoch ms; PROGRAM-DATE-TIME source
  int64  media_end_ms = 5;
  string local_path = 6;            // reserved; Helmsman resolves from its DVRManager job
  string presigned_recovery_url = 7; // S3 GET fallback when local copy is missing
  int64  size_bytes = 8;            // ledger size hint, drives admission preflight on Helmsman
}

// Processing job result (Helmsman → Foghorn)
message ProcessingJobResult {
  string job_id = 1;
  string status = 2;              // "completed", "failed"
  string error = 3;
  map<string, string> outputs = 4; // Metadata (codec, resolution, etc.) or completion info
  string output_path = 5;          // Local file path of processed output (for artifact registration)
  int64 output_size_bytes = 6;     // Size of processed output file
}

// ProcessingJobProgress is sent periodically by Helmsman while a processing
// push is running. Foghorn uses it to refresh updated_at (preventing stale
// recovery) and to emit VodLifecycleData progress events.
message ProcessingJobProgress {
  string job_id = 1;
  int32 progress_pct = 2;         // 0-100 based on track position vs source duration
  int64 last_ms = 3;              // Current output track position in milliseconds
  int64 source_duration_ms = 4;   // Total source duration in milliseconds
}

// Tracks GraphQL API requests for usage analytics (RFC: x402 Agent Access)
// Gateway aggregates in-memory and flushes periodically (not per-request)

message APIRequestBatch {
  int64 timestamp = 1;                         // Flush timestamp (Unix seconds)
  string source_node = 2;                      // Gateway instance ID
  repeated APIRequestAggregate aggregates = 3;
}

message APIRequestAggregate {
  string tenant_id = 1;
  string auth_type = 2;             // jwt, api_token, wallet
  string operation_type = 3;        // query, mutation, subscription
  string operation_name = 4;        // GetStreams, CreateClip, etc. (empty if anonymous)
  uint32 request_count = 5;
  uint32 error_count = 6;
  uint64 total_duration_ms = 7;
  uint32 total_complexity = 8;      // Sum of GraphQL complexity scores
  repeated uint64 user_hashes = 9;  // Hashed user IDs observed in the aggregate window
  repeated uint64 token_hashes = 10; // Hashed API token IDs observed in the aggregate window
  int64 timestamp = 11;             // First request timestamp (Unix seconds)
}


// Helmsman sends to Foghorn; Foghorn validates via Commodore (API token) or JWT verification.
message ValidateEdgeTokenRequest {
  string token = 1;
}

message ValidateEdgeTokenResponse {
  bool valid = 1;
  string user_id = 2;
  string tenant_id = 3;
  string role = 4;
  repeated string permissions = 5;
}

// Helmsman -> Foghorn over the control stream. Helmsman never sees the
// JWT secret; Foghorn relays to Commodore.ValidateMistAdminSession and
// injects expected_node_id from the connected stream's node identity so
// a token minted for one edge cannot be replayed against another.
message EdgeMistAdminSessionRequest {
  string token = 1;
}

message EdgeMistAdminSessionResponse {
  bool valid = 1;
  string user_id = 2;
  string tenant_id = 3;
  string role = 4;
  string node_id = 5;
  string cluster_id = 6;
  int64 expires_at = 7; // Unix seconds; Helmsman uses for cookie Max-Age.
}

// Helmsman -> Foghorn: request presigned PUT URLs for thumbnail files
message ThumbnailUploadRequest {
  string internal_name = 1; // MistServer stream name
  repeated string file_paths = 2; // Local paths (poster.jpg, sprite.jpg, sprite.vtt)
}

// Foghorn -> Helmsman: presigned PUT URLs for each file
message ThumbnailUploadResponse {
  message PresignedUpload {
    string file_name = 1; // e.g. "poster.jpg"
    string presigned_url = 2;
    string s3_key = 3;
    string local_path = 4; // echoed from request so Helmsman can find the file
  }
  string thumbnail_key = 1; // stream_id (UUID) for live, artifact_hash for artifacts
  repeated PresignedUpload uploads = 2;
}

// Helmsman -> Foghorn: confirm upload complete
message ThumbnailUploaded {
  string thumbnail_key = 1; // echoed from ThumbnailUploadResponse
  repeated string s3_keys = 2;
}

// Gateway telemetry: Livepeer gateway -> Decklog -> Periscope (orchestrator
// visibility pipeline). See docs/architecture/orchestrator-visibility.md.
//
// Tenant policy:
//   - stream_tenant_id: set on session-scoped events (transcode/AI outcomes)
//     via the extended Foghorn auth response into go-livepeer StreamParameters.
//   - cluster_owner_tenant_id: always set, from gitops cluster ownership.
//   - Decklog rejects session-scoped events missing either tenant.

message GatewayTelemetryEvent {
  // Identity baked into the gateway env at provision time.
  string gateway_id = 1;
  string gateway_region = 2;
  string cluster_id = 3;
  string cluster_owner_tenant_id = 4; // UUID, resolved by gitops
  string stream_tenant_id = 5;        // UUID, propagated by auth response on session events; empty on global events

  google.protobuf.Timestamp timestamp = 6;

  oneof payload {
    OrchestratorDiscoveryObserved discovery = 10;
    OrchestratorStateUpdate       state     = 11;
    OrchestratorTranscodeOutcome  transcode = 12;
    OrchestratorAIOutcome         ai        = 13;
  }

  // ===== Envelope v2 =====
  // gateway_region (2) plays source_region's role for the gateway-instance
  // attribution; cluster_id (3) plays source_cluster_id. These fields cover
  // the stream-origin pair (empty for cluster-scoped events) plus schema
  // versioning and correlation.
  string stream_origin_region = 52;
  string stream_origin_cluster_id = 53;
  int32  schema_version = 54;
  string correlation_id = 55;
  string causation_id = 56;
  string event_id = 57; // UUIDv7 producer-stamped event identifier (dedupe key)
}

// Per-vantage geo + IP attachment. Emitted as part of every discovery / state
// event so multi-IP / multi-region observation is preserved (one event per
// resolved IP per attempt; DNS round-robin is first-class).
message OrchestratorVantageGeo {
  string resolved_ip = 1;
  bool   dialed = 2;          // true on the IP the RPC actually used; false on sibling A-record IPs
  double latitude = 3;
  double longitude = 4;
  string city = 5;
  string country_code = 6;
  string geo_source = 7;      // "mmdb" | "unknown"
  google.protobuf.Timestamp geo_resolved_at = 8;
}

// Per GetOrchestratorInfo RPC attempt: success or failure leg. The dialed IP
// carries discovery_latency_ms + reachability outcome; sibling resolved IPs
// (same hostname) come along as additional rows with dialed=false so their
// geo is recorded.
message OrchestratorDiscoveryObserved {
  string orch_addr = 1;             // eth address (hex)
  string orch_url = 2;
  string advertised_node_url = 3;   // when the orch advertises sub-nodes
  uint32 discovery_latency_ms = 4;
  bool   reachable = 5;
  bool   compatible = 6;
  float  score = 7;
  string failure_reason = 8;
  string failure_kind = 9;          // "dns" | "tcp" | "rpc" | "timeout" | ...
  OrchestratorVantageGeo vantage = 10;
}

// Vantage-independent facts from a successful OrchestratorInfo response.
// Emitted for every responding orch, including incompatible / not-selected
// ones, so ranking can use full state.
message OrchestratorStateUpdate {
  string orch_addr = 1;
  string canonical_url = 2;
  repeated string advertised_node_urls = 3;
  repeated string capabilities = 4;
  // Pricing as raw fields (price_per_unit / pixels_per_unit) to avoid losing
  // precision and to mirror upstream OrchestratorInfo.
  int64 price_per_unit = 5;
  int64 pixels_per_unit = 6;
  reserved 7;
  reserved "capability_prices";
  string hardware = 8;       // free-form hardware string from upstream
  string source = 9;         // "gateway_pool" for gateway-emitted state
  OrchestratorVantageGeo vantage = 10;
  // Typed per-capability pricing. Each entry is one capability/model with
  // its own price_per_unit / pixels_per_unit. Empty when the gateway has no
  // per-capability price facts for this instance.
  repeated OrchestratorCapabilityPriceEntry capability_price_entries = 11;
}

// Per-capability price entry. Either capability (transcode codec, AI model
// id) or position is set; the gateway emits whichever identifier it has.
message OrchestratorCapabilityPriceEntry {
  string capability = 1;        // transcode capability or AI model id
  uint32 position = 2;           // index in upstream capabilities_prices, when capability is empty
  int64 price_per_unit = 3;
  int64 pixels_per_unit = 4;
}

// Per-segment / per-session transcode outcome. Emitted at the result/error
// boundary in go-livepeer's segment_rpc path so failures count.
message OrchestratorTranscodeOutcome {
  string orch_addr = 1;
  string orch_url = 2;
  string session_id = 3;
  string manifest_id_hash = 4;
  uint64 seq_no = 5;
  bool   success = 6;
  float  latency_score = 7;
  uint32 upload_ms = 8;
  uint32 transcode_ms = 9;
  uint32 overall_ms = 10;
  uint64 pixels = 11;
  repeated string profiles = 12;
  string error_code = 13;
  string error_kind = 14;
  string resolved_ip = 15;
}

// Per-AI-job outcome. Same shape as transcode but for AI pipelines, kept
// separate because pricing meters and consumers differ — AI billing is in
// pilot and tracked under the processing meter contract, not delivered minutes.
message OrchestratorAIOutcome {
  string orch_addr = 1;
  string orch_url = 2;
  string session_id = 3;
  string pipeline = 4;
  string model = 5;
  float  latency_score = 6;
  int64  price_per_unit = 7;
  uint32 latency_ms = 8;
  bool   success = 9;
  string error_code = 10;
  string error_kind = 11;
  string resolved_ip = 12;
}
