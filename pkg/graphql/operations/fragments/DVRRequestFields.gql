# All fields available on DVRRequest type
fragment DVRRequestFields on DVRRequest {
  id
  dvrHash
  playbackId
  streamId
  sourceStreamId
  title
  createdAt
  updatedAt
  expiresAt
  storageNodeId
  status
  startedAt
  endedAt
  durationSeconds
  sizeBytes
  manifestPath
  errorMessage
  storageLocation
  syncStatus
  isHot
  isSynced
  isFinalized
  isFrozen
  thumbnailAssets {
    posterUrl
    spriteVttUrl
    spriteJpgUrl
    assetKey
  }
}
