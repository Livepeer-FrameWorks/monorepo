fragment BillingTierFields on BillingTier {
  id
  tierName
  displayName
  description
  basePrice
  currency
  billingPeriod
  supportLevel
  slaLevel
  meteringEnabled
  isEnterprise
  features {
    recording
    analytics
    customBranding
    apiAccess
    supportLevel
    sla
  }
  pricingRules {
    meter
    model
    currency
    includedQuantity
    unitPrice
    configJson
  }
  entitlements {
    key
    value
  }
}
