fragment StreamCoreFields on Stream {
  id
  streamId
  name
  description
  streamKey
  playbackId
  record
  ingestMode
  pullSource {
    sourceUriRedacted
    enabled
    class
    allowedClusterIds
  }
  thumbnailAssets {
    posterUrl
    spriteVttUrl
    spriteJpgUrl
    assetKey
  }
  createdAt
  updatedAt
}
