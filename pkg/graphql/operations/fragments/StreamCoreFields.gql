fragment StreamCoreFields on Stream {
  id
  streamId
  name
  description
  streamKey
  playbackId
  record
  ingestMode
  pullSource {
    sourceUriRedacted
    enabled
    class
  }
  recentPullSourceEvents(limit: 10) {
    id
    internalName
    eventKind
    detail
    createdAt
  }
  createdAt
  updatedAt
}
