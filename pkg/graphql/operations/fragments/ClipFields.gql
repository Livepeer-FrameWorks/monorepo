# All fields available on the Clip type
fragment ClipFields on Clip {
  id
  clipHash
  playbackId
  streamId
  sourceStreamId
  title
  description
  startTime
  duration
  nodeId
  storagePath
  sizeBytes
  status
  createdAt
  updatedAt
  clipMode
  requestedParams
  storageLocation
  syncStatus
  isHot
  isSynced
  isFinalized
  isFrozen
  expiresAt
  thumbnailAssets {
    posterUrl
    spriteVttUrl
    spriteJpgUrl
    assetKey
  }
}
