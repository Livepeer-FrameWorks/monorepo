# Fetch complete billing status including current tier, subscription, and usage summary
query GetBillingStatus {
  billingStatus {
    billingStatus
    currency
    paymentMethods
    nextBillingDate
    trialEndsAt
    outstandingAmount
    currentTier {
      ...BillingTierFields
    }
    subscription {
      id
      tenantId
      tierId
      status
      billingEmail
      billingModel
      startedAt
      trialEndsAt
      nextBillingDate
      cancelledAt
      customFeatures {
        recording
        analytics
        customBranding
        apiAccess
        supportLevel
        sla
      }
      pricingOverrides {
        meter
        model
        currency
        includedQuantity
        unitPrice
        configJson
      }
      entitlementOverrides {
        key
        value
      }
      paymentMethod
      createdAt
      updatedAt
    }
    liveUsage {
      ...LiveUsageSummaryFields
    }
    invoicePreview {
      id
      status
      amount
      baseAmount
      meteredAmount
      prepaidCreditApplied
      currency
      dueDate
      periodStart
      periodEnd
      usageSummary {
        ...UsageSummaryFields
      }
      lineItems {
        lineKey
        meter
        description
        quantity
        includedQuantity
        billableQuantity
        unitPrice
        total
        currency
      }
    }
  }
}
