# Fetch billing status, live usage, and the current invoice preview.
query GetBillingStatus {
  billingStatus {
    billingStatus
    currency
    paymentMethods
    nextBillingDate
    trialEndsAt
    outstandingAmount
    currentTier {
      ...BillingTierFields
    }
    subscription {
      id
      tenantId
      tierId
      status
      billingEmail
      billingModel
      startedAt
      trialEndsAt
      nextBillingDate
      cancelledAt
      customFeatures {
        recording
        analytics
        customBranding
        apiAccess
        supportLevel
        sla
      }
      pricingOverrides {
        meter
        model
        currency
        includedQuantity
        unitPrice
        configJson
      }
      entitlementOverrides {
        key
        value
      }
      paymentMethod
      pendingTier {
        id
        tierName
        displayName
        tierLevel
      }
      pendingEffectiveAt
      pendingReason
      createdAt
      updatedAt
    }
    liveUsage {
      ...LiveUsageSummaryFields
    }
    invoicePreview {
      id
      status
      amount
      baseAmount
      meteredAmount
      grossMeteredAmount
      prepaidCreditApplied
      currency
      dueDate
      periodStart
      periodEnd
      lineItems {
        lineKey
        meter
        description
        quantity
        includedQuantity
        billableQuantity
        unitPrice
        total
        currency
        clusterId
        clusterName
        clusterKind
        pricingSource
        pricingLabel
      }
    }
  }
}
