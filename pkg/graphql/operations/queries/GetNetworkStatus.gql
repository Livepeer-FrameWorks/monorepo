# Public network status for marketing/status maps. Anonymous callers receive
# official platform topology, including node and service placement. Authenticated
# tenants receive official topology plus subscribed or owned clusters, with
# cluster-level load counters for every visible cluster; private node and
# service placement is included only for owned clusters.
query GetNetworkStatus {
  networkStatus {
    clusters {
      clusterId
      name
      region
      latitude
      longitude
      nodeCount
      healthyNodeCount
      peerCount
      status
      clusterType
      shortDescription
      currentStreams
      currentViewers
      egressMbps
      egressCapacityMbps
      ingressMbps
      services
    }
    peerConnections {
      sourceCluster
      targetCluster
      connected
      connectionType
    }
    nodes {
      nodeId
      name
      nodeType
      latitude
      longitude
      status
      clusterId
    }
    serviceInstances {
      instanceId
      serviceId
      clusterId
      nodeId
      status
      healthStatus
    }
    totalNodes
    healthyNodes
    updatedAt
  }
}
