# Public network status for marketing/status maps. Authenticated cluster owners
# receive node/service detail for owned clusters; everyone else receives
# cluster-level topology only.
query GetNetworkStatus {
  networkStatus {
    clusters {
      clusterId
      name
      region
      latitude
      longitude
      nodeCount
      healthyNodeCount
      peerCount
      status
      clusterType
      shortDescription
      currentStreams
      currentViewers
      egressMbps
      egressCapacityMbps
      ingressMbps
      services
    }
    peerConnections {
      sourceCluster
      targetCluster
      connected
      connectionType
    }
    nodes {
      nodeId
      name
      nodeType
      latitude
      longitude
      status
      clusterId
    }
    serviceInstances {
      instanceId
      serviceId
      clusterId
      nodeId
      status
      healthStatus
    }
    totalNodes
    healthyNodes
    updatedAt
  }
}
