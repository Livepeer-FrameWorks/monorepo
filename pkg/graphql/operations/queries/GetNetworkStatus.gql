# Public network status for marketing/status maps. Anonymous callers receive
# clusters explicitly published to public topology, including public node
# placement. Authenticated tenants receive public topology plus subscribed or
# owned clusters, with cluster-level load counters for every visible cluster;
# service-instance inventory is included only for owned clusters.
query GetNetworkStatus {
  networkStatus {
    clusters {
      clusterId
      name
      region
      latitude
      longitude
      nodeCount
      healthyNodeCount
      peerCount
      status
      clusterType
      shortDescription
      currentStreams
      currentViewers
      egressMbps
      egressCapacityMbps
      ingressMbps
      services
    }
    peerConnections {
      sourceCluster
      targetCluster
      connected
      connectionType
    }
    nodes {
      nodeId
      name
      nodeType
      latitude
      longitude
      status
      clusterId
    }
    serviceInstances {
      instanceId
      serviceId
      clusterId
      nodeId
      status
      healthStatus
    }
    totalNodes
    healthyNodes
    updatedAt
  }
}
