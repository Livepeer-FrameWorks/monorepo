# Fetch paginated viewer sessions for a stream.
# Use GetStreamAnalyticsSummary and GetClientQoeSummary for aggregate counters.
query GetStreamSessions(
  $streamId: ID
  $timeRange: TimeRangeInput
  $first: Int = 25
  $after: String
) {
  analytics {
    lifecycle {
      viewerSessionsConnection(
        streamId: $streamId
        timeRange: $timeRange
        page: { first: $first, after: $after }
      ) {
        edges {
          cursor
          node {
            id
            timestamp
            sessionId
            connector
            countryCode
            city
            durationSeconds
            connectionQuality
          }
        }
        pageInfo {
          ...PageInfoFields
        }
        totalCount
      }
    }
  }
}
