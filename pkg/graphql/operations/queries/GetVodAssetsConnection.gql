query GetVodAssetsConnection(
  $streamId: ID
  $first: Int = 50
  $after: String
  $last: Int
  $before: String
  $input: MediaArtifactConnectionInput
) {
  vodAssetsConnection(
    streamId: $streamId
    page: { first: $first, after: $after, last: $last, before: $before }
    input: $input
  ) {
    edges {
      cursor
      node {
        id
        artifactHash
        playbackId
        streamId
        originType
        originId
        title
        description
        filename
        status
        storageLocation
        sizeBytes
        durationMs
        resolution
        videoCodec
        audioCodec
        bitrateKbps
        createdAt
        updatedAt
        expiresAt
        errorMessage
        thumbnailAssets {
          posterUrl
          spriteVttUrl
          spriteJpgUrl
          assetKey
        }
        storageCost {
          perDay
          perMonth
          currency
        }
        effectiveRetention {
          retentionDays
          retentionUntil
          source
        }
      }
    }
    pageInfo {
      hasNextPage
      hasPreviousPage
      startCursor
      endCursor
    }
    totalCount
  }
}
