# Retrieve chapter metadata for a single chapter in a DVR recording.
# Chapter playback uses the chapter artifact's playbackId via the
# normal VOD playback path; this query exposes range + state.
query DVRChapter(
  $dvrId: ID!
  $mode: DVRChapterMode
  $intervalSeconds: Int
  $startMs: Float!
  $endMs: Float!
) {
  dvrChapter(
    dvrId: $dvrId
    mode: $mode
    intervalSeconds: $intervalSeconds
    startMs: $startMs
    endMs: $endMs
  ) {
    chapterId
    state
    playbackId
    isCurrent
    hasGaps
    segmentCount
    wallClockStartUnixMs
    wallClockEndUnixMs
    playableNow
    lastFailureReason
  }
}
