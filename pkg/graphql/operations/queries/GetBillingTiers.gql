# Fetch all available billing tiers with pricing rules and entitlements
query GetBillingTiers {
  billingTiers {
    id
    tierName
    displayName
    description
    basePrice
    currency
    billingPeriod
    features {
      recording
      analytics
      customBranding
      apiAccess
      supportLevel
      sla
    }
    pricingRules {
      meter
      model
      currency
      includedQuantity
      unitPrice
      configJson
    }
    entitlements {
      key
      value
    }
    supportLevel
    slaLevel
    meteringEnabled
    isEnterprise
  }
}
