# Fetch tenant info and clusters for infrastructure dashboard
# Nodes: use GetNodesConnection. Metrics: use GetInfrastructureMetrics.
query GetInfrastructureOverview {
  tenant {
    id
    name
    cluster
    createdAt
  }
  clustersConnection(page: { first: 25 }) {
    edges {
      cursor
      node {
        id
        clusterId
        clusterName
        clusterType
        deploymentModel
        maxConcurrentStreams
        maxConcurrentViewers
        maxBandwidthMbps
        healthStatus
        createdAt
        visibility
      }
    }
    pageInfo {
      ...PageInfoFields
    }
    totalCount
  }
}
