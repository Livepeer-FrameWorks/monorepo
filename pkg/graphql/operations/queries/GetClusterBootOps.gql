# Cluster-ops boot aggregate (operator view, token-attributed rows only)
query GetClusterBootOps($clusterId: ID, $timeRange: TimeRangeInput) {
  analytics {
    infra {
      clusterBootOps(clusterId: $clusterId, timeRange: $timeRange) {
        servingClusterId
        nodeId
        protocol
        bootCount
        errorCount
        p95TtfMs
        cacheHitRatio
      }
    }
  }
}
