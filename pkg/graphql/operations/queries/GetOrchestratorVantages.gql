# Public per-vantage Livepeer observations for the federation map's pin toggle.
# Filter by `orchAddr` from the side panel.
query GetOrchestratorVantages($orchAddr: String) {
  orchestratorVantages(orchAddr: $orchAddr) {
    __typename
    tenantId
    gatewayId
    gatewayRegion
    orchAddr
    resolvedIp
    latitude
    longitude
    city
    countryCode
    geoSource
    geoResolvedAt
    latestLatencyMs
    score
    dialedRecently
    lastSeen
  }
}
