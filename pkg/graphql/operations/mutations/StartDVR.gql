# Start DVR recording for a stream.
mutation StartDVR($streamId: ID!) {
  startDVR(streamId: $streamId) {
    __typename
    ... on DVRRequest {
      ...DVRRequestFields
    }
    ... on ValidationError {
      ...ValidationErrorFields @mask_disable
    }
    ... on NotFoundError {
      ...NotFoundErrorFields @mask_disable
    }
    ... on AuthError {
      ...AuthErrorFields @mask_disable
    }
  }
}
