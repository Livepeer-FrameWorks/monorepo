mutation CreateCryptoTopup($input: CreateCryptoTopupInput!) {
  createCryptoTopup(input: $input) {
    topupId
    depositAddress
    asset
    assetSymbol
    expectedAmountCents
    expiresAt
    expectedAmountBaseUnits
    expectedAmountToken
    quotedPriceUsd
    quoteSource
    quotedAt
    network
  }
}
