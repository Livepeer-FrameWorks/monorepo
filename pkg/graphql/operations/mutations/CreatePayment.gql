# Create a new payment transaction
mutation CreatePayment($input: CreatePaymentInput!) {
  createPayment(input: $input) {
    __typename
    ... on Payment {
      id
      paymentUrl
      walletAddress
      amount
      currency
      method
      status
      expiresAt
      qrCode
      expectedAmountBaseUnits
      expectedAmountToken
      quotedPriceUsd
      quoteSource
      assetSymbol
      network
      quotedAt
      createdAt
    }
    ... on ValidationError {
      ...ValidationErrorFields @mask_disable
    }
    ... on AuthError {
      ...AuthErrorFields @mask_disable
    }
  }
}
