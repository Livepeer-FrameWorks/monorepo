mutation GetCryptoTopupStatus($topupId: ID!) {
  cryptoTopupStatus(topupId: $topupId) {
    id
    depositAddress
    asset
    status
    txHash
    confirmations
    receivedAmountBaseUnits
    receivedAmountToken
    creditedAmountCents
    creditedAmountCurrency
    quoteSource
    network
    expiresAt
    detectedAt
    completedAt
  }
}
