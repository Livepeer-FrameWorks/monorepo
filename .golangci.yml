version: "2"

run:
  go: "1.25"
  modules-download-mode: readonly

linters:
  default: none
  enable:
    # Tier 1: Bug finders (essential, low false positives)
    - errcheck # Unchecked errors
    - govet # Go vet checks
    - ineffassign # Useless assignments
    - staticcheck # Comprehensive static analysis
    - unused # Unused code
    # Tier 2: Quality (catches real issues in HTTP/SQL/error handling)
    - bodyclose # HTTP response body leaks
    - durationcheck # time.Duration calculation mistakes
    - errorlint # Error wrapping correctness (Go 1.13+)
    - nilerr # Returns nil on non-nil error
    - noctx # HTTP requests without context
    - sqlclosecheck # Unclosed SQL rows/statements
    # Tier 3: Architectural boundaries
    - depguard # Forbidden imports outside allowlisted owners

  settings:
    errcheck:
      check-type-assertions: true
      check-blank: true
    errorlint:
      errorf: true
      asserts: true
      comparison: true
    govet:
      enable-all: true
      disable:
        - fieldalignment # Micro-optimization, too noisy
    staticcheck:
      checks:
        - all
        - -ST1000 # Package comments (not enforced)
        - -ST1003 # CamelCase naming (generated code has odd names)
        - -ST1016 # Method receiver names (style preference)
    depguard:
      # ClickHouse topology is owned by Periscope. Other services must go
      # through Periscope-Query gRPC for analytics reads. The allowlist below
      # covers the shared driver wrapper (pkg/database/clickhouse.go) and the
      # CLI health/provisioning helpers; all other paths are denied via
      # exclusions.rules.
      rules:
        no-direct-clickhouse:
          list-mode: lax
          deny:
            - pkg: github.com/ClickHouse/clickhouse-go/v2
              desc: "Direct ClickHouse access is forbidden outside Periscope and the shared driver wrapper. Use Periscope-Query gRPC for reads; Periscope-Ingest for writes."
            - pkg: github.com/ClickHouse/clickhouse-go/v2/lib/driver
              desc: "Direct ClickHouse driver imports are forbidden outside pkg/database/clickhouse.go."

  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      # Exclude generated protobuf files
      - linters:
          - errcheck
          - govet
          - ineffassign
          - staticcheck
          - unused
        path: .*\.pb\.go$

      # Exclude generated gRPC files
      - linters:
          - errcheck
          - govet
          - ineffassign
          - staticcheck
          - unused
        path: .*_grpc\.pb\.go$

      # Exclude GraphQL generated code
      - linters:
          - errcheck
          - govet
          - ineffassign
          - staticcheck
          - unused
        path: api_gateway/graph/generated/.*\.go$

      - linters:
          - errcheck
          - govet
          - ineffassign
          - staticcheck
          - unused
        path: api_gateway/graph/model/models_gen\.go$

      # Test files: allow unused fixtures and unchecked errors in tests
      - linters:
          - errcheck
          - unused
        path: _test\.go$

      # Allow context.Background() in main/cmd packages (entry points)
      - linters:
          - noctx
        path: cmd/

      # ClickHouse driver allowlist: the shared wrapper and CLI tooling are
      # the canonical entry points. Periscope-Ingest/Periscope-Query consume
      # the wrapper rather than importing the driver directly.
      - linters:
          - depguard
        path: pkg/database/clickhouse\.go$
      - linters:
          - depguard
        path: cli/pkg/health/clickhouse\.go$
      - linters:
          - depguard
        path: cli/pkg/provisioner/ch_executor\.go$

    paths:
      - vendor
      - third_party$
      - builtin$
      - examples$

issues:
  max-issues-per-linter: 0
  max-same-issues: 0

formatters:
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
