    fields:
      id:
        resolver: true
  StreamAnalyticsDaily:
    model:
      - github.com/Livepeer-FrameWorks/monorepo/pkg/proto.StreamAnalyticsDaily
    fields:
      id:
        resolver: true
      streamId:
        resolver: true
      stream:
        resolver: true
  ProcessingUsageRecord:
    model:
      - github.com/Livepeer-FrameWorks/monorepo/pkg/proto.ProcessingUsageRecord
    fields:
      id:
        resolver: true
      streamId:
        resolver: true
      stream:
        resolver: true
  APIUsageRecord:
    model:
      - github.com/Livepeer-FrameWorks/monorepo/pkg/proto.APIUsageRecord
    fields:
      id:
        resolver: true
      timestamp:
        resolver: true
      requestCount:
        resolver: true
      errorCount:
        resolver: true
      totalDurationMs:
        resolver: true
      totalComplexity:
        resolver: true
      uniqueUsers:
        resolver: true
      uniqueTokens:
        resolver: true
  APIUsageSummary:
