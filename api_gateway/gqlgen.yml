# GraphQL schema location (shared schema)
schema:
  - ../pkg/graphql/schema.graphql

# Where should the generated server code go?
exec:
  filename: graph/generated/generated.go
  package: generated

# Where should any generated models go?
model:
  filename: graph/model/models_gen.go
  package: model

# Where should the resolver implementations go?
resolver:
  layout: follow-schema
  dir: graph
  package: graph
  filename_template: "{name}.resolvers.go"

# Optional: turn on or off automatic camelCase marshaling for field names
autobind:
  - github.com/Livepeer-FrameWorks/monorepo/pkg/proto

# Map GraphQL types to existing Go models (comprehensive mapping)
# NOTE: Using pb.* proto types for all analytics/streaming types
models:
  # Analytics root types - custom empty structs (force resolvers)
  Analytics:
    model:
      - frameworks/api_gateway/graph/markers.Analytics
  AnalyticsUsage:
    model:
      - frameworks/api_gateway/graph/markers.AnalyticsUsage
  StreamingUsage:
    model:
      - frameworks/api_gateway/graph/markers.StreamingUsage
  StorageUsage:
    model:
      - frameworks/api_gateway/graph/markers.StorageUsage
  ProcessingUsage:
    model:
      - frameworks/api_gateway/graph/markers.ProcessingUsage
  APIUsage:
    model:
      - frameworks/api_gateway/graph/markers.APIUsage
  AnalyticsHealth:
    model:
      - frameworks/api_gateway/graph/markers.AnalyticsHealth
  AnalyticsLifecycle:
    model:
      - frameworks/api_gateway/graph/markers.AnalyticsLifecycle
  AnalyticsInfra:
    model:
      - frameworks/api_gateway/graph/markers.AnalyticsInfra
  TenantEvent:
    model:
      - frameworks/api_gateway/graph/model.TenantEvent
  SkipperInvestigationEvent:
    model:
      - frameworks/api_gateway/graph/model.SkipperInvestigationEvent
  # Rollup analytics types - use generated model types (NOT proto)
  # Proto has same-named types (StreamHealthSummary, ClientQoeSummary, RoutingCountryStat)
  # but resolvers return model.* types, so we must override autobind.
  StreamHealthSummary:
    model:
      - frameworks/api_gateway/graph/model.StreamHealthSummary
  ClientQoeSummary:
    model:
      - frameworks/api_gateway/graph/model.ClientQoeSummary
  RoutingEfficiency:
    model:
      - frameworks/api_gateway/graph/model.RoutingEfficiency
  RoutingCountryStat:
    model:
      - frameworks/api_gateway/graph/model.RoutingCountryStat

  # Analytics types - bound to proto types
  StreamAnalyticsSummary:
    model:
      - github.com/Livepeer-FrameWorks/monorepo/pkg/proto.StreamAnalyticsSummary
    fields:
      streamId:
        resolver: true
      stream:
        resolver: true
  QualityTierSummary:
    model:
      - github.com/Livepeer-FrameWorks/monorepo/pkg/proto.QualityTierSummary
  RoutingEvent:
    model:
      - github.com/Livepeer-FrameWorks/monorepo/pkg/proto.RoutingEvent
    fields:
      streamId:
        resolver: true
      stream:
        resolver: true
  ViewerSession:
    model:
      - github.com/Livepeer-FrameWorks/monorepo/pkg/proto.ViewerSession
    fields:
      id:
        resolver: true
      streamId:
        resolver: true
      stream:
        resolver: true
  ViewerMetrics5m:
    model:
      - github.com/Livepeer-FrameWorks/monorepo/pkg/proto.ViewerSession5M
  ConnectionEvent:
    model:
      - github.com/Livepeer-FrameWorks/monorepo/pkg/proto.ConnectionEvent
    fields:
      id:
        resolver: true
      streamId:
        resolver: true
      connectionAddr:
        resolver: true # Redact client IP for privacy
      stream:
        resolver: true
  StreamHealthMetric:
    model:
      - github.com/Livepeer-FrameWorks/monorepo/pkg/proto.StreamHealthMetric
    fields:
      id:
        resolver: true
      streamId:
        resolver: true
      stream:
        resolver: true
  ViewerCountBucket:
    model:
      - github.com/Livepeer-FrameWorks/monorepo/pkg/proto.ViewerCountBucket
    fields:
      streamId:
        resolver: true
      stream:
        resolver: true
  GeographicDistribution:
    model:
      - frameworks/api_gateway/graph/model.GeographicDistribution
    fields:
      streamId:
        resolver: true
      stream:
        resolver: true
  RebufferingEvent:
    model:
      - github.com/Livepeer-FrameWorks/monorepo/pkg/proto.RebufferingEvent
    fields:
      streamId:
        resolver: true
      stream:
        resolver: true
  CountryMetric:
