    fields:
      id:
        resolver: true
  NodePerformance5m:
    model:
      - github.com/Livepeer-FrameWorks/monorepo/pkg/proto.NodePerformance5M
    fields:
      id:
        resolver: true
  ViewerHoursHourly:
    model:
      - github.com/Livepeer-FrameWorks/monorepo/pkg/proto.ViewerHoursHourly
    fields:
