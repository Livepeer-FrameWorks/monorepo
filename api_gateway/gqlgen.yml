      - github.com/Livepeer-FrameWorks/monorepo/pkg/proto.APIUsageSummary
    fields:
      date:
        resolver: true
      totalRequests:
        resolver: true
      totalErrors:
        resolver: true
      totalComplexity:
        resolver: true
