      - github.com/Livepeer-FrameWorks/monorepo/pkg/proto.CountryMetric
  CountryMetrics:
    model:
      - github.com/Livepeer-FrameWorks/monorepo/pkg/proto.CountryMetrics
  CityMetric:
    model:
      - github.com/Livepeer-FrameWorks/monorepo/pkg/proto.CityMetric
  PlatformOverview:
    model:
      - github.com/Livepeer-FrameWorks/monorepo/pkg/proto.GetPlatformOverviewResponse
  ViewerGeographic:
    model:
      - github.com/Livepeer-FrameWorks/monorepo/pkg/proto.ConnectionEvent
