      - github.com/Livepeer-FrameWorks/monorepo/pkg/proto.ClipEvent
    fields:
      id:
        resolver: true
      streamId:
        resolver: true
      playbackId:
        resolver: true
      filePath:
        resolver: true
      s3Url:
        resolver: true
      stream:
        resolver: true
  ArtifactState:
    model:
      - github.com/Livepeer-FrameWorks/monorepo/pkg/proto.ArtifactState
    fields:
      streamId:
        resolver: true
      playbackId:
        resolver: true
      filePath:
        resolver: true
      s3Url:
        resolver: true
      manifestPath:
        resolver: true
      stream:
        resolver: true
  StreamTrack:
    model:
      - github.com/Livepeer-FrameWorks/monorepo/pkg/proto.StreamTrack
  # Pre-aggregated analytics types (Materialized Views)
  StreamConnectionHourly:
    model:
      - github.com/Livepeer-FrameWorks/monorepo/pkg/proto.StreamConnectionHourly
    fields:
      id:
        resolver: true
      streamId:
        resolver: true
      stream:
        resolver: true
  ClientMetrics5m:
    model:
      - github.com/Livepeer-FrameWorks/monorepo/pkg/proto.ClientMetrics5M
    fields:
      id:
        resolver: true
      streamId:
        resolver: true
      stream:
        resolver: true
  QualityTierDaily:
    model:
      - github.com/Livepeer-FrameWorks/monorepo/pkg/proto.QualityTierDaily
    fields:
      id:
        resolver: true
      streamId:
        resolver: true
      stream:
        resolver: true
  QualityChangesHourly:
    model:
