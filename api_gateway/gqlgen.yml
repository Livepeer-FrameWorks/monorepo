      - github.com/Livepeer-FrameWorks/monorepo/pkg/proto.NodeMetric
    fields:
      id:
        resolver: true
  NodeMetricHourly:
    model:
      - github.com/Livepeer-FrameWorks/monorepo/pkg/proto.NodeMetricHourly
    fields:
      id:
        resolver: true
  NodeMetricsAggregated:
    model:
      - github.com/Livepeer-FrameWorks/monorepo/pkg/proto.NodeMetricsAggregated
  TimeRange:
    model:
      - github.com/Livepeer-FrameWorks/monorepo/pkg/proto.TimeRange
  Cluster:
    model:
      - github.com/Livepeer-FrameWorks/monorepo/pkg/proto.InfrastructureCluster
    fields:
      id:
        resolver: true
  Node:
    model:
      - frameworks/api_gateway/graph/model.Node
  InfrastructureNode:
    model:
      - github.com/Livepeer-FrameWorks/monorepo/pkg/proto.InfrastructureNode
    fields:
      id:
        resolver: true
      internalIp:
        resolver: true
      externalIp:
        resolver: true
      wireguardIp:
        resolver: true
      wireguardPublicKey:
        resolver: true

  # Cluster Marketplace types - bound to proto types
  MarketplaceCluster:
    model:
      - github.com/Livepeer-FrameWorks/monorepo/pkg/proto.MarketplaceClusterEntry
  ClusterSubscription:
    model:
      - github.com/Livepeer-FrameWorks/monorepo/pkg/proto.ClusterSubscription
  ClusterInvite:
    model:
      - github.com/Livepeer-FrameWorks/monorepo/pkg/proto.ClusterInvite

  # Tenant types - bound to proto types
  Tenant:
    model:
      - github.com/Livepeer-FrameWorks/monorepo/pkg/proto.Tenant
  User:
    model:
      - github.com/Livepeer-FrameWorks/monorepo/pkg/proto.User
  # WalletIdentity and WalletLoginPayload: NOT bound to proto.
  # Because they're used in union types which require marker interface methods.
  # Use manually created model types (graph/model/wallet.go).
  WalletIdentity:
    model:
      - frameworks/api_gateway/graph/model.WalletIdentity
  WalletLoginPayload:
    model:
      - frameworks/api_gateway/graph/model.WalletLoginPayload
  # BalanceTransaction and PrepaidBalance: NOT bound to proto.
  # Use manually created model types (graph/model/prepaid.go).
  BalanceTransaction:
    model:
      - frameworks/api_gateway/graph/model.BalanceTransaction
  PrepaidBalance:
    model:
      - frameworks/api_gateway/graph/model.PrepaidBalance
  DeveloperToken:
    model:
      - github.com/Livepeer-FrameWorks/monorepo/pkg/proto.APITokenInfo
  BootstrapToken:
    model:
      - github.com/Livepeer-FrameWorks/monorepo/pkg/proto.BootstrapToken

  Money:
    model:
      - github.com/99designs/gqlgen/graphql.Float
  Currency:
    model:
      - github.com/99designs/gqlgen/graphql.String

  # Analytics sort enums - bound to proto types
  SortOrder:
    model:
      - github.com/Livepeer-FrameWorks/monorepo/pkg/proto.SortOrder
  StreamSummarySortField:
    model:
      - github.com/Livepeer-FrameWorks/monorepo/pkg/proto.StreamSummarySortField

  # Cluster marketplace enums - bound to proto types
  ClusterVisibility:
    model:
      - github.com/Livepeer-FrameWorks/monorepo/pkg/proto.ClusterVisibility
  ClusterPricingModel:
    model:
      - github.com/Livepeer-FrameWorks/monorepo/pkg/proto.ClusterPricingModel
  ClusterSubscriptionStatus:
    model:
      - github.com/Livepeer-FrameWorks/monorepo/pkg/proto.ClusterSubscriptionStatus

  # Crypto top-up enums - bound to proto types
  CryptoAsset:
    model:
      - github.com/Livepeer-FrameWorks/monorepo/pkg/proto.CryptoAsset

  # AI Consultant (Skipper) types - manual model types (union members need marker interfaces)
  SkipperChatEvent:
    model:
      - frameworks/api_gateway/graph/model.SkipperChatEvent
  SkipperToken:
    model:
      - frameworks/api_gateway/graph/model.SkipperToken
  SkipperToolStartEvent:
    model:
      - frameworks/api_gateway/graph/model.SkipperToolStartEvent
  SkipperToolEndEvent:
    model:
      - frameworks/api_gateway/graph/model.SkipperToolEndEvent
  SkipperMeta:
    model:
      - frameworks/api_gateway/graph/model.SkipperMeta
  SkipperCitation:
    model:
      - frameworks/api_gateway/graph/model.SkipperCitation
  SkipperToolDetail:
    model:
      - frameworks/api_gateway/graph/model.SkipperToolDet
  SkipperDone:
    model:
      - frameworks/api_gateway/graph/model.SkipperDone
  SkipperConversation:
    model:
      - frameworks/api_gateway/graph/model.SkipperConversation
  SkipperConversationSummary:
    model:
      - frameworks/api_gateway/graph/model.SkipperConversationSummary
  SkipperMessage:
    model:
      - frameworks/api_gateway/graph/model.SkipperMessage
  SkipperChatInput:
    model:
      - frameworks/api_gateway/graph/model.SkipperChatInput
  SkipperMode:
    model:
      - frameworks/api_gateway/graph/model.SkipperMode

  # Support messaging enums - bound to proto types
  ConversationStatus:
    model:
      - github.com/Livepeer-FrameWorks/monorepo/pkg/proto.ConversationStatus
  MessageSender:
    model:
      - github.com/Livepeer-FrameWorks/monorepo/pkg/proto.MessageSender

  # Media retention enum: proto's MediaRetentionTarget is an int32 enum,
  # which gqlgen can't autobind as a string GraphQL enum. Force a generated
  # model.MediaRetentionTarget (string-based) for the GraphQL surface; the
  # resolver translates to/from the proto enum at the wire boundary.
  MediaRetentionTarget:
    model:
      - frameworks/api_gateway/graph/model.MediaRetentionTarget
  # MediaRetentionBounds is a plain proto message — autobind picks it up.

  # NodeOperationalMode is a GraphQL-only enum (the proto wire uses a string).
  # Bind to a hand-defined model enum so gqlgen has something concrete to
  # marshal; the resolver maps to/from the wire string.
  NodeOperationalMode:
    model:
      - frameworks/api_gateway/graph/model.NodeOperationalMode

# Skip generation for these types (we'll implement them manually)
skip_validation: true
