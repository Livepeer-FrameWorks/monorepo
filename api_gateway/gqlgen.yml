    fields:
      totalRequests:
        resolver: true
      totalErrors:
        resolver: true
      uniqueOperations:
        resolver: true
      totalComplexity:
        resolver: true

  # Real-time subscription types - bound to ipc.proto types (raw Kafka events via Signalman)
  ViewerMetrics:
    model:
      - github.com/Livepeer-FrameWorks/monorepo/pkg/proto.ClientLifecycleUpdate
    fields:
      streamId:
        resolver: true
      host:
        resolver: true # Redact client IP for privacy
      stream:
        resolver: true
  SystemHealthEvent:
    model:
      - github.com/Livepeer-FrameWorks/monorepo/pkg/proto.NodeLifecycleUpdate
    fields:
      nodeId:
        resolver: true # Return node_uuid (database UUID) not node_id (logical name)
  DVREvent:
    model:
      - github.com/Livepeer-FrameWorks/monorepo/pkg/proto.DVRLifecycleData
    fields:
      playbackId:
        resolver: true
      streamId:
        resolver: true
      stream:
        resolver: true
  TrackListUpdate:
    model:
      - github.com/Livepeer-FrameWorks/monorepo/pkg/proto.StreamTrackListTrigger
    fields:
      streamId:
        resolver: true
      stream:
        resolver: true
  ClipLifecycle:
    model:
      - github.com/Livepeer-FrameWorks/monorepo/pkg/proto.ClipLifecycleData
    fields:
      playbackId:
        resolver: true
      streamId:
        resolver: true
      stream:
        resolver: true
      filePath:
        resolver: true
      s3Url:
        resolver: true

  # Real-time stream subscription types - direct proto passthrough
  VodLifecycle:
    model:
      - github.com/Livepeer-FrameWorks/monorepo/pkg/proto.VodLifecycleData
    fields:
      playbackId:
        resolver: true
      # Security: Don't expose internal identifiers
      tenantId:
        resolver: true # Return nil - internal only
      userId:
        resolver: true # Return nil - internal only
      filePath:
        resolver: true
      s3Url:
        resolver: true

  # Stream management types - bound to proto types
  Stream:
    model:
      - github.com/Livepeer-FrameWorks/monorepo/pkg/proto.Stream
    fields:
      pushTargets:
        resolver: true
  PushTarget:
    model:
      - github.com/Livepeer-FrameWorks/monorepo/pkg/proto.PushTarget
    fields:
      id:
        resolver: true
      streamId:
        resolver: true
      createdAt:
        resolver: true
      lastPushedAt:
        resolver: true
  StreamMetrics:
    model:
      - github.com/Livepeer-FrameWorks/monorepo/pkg/proto.StreamStatusResponse
  StreamKey:
    model:
      - github.com/Livepeer-FrameWorks/monorepo/pkg/proto.StreamKey
    fields:
      streamId:
        resolver: true
      stream:
        resolver: true
  Recording:
    model:
      - github.com/Livepeer-FrameWorks/monorepo/pkg/proto.Recording
  Clip:
    model:
      - github.com/Livepeer-FrameWorks/monorepo/pkg/proto.ClipInfo
    fields:
      id:
        resolver: true
      streamId:
        resolver: true
      # Lifecycle fields resolved from Periscope (batch lookup by clipHash)
      status:
        resolver: true
      sizeBytes:
        resolver: true
      storageLocation:
        resolver: true
      nodeId:
        resolver: true
      storagePath:
        resolver: true
      stream:
        resolver: true
  DVRRequest:
    model:
      - github.com/Livepeer-FrameWorks/monorepo/pkg/proto.DVRInfo
    fields:
      streamId:
        resolver: true
      # Lifecycle fields resolved from Periscope (batch lookup by dvrHash)
      status:
        resolver: true
      sizeBytes:
        resolver: true
      storageLocation:
        resolver: true
      storageNodeId:
        resolver: true
      manifestPath:
        resolver: true
      startedAt:
        resolver: true
      endedAt:
        resolver: true
      durationSeconds:
        resolver: true
      errorMessage:
        resolver: true
      s3Url:
        resolver: true
      frozenAt:
        resolver: true

      # VOD upload types - generated by gqlgen (not bound to proto)
      # Because VodAsset/VodUploadSession are used in unions, they need marker interface methods
      # which proto types don't have. Let gqlgen generate them and convert in resolvers.

      # Viewer endpoint resolution types - bound to proto types
      stream:
        resolver: true
  # VodAsset is fully gqlgen-generated; fields below need resolvers because
  # they require either a Commodore round-trip (playbackPolicy) or a
  # Purser/projection lookup (storageCost) — gqlgen would otherwise expect
  # them as struct fields on model.VodAsset.
  VodAsset:
    fields:
      playbackPolicy:
        resolver: true
      effectiveRetention:
        resolver: true
      storageCost:
        resolver: true
  # PlaybackJwtPolicy and PlaybackWebhookPolicy autobind to proto types, but
  # two fields don't line up:
  #   - jwt.requiredClaimsJson is a list-of-pairs in GraphQL vs map in proto
  #   - webhook.secretMasked is rendered server-side (proto has secret_pt)
  # gqlgen stubs resolvers for those mismatched fields; we implement them to
  # do the conversion / redaction.
  PlaybackJwtPolicy:
    fields:
      requiredClaimsJson:
        resolver: true
  PlaybackWebhookPolicy:
    fields:
      secretMasked:
        resolver: true
  ViewerEndpointResponse:
    model:
      - github.com/Livepeer-FrameWorks/monorepo/pkg/proto.ViewerEndpointResponse
  ViewerEndpoint:
    model:
      - github.com/Livepeer-FrameWorks/monorepo/pkg/proto.ViewerEndpoint
  PlaybackMetadata:
    model:
      - github.com/Livepeer-FrameWorks/monorepo/pkg/proto.PlaybackMetadata
  PlaybackTrack:
    model:
      - github.com/Livepeer-FrameWorks/monorepo/pkg/proto.PlaybackTrack
  PlaybackInstance:
    model:
      - github.com/Livepeer-FrameWorks/monorepo/pkg/proto.PlaybackInstance
  IngestMetadata:
    model:
      - github.com/Livepeer-FrameWorks/monorepo/pkg/proto.IngestMetadata
    fields:
      streamId:
        resolver: true

      # Billing types - bound to proto types
      stream:
        resolver: true
  BillingStatus:
    model:
      - github.com/Livepeer-FrameWorks/monorepo/pkg/proto.BillingStatusResponse
    fields:
      paymentMethods:
        resolver: true
  BillingTier:
    model:
      - github.com/Livepeer-FrameWorks/monorepo/pkg/proto.BillingTier
  BillingFeatures:
    model:
      - github.com/Livepeer-FrameWorks/monorepo/pkg/proto.BillingFeatures
  PricingRule:
    model:
      - github.com/Livepeer-FrameWorks/monorepo/pkg/proto.PricingRule
  LineItem:
    model:
      - github.com/Livepeer-FrameWorks/monorepo/pkg/proto.LineItem
  Invoice:
    model:
      - github.com/Livepeer-FrameWorks/monorepo/pkg/proto.Invoice
  Payment:
    model:
      - github.com/Livepeer-FrameWorks/monorepo/pkg/proto.PaymentResponse
  UsageRecord:
    model:
      - github.com/Livepeer-FrameWorks/monorepo/pkg/proto.UsageRecord
  LiveUsageSummary:
    model:
      - github.com/Livepeer-FrameWorks/monorepo/pkg/proto.LiveUsageSummary
  # TenantUsage, UsageEntry, CostEntry remain as model types
  # because proto.TenantUsageResponse uses map<string, double>
  # which doesn't map directly to GraphQL arrays

  # Infrastructure types - bound to proto types
  ServiceInstance:
    model:
      - github.com/Livepeer-FrameWorks/monorepo/pkg/proto.ServiceInstance
  ServiceInstanceHealth:
    model:
      - github.com/Livepeer-FrameWorks/monorepo/pkg/proto.ServiceInstanceHealth
    fields:
      host:
        resolver: true
      healthEndpoint:
        resolver: true
  NodeMetric:
