cards:
  - slug: periscope.routing-decisions-by-selected-node
    name: Routing decisions by selected node
    display: table
    database: FrameWorks ClickHouse
    query: |
      SELECT coalesce(nullIf(selected_node_id, ''), selected_node) AS node,
             count() AS decisions,
             countIf(status = 'success') AS successes,
             round(successes / nullIf(decisions, 0), 4) AS success_rate,
             round(avgIf(routing_distance_km, routing_distance_km IS NOT NULL), 2) AS avg_distance_km,
             max(timestamp) AS last_seen
      FROM periscope.routing_decisions
      WHERE timestamp >= now() - INTERVAL 24 HOUR
      GROUP BY node
      ORDER BY decisions DESC
      LIMIT 25

  - slug: periscope.routing-distance-by-selected-node
    name: Routing distance by selected node
    display: line
    database: FrameWorks ClickHouse
    query: |
      SELECT toStartOfHour(timestamp) AS hour,
             coalesce(nullIf(selected_node_id, ''), selected_node) AS node,
             round(avgIf(routing_distance_km, routing_distance_km IS NOT NULL), 2) AS avg_distance_km,
             round(quantileIf(0.95)(routing_distance_km, routing_distance_km IS NOT NULL), 2) AS p95_distance_km,
             count() AS decisions
      FROM periscope.routing_decisions
      WHERE timestamp >= now() - INTERVAL 7 DAY
      GROUP BY hour, node
      ORDER BY hour, node
      LIMIT 500

  - slug: periscope.routing-attribution-coverage
    name: Routing attribution coverage
    display: scalar
    database: FrameWorks ClickHouse
    query: |
      SELECT count() AS rows,
             countIf(selected_node_id = '') AS missing_selected_node_id,
             countIf(routing_distance_km IS NULL) AS missing_distance,
             round(missing_selected_node_id / nullIf(rows, 0), 4) AS missing_node_ratio,
             round(missing_distance / nullIf(rows, 0), 4) AS missing_distance_ratio
      FROM periscope.routing_decisions
      WHERE timestamp >= now() - INTERVAL 24 HOUR

  - slug: periscope.artifact-state-by-processing-node
    name: Artifact state by processing node
    display: table
    database: FrameWorks ClickHouse
    query: |
      SELECT processing_node_id,
             content_type,
             stage,
             count() AS artifacts,
             round(sum(ifNull(size_bytes, 0)) / pow(1024, 3), 3) AS gib
      FROM periscope.artifact_state_current FINAL
      WHERE updated_at >= now() - INTERVAL 30 DAY
      GROUP BY processing_node_id, content_type, stage
      ORDER BY artifacts DESC
      LIMIT 100

  - slug: periscope.artifact-lifecycle-by-ingest-node
    name: Artifact lifecycle by ingest node
    display: line
    database: FrameWorks ClickHouse
    query: |
      SELECT toStartOfHour(timestamp) AS hour,
             ingest_node_id,
             content_type,
             stage,
             count() AS events
      FROM periscope.artifact_events
      WHERE timestamp >= now() - INTERVAL 7 DAY
      GROUP BY hour, ingest_node_id, content_type, stage
      ORDER BY hour DESC, events DESC
      LIMIT 500

  - slug: periscope.artifact-attribution-coverage
    name: Artifact attribution coverage
    display: scalar
    database: FrameWorks ClickHouse
    query: |
      SELECT count() AS events,
             countIf(ingest_node_id = '') AS missing_ingest_node,
             round(missing_ingest_node / nullIf(events, 0), 4) AS missing_ratio
      FROM periscope.artifact_events
      WHERE timestamp >= now() - INTERVAL 24 HOUR

  - slug: periscope.raw-mist-triggers-by-type
    name: Raw Mist triggers by type
    display: table
    database: FrameWorks ClickHouse
    query: |
      SELECT trigger_type,
             count() AS rows,
             uniqExact(source_request_id) AS logical_triggers,
             rows - logical_triggers AS duplicate_deliveries,
             max(toDateTime(received_at_ms / 1000)) AS last_received
      FROM periscope.raw_mist_triggers
      WHERE toDateTime(received_at_ms / 1000) >= now() - INTERVAL 24 HOUR
      GROUP BY trigger_type
      ORDER BY logical_triggers DESC

  - slug: periscope.raw-mist-trigger-ingest-lag
    name: Raw Mist trigger ingest lag
    display: table
    database: FrameWorks ClickHouse
    query: |
      SELECT trigger_type,
             quantile(0.5)((ingested_at_ms - received_at_ms) / 1000.0) AS p50_seconds,
             quantile(0.95)((ingested_at_ms - received_at_ms) / 1000.0) AS p95_seconds,
             quantile(0.99)((ingested_at_ms - received_at_ms) / 1000.0) AS p99_seconds,
             count() AS rows
      FROM periscope.raw_mist_triggers
      WHERE toDateTime(received_at_ms / 1000) >= now() - INTERVAL 24 HOUR
      GROUP BY trigger_type
      ORDER BY p95_seconds DESC

  - slug: periscope.storage-hot-cold-frozen-by-tenant
    name: Storage hot/cold/frozen by tenant
    display: table
    database: FrameWorks ClickHouse
    query: |
      SELECT tenant_id,
             storage_scope,
             round(sum(latest_total)  / pow(1024, 3), 3) AS total_gib,
             round(sum(latest_dvr)    / pow(1024, 3), 3) AS dvr_gib,
             round(sum(latest_clip)   / pow(1024, 3), 3) AS clip_gib,
             round(sum(latest_vod)    / pow(1024, 3), 3) AS vod_gib,
             round(sum(latest_frozen) / pow(1024, 3), 3) AS frozen_gib
      FROM (
          SELECT tenant_id,
                 node_id,
                 storage_scope,
                 argMax(total_bytes, timestamp) AS latest_total,
                 argMax(dvr_bytes,   timestamp) AS latest_dvr,
                 argMax(clip_bytes,  timestamp) AS latest_clip,
                 argMax(vod_bytes,   timestamp) AS latest_vod,
                 argMax(frozen_dvr_bytes + frozen_clip_bytes + frozen_vod_bytes, timestamp) AS latest_frozen
          FROM periscope.storage_snapshots
          WHERE timestamp >= now() - INTERVAL 1 DAY
          GROUP BY tenant_id, node_id, storage_scope
      )
      GROUP BY tenant_id, storage_scope
      ORDER BY total_gib DESC
      LIMIT 100

  - slug: periscope.storage-capacity-trend
    name: Storage capacity trend
    display: line
    database: FrameWorks ClickHouse
    query: |
      SELECT day,
             storage_scope,
             round(sum(gb_hours), 2) AS gb_hours
      FROM periscope.storage_usage_daily
      WHERE day >= today() - 30
      GROUP BY day, storage_scope
      ORDER BY day, storage_scope
      LIMIT 500

  # Informational only: unit price is the payg list rate (€0.035 / GiB-hour,
  # storage_gb_seconds_cold in billing_tiers.yaml). Not authoritative billing.
  - slug: periscope.cold-storage-cost-by-tenant
    name: Cold-storage cost by tenant (informational)
    display: table
    database: FrameWorks ClickHouse
    query: |
      SELECT tenant_id,
             round(sum(gb_hours), 2)          AS cold_gib_hours,
             round(sum(gb_hours) * 0.035, 2)  AS est_cost_eur
      FROM periscope.storage_usage_daily
      WHERE storage_scope = 'cold'
        AND day >= today() - 30
      GROUP BY tenant_id
      ORDER BY est_cost_eur DESC
      LIMIT 100

  - slug: periscope.retention-runway
    name: Retention runway (artifacts expiring soon)
    display: table
    database: FrameWorks ClickHouse
    query: |
      SELECT toDate(expires_at) AS expires_on,
             content_type,
             count() AS artifacts,
             round(sum(ifNull(size_bytes, 0)) / pow(1024, 3), 3) AS gib
      FROM periscope.artifact_state_current FINAL
      WHERE expires_at IS NOT NULL
        AND expires_at >= now()
        AND expires_at < now() + INTERVAL 30 DAY
      GROUP BY expires_on, content_type
      ORDER BY expires_on
      LIMIT 200

  # Cold-read amplification: every read-through (action='cached') is by
  # definition a read of a frozen/cold artifact. Repeated reads or large
  # byte totals for one asset mean it should have stayed hot — an eviction
  # (freezeThreshold / LRU) mistake costing cold storage + S3 egress + TTFB.
  - slug: periscope.cold-read-offenders
    name: Cold-read offenders (frozen-but-read assets)
    display: table
    database: FrameWorks ClickHouse
    query: |
      SELECT tenant_id,
             asset_hash,
             asset_type,
             count() AS read_events,
             round(sum(size_bytes) / pow(1024, 3), 3) AS s3_read_gib,
             max(timestamp) AS last_read
      FROM periscope.storage_events
      WHERE action = 'cached'
        AND timestamp >= now() - INTERVAL 7 DAY
      GROUP BY tenant_id, asset_hash, asset_type
      ORDER BY s3_read_gib DESC
      LIMIT 100

  - slug: periscope.cold-read-bytes-by-tenant
    name: Cold-read S3 egress by tenant
    display: line
    database: FrameWorks ClickHouse
    query: |
      SELECT toDate(timestamp) AS day,
             tenant_id,
             round(sum(size_bytes) / pow(1024, 3), 3) AS s3_read_gib
      FROM periscope.storage_events
      WHERE action = 'cached'
        AND timestamp >= now() - INTERVAL 30 DAY
      GROUP BY day, tenant_id
      ORDER BY day, s3_read_gib DESC
      LIMIT 500
