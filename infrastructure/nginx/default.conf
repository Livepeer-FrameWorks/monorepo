server {
    listen 80;
    listen [::]:80;
    server_name localhost;

    resolver 127.0.0.11 valid=10s ipv6=off;

    set $bridge_upstream http://bridge:18000;
    set $chandler_upstream http://chandler:18020;
    set $chartroom_upstream http://chartroom:18030;
    set $chatwoot_upstream http://chatwoot:3000;
    set $foredeck_upstream http://foredeck:18031;
    set $logbook_upstream http://logbook:18033;
    set $mist_api_upstream http://mistserver:4242;
    set $mist_http_upstream http://mistserver:8080;

    proxy_intercept_errors on;
    error_page 502 503 504 /maintenance.html;

    # Health check endpoint
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # Maintenance fallback page (served from local filesystem, not proxied)
    location = /maintenance.html {
        ssi on;
        root /usr/share/nginx/html;
        internal;
    }

    # Marketing Website
    location /marketing/ {
        rewrite ^/marketing/(.*)$ /$1 break;
        proxy_pass $foredeck_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Documentation Website
    # Redirect /docs to /docs/ (avoid nginx default redirect to localhost:80)
    location = /docs {
        return 301 $scheme://$http_host/docs/;
    }

    location /docs/ {
        proxy_pass $logbook_upstream$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Chatwoot (Agent Dashboard) under /support
    location = /support {
        return 301 $scheme://$http_host/support/;
    }

    # WebSocket support for Chatwoot ActionCable
    location /support/cable {
        rewrite ^/support/cable(.*)$ /cable$1 break;
        proxy_pass $chatwoot_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    location /support/ {
        rewrite ^/support/(.*)$ /$1 break;
        proxy_pass $chatwoot_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # GraphQL API Gateway - HTTP endpoint
    # Exact path without trailing slash: internally proxy to /graphql/
    location = /graphql {
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Content-Type application/json;
        proxy_pass $bridge_upstream/graphql/$is_args$args;
    }

    # Trailing slash path: proxy as-is to upstream /graphql/
    location /graphql/ {
        proxy_pass $bridge_upstream$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Content-Type application/json;
    }

    # Dedicated GraphQL WebSocket endpoint for subscriptions
    location /graphql/ws {
        proxy_pass $bridge_upstream$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    # Bridge Auth Proxy - routes to Commodore auth endpoints
    location /auth/ {
        proxy_pass $bridge_upstream$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # MistServer Admin/API (port 4242)
    location /mist/ {
        rewrite ^/mist/(.*)$ /$1 break;
        proxy_pass $mist_api_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # MistServer WebSocket support for admin interface
    location /mist/ws {
        rewrite ^/mist/ws(.*)$ /ws$1 break;
        proxy_pass $mist_api_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400;
    }

    # MistServer Media/View endpoints (port 8080 internally, 9080 externally)
    location /view/ {
        proxy_hide_header Access-Control-Allow-Credentials;
        proxy_hide_header Access-Control-Allow-Headers;
        proxy_hide_header Access-Control-Allow-Methods;
        proxy_hide_header Access-Control-Allow-Origin;
        proxy_hide_header Access-Control-Expose-Headers;
        proxy_hide_header Access-Control-Max-Age;
        proxy_hide_header Access-Control-Request-Headers;
        proxy_hide_header Access-Control-Request-Method;
        add_header Access-Control-Allow-Origin * always;
        add_header Access-Control-Allow-Methods 'GET, HEAD, OPTIONS' always;
        add_header Access-Control-Allow-Headers 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range' always;
        add_header Access-Control-Expose-Headers 'Content-Length,Content-Range,Accept-Ranges' always;

        if ($request_method = OPTIONS) {
            return 204;
        }

        rewrite ^/view/(.*)$ /$1 break;
        proxy_pass $mist_http_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Mst-Path "$scheme://$host/view/";
        
        # WebSocket support for media streaming
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_buffering off;
    }

    # HLS streaming endpoints (via media server port 8080)
    location /hls/ {
        proxy_pass $mist_http_upstream$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # CORS headers for HLS
        add_header Access-Control-Allow-Origin *;
        add_header Access-Control-Allow-Methods 'GET, POST, OPTIONS';
        add_header Access-Control-Allow-Headers 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range';
        add_header Access-Control-Expose-Headers 'Content-Length,Content-Range';
    }

    # WebRTC endpoints (via media server port 8080)
    location /webrtc/ {
        proxy_pass $mist_http_upstream$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # WebSocket support for WebRTC
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Foredeck's Vite build emits root-level /assets/*.js and /assets/*.css.
    # Chandler owns nested asset-key paths such as /assets/{assetKey}/poster.jpg.
    location ~ ^/assets/[^/]+\.(?:js|mjs|css|map|svg|png|jpe?g|gif|webp|avif|ico|woff2?|ttf|otf)$ {
        proxy_pass $foredeck_upstream$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Static assets (thumbnails, media assets)
    location /assets/ {
        proxy_pass $chandler_upstream$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Nginx status for Prometheus monitoring
    location /nginx_status {
        stub_status on;
        access_log off;
        allow 127.0.0.1;
        allow 172.16.0.0/12;  # Docker networks
        deny all;
    }

    # SvelteKit Web Application (behind /app path)
    location = /app {
        return 301 $scheme://$http_host/app/;
    }

    # Static assets from SvelteKit build
    location /app/_app/ {
        proxy_pass $chartroom_upstream$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
    
    # SvelteKit SSR and everything else
    location /app/ {
        proxy_pass $chartroom_upstream$request_uri;
        proxy_http_version 1.1;
        proxy_buffer_size 32k;
        proxy_buffers 8 32k;
        proxy_busy_buffers_size 64k;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # React Marketing Website (root) - SPA routing
    location / {
        proxy_pass $foredeck_upstream$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
} 
