<!DOCTYPE html>
<html>
<head>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; padding: 20px; }
    h1 { font-size: 24px; }
    code { background: #f0f0f0; padding: 2px 6px; border-radius: 3px; }
  </style>
</head>
<body>
  <h1>FrameWorks</h1>
  <p>Live streaming infrastructure management CLI.</p>
  <p>This installer will place the <code>frameworks</code> command-line tool at
     <code>/usr/local/bin/frameworks</code>.</p>
  <p>After installation, run <code>frameworks --help</code> to get started.</p>
  <p>To set up a local edge node, run <code>frameworks edge provision --local</code>.</p>
</body>
</html>
