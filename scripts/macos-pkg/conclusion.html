<!doctype html>
<html>
  <head>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, sans-serif;
        padding: 20px;
      }
      h1 {
        font-size: 24px;
      }
      code {
        padding: 2px 6px;
        border-radius: 3px;
      }
      .cmd {
        margin: 8px 0;
      }
      @media (prefers-color-scheme: dark) {
        code {
          background: #333;
          color: #e0e0e0;
        }
      }
      @media (prefers-color-scheme: light) {
        code {
          background: #f0f0f0;
          color: #1a1a1a;
        }
      }
    </style>
  </head>
  <body>
    <h1>Installation Complete</h1>
    <p>FrameWorks CLI has been installed.</p>
    <div class="cmd"><code>frameworks --help</code> &mdash; see available commands</div>
    <div class="cmd">
      <code>frameworks edge provision --local</code> &mdash; set up a local edge node
    </div>
    <div class="cmd"><code>frameworks-uninstall</code> &mdash; remove FrameWorks</div>
    <p>Documentation: <a href="https://docs.frameworks.live">docs.frameworks.live</a></p>
  </body>
</html>
