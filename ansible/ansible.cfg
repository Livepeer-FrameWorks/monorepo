[defaults]
# Source-first collections path: local role edits take effect without a
# `ansible-galaxy install --force` round-trip; the cache holds external
# collections (community.sops, community.docker, community.postgresql,
# community.general, ansible.posix).
collections_path = collections:.cache/collections
# External Galaxy roles (geerlingguy.postgresql, geerlingguy.redis, caddy)
# live under .cache/roles; our wrapper roles include_role them by namespace.
roles_path = .cache/roles
vars_plugins_enabled = host_group_vars,community.sops.sops
stdout_callback = default
interpreter_python = auto_silent
host_key_checking = True
gathering = smart
retry_files_enabled = False

[inventory]
enable_plugins = host_list, yaml, ini, auto

[ssh_connection]
pipelining = True
