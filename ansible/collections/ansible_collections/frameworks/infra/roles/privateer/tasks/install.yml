---
- name: Privateer | install host networking tools
  ansible.builtin.package:
    name: "{{ privateer_network_packages_by_family[ansible_facts.os_family] | default(privateer_network_packages_by_family.RedHat) }}"
    state: present
  when: not ansible_check_mode

- name: Ensure privateer group
  ansible.builtin.group:
    name: "{{ privateer_group }}"
    system: true

- name: Ensure privateer user
  ansible.builtin.user:
    name: "{{ privateer_user }}"
    group: "{{ privateer_group }}"
    system: true
    shell: /usr/sbin/nologin
    create_home: false

- name: Ensure privateer directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ omit if ansible_check_mode else privateer_user }}"
    group: "{{ omit if ansible_check_mode else privateer_group }}"
    mode: "0755"
  loop:
    - "{{ privateer_install_dir }}"
    - "{{ privateer_conf_dir }}"
    - "{{ privateer_data_dir }}"

- name: Download Privateer artifact
  ansible.builtin.get_url:
    url: "{{ privateer_artifact_url }}"
    dest: "{{ privateer_tarball_path }}"
    checksum: "{{ privateer_artifact_checksum }}"
    mode: "0644"
    timeout: 300
  when: not ansible_check_mode

- name: Stat Privateer binary
  ansible.builtin.stat:
    path: "{{ privateer_bin }}"
  register: privateer_bin_stat
  when: not ansible_check_mode

- name: Remove stale Privateer install sentinel when binary is missing
  ansible.builtin.file:
    path: "{{ privateer_install_sentinel }}"
    state: absent
  when:
    - not ansible_check_mode
    - not (privateer_bin_stat.stat.exists | default(false))

- name: Extract Privateer
  ansible.builtin.unarchive:
    src: "{{ privateer_tarball_path }}"
    dest: "{{ privateer_install_dir }}"
    remote_src: true
    owner: "{{ privateer_user }}"
    group: "{{ privateer_group }}"
    creates: "{{ privateer_install_sentinel }}"
  notify: privateer restart
  when: not ansible_check_mode

- name: Normalize Privateer binary name
  ansible.builtin.shell: |
    set -e
    candidate=""
    for path in "{{ privateer_bin }}" "{{ privateer_install_dir }}/frameworks-privateer" "{{ privateer_install_dir }}/frameworks"; do
      if [ -f "$path" ]; then
        candidate="$path"
        break
      fi
    done
    if [ -z "$candidate" ]; then
      candidate="$(
        find "{{ privateer_install_dir }}" -maxdepth 2 -type f \
          \( -name privateer \
          -o -name frameworks-privateer \
          -o -name 'frameworks-privateer-*' \
          -o -name frameworks \) \
          -print -quit
      )"
    fi
    test -n "$candidate"
    if [ "$candidate" != "{{ privateer_bin }}" ]; then
      cp "$candidate" "{{ privateer_bin }}"
    fi
    chmod +x "{{ privateer_bin }}"
    touch "{{ privateer_install_sentinel }}"
    chown {{ privateer_user }}:{{ privateer_group }} "{{ privateer_install_sentinel }}" "{{ privateer_bin }}"
  args:
    creates: "{{ privateer_install_sentinel }}"
  when: not ansible_check_mode
