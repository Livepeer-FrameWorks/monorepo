---
- name: Privateer | install host networking tools
  ansible.builtin.package:
    name: "{{ privateer_network_packages_by_family[ansible_facts.os_family] | default(privateer_network_packages_by_family.RedHat) }}"
    state: present
  when: not ansible_check_mode

- name: Ensure privateer group
  ansible.builtin.group:
    name: "{{ privateer_group }}"
    system: true

- name: Ensure privateer user
  ansible.builtin.user:
    name: "{{ privateer_user }}"
    group: "{{ privateer_group }}"
    system: true
    shell: /usr/sbin/nologin
    create_home: false

- name: Ensure privateer directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ omit if ansible_check_mode else privateer_user }}"
    group: "{{ omit if ansible_check_mode else privateer_group }}"
    mode: "0755"
  loop:
    - "{{ privateer_install_dir }}"
    - "{{ privateer_conf_dir }}"
    - "{{ privateer_data_dir }}"

- name: Download Privateer artifact
  ansible.builtin.get_url:
    url: "{{ privateer_artifact_url }}"
    dest: "{{ privateer_tarball_path }}"
    checksum: "{{ privateer_artifact_checksum }}"
    mode: "0644"
    timeout: 300
  when: not ansible_check_mode

- name: Stat Privateer binary
  ansible.builtin.stat:
    path: "{{ privateer_bin }}"
  register: privateer_bin_stat
  when: not ansible_check_mode

- name: Stat Privateer install sentinel
  ansible.builtin.stat:
    path: "{{ privateer_install_sentinel }}"
  register: privateer_install_sentinel_stat
  when: not ansible_check_mode

- name: Read installed Privateer version
  ansible.builtin.shell: |
    set -o pipefail
    version="$(
      "{{ privateer_bin }}" version 2>/dev/null |
        awk -F': ' '/platform version:/ {print $2; exit}'
    )"
    test -n "$version"
    printf '%s\n' "$version"
  args:
    executable: /bin/bash
  register: privateer_installed_version
  changed_when: false
  failed_when: false
  when:
    - not ansible_check_mode
    - privateer_bin_stat.stat.exists | default(false)

- name: Remove stale Privateer install sentinel when binary is missing
  ansible.builtin.file:
    path: "{{ privateer_install_sentinel }}"
    state: absent
  when:
    - not ansible_check_mode
    - not (privateer_bin_stat.stat.exists | default(false))

- name: Remove stale Privateer install sentinel when binary version differs
  ansible.builtin.file:
    path: "{{ privateer_install_sentinel }}"
    state: absent
  when:
    - not ansible_check_mode
    - privateer_install_sentinel_stat.stat.exists | default(false)
    - privateer_version | length > 0
    - privateer_installed_version.stdout | default('') != privateer_version

- name: Find existing Privateer binary candidates before changed artifact install
  ansible.builtin.find:
    paths: "{{ privateer_install_dir }}"
    file_type: file
    recurse: false
    patterns:
      - privateer
      - frameworks-privateer
      - frameworks-privateer-*
      - frameworks
  register: privateer_existing_binary_candidates
  when:
    - not ansible_check_mode
    - >
      not (privateer_install_sentinel_stat.stat.exists | default(false)) or
      (
        privateer_version | length > 0 and
        privateer_installed_version.stdout | default('') != privateer_version
      )

- name: Remove existing Privateer binary candidates before changed artifact install
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: absent
  loop: "{{ privateer_existing_binary_candidates.files | default([]) }}"
  loop_control:
    label: "{{ item.path }}"
  when:
    - not ansible_check_mode
    - >
      not (privateer_install_sentinel_stat.stat.exists | default(false)) or
      (
        privateer_version | length > 0 and
        privateer_installed_version.stdout | default('') != privateer_version
      )

- name: Extract Privateer
  ansible.builtin.unarchive:
    src: "{{ privateer_tarball_path }}"
    dest: "{{ privateer_install_dir }}"
    remote_src: true
    owner: "{{ privateer_user }}"
    group: "{{ privateer_group }}"
    creates: "{{ privateer_install_sentinel }}"
  notify: privateer restart
  when: not ansible_check_mode

- name: Normalize Privateer binary name
  ansible.builtin.shell: |
    set -e
    candidate=""
    for path in \
      "{{ privateer_install_dir }}/frameworks-privateer" \
      "{{ privateer_install_dir }}/frameworks" \
      "{{ privateer_bin }}"; do
      if [ -f "$path" ]; then
        candidate="$path"
        break
      fi
    done
    if [ -z "$candidate" ]; then
      candidate="$(
        find "{{ privateer_install_dir }}" -maxdepth 2 -type f \
          \( -name privateer \
          -o -name frameworks-privateer \
          -o -name 'frameworks-privateer-*' \
          -o -name frameworks \) \
          -print -quit
      )"
    fi
    test -n "$candidate"
    if [ "$candidate" != "{{ privateer_bin }}" ]; then
      cp "$candidate" "{{ privateer_bin }}"
    fi
    chmod +x "{{ privateer_bin }}"
    touch "{{ privateer_install_sentinel }}"
    chown {{ privateer_user }}:{{ privateer_group }} "{{ privateer_install_sentinel }}" "{{ privateer_bin }}"
  args:
    creates: "{{ privateer_install_sentinel }}"
  when: not ansible_check_mode
