---
- name: Privateer | ensure framework config root is traversable
  ansible.builtin.file:
    path: /etc/frameworks
    state: directory
    mode: "0755"
  when: not ansible_check_mode

- name: Privateer | collect service state before PKI repair
  ansible.builtin.service_facts:
  when: not ansible_check_mode

- name: Privateer | stop service before PKI repair
  ansible.builtin.systemd:
    name: frameworks-privateer
    state: stopped
  notify: privateer restart
  when:
    - not ansible_check_mode
    - "'frameworks-privateer.service' in ansible_facts.services"
    - ansible_facts.services['frameworks-privateer.service'].state == 'running'

- name: Privateer | ensure internal PKI directory
  ansible.builtin.file:
    path: "{{ (privateer_env.GRPC_TLS_CA_PATH | default(privateer_internal_ca_default_path)) | dirname }}"
    state: directory
    owner: "{{ privateer_user }}"
    group: "{{ privateer_group }}"
    mode: "0755"
  when:
    - not ansible_check_mode
    - privateer_internal_ca_bundle_pem | length > 0

- name: Privateer | render internal CA trust bundle
  ansible.builtin.copy:
    dest: "{{ privateer_env.GRPC_TLS_CA_PATH | default(privateer_internal_ca_default_path) }}"
    content: "{{ privateer_internal_ca_bundle_pem }}"
    owner: "{{ privateer_user }}"
    group: "{{ privateer_group }}"
    mode: "0644"
  when:
    - not ansible_check_mode
    - privateer_internal_ca_bundle_pem | length > 0

- name: Privateer | stat internal CA trust bundle for check mode
  ansible.builtin.stat:
    path: "{{ privateer_env.GRPC_TLS_CA_PATH | default(privateer_internal_ca_default_path) }}"
  register: privateer_internal_ca_bundle_stat
  check_mode: false
  changed_when: false
  when: privateer_internal_ca_bundle_pem | length > 0

- name: Privateer | report pending internal CA trust bundle update under --check
  ansible.builtin.debug:
    msg: >-
      privateer would update internal CA trust bundle at
      {{ privateer_env.GRPC_TLS_CA_PATH | default(privateer_internal_ca_default_path) }}
  changed_when: >-
    not (privateer_internal_ca_bundle_stat.stat.exists | default(false))
    or (
      privateer_internal_ca_bundle_stat.stat.checksum | default('')
      != (privateer_internal_ca_bundle_pem | hash('sha1'))
    )
  when:
    - ansible_check_mode
    - privateer_internal_ca_bundle_pem | length > 0

- name: Privateer | ensure runtime service certificate directory
  ansible.builtin.file:
    path: "{{ ((privateer_env.GRPC_TLS_CA_PATH | default(privateer_internal_ca_default_path)) | dirname) + '/services' }}"
    state: directory
    owner: "{{ privateer_user }}"
    group: frameworks
    mode: "2750"
  when:
    - not ansible_check_mode

- name: Privateer | discover existing service certificate directories
  ansible.builtin.find:
    paths: "{{ ((privateer_env.GRPC_TLS_CA_PATH | default(privateer_internal_ca_default_path)) | dirname) + '/services' }}"
    file_type: directory
    depth: 1
  register: privateer_service_pki_dirs
  when:
    - not ansible_check_mode

- name: Privateer | normalize existing service certificate directories
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    owner: "{{ privateer_user }}"
    group: frameworks
    mode: "2750"
  loop: "{{ privateer_service_pki_dirs.files | default([]) }}"
  when:
    - not ansible_check_mode

- name: Privateer | discover existing service certificate files
  ansible.builtin.find:
    paths: "{{ ((privateer_env.GRPC_TLS_CA_PATH | default(privateer_internal_ca_default_path)) | dirname) + '/services' }}"
    file_type: file
    recurse: true
    patterns:
      - tls.crt
      - tls.key
  register: privateer_service_pki_files
  when:
    - not ansible_check_mode

- name: Privateer | normalize existing service certificate files
  ansible.builtin.file:
    path: "{{ item.path }}"
    owner: "{{ privateer_user }}"
    group: frameworks
    mode: "{{ (item.path | basename == 'tls.key') | ternary('0640', '0644') }}"
  loop: "{{ privateer_service_pki_files.files | default([]) }}"
  loop_control:
    label: "{{ item.path }}"
  when:
    - not ansible_check_mode

- name: Privateer | discover stale service certificate lock files
  ansible.builtin.find:
    paths: "{{ ((privateer_env.GRPC_TLS_CA_PATH | default(privateer_internal_ca_default_path)) | dirname) + '/services' }}"
    file_type: file
    hidden: true
    recurse: true
    patterns:
      - .tls.write.lock
  register: privateer_service_pki_lock_files
  when:
    - not ansible_check_mode

- name: Privateer | remove stale service certificate lock files
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: absent
  loop: "{{ privateer_service_pki_lock_files.files | default([]) }}"
  loop_control:
    label: "{{ item.path }}"
  when:
    - not ansible_check_mode

- name: Privateer | verify service PKI write access
  ansible.builtin.shell: |
    set -euo pipefail
    base={{ (((privateer_env.GRPC_TLS_CA_PATH | default(privateer_internal_ca_default_path)) | dirname) + '/services') | quote }}
    probe="$base/.ansible-privateer-pki-probe"
    printf ok > "$probe"
    rm -f "$probe"
    for dir in "$base"/*; do
      [ -d "$dir" ] || continue
      probe="$dir/.ansible-privateer-pki-probe"
      printf ok > "$probe"
      rm -f "$probe"
    done
  args:
    executable: /bin/bash
  become: true
  become_user: "{{ privateer_user }}"
  changed_when: false
  when:
    - not ansible_check_mode

- name: Privateer | require internal CA trust bundle for TLS
  ansible.builtin.stat:
    path: "{{ privateer_env.GRPC_TLS_CA_PATH }}"
  register: privateer_internal_ca_stat
  when:
    - not ansible_check_mode
    - privateer_env.GRPC_TLS_CA_PATH is defined

- name: Privateer | fail when internal CA trust bundle is missing
  ansible.builtin.fail:
    msg: >-
      Privateer is configured with GRPC_TLS_CA_PATH={{ privateer_env.GRPC_TLS_CA_PATH }}
      but no CA bundle was rendered or found there. Provide the Navigator
      internal CA public bundle in GitOps/SOPS before starting Privateer.
  when:
    - not ansible_check_mode
    - privateer_env.GRPC_TLS_CA_PATH is defined
    - not (privateer_internal_ca_stat.stat.exists | default(false))
