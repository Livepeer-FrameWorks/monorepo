---
- name: redis | install + configure + service (via geerlingguy.redis)
  ansible.builtin.import_tasks: install.yml
  tags: [install, configure, service]

- name: redis | flush handlers before validate
  ansible.builtin.meta: flush_handlers
  tags: [service, validate]

- name: redis | validate
  ansible.builtin.import_tasks: validate.yml
  tags: [validate]

- name: redis | restart
  ansible.builtin.import_tasks: restart.yml
  tags: [restart, never]

- name: redis | cleanup
  ansible.builtin.import_tasks: cleanup.yml
  tags: [cleanup, never]
