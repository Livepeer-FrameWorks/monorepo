---
- name: Refresh service facts
  ansible.builtin.service_facts:

- name: Set Redis service candidates
  ansible.builtin.set_fact:
    redis_service_candidates: >-
      {{
        [redis_service_name ~ '.service'] if redis_named_instance | bool else
        [redis_service_name ~ '.service', 'redis.service', 'redis-server.service', 'valkey.service']
      }}

- name: Select running Redis service fact
  ansible.builtin.set_fact:
    redis_effective_service_name: "{{ item }}"
  loop: "{{ redis_service_candidates }}"
  when:
    - redis_effective_service_name is not defined
    - item in ansible_facts.services
    - ansible_facts.services[item].state == 'running'

- name: Assert redis service running
  ansible.builtin.assert:
    that:
      - redis_effective_service_name is defined
    fail_msg: >-
      Redis service not running; checked {{ redis_service_candidates | join(', ') }}.

- name: Set Redis bind addresses
  ansible.builtin.set_fact:
    redis_bind_addresses: "{{ redis_bind_interface.split() }}"

- name: Assert Redis bind addresses are configured
  ansible.builtin.assert:
    that:
      - redis_bind_addresses | length > 0
    fail_msg: "Redis bind interface cannot be empty."

- name: Select Redis CLI ping host
  ansible.builtin.set_fact:
    redis_ping_host: >-
      {{
        '127.0.0.1' if '127.0.0.1' in redis_bind_addresses else
        '::1' if '::1' in redis_bind_addresses else
        redis_bind_addresses[0]
      }}

- name: Wait for TCP listener
  ansible.builtin.wait_for:
    host: "{{ item }}"
    port: "{{ redis_port }}"
    timeout: 30
  loop: "{{ redis_bind_addresses }}"
  loop_control:
    label: "{{ item }}:{{ redis_port }}"

- name: Discover Redis CLI
  ansible.builtin.shell: |
    set -e
    command -v redis-cli || command -v valkey-cli
  args:
    executable: /bin/sh
  register: redis_cli_binary
  changed_when: false

- name: PING via redis-cli (authed when password set)
  ansible.builtin.command:
    argv: >-
      {{ [redis_cli_binary.stdout, '-h', redis_ping_host, '-p', redis_port | string]
         + (['-a', redis_password] if redis_password | length > 0 else [])
         + ['PING'] }}
  register: redis_ping
  changed_when: false
  no_log: "{{ redis_password | length > 0 }}"
  failed_when: "'PONG' not in redis_ping.stdout"
