---
- name: Install and configure default Redis via geerlingguy.redis
  ansible.builtin.include_role:
    name: geerlingguy.redis
    apply:
      tags: [install, configure, service]
  vars:
    redis_requirepass: "{{ redis_password }}"
  when:
    - not ansible_check_mode
    - not (redis_named_instance | bool)

- name: Select Redis package for named instance
  ansible.builtin.set_fact:
    redis_package_name: redis
  when:
    - not ansible_check_mode
    - redis_named_instance | bool

- name: Select Debian Redis package for named instance
  ansible.builtin.set_fact:
    redis_package_name: redis-server
  when:
    - not ansible_check_mode
    - redis_named_instance | bool
    - ansible_facts.os_family == 'Debian'

- name: Select Valkey package for named instance
  ansible.builtin.set_fact:
    redis_package_name: valkey
  when:
    - not ansible_check_mode
    - redis_named_instance | bool
    - redis_engine == 'valkey'

- name: Select Debian Valkey package for named instance
  ansible.builtin.set_fact:
    redis_package_name: valkey-server
  when:
    - not ansible_check_mode
    - redis_named_instance | bool
    - redis_engine == 'valkey'
    - ansible_facts.os_family == 'Debian'

- name: Install Redis package for named instance
  ansible.builtin.package:
    name: "{{ redis_package_name }}"
    state: present
  when:
    - not ansible_check_mode
    - redis_named_instance | bool

- name: Stop default Redis services for named instance
  ansible.builtin.systemd:
    name: "{{ item }}"
    state: stopped
    enabled: false
  loop:
    - redis.service
    - redis-server.service
    - valkey.service
    - valkey-server.service
  failed_when: false
  when:
    - not ansible_check_mode
    - redis_named_instance | bool

- name: Discover Redis server binary for named instance
  ansible.builtin.shell: |
    set -e
    command -v valkey-server || command -v redis-server
  args:
    executable: /bin/sh
  register: redis_server_binary
  changed_when: false
  when:
    - not ansible_check_mode
    - redis_named_instance | bool

- name: Discover Redis runtime user for named instance
  ansible.builtin.shell: |
    set -e
    for user in valkey redis; do
      if getent passwd "$user" >/dev/null; then
        echo "$user"
        exit 0
      fi
    done
    echo root
  args:
    executable: /bin/sh
  register: redis_runtime_user_result
  changed_when: false
  when:
    - not ansible_check_mode
    - redis_named_instance | bool

- name: Set Redis runtime identity for named instance
  ansible.builtin.set_fact:
    redis_runtime_user: "{{ redis_runtime_user_result.stdout }}"
    redis_runtime_group: "{{ redis_runtime_user_result.stdout }}"
  when:
    - not ansible_check_mode
    - redis_named_instance | bool

- name: Ensure named Redis directories
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    owner: "{{ item.owner | default(redis_runtime_user) }}"
    group: "{{ item.group | default(redis_runtime_group) }}"
    mode: "{{ item.mode }}"
  loop:
    - path: /etc/frameworks
      owner: root
      group: root
      mode: "0755"
    - path: /etc/frameworks/redis
      owner: root
      group: root
      mode: "0755"
    - path: /var/lib/frameworks
      owner: root
      group: root
      mode: "0755"
    - path: /var/lib/frameworks/redis
      owner: root
      group: root
      mode: "0755"
    - path: "{{ redis_data_dir }}"
      mode: "0750"
    - path: /var/log/frameworks
      owner: root
      group: root
      mode: "0755"
    - path: "{{ redis_log_dir }}"
      mode: "0750"
  when:
    - not ansible_check_mode
    - redis_named_instance | bool

- name: Render named Redis config
  ansible.builtin.template:
    src: "{{ 'sentinel.conf.j2' if redis_role == 'sentinel' else 'instance.conf.j2' }}"
    dest: "{{ redis_config_path }}"
    owner: "{{ redis_runtime_user if redis_role == 'sentinel' else 'root' }}"
    group: "{{ redis_runtime_group }}"
    mode: "0640"
  register: redis_named_config
  when:
    - not ansible_check_mode
    - redis_named_instance | bool

- name: Render named Redis systemd unit
  ansible.builtin.template:
    src: instance.service.j2
    dest: "/etc/systemd/system/{{ redis_service_name }}.service"
    owner: root
    group: root
    mode: "0644"
  register: redis_named_unit
  when:
    - not ansible_check_mode
    - redis_named_instance | bool

- name: Verify named Redis bind addresses exist
  ansible.builtin.shell: |
    set -euo pipefail
    configured_addresses="$(ip -o addr show | awk '{print $4}' | cut -d/ -f1)"
    for addr in {{ redis_bind_interface }}; do
      case "$addr" in
        0.0.0.0|::|127.0.0.1|::1|localhost)
          continue
          ;;
      esac
      if ! printf '%s\n' "$configured_addresses" | grep -Fxq "$addr"; then
        echo "$addr"
        exit 1
      fi
    done
  args:
    executable: /bin/bash
  register: redis_bind_address_check
  changed_when: false
  failed_when: false
  when:
    - not ansible_check_mode
    - redis_named_instance | bool

- name: Fail when named Redis bind address is absent
  ansible.builtin.fail:
    msg: >-
      Redis instance {{ redis_instance }} ({{ redis_role }}) is configured to bind
      {{ redis_bind_address_check.stdout }}, but that address is not present on this host.
      Configured bind addresses: {{ redis_bind_interface }}.
  when:
    - not ansible_check_mode
    - redis_named_instance | bool
    - redis_bind_address_check.rc != 0

- name: Verify Redis runtime can access named paths
  ansible.builtin.shell: |
    set -euo pipefail
    test -r "{{ redis_config_path }}"
    {% if redis_role == 'sentinel' %}
    test -w "{{ redis_config_path }}"
    {% endif %}
    test -d "{{ redis_data_dir }}"
    test -w "{{ redis_data_dir }}"
    test -d "{{ redis_log_dir }}"
    test -w "{{ redis_log_dir }}"
  args:
    executable: /bin/bash
  become: true
  become_user: "{{ redis_runtime_user }}"
  register: redis_runtime_access_check
  changed_when: false
  failed_when: false
  when:
    - not ansible_check_mode
    - redis_named_instance | bool

- name: Fail when Redis runtime cannot access named paths
  ansible.builtin.fail:
    msg: >-
      Redis runtime user {{ redis_runtime_user }} cannot access the named instance paths.
      config={{ redis_config_path }}, data={{ redis_data_dir }}, log={{ redis_log_dir }}.
      Check output: {{ redis_runtime_access_check.stderr | default(redis_runtime_access_check.stdout) | default('permission check failed') }}
  when:
    - not ansible_check_mode
    - redis_named_instance | bool
    - redis_runtime_access_check.rc != 0

- name: Check named Redis port owner
  ansible.builtin.shell: |
    set -euo pipefail
    if systemctl is-active --quiet "{{ redis_service_name }}"; then
      exit 0
    fi
    if ss -ltn "sport = :{{ (redis_sentinel_port if redis_role == 'sentinel' else redis_port) }}" | grep -q LISTEN; then
      ss -ltnp "sport = :{{ (redis_sentinel_port if redis_role == 'sentinel' else redis_port) }}" || true
      exit 1
    fi
  args:
    executable: /bin/bash
  register: redis_named_port_check
  changed_when: false
  failed_when: false
  when:
    - not ansible_check_mode
    - redis_named_instance | bool

- name: Fail when named Redis port is already owned
  ansible.builtin.fail:
    msg: >-
      Redis instance {{ redis_instance }} ({{ redis_role }}) cannot bind
      {{ redis_bind_interface }}:{{ (redis_sentinel_port if redis_role == 'sentinel' else redis_port) }};
      another service is already listening. Existing listener:
      {{ redis_named_port_check.stdout | default('unknown') }}
  when:
    - not ansible_check_mode
    - redis_named_instance | bool
    - redis_named_port_check.rc != 0

- name: Reload systemd for named Redis unit
  ansible.builtin.systemd:
    daemon_reload: true
  when:
    - not ansible_check_mode
    - redis_named_instance | bool
    - redis_named_unit.changed

- name: Start named Redis service
  when:
    - not ansible_check_mode
    - redis_named_instance | bool
  block:
    - name: Ensure named Redis is enabled and running
      ansible.builtin.systemd:
        name: "{{ redis_service_name }}"
        enabled: true
        state: "{{ 'restarted' if redis_named_config.changed or redis_named_unit.changed else 'started' }}"
  rescue:
    - name: Capture named Redis systemctl status after failed start
      ansible.builtin.command: "systemctl status {{ redis_service_name }} --no-pager -l"
      register: redis_systemctl_status
      changed_when: false
      failed_when: false
      check_mode: false

    - name: Capture named Redis journal after failed start
      ansible.builtin.command: "journalctl -u {{ redis_service_name }} --no-pager -n 120"
      register: redis_journal
      changed_when: false
      failed_when: false
      check_mode: false

    - name: Capture named Redis log after failed start
      ansible.builtin.slurp:
        src: "{{ redis_log_file }}"
      register: redis_log
      failed_when: false
      check_mode: false

    - name: Fail with named Redis startup diagnostics
      ansible.builtin.fail:
        msg: |-
          {{ redis_service_name }} failed to start
          systemctl status:
          {{ redis_systemctl_status.stdout | default('(no systemctl output)') }}

          journalctl:
          {{ redis_journal.stdout | default('(no journal output)') }}

          redis log:
          {{ (redis_log.content | default('') | b64decode) or '(no redis log output)' }}
