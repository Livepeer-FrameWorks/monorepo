---
# Shared setup across both modes: directories, CA bundle, optional certs.
# The role itself owns these so sub-roles don't each reinvent filesystem
# prep. All paths are controlled by edge_* defaults.

- name: Ensure edge config directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - "{{ edge_conf_dir }}"
    - "{{ edge_conf_dir }}/pki"
    - "{{ edge_cert_dir }}"

- name: Read existing native MistServer env
  ansible.builtin.slurp:
    src: "{{ edge_conf_dir }}/mistserver.env"
  register: edge_existing_mistserver_env
  changed_when: false
  failed_when: false
  no_log: true

- name: Read existing compose file
  ansible.builtin.slurp:
    src: "{{ edge_base_dir }}/docker-compose.yml"
  register: edge_existing_compose_file
  changed_when: false
  failed_when: false
  no_log: true

- name: Extract existing MistServer API password
  ansible.builtin.set_fact:
    edge_existing_native_mist_api_password: >-
      {{
        (
          edge_existing_mistserver_env.content | default('') | b64decode
          | regex_search('(?m)^MIST_API_PASSWORD=[^\r\n]*')
          | default('', true)
        ) | regex_replace('^MIST_API_PASSWORD=', '')
      }}
    edge_existing_compose_mist_api_password: >-
      {{
        (
          edge_existing_compose_file.content | default('') | b64decode
          | regex_search('(?m)MIST_API_PASSWORD=[^"\r\n ]*')
          | default('', true)
        ) | regex_replace('^.*MIST_API_PASSWORD=', '')
      }}
  no_log: true

- name: Select effective MistServer API password
  ansible.builtin.set_fact:
    edge_effective_mist_api_password: >-
      {{
        [
          edge_existing_native_mist_api_password | default('', true),
          edge_existing_compose_mist_api_password | default('', true),
          edge_mist_api_password | default('', true)
        ] | map('trim') | reject('equalto', '') | list | first | default('', true)
      }}
  no_log: true

- name: Stage internal CA bundle (when provided)
  ansible.builtin.copy:
    dest: "{{ edge_ca_path }}"
    content: "{{ edge_ca_bundle_pem }}"
    owner: frameworks
    group: frameworks
    mode: "0644"
  when: edge_ca_bundle_pem | length > 0
  no_log: true

- name: Check internal CA bundle
  ansible.builtin.stat:
    path: "{{ edge_ca_path }}"
  register: edge_grpc_ca_bundle_stat

- name: Stage edge TLS cert (when provided)
  ansible.builtin.copy:
    dest: "{{ edge_cert_dir }}/cert.pem"
    content: "{{ edge_cert_pem }}"
    mode: "0644"
  when: edge_cert_pem | length > 0
  no_log: true

- name: Stage edge TLS key (when provided)
  ansible.builtin.copy:
    dest: "{{ edge_cert_dir }}/key.pem"
    content: "{{ edge_key_pem }}"
    mode: "0600"
  when: edge_key_pem | length > 0
  no_log: true
