---
# Everything non-native falls through to the container install path, so an
# unknown mode string must be a hard stop, not a surprise container deploy.
- name: Edge | validate mode
  ansible.builtin.assert:
    that:
      - edge_mode in ['native', 'container', 'docker']
    fail_msg: "edge_mode must be 'native' or 'container' ('docker' is a deprecated alias for container); got '{{ edge_mode }}'"
  tags: [install, configure, service, validate]

- name: Edge | prepare shared state
  ansible.builtin.import_tasks: prepare.yml
  tags: [install, configure]

- name: Edge | install (container)
  ansible.builtin.import_tasks: install-container.yml
  when: edge_mode != 'native'
  tags: [install, configure, service, validate]

- name: Edge | install (native-linux)
  ansible.builtin.import_tasks: install-native-linux.yml
  when: edge_mode == 'native' and ansible_facts.os_family != 'Darwin'
  tags: [install, configure, service, validate]

- name: Edge | install (native-darwin)
  ansible.builtin.import_tasks: install-native-darwin.yml
  when: edge_mode == 'native' and ansible_facts.os_family == 'Darwin'
  tags: [install, configure, service, validate]

- name: Edge | validate
  ansible.builtin.import_tasks: validate.yml
  tags: [validate]

- name: Edge | cleanup
  ansible.builtin.import_tasks: cleanup.yml
  tags: [cleanup, never]
