---
- name: Resolve Darwin layout for selected domain
  ansible.builtin.set_fact:
    edge_darwin_base_dir: >-
      {{ edge_darwin_user_base_dir if edge_darwin_domain == 'user'
         else edge_darwin_system_base_dir }}
    edge_darwin_conf_dir: >-
      {{ edge_darwin_user_conf_dir if edge_darwin_domain == 'user'
         else edge_darwin_system_conf_dir }}
    edge_darwin_log_dir: >-
      {{ edge_darwin_user_log_dir if edge_darwin_domain == 'user'
         else edge_darwin_system_log_dir }}
    edge_darwin_plist_dir: >-
      {{ edge_darwin_user_plist_dir if edge_darwin_domain == 'user'
         else edge_darwin_system_plist_dir }}

- name: Ensure Darwin edge directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - "{{ edge_darwin_base_dir }}"
    - "{{ edge_darwin_conf_dir }}"
    - "{{ edge_darwin_log_dir }}"
    - "{{ edge_darwin_plist_dir }}"
    - "{{ edge_darwin_conf_dir }}/pki"
    - "{{ edge_darwin_conf_dir }}/certs"

- name: Ensure Darwin edge durable storage directory
  ansible.builtin.file:
    path: "{{ edge_storage_local_path }}"
    state: directory
    mode: "0755"

- name: Stage internal CA bundle on Darwin (when provided)
  ansible.builtin.copy:
    dest: "{{ edge_darwin_conf_dir }}/pki/ca.crt"
    content: "{{ edge_ca_bundle_pem }}"
    mode: "0644"
  when: edge_ca_bundle_pem | length > 0
  no_log: true

- name: Stage edge TLS cert on Darwin (when provided)
  ansible.builtin.copy:
    dest: "{{ edge_darwin_conf_dir }}/certs/cert.pem"
    content: "{{ edge_cert_pem }}"
    mode: "0644"
  when: edge_cert_pem | length > 0
  no_log: true

- name: Stage edge TLS key on Darwin (when provided)
  ansible.builtin.copy:
    dest: "{{ edge_darwin_conf_dir }}/certs/key.pem"
    content: "{{ edge_key_pem }}"
    mode: "0600"
  when: edge_key_pem | length > 0
  no_log: true

- name: Apply mistserver install sub-role (darwin)
  ansible.builtin.include_role:
    name: frameworks.infra.mistserver
    tasks_from: install.yml
  vars:
    mistserver_artifact_url: "{{ edge_mistserver_artifact_url }}"
    mistserver_artifact_checksum: "{{ edge_mistserver_artifact_checksum }}"
    mistserver_version: "{{ edge_mistserver_version }}"
    mistserver_component_versions_file: "{{ edge_darwin_conf_dir }}/component-versions.env"
    mistserver_api_password: "{{ edge_effective_mist_api_password }}"
    mistserver_darwin_domain: "{{ edge_darwin_domain }}"

- name: Apply mistserver configure sub-role (darwin)
  ansible.builtin.include_role:
    name: frameworks.infra.mistserver
    tasks_from: configure.yml
  vars:
    mistserver_artifact_url: "{{ edge_mistserver_artifact_url }}"
    mistserver_artifact_checksum: "{{ edge_mistserver_artifact_checksum }}"
    mistserver_api_password: "{{ edge_effective_mist_api_password }}"
    mistserver_darwin_domain: "{{ edge_darwin_domain }}"

- name: Flush mistserver handlers before service (darwin)
  ansible.builtin.meta: flush_handlers

- name: Apply mistserver service sub-role (darwin)
  ansible.builtin.include_role:
    name: frameworks.infra.mistserver
    tasks_from: service.yml
  vars:
    mistserver_artifact_url: "{{ edge_mistserver_artifact_url }}"
    mistserver_artifact_checksum: "{{ edge_mistserver_artifact_checksum }}"
    mistserver_api_password: "{{ edge_effective_mist_api_password }}"
    mistserver_darwin_domain: "{{ edge_darwin_domain }}"

- name: Flush mistserver handlers before validate (darwin)
  ansible.builtin.meta: flush_handlers

- name: Apply mistserver validate sub-role (darwin)
  ansible.builtin.include_role:
    name: frameworks.infra.mistserver
    tasks_from: validate.yml
  vars:
    mistserver_artifact_url: "{{ edge_mistserver_artifact_url }}"
    mistserver_artifact_checksum: "{{ edge_mistserver_artifact_checksum }}"
    mistserver_api_password: "{{ edge_effective_mist_api_password }}"
    mistserver_darwin_domain: "{{ edge_darwin_domain }}"

- name: Apply caddy bootstrap (darwin)
  ansible.builtin.import_tasks: install-native-darwin-caddy.yml

- name: Apply helmsman install sub-role (darwin)
  ansible.builtin.include_role:
    name: frameworks.infra.helmsman
    tasks_from: install.yml
  vars:
    helmsman_artifact_url: "{{ edge_helmsman_artifact_url }}"
    helmsman_artifact_checksum: "{{ edge_helmsman_artifact_checksum }}"
    helmsman_version: "{{ edge_helmsman_version }}"
    helmsman_component_versions_file: "{{ edge_darwin_conf_dir }}/component-versions.env"
    helmsman_node_id: "{{ edge_node_id }}"
    helmsman_edge_domain: "{{ edge_domain }}"
    helmsman_acme_email: "{{ edge_acme_email | default('', true) }}"
    helmsman_foghorn_grpc_addr: "{{ edge_foghorn_grpc_addr }}"
    helmsman_enrollment_token: "{{ edge_enrollment_token }}"
    helmsman_deploy_mode: native
    helmsman_caddy_config_path: "{{ edge_darwin_conf_dir }}/Caddyfile"
    helmsman_mist_api_upstream: "localhost:4242"
    helmsman_mist_http_upstream: "localhost:8080"
    helmsman_webhook_upstream: "localhost:18007"
    helmsman_mist_api_password: "{{ edge_effective_mist_api_password }}"
    helmsman_grpc_tls_ca_path: "{{ edge_darwin_conf_dir }}/pki/ca.crt"
    helmsman_extra_env:
      CLUSTER_ID: "{{ edge_cluster_id }}"
      HELMSMAN_BW_LIMIT_BYTES_PER_SEC: "{{ edge_bandwidth_limit_bytes_per_sec }}"
      HELMSMAN_MAX_TRANSCODES: "{{ edge_max_transcodes }}"
      HELMSMAN_STORAGE_CAPACITY_BYTES: "{{ edge_storage_capacity_bytes }}"
      HELMSMAN_STORAGE_LOCAL_PATH: "{{ edge_storage_local_path }}"
      HELMSMAN_CAP_INGEST: "{{ edge_cap_ingest }}"
      HELMSMAN_CAP_EDGE: "{{ edge_cap_edge }}"
      HELMSMAN_CAP_STORAGE: "{{ edge_cap_storage }}"
      HELMSMAN_CAP_PROCESSING: "{{ edge_cap_processing }}"
      HELMSMAN_TLS_CERT_PATH: "{{ edge_darwin_conf_dir }}/certs/cert.pem"
      HELMSMAN_TLS_KEY_PATH: "{{ edge_darwin_conf_dir }}/certs/key.pem"
    helmsman_darwin_domain: "{{ edge_darwin_domain }}"

- name: Apply helmsman configure sub-role (darwin)
  ansible.builtin.include_role:
    name: frameworks.infra.helmsman
    tasks_from: configure.yml
  vars:
    helmsman_artifact_url: "{{ edge_helmsman_artifact_url }}"
    helmsman_artifact_checksum: "{{ edge_helmsman_artifact_checksum }}"
    helmsman_force_reenroll: "{{ edge_force_reenroll }}"
    helmsman_node_id: "{{ edge_node_id }}"
    helmsman_edge_domain: "{{ edge_domain }}"
    helmsman_acme_email: "{{ edge_acme_email | default('', true) }}"
    helmsman_foghorn_grpc_addr: "{{ edge_foghorn_grpc_addr }}"
    helmsman_enrollment_token: "{{ edge_enrollment_token }}"
    helmsman_deploy_mode: native
    helmsman_caddy_config_path: "{{ edge_darwin_conf_dir }}/Caddyfile"
    helmsman_mist_api_upstream: "localhost:4242"
    helmsman_mist_http_upstream: "localhost:8080"
    helmsman_webhook_upstream: "localhost:18007"
    helmsman_mist_api_password: "{{ edge_effective_mist_api_password }}"
    helmsman_grpc_tls_ca_path: "{{ edge_darwin_conf_dir }}/pki/ca.crt"
    helmsman_extra_env:
      CLUSTER_ID: "{{ edge_cluster_id }}"
      HELMSMAN_BW_LIMIT_BYTES_PER_SEC: "{{ edge_bandwidth_limit_bytes_per_sec }}"
      HELMSMAN_MAX_TRANSCODES: "{{ edge_max_transcodes }}"
      HELMSMAN_STORAGE_CAPACITY_BYTES: "{{ edge_storage_capacity_bytes }}"
      HELMSMAN_STORAGE_LOCAL_PATH: "{{ edge_storage_local_path }}"
      HELMSMAN_CAP_INGEST: "{{ edge_cap_ingest }}"
      HELMSMAN_CAP_EDGE: "{{ edge_cap_edge }}"
      HELMSMAN_CAP_STORAGE: "{{ edge_cap_storage }}"
      HELMSMAN_CAP_PROCESSING: "{{ edge_cap_processing }}"
      HELMSMAN_TLS_CERT_PATH: "{{ edge_darwin_conf_dir }}/certs/cert.pem"
      HELMSMAN_TLS_KEY_PATH: "{{ edge_darwin_conf_dir }}/certs/key.pem"
    helmsman_darwin_domain: "{{ edge_darwin_domain }}"

- name: Flush helmsman handlers before service (darwin)
  ansible.builtin.meta: flush_handlers

- name: Apply helmsman service sub-role (darwin)
  ansible.builtin.include_role:
    name: frameworks.infra.helmsman
    tasks_from: service.yml
  vars:
    helmsman_artifact_url: "{{ edge_helmsman_artifact_url }}"
    helmsman_artifact_checksum: "{{ edge_helmsman_artifact_checksum }}"
    helmsman_node_id: "{{ edge_node_id }}"
    helmsman_edge_domain: "{{ edge_domain }}"
    helmsman_acme_email: "{{ edge_acme_email | default('', true) }}"
    helmsman_foghorn_grpc_addr: "{{ edge_foghorn_grpc_addr }}"
    helmsman_enrollment_token: "{{ edge_enrollment_token }}"
    helmsman_deploy_mode: native
    helmsman_caddy_config_path: "{{ edge_darwin_conf_dir }}/Caddyfile"
    helmsman_mist_api_upstream: "localhost:4242"
    helmsman_mist_http_upstream: "localhost:8080"
    helmsman_webhook_upstream: "localhost:18007"
    helmsman_mist_api_password: "{{ edge_effective_mist_api_password }}"
    helmsman_grpc_tls_ca_path: "{{ edge_darwin_conf_dir }}/pki/ca.crt"
    helmsman_extra_env:
      CLUSTER_ID: "{{ edge_cluster_id }}"
      HELMSMAN_BW_LIMIT_BYTES_PER_SEC: "{{ edge_bandwidth_limit_bytes_per_sec }}"
      HELMSMAN_MAX_TRANSCODES: "{{ edge_max_transcodes }}"
      HELMSMAN_STORAGE_CAPACITY_BYTES: "{{ edge_storage_capacity_bytes }}"
      HELMSMAN_STORAGE_LOCAL_PATH: "{{ edge_storage_local_path }}"
      HELMSMAN_CAP_INGEST: "{{ edge_cap_ingest }}"
      HELMSMAN_CAP_EDGE: "{{ edge_cap_edge }}"
      HELMSMAN_CAP_STORAGE: "{{ edge_cap_storage }}"
      HELMSMAN_CAP_PROCESSING: "{{ edge_cap_processing }}"
      HELMSMAN_TLS_CERT_PATH: "{{ edge_darwin_conf_dir }}/certs/cert.pem"
      HELMSMAN_TLS_KEY_PATH: "{{ edge_darwin_conf_dir }}/certs/key.pem"
    helmsman_darwin_domain: "{{ edge_darwin_domain }}"

# Seed-only: the component updater owns CONFIG_SCHEMA_VERSION after first
# boot (it stamps the version whenever it applies a config_schema update).
- name: Check recorded config schema version (darwin)
  ansible.builtin.command:
    argv:
      - grep
      - -q
      - "^CONFIG_SCHEMA_VERSION="
      - "{{ edge_darwin_conf_dir }}/component-versions.env"
  register: edge_schema_version_recorded
  changed_when: false
  failed_when: false
  when: not ansible_check_mode

- name: Seed config schema version for the component updater (darwin)
  ansible.builtin.lineinfile:
    path: "{{ edge_darwin_conf_dir }}/component-versions.env"
    regexp: "^CONFIG_SCHEMA_VERSION="
    line: "CONFIG_SCHEMA_VERSION={{ edge_config_schema_version }}"
    create: true
    mode: "0644"
  when:
    - not ansible_check_mode
    - edge_config_schema_version | length > 0
    - (edge_schema_version_recorded.rc | default(1)) != 0

- name: Flush helmsman handlers before validate (darwin)
  ansible.builtin.meta: flush_handlers

- name: Apply helmsman validate sub-role (darwin)
  ansible.builtin.include_role:
    name: frameworks.infra.helmsman
    tasks_from: validate.yml
  vars:
    helmsman_artifact_url: "{{ edge_helmsman_artifact_url }}"
    helmsman_artifact_checksum: "{{ edge_helmsman_artifact_checksum }}"
    helmsman_node_id: "{{ edge_node_id }}"
    helmsman_edge_domain: "{{ edge_domain }}"
    helmsman_acme_email: "{{ edge_acme_email | default('', true) }}"
    helmsman_foghorn_grpc_addr: "{{ edge_foghorn_grpc_addr }}"
    helmsman_enrollment_token: "{{ edge_enrollment_token }}"
    helmsman_deploy_mode: native
    helmsman_caddy_config_path: "{{ edge_darwin_conf_dir }}/Caddyfile"
    helmsman_mist_api_upstream: "localhost:4242"
    helmsman_mist_http_upstream: "localhost:8080"
    helmsman_webhook_upstream: "localhost:18007"
    helmsman_mist_api_password: "{{ edge_effective_mist_api_password }}"
    helmsman_grpc_tls_ca_path: "{{ edge_darwin_conf_dir }}/pki/ca.crt"
    helmsman_extra_env:
      CLUSTER_ID: "{{ edge_cluster_id }}"
      HELMSMAN_BW_LIMIT_BYTES_PER_SEC: "{{ edge_bandwidth_limit_bytes_per_sec }}"
      HELMSMAN_MAX_TRANSCODES: "{{ edge_max_transcodes }}"
      HELMSMAN_STORAGE_CAPACITY_BYTES: "{{ edge_storage_capacity_bytes }}"
      HELMSMAN_STORAGE_LOCAL_PATH: "{{ edge_storage_local_path }}"
      HELMSMAN_CAP_INGEST: "{{ edge_cap_ingest }}"
      HELMSMAN_CAP_EDGE: "{{ edge_cap_edge }}"
      HELMSMAN_CAP_STORAGE: "{{ edge_cap_storage }}"
      HELMSMAN_CAP_PROCESSING: "{{ edge_cap_processing }}"
      HELMSMAN_TLS_CERT_PATH: "{{ edge_darwin_conf_dir }}/certs/cert.pem"
      HELMSMAN_TLS_KEY_PATH: "{{ edge_darwin_conf_dir }}/certs/key.pem"
    helmsman_darwin_domain: "{{ edge_darwin_domain }}"
