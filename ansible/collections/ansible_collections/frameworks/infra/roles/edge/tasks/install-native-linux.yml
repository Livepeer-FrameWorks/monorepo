    helmsman_artifact_checksum: "{{ edge_helmsman_artifact_checksum }}"
    helmsman_node_id: "{{ edge_node_id }}"
    helmsman_edge_domain: "{{ edge_domain }}"
    helmsman_acme_email: "{{ edge_acme_email | default('', true) }}"
    helmsman_foghorn_grpc_addr: "{{ edge_foghorn_grpc_addr }}"
    helmsman_enrollment_token: "{{ edge_enrollment_token }}"
    helmsman_deploy_mode: native
    helmsman_mist_api_upstream: "localhost:4242"
    helmsman_mist_http_upstream: "localhost:8080"
    helmsman_webhook_upstream: "localhost:18007"
