      HELMSMAN_STORAGE_LOCAL_PATH: "{{ edge_storage_local_path }}"
      HELMSMAN_CAP_INGEST: "{{ edge_cap_ingest }}"
      HELMSMAN_CAP_EDGE: "{{ edge_cap_edge }}"
      HELMSMAN_CAP_STORAGE: "{{ edge_cap_storage }}"
      HELMSMAN_CAP_PROCESSING: "{{ edge_cap_processing }}"

- name: Assert Helmsman trusts staged internal CA
  ansible.builtin.command:
    argv:
      - grep
      - -Fx
      - "GRPC_TLS_CA_PATH={{ edge_ca_path }}"
      - "{{ helmsman_env_file | default('/etc/frameworks/helmsman.env') }}"
  changed_when: false
  when:
    - not ansible_check_mode
    - edge_grpc_ca_bundle_stat.stat.exists | default(false)

# Seed-only: the component updater owns CONFIG_SCHEMA_VERSION after first
# boot (it stamps the version whenever it applies a config_schema update).
- name: Check recorded config schema version
  ansible.builtin.command:
    argv:
      - grep
      - -q
      - "^CONFIG_SCHEMA_VERSION="
      - "{{ edge_component_versions_file }}"
  register: edge_schema_version_recorded
  changed_when: false
  failed_when: false
  when: not ansible_check_mode

- name: Seed config schema version for the component updater
  ansible.builtin.lineinfile:
    path: "{{ edge_component_versions_file }}"
    regexp: "^CONFIG_SCHEMA_VERSION="
    line: "CONFIG_SCHEMA_VERSION={{ edge_config_schema_version }}"
    create: true
    owner: frameworks
    group: frameworks
    mode: "0644"
  when:
    - not ansible_check_mode
    - edge_config_schema_version | length > 0
    - (edge_schema_version_recorded.rc | default(1)) != 0

# Telemetry requires BOTH url and token (single contract with the compose
# template and the Go renderer).
- name: Apply vmagent edge telemetry (when enabled)
  ansible.builtin.import_tasks: install-native-linux-vmagent.yml
  when: edge_telemetry_url | length > 0 and edge_telemetry_token | length > 0
