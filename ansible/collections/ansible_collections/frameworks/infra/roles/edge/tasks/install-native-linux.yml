---
# Migration from container mode: stop the compose stack (else it keeps
# 80/443/1935) and flip the leftover .edge.env DEPLOY_MODE so CLI management
# commands classify the node as native instead of resurrecting the retired
# container via `edge update`. Volumes are kept.
- name: Check for leftover container-mode compose project (migration)
  ansible.builtin.stat:
    path: "{{ edge_base_dir }}/docker-compose.yml"
  register: edge_leftover_compose

- name: Stop retired edge container stack (migration)
  ansible.builtin.command:
    argv: [docker, compose, -f, "{{ edge_base_dir }}/docker-compose.yml", down]
  when:
    - not ansible_check_mode
    - edge_leftover_compose.stat.exists | default(false)
  changed_when: true
  failed_when: false

# The env flip must reflect reality and fail CLOSED: it requires a
# successful docker ps proving neither managed container (single-image or
# legacy proxy) is running. A daemon we cannot reach might still be running
# the stack — proceeding would stamp a lying DEPLOY_MODE=native over live
# containers holding 80/443/1935.
- name: Check retired edge container is stopped (migration)
  ansible.builtin.command:
    argv: [docker, ps, -q, --filter, "name=^frameworks-edge$", --filter, "name=^edge-proxy$"]
  register: edge_container_check
  changed_when: false
  failed_when: false
  when:
    - not ansible_check_mode
    - edge_leftover_compose.stat.exists | default(false)

- name: Fail when the retired edge container stack cannot be proven stopped (migration)
  ansible.builtin.fail:
    msg: >-
      Cannot prove the retired edge container stack is stopped:
      {{ 'docker ps failed (daemon unreachable in this context?)'
         if (edge_container_check.rc | default(1)) != 0
         else 'a managed edge container is still running and holds the media ports' }}.
      Stop the stack (docker compose -f {{ edge_base_dir }}/docker-compose.yml down),
      verify docker is reachable, and re-run.
  when:
    - not ansible_check_mode
    - edge_leftover_compose.stat.exists | default(false)
    - >-
      (edge_container_check.rc | default(1)) != 0
      or (edge_container_check.stdout | default('') | trim | length) > 0

# Missing .edge.env is fine (nothing to mislead the CLI); a FAILED rewrite
# of an existing one is not — the stale DEPLOY_MODE=container would let
# `edge update` resurrect the retired stack, so let lineinfile errors fail
# the play.
- name: Check for leftover container-mode env file (migration)
  ansible.builtin.stat:
    path: "{{ edge_base_dir }}/.edge.env"
  register: edge_leftover_env
  when: edge_leftover_compose.stat.exists | default(false)

- name: Mark leftover edge env as native (migration)
  ansible.builtin.lineinfile:
    path: "{{ edge_base_dir }}/.edge.env"
    regexp: "^DEPLOY_MODE="
    line: "DEPLOY_MODE=native"
  when:
    - edge_leftover_compose.stat.exists | default(false)
    - edge_leftover_env.stat.exists | default(false)
    - ansible_check_mode or ((edge_container_check.rc | default(1)) == 0 and (edge_container_check.stdout | default('') | trim | length) == 0)

- name: Apply mistserver install sub-role
  ansible.builtin.include_role:
    name: frameworks.infra.mistserver
    tasks_from: install.yml
  vars:
    mistserver_artifact_url: "{{ edge_mistserver_artifact_url }}"
    mistserver_artifact_checksum: "{{ edge_mistserver_artifact_checksum }}"
    mistserver_version: "{{ edge_mistserver_version }}"
    mistserver_debug_artifact_url: "{{ edge_mistserver_debug_artifact_url }}"
    mistserver_debug_artifact_checksum: "{{ edge_mistserver_debug_artifact_checksum }}"
    mistserver_install_debug_symbols: "{{ edge_mistserver_install_debug_symbols }}"
    mistserver_api_password: "{{ edge_effective_mist_api_password }}"
    mistserver_component_versions_file: "{{ edge_component_versions_file }}"

- name: Ensure edge durable storage directory
  ansible.builtin.file:
    path: "{{ edge_storage_local_path }}"
    state: directory
    owner: frameworks
    group: frameworks
    mode: "0755"

- name: Apply mistserver configure sub-role
  ansible.builtin.include_role:
    name: frameworks.infra.mistserver
    tasks_from: configure.yml
  vars:
    mistserver_artifact_url: "{{ edge_mistserver_artifact_url }}"
    mistserver_artifact_checksum: "{{ edge_mistserver_artifact_checksum }}"
    mistserver_version: "{{ edge_mistserver_version }}"
    mistserver_debug_artifact_url: "{{ edge_mistserver_debug_artifact_url }}"
    mistserver_debug_artifact_checksum: "{{ edge_mistserver_debug_artifact_checksum }}"
    mistserver_install_debug_symbols: "{{ edge_mistserver_install_debug_symbols }}"
    mistserver_api_password: "{{ edge_effective_mist_api_password }}"

- name: Flush mistserver handlers before service
  ansible.builtin.meta: flush_handlers

- name: Apply mistserver service sub-role
  ansible.builtin.include_role:
    name: frameworks.infra.mistserver
    tasks_from: service.yml
  vars:
    mistserver_artifact_url: "{{ edge_mistserver_artifact_url }}"
    mistserver_artifact_checksum: "{{ edge_mistserver_artifact_checksum }}"
    mistserver_version: "{{ edge_mistserver_version }}"
    mistserver_debug_artifact_url: "{{ edge_mistserver_debug_artifact_url }}"
    mistserver_debug_artifact_checksum: "{{ edge_mistserver_debug_artifact_checksum }}"
    mistserver_install_debug_symbols: "{{ edge_mistserver_install_debug_symbols }}"
    mistserver_api_password: "{{ edge_effective_mist_api_password }}"

- name: Flush mistserver handlers before validate
  ansible.builtin.meta: flush_handlers

- name: Apply mistserver validate sub-role
  ansible.builtin.include_role:
    name: frameworks.infra.mistserver
    tasks_from: validate.yml
  vars:
    mistserver_artifact_url: "{{ edge_mistserver_artifact_url }}"
    mistserver_artifact_checksum: "{{ edge_mistserver_artifact_checksum }}"
    mistserver_version: "{{ edge_mistserver_version }}"
    mistserver_debug_artifact_url: "{{ edge_mistserver_debug_artifact_url }}"
    mistserver_debug_artifact_checksum: "{{ edge_mistserver_debug_artifact_checksum }}"
    mistserver_install_debug_symbols: "{{ edge_mistserver_install_debug_symbols }}"
    mistserver_api_password: "{{ edge_effective_mist_api_password }}"

- name: Apply caddy bootstrap
  ansible.builtin.import_tasks: install-native-linux-caddy.yml

- name: Apply helmsman install sub-role
  ansible.builtin.include_role:
    name: frameworks.infra.helmsman
    tasks_from: install.yml
  vars:
    helmsman_artifact_url: "{{ edge_helmsman_artifact_url }}"
    helmsman_artifact_checksum: "{{ edge_helmsman_artifact_checksum }}"
    helmsman_version: "{{ edge_helmsman_version }}"
    helmsman_component_versions_file: "{{ edge_component_versions_file }}"
    helmsman_node_id: "{{ edge_node_id }}"
    helmsman_edge_domain: "{{ edge_domain }}"
    helmsman_acme_email: "{{ edge_acme_email | default('', true) }}"
    helmsman_foghorn_grpc_addr: "{{ edge_foghorn_grpc_addr }}"
    helmsman_enrollment_token: "{{ edge_enrollment_token }}"
    helmsman_deploy_mode: native
    helmsman_extra_groups: caddy
    helmsman_mist_api_upstream: "localhost:4242"
    helmsman_mist_http_upstream: "localhost:8080"
    helmsman_webhook_upstream: "localhost:18007"
    helmsman_mist_api_password: "{{ edge_effective_mist_api_password }}"
    helmsman_grpc_tls_ca_path: "{{ edge_ca_path if edge_grpc_ca_bundle_stat.stat.exists | default(false) else '' }}"
    helmsman_extra_env:
      CLUSTER_ID: "{{ edge_cluster_id }}"
      HELMSMAN_BW_LIMIT_BYTES_PER_SEC: "{{ edge_bandwidth_limit_bytes_per_sec }}"
      HELMSMAN_MAX_TRANSCODES: "{{ edge_max_transcodes }}"
      HELMSMAN_STORAGE_CAPACITY_BYTES: "{{ edge_storage_capacity_bytes }}"
      HELMSMAN_STORAGE_LOCAL_PATH: "{{ edge_storage_local_path }}"
      HELMSMAN_CAP_INGEST: "{{ edge_cap_ingest }}"
      HELMSMAN_CAP_EDGE: "{{ edge_cap_edge }}"
      HELMSMAN_CAP_STORAGE: "{{ edge_cap_storage }}"
      HELMSMAN_CAP_PROCESSING: "{{ edge_cap_processing }}"

- name: Apply helmsman configure sub-role
  ansible.builtin.include_role:
    name: frameworks.infra.helmsman
    tasks_from: configure.yml
  vars:
    helmsman_artifact_url: "{{ edge_helmsman_artifact_url }}"
    helmsman_artifact_checksum: "{{ edge_helmsman_artifact_checksum }}"
