---
# Edge meta-role. Composes the edge stack (mistserver + helmsman + caddy +
# optional vmagent) either as the single-image edge container (s6-overlay,
# host networking) or as a set of native services — Linux systemd or macOS
# launchd, the latter in system or user domain.
#
# Orchestration data (node identity, domain, enrollment token, Foghorn addr)
# flows in from the CLI. Pinned artifacts for each sub-service flow in from
# the release manifest via the Go-side vars builder.

edge_mode: container # container | native ("docker" is a deprecated alias for container)
edge_node_id: ""
edge_cluster_id: ""
edge_domain: ""
edge_acme_email: ""
edge_foghorn_grpc_addr: ""
edge_enrollment_token: ""

# Re-enrollment knobs. The bootstrap Caddyfile and the enrollment-token env
# file are write-once: helmsman owns the Caddyfile after ConfigSeed
# activation, and Foghorn ignores tokens for already-registered nodes. Set
# true (CLI --force-reenroll) to overwrite both when re-enrolling a node
# that was wiped from the control plane.
edge_force_bootstrap_caddyfile: false
edge_force_reenroll: false

# Optional: pre-staged wildcard cert (otherwise ConfigSeed writes it post-
# enrollment). Both halves are required together.
edge_cert_pem: ""
edge_key_pem: ""

# Optional: internal CA bundle for gRPC TLS to Foghorn. Empty means no CA
# file is written and GRPC_TLS_CA_PATH is left empty in env files.
edge_ca_bundle_pem: ""

# Optional: telemetry endpoint for edge vmagent remote-write. When both URL
# and token are set, vmagent is installed alongside the edge services.
edge_telemetry_url: ""
edge_telemetry_token: ""

# Optional node capacity and capability controls. Capabilities default to
# Helmsman's built-in all-enabled behavior when left empty.
edge_bandwidth_limit_bytes_per_sec: 0
edge_max_transcodes: 0
edge_storage_capacity_bytes: 0
edge_cap_ingest: ""
edge_cap_edge: ""
edge_cap_storage: ""
edge_cap_processing: ""

# Generated upstream (Go caller passes a random 32-char hex). Shared between
# mistserver (-a frameworks:<pw>) and helmsman (MIST_API_PASSWORD env).
edge_mist_api_password: ""

# Container-mode edge image (helmsman + MistServer + Caddy under s6-overlay).
# Remote cluster applies pass the GitOps-pinned image@digest.
edge_image: livepeerframeworks/frameworks-edge:latest

# Pinned artifacts. Each sub-role receives its own vars; these top-level
# keys let the Go caller hand the full set in one map.
edge_mistserver_artifact_url: ""
edge_mistserver_artifact_checksum: ""
edge_mistserver_version: ""
edge_mistserver_debug_artifact_url: ""
edge_mistserver_debug_artifact_checksum: ""
edge_mistserver_install_debug_symbols: false
edge_helmsman_artifact_url: ""
edge_helmsman_artifact_checksum: ""
edge_helmsman_version: ""
edge_caddy_artifact_url: ""
edge_caddy_artifact_checksum: ""
edge_caddy_version: ""
edge_vmagent_artifact_url: ""
edge_vmagent_artifact_checksum: ""
edge_config_schema_version: ""

# Remote filesystem layout. Shared by container + native modes.
edge_base_dir: /opt/frameworks/edge
edge_conf_dir: /etc/frameworks

# Helmsman component-updater version file. Sub-roles stamp installed
# versions here (instead of helmsman.env) so version bumps never restart
# helmsman; the updater owns this file at runtime. Path must match
# componentVersionPath() in api_sidecar/internal/updater.
edge_component_versions_file: /etc/frameworks/component-versions.env
edge_ca_path: /etc/frameworks/pki/ca.crt
edge_cert_dir: /etc/frameworks/certs
edge_storage_local_path: /var/lib/frameworks/edge-storage
edge_docker_storage_local_path: /data/storage

# Darwin launchd domain selection. Forwarded to mistserver + helmsman
# sub-roles. "system" puts plists in /Library/LaunchDaemons (root-owned,
# survives logout). "user" puts them in ~/Library/LaunchAgents and runs
# without sudo — matches `edge deploy` local mode.
edge_darwin_domain: system

# Darwin directory roots. System domain maps to /usr/local; user domain
# maps under $HOME. Mirrors the mistserver/helmsman defaults so all three
# services land in the same layout.
edge_darwin_system_base_dir: /usr/local/opt/frameworks
edge_darwin_system_conf_dir: /usr/local/etc/frameworks
edge_darwin_system_log_dir: /usr/local/var/log/frameworks
edge_darwin_system_plist_dir: /Library/LaunchDaemons

edge_darwin_user_base_dir: "{{ ansible_env.HOME }}/.local/opt/frameworks"
edge_darwin_user_conf_dir: "{{ ansible_env.HOME }}/.config/frameworks"
edge_darwin_user_log_dir: "{{ ansible_env.HOME }}/.local/var/log/frameworks"
edge_darwin_user_plist_dir: "{{ ansible_env.HOME }}/Library/LaunchAgents"
