---
- name: Reconcile MistServer controller config
  ansible.builtin.command:
    argv:
      - "{{ ansible_python_interpreter | default('/usr/bin/python3') }}"
      - -c
      - |
        import json
        import os
        import sys

        path, interface, port_raw, mode = sys.argv[1], sys.argv[2], sys.argv[3], sys.argv[4]
        wanted = {"interface": interface, "port": int(port_raw)}
        data = {}
        if os.path.exists(path) and os.path.getsize(path) > 0:
            with open(path, encoding="utf-8") as handle:
                data = json.load(handle)
        config = data.setdefault("config", {})
        if config.get("controller") == wanted:
            print("unchanged")
            sys.exit(0)
        if mode == "check":
            print("changed")
            sys.exit(0)
        config["controller"] = wanted
        tmp_path = path + ".tmp"
        with open(tmp_path, "w", encoding="utf-8") as handle:
            json.dump(data, handle, separators=(",", ":"))
            handle.write("\n")
        os.replace(tmp_path, path)
        print("changed")
      - "{{ mistserver_config_file }}"
      - "{{ mistserver_controller_interface }}"
      - "{{ mistserver_controller_port | string }}"
      - "{{ 'check' if ansible_check_mode else 'apply' }}"
  register: mistserver_controller_config
  changed_when: mistserver_controller_config.stdout == "changed"
  notify: mistserver restart

- name: Ensure MistServer config permissions
  ansible.builtin.file:
    path: "{{ mistserver_config_file }}"
    owner: "{{ mistserver_user }}"
    group: "{{ mistserver_group }}"
    mode: "0600"

- name: Render env file
  ansible.builtin.copy:
    dest: "{{ mistserver_env_file }}"
    content: |
      # MistServer environment (managed by frameworks.infra.mistserver)
      {% for k, v in (mistserver_env | dictsort) %}
      {{ k }}={{ v }}
      {% endfor %}
      MIST_API_USERNAME={{ mistserver_api_user }}
      MIST_API_PASSWORD={{ mistserver_api_password }}
    owner: "{{ mistserver_user }}"
    group: "{{ mistserver_group }}"
    mode: "0600"
  no_log: true
  notify: mistserver restart

- name: Render systemd unit
  ansible.builtin.template:
    src: mistserver.service.j2
    dest: "{{ mistserver_unit_path }}"
    owner: root
    group: root
    mode: "0644"
  notify: mistserver restart
