---
- name: Ensure frameworks group
  ansible.builtin.group:
    name: "{{ mistserver_group }}"
    system: true

- name: Ensure frameworks user
  ansible.builtin.user:
    name: "{{ mistserver_user }}"
    group: "{{ mistserver_group }}"
    system: true
    shell: /usr/sbin/nologin
    create_home: false

- name: Ensure directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ mistserver_user }}"
    group: "{{ mistserver_group }}"
    mode: "0755"
  loop:
    - /etc/frameworks
    - "{{ mistserver_install_dir }}"

- name: Install MistServer runtime packages
  ansible.builtin.package:
    name: "{{ mistserver_runtime_packages }}"
    state: present
  when: mistserver_runtime_packages | length > 0

- name: Set install identity
  ansible.builtin.set_fact:
    mistserver_install_identity: >-
      {{ mistserver_artifact_checksum
         if mistserver_artifact_checksum | length > 0
         else mistserver_artifact_url }}

- name: Set install sentinel path
  ansible.builtin.set_fact:
    mistserver_install_sentinel: "{{ mistserver_install_dir }}/.installed-{{ mistserver_install_identity | hash('sha1') }}"

- name: Inspect MistServer binary
  ansible.builtin.stat:
    path: "{{ mistserver_install_dir }}/bin/MistController"
  register: mistserver_binary_stat

- name: Inspect MistServer install sentinel
  ansible.builtin.stat:
    path: "{{ mistserver_install_sentinel }}"
  register: mistserver_sentinel_stat

- name: Determine whether MistServer reinstall is required
  ansible.builtin.set_fact:
    mistserver_reinstall_required: >-
      {{
        not (mistserver_binary_stat.stat.exists | default(false))
        or not (mistserver_sentinel_stat.stat.exists | default(false))
      }}

- name: Report MistServer artifact drift in check mode
  ansible.builtin.debug:
    msg: "MistServer artifact would be installed from {{ mistserver_artifact_url }}"
  changed_when: mistserver_reinstall_required | bool
  when: ansible_check_mode

- name: Download MistServer tarball
  ansible.builtin.get_url:
    url: "{{ mistserver_artifact_url }}"
    dest: "/tmp/mistserver.tar.gz"
    checksum: "{{ mistserver_artifact_checksum if mistserver_artifact_checksum | length > 0 else omit }}"
    mode: "0644"
    timeout: 300
  when:
    - not ansible_check_mode
    - mistserver_reinstall_required | bool

- name: Remove stale MistServer install sentinel before reinstall
  ansible.builtin.file:
    path: "{{ mistserver_install_sentinel }}"
    state: absent
  when:
    - not ansible_check_mode
    - mistserver_reinstall_required | bool

- name: Extract MistServer
  ansible.builtin.unarchive:
    src: "/tmp/mistserver.tar.gz"
    dest: "{{ mistserver_install_dir }}"
    remote_src: true
    owner: "{{ mistserver_user }}"
    group: "{{ mistserver_group }}"
    creates: "{{ mistserver_install_sentinel }}"
  notify: mistserver reload
  when:
    - not ansible_check_mode
    - mistserver_reinstall_required | bool

- name: Ensure MistServer binary is executable and mark install sentinel
  ansible.builtin.shell: |
    set -e
    test -x "{{ mistserver_install_dir }}/bin/MistController"
    find "{{ mistserver_install_dir }}/bin" -maxdepth 1 -type f -name 'Mist*' -exec chmod 0755 {} \;
    chown -R {{ mistserver_user }}:{{ mistserver_group }} "{{ mistserver_install_dir }}/bin"
    [ ! -d "{{ mistserver_install_dir }}/lib" ] || chown -R {{ mistserver_user }}:{{ mistserver_group }} "{{ mistserver_install_dir }}/lib"
    touch "{{ mistserver_install_sentinel }}"
    chown {{ mistserver_user }}:{{ mistserver_group }} "{{ mistserver_install_sentinel }}"
  args:
    creates: "{{ mistserver_install_sentinel }}"
  when:
    - not ansible_check_mode
    - mistserver_reinstall_required | bool

- name: Preflight MistServer native binary shared libraries
  ansible.builtin.shell: |
    set -o pipefail
    find "{{ mistserver_install_dir }}/bin" -maxdepth 1 -type f -name 'Mist*' -perm -111 -print0 \
      | xargs -0 -r ldd 2>&1 \
      | awk '/not found/ { print }'
  args:
    executable: /bin/bash
  register: mistserver_ldd_missing
  changed_when: false
  failed_when: false
  when: not ansible_check_mode

- name: Fail when MistServer native binary dependencies are missing
  ansible.builtin.fail:
    msg: |
      MistServer native artifact has unresolved shared libraries:
      {{ mistserver_ldd_missing.stdout }}
  when:
    - not ansible_check_mode
    - mistserver_ldd_missing.stdout | trim | length > 0

- name: Write MistServer artifact manifest
  ansible.builtin.copy:
    dest: "{{ mistserver_manifest_file }}"
    owner: "{{ mistserver_user }}"
    group: "{{ mistserver_group }}"
    mode: "0644"
    content: |
      {{
        {
          "component": "mistserver",
          "version": mistserver_version,
          "artifact_url": mistserver_artifact_url,
          "artifact_checksum": mistserver_artifact_checksum,
          "debug_artifact_url": mistserver_debug_artifact_url,
          "debug_artifact_checksum": mistserver_debug_artifact_checksum,
          "install_dir": mistserver_install_dir,
          "controller_binary": mistserver_install_dir ~ "/bin/MistController"
        } | to_nice_json
      }}

- name: Fail when MistServer debug symbols are requested without an artifact
  ansible.builtin.fail:
    msg: mistserver_install_debug_symbols=true requires mistserver_debug_artifact_url.
  when:
    - mistserver_install_debug_symbols | bool
    - mistserver_debug_artifact_url | trim | length == 0

- name: Download MistServer debug symbols
  ansible.builtin.get_url:
    url: "{{ mistserver_debug_artifact_url }}"
    dest: "/tmp/mistserver-debug.tar.gz"
    checksum: "{{ mistserver_debug_artifact_checksum if mistserver_debug_artifact_checksum | length > 0 else omit }}"
    mode: "0644"
    timeout: 300
  when:
    - mistserver_install_debug_symbols | bool
    - mistserver_debug_artifact_url | trim | length > 0

- name: Ensure MistServer debug symbols directory
  ansible.builtin.file:
    path: "{{ mistserver_debug_symbols_dir }}"
    state: directory
    owner: "{{ mistserver_user }}"
    group: "{{ mistserver_group }}"
    mode: "0755"
  when: mistserver_install_debug_symbols | bool

- name: Extract MistServer debug symbols
  ansible.builtin.unarchive:
    src: "/tmp/mistserver-debug.tar.gz"
    dest: "{{ mistserver_debug_symbols_dir }}"
    remote_src: true
    owner: "{{ mistserver_user }}"
    group: "{{ mistserver_group }}"
  when:
    - not ansible_check_mode
    - mistserver_install_debug_symbols | bool
    - mistserver_debug_artifact_url | trim | length > 0
