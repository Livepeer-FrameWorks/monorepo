---
- name: Restart mistserver (linux)
  ansible.builtin.systemd:
    name: "{{ mistserver_systemd_name }}"
    state: restarted
  when: ansible_facts.os_family != 'Darwin'

- name: Restart mistserver (darwin)
  community.general.launchd:
    name: "{{ mistserver_darwin_label }}"
    state: restarted
  when: ansible_facts.os_family == 'Darwin'

- name: Wait for MistServer HTTP port after restart
  ansible.builtin.wait_for:
    host: 127.0.0.1
    port: "{{ mistserver_port }}"
    timeout: 60
