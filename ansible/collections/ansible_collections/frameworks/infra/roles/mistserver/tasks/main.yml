  tags: [validate]

- name: mistserver | restart
  ansible.builtin.import_tasks: restart.yml
  tags: [restart, never]

- name: mistserver | cleanup
  ansible.builtin.import_tasks: cleanup.yml
  tags: [cleanup, never]
