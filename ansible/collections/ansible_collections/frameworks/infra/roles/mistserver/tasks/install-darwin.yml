---
- name: Resolve Darwin layout for selected domain
  ansible.builtin.set_fact:
    mistserver_darwin_base_dir: >-
      {{ mistserver_darwin_user_base_dir if mistserver_darwin_domain == 'user'
         else mistserver_darwin_system_base_dir }}
    mistserver_darwin_conf_dir: >-
      {{ mistserver_darwin_user_conf_dir if mistserver_darwin_domain == 'user'
         else mistserver_darwin_system_conf_dir }}
    mistserver_darwin_log_dir: >-
      {{ mistserver_darwin_user_log_dir if mistserver_darwin_domain == 'user'
         else mistserver_darwin_system_log_dir }}
    mistserver_darwin_plist_dir: >-
      {{ mistserver_darwin_user_plist_dir if mistserver_darwin_domain == 'user'
         else mistserver_darwin_system_plist_dir }}

- name: Ensure Darwin directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - "{{ mistserver_darwin_base_dir }}"
    - "{{ mistserver_darwin_base_dir }}/mistserver"
    - "{{ mistserver_darwin_conf_dir }}"
    - "{{ mistserver_darwin_log_dir }}"
    - "{{ mistserver_darwin_plist_dir }}"

- name: Set install identity
  ansible.builtin.set_fact:
    mistserver_install_identity: >-
      {{ mistserver_artifact_checksum
         if mistserver_artifact_checksum | length > 0
         else mistserver_artifact_url }}

- name: Set install sentinel path
  ansible.builtin.set_fact:
    mistserver_install_sentinel: "{{ mistserver_darwin_base_dir }}/mistserver/.installed-{{ mistserver_install_identity | hash('sha1') }}"

- name: Inspect MistServer binary
  ansible.builtin.stat:
    path: "{{ mistserver_darwin_base_dir }}/mistserver/bin/MistController"
  register: mistserver_binary_stat

- name: Inspect MistServer install sentinel
  ansible.builtin.stat:
    path: "{{ mistserver_install_sentinel }}"
  register: mistserver_sentinel_stat

- name: Determine whether MistServer reinstall is required
  ansible.builtin.set_fact:
    mistserver_reinstall_required: >-
      {{
        not (mistserver_binary_stat.stat.exists | default(false))
        or not (mistserver_sentinel_stat.stat.exists | default(false))
      }}

- name: Report MistServer artifact drift in check mode
  ansible.builtin.debug:
    msg: "MistServer artifact would be installed from {{ mistserver_artifact_url }}"
  changed_when: mistserver_reinstall_required | bool
  when: ansible_check_mode

- name: Download MistServer tarball
  ansible.builtin.get_url:
    url: "{{ mistserver_artifact_url }}"
    dest: "/tmp/mistserver.tar.gz"
    checksum: "{{ mistserver_artifact_checksum if mistserver_artifact_checksum | length > 0 else omit }}"
    mode: "0644"
    timeout: 300
  when:
    - not ansible_check_mode
    - mistserver_reinstall_required | bool

- name: Remove stale MistServer install sentinel before reinstall
  ansible.builtin.file:
    path: "{{ mistserver_install_sentinel }}"
    state: absent
  when:
    - not ansible_check_mode
    - mistserver_reinstall_required | bool

- name: Extract MistServer
  ansible.builtin.unarchive:
    src: "/tmp/mistserver.tar.gz"
    dest: "{{ mistserver_darwin_base_dir }}/mistserver"
    remote_src: true
    creates: "{{ mistserver_install_sentinel }}"
  notify: mistserver reload
  when:
    - not ansible_check_mode
    - mistserver_reinstall_required | bool

- name: Ensure MistServer binary is executable and mark install sentinel
  ansible.builtin.shell: |
    set -e
    test -x "{{ mistserver_darwin_base_dir }}/mistserver/bin/MistController"
    find "{{ mistserver_darwin_base_dir }}/mistserver/bin" -maxdepth 1 -type f -name 'Mist*' -exec chmod 0755 {} \;
    touch "{{ mistserver_install_sentinel }}"
  args:
    creates: "{{ mistserver_install_sentinel }}"
  when:
    - not ansible_check_mode
    - mistserver_reinstall_required | bool

# The component updater (helmsman) owns this file at runtime. Stamp only
# when this run actually installed the pinned artifact, or the key was never
# seeded — never regress a version the updater recorded for a binary this
# run left in place (a stale install sentinel skips the reinstall).
- name: Check recorded MistServer component version
  ansible.builtin.command:
    argv:
      - grep
      - -q
      - "^MIST_VERSION="
      - "{{ mistserver_component_versions_file }}"
  register: mistserver_version_recorded
  changed_when: false
  failed_when: false
  when:
    - not ansible_check_mode
    - mistserver_component_versions_file | length > 0

- name: Record MistServer version for the component updater
  ansible.builtin.lineinfile:
    path: "{{ mistserver_component_versions_file }}"
    regexp: "^MIST_VERSION="
    line: "MIST_VERSION={{ mistserver_version }}"
    create: true
    mode: "0644"
  when:
    - not ansible_check_mode
    - mistserver_component_versions_file | length > 0
    - mistserver_version | length > 0
    - (mistserver_reinstall_required | bool) or (mistserver_version_recorded.rc | default(1)) != 0
