---
- name: Ensure systemd service running (linux)
  ansible.builtin.systemd:
    name: "{{ mistserver_systemd_name }}"
    state: started
    enabled: true
    daemon_reload: true
  when:
    - not ansible_check_mode
    - ansible_facts.os_family != 'Darwin'

- name: Ensure launchd job loaded (darwin)
  community.general.launchd:
    name: "{{ mistserver_darwin_label }}"
    state: started
    enabled: true
  when:
    - not ansible_check_mode
    - ansible_facts.os_family == 'Darwin'
