---
- name: Yugabyte | preflight
  ansible.builtin.import_tasks: preflight.yml
  tags: [always]

- name: Yugabyte | install
  ansible.builtin.import_tasks: install.yml
  tags: [install]

- name: Yugabyte | configure
  ansible.builtin.import_tasks: configure.yml
  tags: [configure]

# Apply any notified restarts before the service + validate phases observe
# cluster state — otherwise validate hits the pre-restart process.
- name: Yugabyte | flush handlers before service
  ansible.builtin.meta: flush_handlers
  tags: [configure, service]

- name: Yugabyte | service
  ansible.builtin.import_tasks: service.yml
  tags: [service]

- name: Yugabyte | flush handlers before validate
  ansible.builtin.meta: flush_handlers
  tags: [service, validate]

- name: Yugabyte | validate
  ansible.builtin.import_tasks: validate.yml
  tags: [validate]

- name: Yugabyte | init
  ansible.builtin.import_tasks: init.yml
  tags: [init, never]

- name: Yugabyte | seed
  ansible.builtin.import_tasks: seed.yml
  tags: [seed, never]

- name: Yugabyte | restart
  ansible.builtin.import_tasks: restart.yml
  tags: [restart, never]

- name: Yugabyte | cleanup
  ansible.builtin.import_tasks: cleanup.yml
  tags: [cleanup, never]
