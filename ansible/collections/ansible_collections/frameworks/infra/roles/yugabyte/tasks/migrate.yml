---
# Mirror of postgres/tasks/migrate.yml for Yugabyte. Local admin traffic uses
# the built-in yugabyte role, which the generated HBA trusts only from 127.0.0.1.

- name: Ensure YSQL Ansible module prerequisites
  ansible.builtin.import_tasks: ysql_prereqs.yml

- name: Ensure _migrations tracking table per database (Yugabyte)
  community.postgresql.postgresql_query:
    login_host: 127.0.0.1
    login_port: "{{ yugabyte_ysql_port }}"
    login_user: "{{ yugabyte_superuser_role }}"
    login_password: "{{ yugabyte_superuser_password }}"
    db: "{{ db_entry }}"
    query: |
      CREATE TABLE IF NOT EXISTS _migrations (
        version    TEXT NOT NULL,
        phase      TEXT NOT NULL DEFAULT 'expand',
        seq        INT NOT NULL,
        filename   TEXT NOT NULL,
        checksum   TEXT NOT NULL,
        transactional BOOLEAN NOT NULL DEFAULT true,
        applied_at TIMESTAMPTZ NOT NULL DEFAULT NOW(),
        PRIMARY KEY (version, phase, seq)
      );
      ALTER TABLE _migrations
        ADD COLUMN IF NOT EXISTS phase TEXT NOT NULL DEFAULT 'expand';
      ALTER TABLE _migrations
        ADD COLUMN IF NOT EXISTS transactional BOOLEAN NOT NULL DEFAULT true;
      DO $$
      BEGIN
        IF EXISTS (
          SELECT 1
          FROM pg_constraint
          WHERE conrelid = '_migrations'::regclass
            AND conname = '_migrations_pkey'
            AND array_length(conkey, 1) = 2
        ) THEN
          ALTER TABLE _migrations DROP CONSTRAINT _migrations_pkey;
        END IF;
        IF NOT EXISTS (
          SELECT 1
          FROM pg_constraint
          WHERE conrelid = '_migrations'::regclass
            AND conname = '_migrations_pkey'
        ) THEN
          ALTER TABLE _migrations
            ADD CONSTRAINT _migrations_pkey PRIMARY KEY (version, phase, seq);
        END IF;
      END $$;
  loop: "{{ yugabyte_migrate_items | default([]) | map(attribute='db') | unique | list }}"
  loop_control:
    loop_var: db_entry
  no_log: true

- name: Read applied migrations per database (Yugabyte)
  community.postgresql.postgresql_query:
    login_host: 127.0.0.1
    login_port: "{{ yugabyte_ysql_port }}"
    login_user: "{{ yugabyte_superuser_role }}"
    login_password: "{{ yugabyte_superuser_password }}"
    db: "{{ db_entry }}"
    query: "SELECT version || ':' || phase || ':' || seq AS key, checksum FROM _migrations"
  register: yugabyte_applied_queries
  changed_when: false
  failed_when: false
  check_mode: false
  loop: "{{ yugabyte_migrate_items | default([]) | map(attribute='db') | unique | list }}"
  loop_control:
    loop_var: db_entry
  no_log: true

- name: Fail on migration ledger read errors (Yugabyte)
  ansible.builtin.fail:
    msg: "Read _migrations failed for {{ item.db_entry }}."
  loop: "{{ yugabyte_applied_queries.results | default([]) }}"
  loop_control:
    label: "{{ item.db_entry }}"
  vars:
    ledger_read_error: "{{ (item.msg | default('')) ~ (item.stderr | default('')) }}"
  no_log: true
  when:
    - item.failed | default(false)
    - "'_migrations' not in ledger_read_error or 'does not exist' not in ledger_read_error"

- name: Index applied migrations by database (Yugabyte)
  ansible.builtin.set_fact:
    yugabyte_applied_by_db: >-
      {{ yugabyte_applied_by_db | default({})
         | combine({ item.db_entry:
                     dict((item.query_result | default([]) | map(attribute='key') | list)
                          | zip(item.query_result | default([]) | map(attribute='checksum') | list)) }) }}
  loop: "{{ yugabyte_applied_queries.results | default([]) }}"
  loop_control:
    label: "{{ item.db_entry }}"

- name: Fail on edited applied migrations (Yugabyte)
  ansible.builtin.fail:
    msg: >-
      Migration checksum mismatch for {{ item.db }}/{{ item.version }}/{{ item.phase }}/{{ item.filename }}:
      database has {{ yugabyte_applied_by_db[item.db][item.version ~ ':' ~ item.phase ~ ':' ~ (item.sequence | string)] }},
      embedded file has {{ item.checksum }}.
  loop: "{{ yugabyte_migrate_items | default([]) }}"
  loop_control:
    label: "{{ item.db }}/{{ item.version }}/{{ item.phase }}/{{ item.filename }}"
  vars:
    migration_key: "{{ item.version ~ ':' ~ item.phase ~ ':' ~ (item.sequence | string) }}"
  when:
    - yugabyte_migrate_items | default([]) | length > 0
    - migration_key in (yugabyte_applied_by_db[item.db] | default({}))
    - yugabyte_applied_by_db[item.db][migration_key] != item.checksum

- name: Apply pending migrations (Yugabyte)
  community.postgresql.postgresql_query:
    login_host: 127.0.0.1
    login_port: "{{ yugabyte_ysql_port }}"
    login_user: "{{ yugabyte_superuser_role }}"
    login_password: "{{ yugabyte_superuser_password }}"
    db: "{{ item.db }}"
    query:
      - "{{ item.sql }}"
      - >-
        INSERT INTO _migrations (version, phase, seq, filename, checksum, transactional)
        VALUES ('{{ item.version }}', '{{ item.phase }}', {{ item.sequence }},
                '{{ item.filename }}', '{{ item.checksum }}',
                {{ item.transactional | default(true) | ternary('true', 'false') }})
    autocommit: "{{ not (item.transactional | default(true)) }}"
  loop: "{{ yugabyte_migrate_items | default([]) }}"
  loop_control:
    label: "{{ item.db }}/{{ item.version }}/{{ item.phase }}/{{ item.filename }}"
  vars:
    migration_key: "{{ item.version ~ ':' ~ item.phase ~ ':' ~ (item.sequence | string) }}"
  no_log: true
  when:
    - yugabyte_migrate_items | default([]) | length > 0
    - migration_key not in (yugabyte_applied_by_db[item.db] | default({}))
