---
# YSQL is PostgreSQL-wire-compatible. Init runs locally as the built-in
# yugabyte admin role, which the generated HBA trusts only from 127.0.0.1.
# Application owners get the SOPS-backed password and connect over SCRAM.

- name: Ensure YSQL Ansible module prerequisites
  ansible.builtin.import_tasks: ysql_prereqs.yml

- name: Assert application passwords are present
  ansible.builtin.assert:
    that: (item.password | default(yugabyte_application_password)) | length > 0
    fail_msg: "Yugabyte database {{ item.name }} requires an application password; supply per-database password or yugabyte_application_password"
  loop: "{{ yugabyte_databases }}"
  loop_control:
    label: "{{ item.name }}"
  no_log: true
  when: yugabyte_databases | length > 0

- name: Create application owner roles
  community.postgresql.postgresql_user:
    name: "{{ item.owner | default(item.name) }}"
    password: "{{ item.password | default(yugabyte_application_password) }}"
    role_attr_flags: LOGIN
    login_host: 127.0.0.1
    login_port: "{{ yugabyte_ysql_port }}"
    login_user: "{{ yugabyte_superuser_role }}"
    login_password: "{{ yugabyte_superuser_password }}"
    db: yugabyte
    state: present
  loop: "{{ yugabyte_databases }}"
  loop_control:
    label: "{{ item.owner | default(item.name) }}"
  no_log: true
  when: yugabyte_databases | length > 0

- name: Create databases
  community.postgresql.postgresql_db:
    name: "{{ item.name }}"
    owner: "{{ item.owner | default(item.name) }}"
    login_host: 127.0.0.1
    login_port: "{{ yugabyte_ysql_port }}"
    login_user: "{{ yugabyte_superuser_role }}"
    login_password: "{{ yugabyte_superuser_password }}"
    state: present
  loop: "{{ yugabyte_databases }}"
  loop_control:
    label: "{{ item.name }}"
  no_log: true
  when: yugabyte_databases | length > 0

- name: Grant database ownership to owner role
  community.postgresql.postgresql_owner:
    db: "{{ item.name }}"
    new_owner: "{{ item.owner | default(item.name) }}"
    obj_type: database
    login_host: 127.0.0.1
    login_port: "{{ yugabyte_ysql_port }}"
    login_user: "{{ yugabyte_superuser_role }}"
    login_password: "{{ yugabyte_superuser_password }}"
  loop: "{{ yugabyte_databases }}"
  loop_control:
    label: "{{ item.name }}"
  no_log: true
  when: yugabyte_databases | length > 0
