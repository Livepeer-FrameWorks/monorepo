---
- name: Assert Java package mapping exists for this distro family
  ansible.builtin.assert:
    that:
      - ansible_facts.os_family in kafka_mm_java_package_by_family
    fail_msg: "frameworks.infra.kafka_mirrormaker has no Java mapping for os_family={{ ansible_facts.os_family }}"

- name: Probe for a compatible Java runtime
  ansible.builtin.shell:
    cmd: |
      set -o pipefail
      if ! command -v java >/dev/null 2>&1; then
        exit 1
      fi
      ver="$(java -XshowSettings:properties -version 2>&1 | awk -F'= ' '/^[[:space:]]*java.specification.version = / { print $2; exit }')"
      major="${ver%%.*}"
      if [ "$major" = "1" ]; then
        rest="${ver#1.}"
        major="${rest%%.*}"
      fi
      test -n "$major" && [ "$major" -ge 17 ]
    executable: /bin/bash
  register: kafka_mm_java_runtime_probe
  changed_when: false
  failed_when: false
  check_mode: false

- name: Install Java runtime
  ansible.builtin.package:
    name: "{{ kafka_mm_java_package_by_family[ansible_facts.os_family] }}"
    state: present
  when: kafka_mm_java_runtime_probe.rc != 0

- name: Ensure kafka group
  ansible.builtin.group:
    name: "{{ kafka_mm_group }}"
    system: true

- name: Ensure kafka user
  ansible.builtin.user:
    name: "{{ kafka_mm_user }}"
    group: "{{ kafka_mm_group }}"
    system: true
    shell: /usr/sbin/nologin
    create_home: false

- name: Ensure mirrormaker dirs
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ kafka_mm_user }}"
    group: "{{ kafka_mm_group }}"
    mode: "0755"
  loop:
    - "{{ kafka_mm_install_dir }}"
    - "{{ kafka_mm_state_dir }}"
    - "{{ kafka_mm_log_dir }}"

- name: Stat MirrorMaker binary
  ansible.builtin.stat:
    path: "{{ kafka_mm_bin_dir }}/connect-mirror-maker.sh"
  register: kafka_mm_bin_stat
  check_mode: false
  changed_when: false

- name: Stat MirrorMaker install sentinel
  ansible.builtin.stat:
    path: "{{ kafka_mm_install_sentinel }}"
  register: kafka_mm_sentinel_stat
  check_mode: false
  changed_when: false

- name: Decide whether MirrorMaker reinstall is required
  ansible.builtin.set_fact:
    kafka_mm_reinstall_required: >-
      {{
        not (kafka_mm_bin_stat.stat.exists | default(false)) or
        not (kafka_mm_sentinel_stat.stat.exists | default(false))
      }}

- name: Report pending MirrorMaker reinstall under --check
  ansible.builtin.debug:
    msg: >-
      kafka-mirrormaker would reinstall:
      binary_exists={{ kafka_mm_bin_stat.stat.exists | default(false) }},
      sentinel={{ kafka_mm_install_sentinel }}
  changed_when: kafka_mm_reinstall_required | bool
  when: ansible_check_mode

- name: Remove stale MirrorMaker install sentinel before reinstall
  ansible.builtin.file:
    path: "{{ kafka_mm_install_sentinel }}"
    state: absent
  when:
    - not ansible_check_mode
    - kafka_mm_reinstall_required | default(false)

- name: Download Kafka tarball (shared with broker/controller role)
  ansible.builtin.get_url:
    url: "{{ kafka_mm_artifact_url }}"
    dest: "{{ kafka_mm_tarball_path }}"
    checksum: "{{ kafka_mm_artifact_checksum }}"
    mode: "0644"
    timeout: 300
  when:
    - not ansible_check_mode
    - kafka_mm_reinstall_required | default(true)

- name: Extract Kafka
  ansible.builtin.unarchive:
    src: "{{ kafka_mm_tarball_path }}"
    dest: "{{ kafka_mm_install_dir }}"
    remote_src: true
    owner: "{{ kafka_mm_user }}"
    group: "{{ kafka_mm_group }}"
    extra_opts:
      - --strip-components=1
    creates: "{{ kafka_mm_install_sentinel }}"
  notify: kafka_mirrormaker restart
  when:
    - not ansible_check_mode
    - kafka_mm_reinstall_required | default(true)

- name: Record install sentinel
  ansible.builtin.file:
    path: "{{ kafka_mm_install_sentinel }}"
    state: touch
    owner: "{{ kafka_mm_user }}"
    group: "{{ kafka_mm_group }}"
    mode: "0644"
  changed_when: false
  when:
    - not ansible_check_mode
    - kafka_mm_reinstall_required | default(true)
