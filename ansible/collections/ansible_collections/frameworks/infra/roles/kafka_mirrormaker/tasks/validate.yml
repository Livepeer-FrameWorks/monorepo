---
- name: Validate Kafka MirrorMaker dedicated worker
  block:
    - name: Refresh service facts
      ansible.builtin.service_facts:

    - name: Assert Kafka MirrorMaker service is running
      ansible.builtin.assert:
        that:
          - ansible_facts.services.get('frameworks-kafka-mirrormaker.service', {}).get('state') == 'running'
        fail_msg: >-
          frameworks-kafka-mirrormaker.service is not running
          (state={{ ansible_facts.services.get('frameworks-kafka-mirrormaker.service', {}).get('state', 'missing') }})

    - name: Read Kafka MirrorMaker systemd status
      ansible.builtin.systemd:
        name: frameworks-kafka-mirrormaker.service
      register: kafka_mm_systemd_status
      when: not ansible_check_mode

    - name: Assert Kafka MirrorMaker has a live main process
      ansible.builtin.assert:
        that:
          - kafka_mm_systemd_status.status.MainPID | int > 0
        fail_msg: "frameworks-kafka-mirrormaker.service has no live MainPID"
      when: not ansible_check_mode

    - name: Read Kafka MirrorMaker process command
      ansible.builtin.command: "ps -p {{ kafka_mm_systemd_status.status.MainPID }} -o args="
      register: kafka_mm_process_args
      changed_when: false
      failed_when: false
      check_mode: false
      when: not ansible_check_mode

    - name: Assert Kafka MirrorMaker dedicated process is running expected config
      ansible.builtin.assert:
        that:
          - kafka_mm_process_args.rc == 0
          - "'org.apache.kafka.connect.mirror.MirrorMaker' in kafka_mm_process_args.stdout"
          - kafka_mm_properties_path in kafka_mm_process_args.stdout
          - kafka_mm_local_cluster_alias | length == 0 or ('--clusters ' ~ kafka_mm_local_cluster_alias) in kafka_mm_process_args.stdout
        fail_msg: >-
          frameworks-kafka-mirrormaker.service is running an unexpected command:
          {{ kafka_mm_process_args.stdout | default('(no process args)') }}
      when: not ansible_check_mode

    - name: Wait for Kafka MirrorMaker REST port
      ansible.builtin.wait_for:
        host: 127.0.0.1
        port: "{{ kafka_mm_rest_port }}"
        state: started
        timeout: 60
      when:
        - not ansible_check_mode
        - kafka_mm_validate_rest | bool
  rescue:
    - name: Capture Kafka MirrorMaker systemctl status after failed validation
      ansible.builtin.command: "systemctl status frameworks-kafka-mirrormaker.service --no-pager -l"
      register: kafka_mm_systemctl_status
      changed_when: false
      failed_when: false
      check_mode: false

    - name: Capture Kafka MirrorMaker journal after failed validation
      ansible.builtin.command: "journalctl -u frameworks-kafka-mirrormaker.service --no-pager -n 160"
      register: kafka_mm_journal
      changed_when: false
      failed_when: false
      check_mode: false

    - name: Capture Kafka MirrorMaker rendered systemd unit
      ansible.builtin.slurp:
        src: /etc/systemd/system/frameworks-kafka-mirrormaker.service
      register: kafka_mm_unit
      check_mode: false

    - name: Fail with Kafka MirrorMaker diagnostics
      ansible.builtin.fail:
        msg: |-
          frameworks-kafka-mirrormaker failed validation
          systemctl status:
          {{ kafka_mm_systemctl_status.stdout | default('(no systemctl output)') }}

          journalctl:
          {{ kafka_mm_journal.stdout | default('(no journal output)') }}

          systemd unit:
          {{ (kafka_mm_unit.content | default('') | b64decode) or '(no systemd unit output)' }}
