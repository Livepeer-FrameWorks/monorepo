---
- name: Ensure Caddy dirs
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ omit if ansible_check_mode else caddy_user }}"
    group: "{{ omit if ansible_check_mode else caddy_group }}"
    mode: "0755"
  loop:
    - "{{ caddy_config_dir }}"
    - "{{ caddy_data_dir }}"
    - "{{ caddy_log_dir }}"

- name: Render Caddyfile
  ansible.builtin.template:
    src: Caddyfile.j2
    dest: "{{ caddy_config_dir }}/Caddyfile"
    owner: "{{ omit if ansible_check_mode else caddy_user }}"
    group: "{{ omit if ansible_check_mode else caddy_group }}"
    mode: "0644"
    validate: "{{ omit if ansible_check_mode else 'caddy validate --config %s --adapter caddyfile' }}"
  notify: caddy reload
