---
- name: Install prerequisites
  ansible.builtin.apt:
    name:
      - debian-keyring
      - debian-archive-keyring
      - apt-transport-https
      - curl
    state: present
    update_cache: true
  when: not ansible_check_mode

- name: Import Caddy apt signing key
  ansible.builtin.get_url:
    url: https://dl.cloudsmith.io/public/caddy/stable/gpg.key
    dest: /etc/apt/keyrings/caddy-stable.asc
    mode: "0644"
  when: not ansible_check_mode

- name: Add Caddy apt repo
  ansible.builtin.copy:
    dest: /etc/apt/sources.list.d/caddy-stable.list
    mode: "0644"
    content: |
      deb [signed-by=/etc/apt/keyrings/caddy-stable.asc] https://dl.cloudsmith.io/public/caddy/stable/deb/debian any-version main
      deb-src [signed-by=/etc/apt/keyrings/caddy-stable.asc] https://dl.cloudsmith.io/public/caddy/stable/deb/debian any-version main
  when: not ansible_check_mode

- name: Install pinned Caddy
  ansible.builtin.apt:
    name: "caddy={{ caddy_version }}*"
    state: present
    update_cache: true
    allow_downgrades: true
  notify: caddy restart
  when: not ansible_check_mode
