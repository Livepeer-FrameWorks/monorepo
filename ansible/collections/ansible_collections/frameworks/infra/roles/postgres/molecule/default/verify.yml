---
- name: Verify
  hosts: all
  become: true
  gather_facts: true
  tasks:
    - name: Check postgresql service state
      ansible.builtin.systemd_service:
        name: postgresql
        state: started
      register: postgresql_unit_state_check

    - name: Check postgresql service enabled state
      ansible.builtin.systemd_service:
        name: postgresql
        enabled: true
      register: postgresql_unit_enabled_check

    - name: Assert postgresql active and enabled
      ansible.builtin.assert:
        that:
          - not postgresql_unit_state_check.changed
          - postgresql_unit_state_check.status.ActiveState == "active"
          - not postgresql_unit_enabled_check.changed
          - postgresql_unit_enabled_check.status.UnitFileState == "enabled"

    - name: Wait for TCP listener
      ansible.builtin.wait_for:
        host: 127.0.0.1
        port: 5432
        timeout: 30

    - name: Run init tag to seed databases
      ansible.builtin.include_role:
        name: frameworks.infra.postgres
        tasks_from: init
      vars:
        postgres_databases:
          - { name: periscope }
          - { name: tenants, owner: tenants }

    - name: Confirm databases exist
      become: true
      become_user: postgres
      community.postgresql.postgresql_query:
        login_unix_socket: /var/run/postgresql
        db: postgres
        query: "SELECT datname FROM pg_database WHERE datname IN ('periscope', 'tenants')"
      register: dbs

    - name: Assert both databases present
      ansible.builtin.assert:
        that: dbs.query_result | map(attribute='datname') | list | sort == ['periscope', 'tenants']

    - name: Rerun role for idempotence
      ansible.builtin.include_role:
        name: frameworks.infra.postgres
      register: idem

    - name: Fail if second apply changed anything
      ansible.builtin.assert:
        that: idem is not changed
        fail_msg: "postgres role not idempotent"
