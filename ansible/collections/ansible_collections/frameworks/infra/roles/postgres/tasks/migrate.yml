---
# Migration items delivered by the CLI: list of {db, version, sequence,
# filename, checksum, sql}. The role reads the _migrations tracking table
# on each target database, filters to pending, and applies them inside a
# transaction. ansible-playbook --check --diff shows which migrations would
# run without applying.

- name: Ensure _migrations tracking table per database
  become: true
  become_user: postgres
  community.postgresql.postgresql_query:
    login_unix_socket: /var/run/postgresql
    db: "{{ db_entry }}"
    query: |
      CREATE TABLE IF NOT EXISTS _migrations (
        version    TEXT NOT NULL,
        seq        INT NOT NULL,
        filename   TEXT NOT NULL,
        checksum   TEXT NOT NULL,
        applied_at TIMESTAMPTZ NOT NULL DEFAULT NOW(),
        PRIMARY KEY (version, seq)
      )
  loop: "{{ postgres_migrate_items | default([]) | map(attribute='db') | unique | list }}"
  loop_control:
    loop_var: db_entry

- name: Read applied migrations per database
  become: true
  become_user: postgres
  community.postgresql.postgresql_query:
    login_unix_socket: /var/run/postgresql
    db: "{{ db_entry }}"
    query: "SELECT version || ':' || seq AS key FROM _migrations"
  register: postgres_applied_queries
  changed_when: false
  check_mode: false
  loop: "{{ postgres_migrate_items | default([]) | map(attribute='db') | unique | list }}"
  loop_control:
    loop_var: db_entry

- name: Index applied migrations by database
  ansible.builtin.set_fact:
    postgres_applied_by_db: >-
      {{ postgres_applied_by_db | default({})
         | combine({ item.db_entry:
                     (item.query_result | default([]) | map(attribute='key') | list) }) }}
  loop: "{{ postgres_applied_queries.results | default([]) }}"
  loop_control:
    label: "{{ item.db_entry }}"

- name: Apply pending migrations (query + _migrations insert in one transaction)
  become: true
  become_user: postgres
  community.postgresql.postgresql_query:
    login_unix_socket: /var/run/postgresql
    db: "{{ item.db }}"
    query:
      - "{{ item.sql }}"
      - >-
        INSERT INTO _migrations (version, seq, filename, checksum)
        VALUES ('{{ item.version }}', {{ item.sequence }},
                '{{ item.filename }}', '{{ item.checksum }}')
    autocommit: false
  loop: "{{ postgres_migrate_items | default([]) }}"
  loop_control:
    label: "{{ item.db }}/{{ item.version }}/{{ item.filename }}"
  when:
    - postgres_migrate_items | default([]) | length > 0
    - (item.version ~ ':' ~ (item.sequence | string))
      not in (postgres_applied_by_db[item.db] | default([]))
