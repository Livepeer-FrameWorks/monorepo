---
# Delegates install + config rendering + service start to geerlingguy.postgresql.
# We map our vars onto its variable surface so there is a single source of
# truth: the FrameWorks manifest.
- name: Postgres | compute effective OS paths for geerlingguy.postgresql
  ansible.builtin.set_fact:
    frameworks_postgres_data_dir: "{{ (postgres_arch_pgroot + '/data') if ansible_facts.os_family == 'Archlinux' else postgres_data_dir }}"
    frameworks_postgres_config_dir: "{{ (postgres_arch_pgroot + '/data') if ansible_facts.os_family == 'Archlinux' else postgres_config_dir }}"
    frameworks_postgres_bin_path: "{{ '/usr/sbin' if ansible_facts.os_family == 'Archlinux' else ('/usr/lib/postgresql/' ~ postgres_version ~ '/bin') }}"

- name: Postgres | define Arch variables missing from geerlingguy.postgresql loader
  ansible.builtin.set_fact:
    postgresql_packages:
      - postgresql
    postgresql_daemon: postgresql
  when: ansible_facts.os_family == "Archlinux"

- name: Postgres | refresh Arch package database before dependency install
  community.general.pacman:
    update_cache: true
  when: ansible_facts.os_family == "Archlinux"

- name: Postgres | ensure Arch PGROOT exists
  ansible.builtin.file:
    path: "{{ postgres_arch_pgroot }}"
    state: directory
    owner: postgres
    group: postgres
    mode: "0700"
  when: ansible_facts.os_family == "Archlinux"

- name: Postgres | ensure Arch systemd override directory exists
  ansible.builtin.file:
    path: /etc/systemd/system/postgresql.service.d
    state: directory
    owner: root
    group: root
    mode: "0755"
  when: ansible_facts.os_family == "Archlinux"

- name: Postgres | redirect Arch PostgreSQL unit to managed PGROOT
  ansible.builtin.copy:
    dest: /etc/systemd/system/postgresql.service.d/frameworks.conf
    owner: root
    group: root
    mode: "0644"
    content: |
      [Service]
      Environment=
      Environment=PGROOT={{ postgres_arch_pgroot }}
      PIDFile=
      PIDFile={{ postgres_arch_pgroot }}/data/postmaster.pid
  register: frameworks_postgres_arch_unit_override
  when: ansible_facts.os_family == "Archlinux"

- name: Postgres | reload systemd for Arch PGROOT override
  ansible.builtin.systemd:
    daemon_reload: true
  when:
    - ansible_facts.os_family == "Archlinux"
    - frameworks_postgres_arch_unit_override.changed

- name: Install and configure PostgreSQL via geerlingguy.postgresql
  ansible.builtin.include_role:
    name: geerlingguy.postgresql
    apply:
      tags: [install, configure, service]
  vars:
    postgresql_version: "{{ postgres_version }}"
    postgresql_data_dir: "{{ frameworks_postgres_data_dir }}"
    postgresql_config_path: "{{ frameworks_postgres_config_dir }}"
    postgresql_bin_path: "{{ frameworks_postgres_bin_path }}"
    postgresql_port: "{{ postgres_port }}"
    postgresql_restarted_state: "reloaded"
    postgresql_global_config_options:
      - option: unix_socket_directories
        value: "{{ postgresql_unix_socket_directories | join(',') }}"
      - option: log_directory
        value: log
      - option: listen_addresses
        value: "{{ postgres_listen_addresses }}"
      - option: port
        value: "{{ postgres_port }}"
      - option: max_connections
        value: "{{ postgres_max_connections }}"
      - option: shared_buffers
        value: "{{ postgres_shared_buffers }}"
      - option: password_encryption
        value: scram-sha-256
    postgresql_hba_entries: "{{ postgres_hba_entries }}"
    # Seed the superuser password so init tasks can connect. geerlingguy
    # surfaces it as postgresql_users entries; we apply it via ALTER USER
    # after install so the password can rotate without a re-init.
    postgresql_users_no_log: true
    postgresql_users:
      - name: Postgres
        password: "{{ postgres_admin_password }}"

- name: Postgres | compute extension package list
  ansible.builtin.set_fact:
    frameworks_postgres_extension_packages: "{{ postgres_extension_packages_by_family[ansible_facts.os_family] | default([]) }}"

- name: Postgres | install extension packages
  ansible.builtin.package:
    name: "{{ frameworks_postgres_extension_packages }}"
    state: present
  when: frameworks_postgres_extension_packages | length > 0

- name: Postgres | check Arch pgvector AUR package state
  ansible.builtin.command:
    cmd: "pacman -Q {{ postgres_pgvector_aur_package }}"
  register: frameworks_postgres_pgvector_installed
  changed_when: false
  failed_when: false
  when:
    - ansible_facts.os_family == "Archlinux"
    - postgres_pgvector_enabled | bool

- name: Postgres | install Arch build dependencies for pgvector
  community.general.pacman:
    name: "{{ postgres_pgvector_arch_build_packages }}"
    state: present
  when:
    - ansible_facts.os_family == "Archlinux"
    - postgres_pgvector_enabled | bool
    - frameworks_postgres_pgvector_installed.rc != 0

- name: Postgres | ensure AUR build user exists for pgvector
  ansible.builtin.user:
    name: "{{ postgres_pgvector_aur_build_user }}"
    home: /var/lib/frameworks-aur
    shell: /bin/bash
    create_home: true
    system: true
  when:
    - ansible_facts.os_family == "Archlinux"
    - postgres_pgvector_enabled | bool
    - frameworks_postgres_pgvector_installed.rc != 0

- name: Postgres | ensure AUR build directory parent exists for pgvector
  ansible.builtin.file:
    path: "{{ postgres_pgvector_aur_build_dir | dirname }}"
    state: directory
    owner: "{{ postgres_pgvector_aur_build_user }}"
    group: "{{ postgres_pgvector_aur_build_user }}"
    mode: "0755"
  when:
    - ansible_facts.os_family == "Archlinux"
    - postgres_pgvector_enabled | bool
    - frameworks_postgres_pgvector_installed.rc != 0

- name: Postgres | fetch pgvector AUR package recipe
  ansible.builtin.git:
    repo: "{{ postgres_pgvector_aur_repo }}"
    dest: "{{ postgres_pgvector_aur_build_dir }}"
    version: master
    update: true
  become: true
  become_user: "{{ postgres_pgvector_aur_build_user }}"
  when:
    - ansible_facts.os_family == "Archlinux"
    - postgres_pgvector_enabled | bool
    - frameworks_postgres_pgvector_installed.rc != 0

- name: Postgres | build pgvector AUR package
  ansible.builtin.command:
    cmd: makepkg --noconfirm --cleanbuild --force
    chdir: "{{ postgres_pgvector_aur_build_dir }}"
  become: true
  become_user: "{{ postgres_pgvector_aur_build_user }}"
  register: frameworks_postgres_pgvector_makepkg
  changed_when: "'Finished making:' in frameworks_postgres_pgvector_makepkg.stdout"
  when:
    - ansible_facts.os_family == "Archlinux"
    - postgres_pgvector_enabled | bool
    - frameworks_postgres_pgvector_installed.rc != 0

- name: Postgres | find built pgvector package
  ansible.builtin.find:
    paths: "{{ postgres_pgvector_aur_build_dir }}"
    patterns: "{{ postgres_pgvector_aur_package }}-*.pkg.tar.zst"
    file_type: file
  register: frameworks_postgres_pgvector_packages
  when:
    - ansible_facts.os_family == "Archlinux"
    - postgres_pgvector_enabled | bool
    - frameworks_postgres_pgvector_installed.rc != 0

- name: Postgres | install built pgvector package
  community.general.pacman:
    name: "{{ (frameworks_postgres_pgvector_packages.files | sort(attribute='mtime') | last).path }}"
    state: present
  when:
    - ansible_facts.os_family == "Archlinux"
    - postgres_pgvector_enabled | bool
    - frameworks_postgres_pgvector_installed.rc != 0
    - frameworks_postgres_pgvector_packages.matched | int > 0

- name: Enforce postgres superuser password (rotation-safe)
  community.postgresql.postgresql_user:
    name: postgres
    password: "{{ postgres_admin_password }}"
    login_unix_socket: /var/run/postgresql
    state: present
  no_log: true
  become: true
  become_user: postgres
