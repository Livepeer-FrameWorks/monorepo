---
- name: Check postgresql service state
  ansible.builtin.systemd_service:
    name: "{{ postgres_service_name }}"
    state: started
  register: postgres_service_state

- name: Assert postgresql service active
  ansible.builtin.assert:
    that:
      - not postgres_service_state.changed
      - postgres_service_state.status.ActiveState == "active"
    fail_msg: "postgresql service is not active"

- name: Wait for TCP listener
  ansible.builtin.wait_for:
    host: 127.0.0.1
    port: "{{ postgres_port }}"
    timeout: 30

- name: Confirm SELECT version() via peer auth
  become: true
  become_user: postgres
  community.postgresql.postgresql_query:
    login_unix_socket: /var/run/postgresql
    db: postgres
    query: "SELECT version()"
  register: postgres_version_probe
  changed_when: false
  failed_when: "'PostgreSQL' not in (postgres_version_probe.query_result[0].version | default(''))"
