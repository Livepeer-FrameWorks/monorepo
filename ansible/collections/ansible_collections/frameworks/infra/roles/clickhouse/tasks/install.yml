---
- name: Install ClickHouse packages via idealista.clickhouse (Debian family)
  ansible.builtin.import_role:
    name: idealista.clickhouse
    tasks_from: install-Debian.yml
  tags: [install]
  vars:
    clickhouse_http_port: "{{ clickhouse_port_http }}"
    clickhouse_tcp_port: "{{ clickhouse_port_tcp }}"
    clickhouse_interserver_http_port: "{{ clickhouse_port_interserver }}"
    clickhouse_default_password_sha256: "{{ clickhouse_default_password | hash('sha256') }}"
    clickhouse_default_users: "{{ frameworks_clickhouse_default_users }}"
    clickhouse_default_quotas: "{{ frameworks_clickhouse_default_quotas }}"

- name: Configure ClickHouse via idealista.clickhouse
  ansible.builtin.import_role:
    name: idealista.clickhouse
    tasks_from: config/clickhouse.yml
  tags: [configure]
  vars:
    clickhouse_http_port: "{{ clickhouse_port_http }}"
    clickhouse_tcp_port: "{{ clickhouse_port_tcp }}"
    clickhouse_interserver_http_port: "{{ clickhouse_port_interserver }}"
    clickhouse_default_password_sha256: "{{ clickhouse_default_password | hash('sha256') }}"
    clickhouse_default_users: "{{ frameworks_clickhouse_default_users }}"
    clickhouse_default_quotas: "{{ frameworks_clickhouse_default_quotas }}"

- name: Remove legacy listen_host overrides before starting ClickHouse
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - /etc/clickhouse-server/config.d/99-listen_host.xml

- name: Write managed ClickHouse listen-host override
  ansible.builtin.copy:
    dest: /etc/clickhouse-server/config.d/listen-host.xml
    owner: clickhouse
    group: clickhouse
    mode: "0644"
    content: |
      <clickhouse>
      {% set managed_listen_hosts = clickhouse_listen_hosts if (clickhouse_listen_hosts | length > 0) else [clickhouse_listen_host] %}
      {% for listen_host in managed_listen_hosts %}
        <listen_host>{{ listen_host }}</listen_host>
      {% endfor %}
      </clickhouse>

- name: Write managed ClickHouse Prometheus endpoint
  ansible.builtin.template:
    src: prometheus.xml.j2
    dest: /etc/clickhouse-server/config.d/prometheus.xml
    owner: clickhouse
    group: clickhouse
    mode: "0644"
  notify: clickhouse restart

# Replicated cluster + coordination. Only when the manifest declares a clustered
# ClickHouse (clickhouse_keeper_nodes non-empty). A bare singleton skips all of
# this and the drop-ins are removed, so non-clustered deployments are unaffected.
# Keeper is a STANDALONE clickhouse-keeper process (docs treat embedded in-process
# Keeper as test/small-instance only) and must be up before clickhouse-server
# starts so the Replicated database engine and Replicated* tables can attach.
- name: Configure standalone ClickHouse Keeper + cluster
  when: clickhouse_keeper_nodes | default([]) | length > 0
  block:
    - name: Install clickhouse-keeper package (Altinity/ClickHouse repo added by idealista)
      ansible.builtin.apt:
        name: clickhouse-keeper
        state: present
        update_cache: true

    - name: Ensure ClickHouse Keeper directories exist
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        owner: clickhouse
        group: clickhouse
        mode: "0750"
      loop:
        - /var/log/clickhouse-keeper
        - /var/lib/clickhouse-keeper
        - /var/lib/clickhouse-keeper/coordination
        - /var/lib/clickhouse-keeper/coordination/log
        - /var/lib/clickhouse-keeper/coordination/snapshots

    - name: Render managed ClickHouse Keeper config
      ansible.builtin.template:
        src: keeper_config.xml.j2
        dest: /etc/clickhouse-keeper/keeper_config.xml
        owner: clickhouse
        group: clickhouse
        mode: "0644"
      notify: keeper restart

    - name: Ensure clickhouse-keeper is enabled and started
      ansible.builtin.systemd:
        name: clickhouse-keeper
        state: started
        enabled: true
        daemon_reload: true

    # remote_servers + macros + zookeeper(keeper) client + default_replica_path.
    # The Replicated database engine (not remote_servers) does the actual DDL/data
    # replication; remote_servers is kept for tooling and system.clusters visibility.
    - name: Write managed ClickHouse cluster config
      ansible.builtin.template:
        src: cluster.xml.j2
        dest: /etc/clickhouse-server/config.d/cluster.xml
        owner: clickhouse
        group: clickhouse
        mode: "0644"
      notify: clickhouse restart

    # Encode the Keeper->server dependency in systemd so ordering holds on reboot
    # and manual `systemctl restart`, not only during an Ansible run (where it
    # would depend on handler definition order).
    - name: Ensure clickhouse-server systemd drop-in dir exists
      ansible.builtin.file:
        path: /etc/systemd/system/clickhouse-server.service.d
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: Order clickhouse-server after clickhouse-keeper (systemd drop-in)
      ansible.builtin.copy:
        dest: /etc/systemd/system/clickhouse-server.service.d/10-keeper.conf
        owner: root
        group: root
        mode: "0644"
        content: |
          [Unit]
          After=clickhouse-keeper.service
          Wants=clickhouse-keeper.service
      notify: systemd daemon-reload

- name: Remove managed ClickHouse cluster + Keeper-ordering config when unclustered
  when: clickhouse_keeper_nodes | default([]) | length == 0
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - /etc/systemd/system/clickhouse-server.service.d/10-keeper.conf
  notify:
    - systemd daemon-reload
    - clickhouse restart

- name: Remove managed ClickHouse cluster config when unclustered
  when: clickhouse_keeper_nodes | default([]) | length == 0
  ansible.builtin.file:
    path: /etc/clickhouse-server/config.d/cluster.xml
    state: absent
  notify: clickhouse restart

- name: Write managed ClickHouse named collections
  when: clickhouse_named_collections | length > 0
  ansible.builtin.copy:
    dest: /etc/clickhouse-server/config.d/named-collections.xml
    owner: clickhouse
    group: clickhouse
    mode: "0600"
    content: |
      <clickhouse>
        <named_collections>
      {% for collection in clickhouse_named_collections %}
          <{{ collection.name }}>
      {% for key, value in (collection.settings | default({})).items() %}
            <{{ key }}>{{ value }}</{{ key }}>
      {% endfor %}
          </{{ collection.name }}>
      {% endfor %}
        </named_collections>
      </clickhouse>
  no_log: true
  notify: clickhouse restart

- name: Remove managed ClickHouse named collections when none are configured
  when: clickhouse_named_collections | length == 0
  ansible.builtin.file:
    path: /etc/clickhouse-server/config.d/named-collections.xml
    state: absent
  notify: clickhouse restart

# The operator-analytics ClickHouse user (Metabase datasource for the
# tenant activity cards) is a DEDICATED user so the runtime `frameworks`
# service user never gains the postgresql() reach-through privileges.
# Named-collection usage requires explicit grants for XML-defined users, and
# <grants> cannot coexist with <allow_databases>/<access_management> on the
# same user — ClickHouse refuses to START with "Any other access control
# settings can't be specified with `grants`" (BAD_ARGUMENTS) — so this user
# is grants-only.
- name: Write managed ClickHouse operator-analytics user
  when: clickhouse_named_collections | length > 0 and clickhouse_analytics_password | length > 0
  ansible.builtin.copy:
    dest: /etc/clickhouse-server/users.d/frameworks-analytics.xml
    owner: clickhouse
    group: clickhouse
    mode: "0600"
    content: |
      <clickhouse>
        <users>
          <frameworks_analytics>
            <password_sha256_hex>{{ clickhouse_analytics_password | hash('sha256') }}</password_sha256_hex>
            <profile>default</profile>
            <quota>default</quota>
            <networks>
              <ip>::/0</ip>
            </networks>
            <grants>
              <query>GRANT SELECT ON periscope.*</query>
              <query>GRANT dictGet ON periscope.tenant_dim</query>
              <query>GRANT CREATE TEMPORARY TABLE, POSTGRES ON *.*</query>
      {% for collection in clickhouse_named_collections %}
              <query>GRANT NAMED COLLECTION ON {{ collection.name }}</query>
      {% endfor %}
            </grants>
          </frameworks_analytics>
        </users>
      </clickhouse>
  no_log: true
  notify: clickhouse restart

- name: Remove managed ClickHouse operator-analytics user when unconfigured
  when: clickhouse_named_collections | length == 0 or clickhouse_analytics_password | length == 0
  ansible.builtin.file:
    path: /etc/clickhouse-server/users.d/frameworks-analytics.xml
    state: absent
  notify: clickhouse restart

- name: Remove broken upstream TLS block when ClickHouse TLS is disabled
  when: not (clickhouse_enable_ssl | default(false) | bool)
  block:
    - name: Remove upstream TLS drop-in when ClickHouse TLS is disabled
      ansible.builtin.file:
        path: /etc/clickhouse-server/config.d/openssl.xml
        state: absent

    - name: Remove unconditional openSSL block from config.xml when ClickHouse TLS is disabled
      ansible.builtin.replace:
        path: /etc/clickhouse-server/config.xml
        regexp: '(?s)\n  <openSSL>.*?\n  </openSSL>\n'
        replace: "\n"

- name: Normalize malformed upstream default quota in users.xml
  ansible.builtin.replace:
    path: /etc/clickhouse-server/users.xml
    regexp: "(<execution_time>)0gv(</execution_time>)"
    replace: '\g<1>0\g<2>'

- name: Start ClickHouse service
  tags: [service]
  block:
    - name: Ensure clickhouse-server is enabled and started
      ansible.builtin.systemd:
        name: "{{ clickhouse_service_name }}"
        state: started
        enabled: true
        daemon_reload: false

    # Skipped under --check: the service was never actually (re)started
    # there, and a live-health assert in the no-op precheck would block the
    # very provision run that repairs a down server.
    - name: Probe ClickHouse locally after start
      ansible.builtin.include_tasks: _probe_client.yml
      when: not ansible_check_mode

  rescue:
    - name: Capture clickhouse-server systemctl status after failed start
      ansible.builtin.command: systemctl status {{ clickhouse_service_name }} --no-pager --full
      register: clickhouse_systemctl_status
      changed_when: false
      failed_when: false

    - name: Capture clickhouse-server journal after failed start
      ansible.builtin.command: journalctl -u {{ clickhouse_service_name }} -n 100 --no-pager
      register: clickhouse_journal
      changed_when: false
      failed_when: false

    - name: Capture clickhouse-server error log after failed start
      ansible.builtin.command: tail -n 100 /var/log/clickhouse-server/clickhouse-server.err.log
      register: clickhouse_err_log
      changed_when: false
      failed_when: false

    - name: Fail with ClickHouse startup diagnostics
      ansible.builtin.fail:
        msg: |-
          clickhouse-server failed to start cleanly
          systemctl status:
          {{ clickhouse_systemctl_status.stdout | default('(no output)') }}

          journalctl:
          {{ clickhouse_journal.stdout | default('(no output)') }}

          clickhouse-server.err.log:
          {{ clickhouse_err_log.stdout | default('(no output)') }}
