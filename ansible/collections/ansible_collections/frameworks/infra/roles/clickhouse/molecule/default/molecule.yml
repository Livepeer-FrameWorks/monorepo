---
role_name_check: 1
prerun: false

dependency:
  name: galaxy

driver:
  name: docker

platforms:
  - name: clickhouse-instance
    image: geerlingguy/docker-ubuntu2404-ansible:latest
    pre_build_image: true
    privileged: true
    command: /usr/sbin/init
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    cgroupns_mode: host
    tmpfs:
      - /run
      - /tmp

provisioner:
  name: ansible
  playbooks:
    prepare: ../../../../molecule/prepare-apt.yml
  inventory:
    group_vars:
      all:
        clickhouse_version: "24.8"
        clickhouse_default_password: "molecule-test-password"
        clickhouse_databases:
          - analytics
          - tenants

verifier:
  name: ansible
