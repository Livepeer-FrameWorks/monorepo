---
- name: Verify
  hosts: all
  become: true
  gather_facts: true
  tasks:
    - name: Refresh service facts
      ansible.builtin.service_facts:

    - name: Assert clickhouse-server running
      ansible.builtin.assert:
        that:
          - ansible_facts.services['clickhouse-server.service'].state == 'running'

    - name: Wait for TCP listener
      ansible.builtin.wait_for:
        host: 127.0.0.1
        port: 9000
        timeout: 60

    - name: Confirm ClickHouse answers a native query
      ansible.builtin.command:
        argv:
          - clickhouse-client
          - --host=127.0.0.1
          - --port=9000
          - --password
          - molecule-test-password
          - -q
          - SELECT 1
      changed_when: false
