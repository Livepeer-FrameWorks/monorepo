---
galaxy_info:
  role_name: clickhouse
  author: FrameWorks Infra
  description: >-
    Thin wrapper over idealista.clickhouse. Pins version, listen host,
    databases, and user passwords from the FrameWorks release manifest.
  license: AGPL-3.0-or-later
  min_ansible_version: "2.15"
  platforms:
    - name: Ubuntu
      versions: [jammy, noble]
    - name: Debian
      versions: [bookworm]

dependencies: []

argument_specs:
  main:
    short_description: Install and configure a ClickHouse server.
    options:
      clickhouse_version:
        type: str
        required: true
      clickhouse_listen_host:
        type: str
        required: false
        default: "::"
      clickhouse_port_http:
        type: int
        required: false
        default: 8123
      clickhouse_port_tcp:
        type: int
        required: false
        default: 9000
      clickhouse_default_password:
        type: str
        required: false
        no_log: true
      clickhouse_databases:
        type: list
        elements: str
        required: false
      clickhouse_users:
        type: list
        elements: dict
        required: false
        options:
          name:
            type: str
            required: true
          password:
            type: str
            required: false
            no_log: true
          networks:
            type: list
            elements: str
            required: false
          profile:
            type: str
            required: false
            default: default
