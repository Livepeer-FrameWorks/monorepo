---
- name: Reload nginx
  listen: nginx reload
  ansible.builtin.systemd:
    name: "{{ nginx_service_name }}"
    state: reloaded
  when: not ansible_check_mode

- name: Restart nginx
  listen: nginx restart
  ansible.builtin.systemd:
    name: "{{ nginx_service_name }}"
    state: restarted
  when: not ansible_check_mode
