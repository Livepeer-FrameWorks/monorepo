---
- name: Nginx | install
  ansible.builtin.import_tasks: install.yml
  tags: [install]

- name: Nginx | configure
  ansible.builtin.import_tasks: configure.yml
  tags: [configure]

- name: Nginx | flush handlers before service
  ansible.builtin.meta: flush_handlers
  tags: [configure, service]

- name: Nginx | service
  ansible.builtin.import_tasks: service.yml
  tags: [service]

- name: Nginx | flush handlers before validate
  ansible.builtin.meta: flush_handlers
  tags: [service, validate]

- name: Nginx | validate
  ansible.builtin.import_tasks: validate.yml
  tags: [validate]

- name: Nginx | restart
  ansible.builtin.import_tasks: restart.yml
  tags: [restart, never]

- name: Nginx | cleanup
  ansible.builtin.import_tasks: cleanup.yml
  tags: [cleanup, never]
