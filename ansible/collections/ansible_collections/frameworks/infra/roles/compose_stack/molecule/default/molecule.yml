---
role_name_check: 1
prerun: false
dependency:
  name: galaxy
driver:
  name: docker
platforms:
  - name: compose-stack-instance
    image: geerlingguy/docker-ubuntu2404-ansible:latest
    pre_build_image: true
    privileged: true
    command: /usr/sbin/init
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    cgroupns_mode: host
    dns_servers:
      - "1.1.1.1"
      - "8.8.8.8"
    tmpfs:
      - /run
      - /tmp
provisioner:
  name: ansible
  inventory:
    group_vars:
      all:
        compose_stack_name: nginx-smoke
        compose_stack_compose_content: |
          services:
            web:
              image: nginx:1.27-alpine
              restart: unless-stopped
              ports:
                - "18080:80"
        compose_stack_render_only: true
        compose_stack_env:
          MARKER: ok
verifier:
  name: ansible
