---
- name: Verify
  hosts: all
  become: true
  gather_facts: true
  tasks:
    - name: Read rendered compose file
      ansible.builtin.slurp:
        src: /opt/frameworks/nginx-smoke/docker-compose.yml
      register: compose_file

    - name: Read rendered env file
      ansible.builtin.slurp:
        src: /opt/frameworks/nginx-smoke/.env
      register: env_file

    - name: Assert rendered stack files
      ansible.builtin.assert:
        that:
          - "'nginx:1.27-alpine' in (compose_file.content | b64decode)"
          - "'18080:80' in (compose_file.content | b64decode)"
          - "'MARKER=ok' in (env_file.content | b64decode)"

    - name: Rerun role (idempotence)
      ansible.builtin.include_role:
        name: frameworks.infra.compose_stack
      register: idem

    - name: Fail if second apply changed anything
      ansible.builtin.assert:
        that: idem is not changed
        fail_msg: "compose_stack role not idempotent"
