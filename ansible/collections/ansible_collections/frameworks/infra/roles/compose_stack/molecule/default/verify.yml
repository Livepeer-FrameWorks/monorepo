---
- name: Verify
  hosts: all
  become: true
  gather_facts: true
  tasks:
    - name: Confirm compose stack is up
      ansible.builtin.command: docker compose -f /opt/frameworks/nginx-smoke/docker-compose.yml ps --format json
      register: compose_ps
      changed_when: false

    - name: Assert exactly one running container
      ansible.builtin.assert:
        that:
          - compose_ps.stdout | from_json | selectattr('State', 'equalto', 'running') | list | length >= 1
        fail_msg: "compose_stack: expected at least one running container, got {{ compose_ps.stdout }}"

    - name: Probe the nginx port
      ansible.builtin.uri:
        url: "http://127.0.0.1:18080/"
        status_code: 200
        return_content: false

    - name: Rerun role (idempotence)
      ansible.builtin.include_role:
        name: frameworks.infra.compose_stack
      register: idem

    - name: Fail if second apply changed anything
      ansible.builtin.assert:
        that: idem is not changed
        fail_msg: "compose_stack role not idempotent"
