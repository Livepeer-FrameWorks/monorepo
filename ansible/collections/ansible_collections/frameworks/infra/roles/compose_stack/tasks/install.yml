---
- name: Ensure project directory
  ansible.builtin.file:
    path: "{{ compose_stack_project_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Render additional stack files
  ansible.builtin.copy:
    dest: "{{ compose_stack_project_dir }}/{{ item.key }}"
    content: "{{ item.value }}"
    owner: root
    group: root
    mode: "0644"
  loop: "{{ compose_stack_files | dict2items }}"
  when: compose_stack_files | length > 0

- name: Ensure data-migrations marker directory
  ansible.builtin.file:
    path: "{{ compose_stack_data_migrations_marker | dirname }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  when: compose_stack_data_migrations_marker | length > 0

- name: Mark data-migrations adoption
  ansible.builtin.copy:
    dest: "{{ compose_stack_data_migrations_marker }}"
    content: "{{ compose_stack_name }}\n"
    owner: root
    group: root
    mode: "0644"
  when: compose_stack_data_migrations_marker | length > 0

- name: Install Docker Engine packages
  ansible.builtin.package:
    name: "{{ compose_stack_docker_engine_packages_by_family[ansible_facts.os_family] | default(compose_stack_docker_engine_packages) }}"
    state: present
  when:
    - compose_stack_manage_docker | bool
    - not (compose_stack_render_only | default(false) | bool)
    - not ansible_check_mode

- name: Check Docker Compose plugin
  ansible.builtin.command:
    argv: [docker, compose, version]
  register: compose_stack_compose_probe
  changed_when: false
  failed_when: false
  check_mode: false
  when:
    - compose_stack_manage_docker | bool
    - not (compose_stack_render_only | default(false) | bool)

- name: Install Docker Compose package
  ansible.builtin.package:
    name: "{{ compose_stack_docker_compose_packages_by_family[ansible_facts.os_family] | default(compose_stack_docker_compose_packages) }}"
    state: present
  register: compose_stack_compose_package_install
  failed_when: false
  when:
    - compose_stack_manage_docker | bool
    - not (compose_stack_render_only | default(false) | bool)
    - not ansible_check_mode
    - compose_stack_compose_probe.rc | default(1) != 0

- name: Re-check Docker Compose plugin after package install
  ansible.builtin.command:
    argv: [docker, compose, version]
  register: compose_stack_compose_package_probe
  changed_when: false
  failed_when: false
  check_mode: false
  when:
    - compose_stack_manage_docker | bool
    - not (compose_stack_render_only | default(false) | bool)
    - compose_stack_compose_probe.rc | default(1) != 0

- name: Resolve Docker Compose plugin architecture
  ansible.builtin.set_fact:
    compose_stack_compose_plugin_arch: >-
      {{
        {
          'x86_64': 'x86_64',
          'amd64': 'x86_64',
          'aarch64': 'aarch64',
          'arm64': 'aarch64'
        }[ansible_facts.architecture] | default('')
      }}
  when:
    - compose_stack_manage_docker | bool
    - not (compose_stack_render_only | default(false) | bool)
    - compose_stack_compose_probe.rc | default(1) != 0
    - compose_stack_compose_package_probe.rc | default(1) != 0

- name: Fail when Docker Compose fallback architecture is unsupported
  ansible.builtin.fail:
    msg: >-
      Docker Compose package is unavailable and no fallback binary mapping
      exists for architecture {{ ansible_facts.architecture }}
  when:
    - compose_stack_manage_docker | bool
    - not (compose_stack_render_only | default(false) | bool)
    - compose_stack_compose_probe.rc | default(1) != 0
    - compose_stack_compose_package_probe.rc | default(1) != 0
    - compose_stack_compose_plugin_arch | default('') | length == 0

- name: Ensure Docker Compose plugin directory
  ansible.builtin.file:
    path: "{{ compose_stack_compose_plugin_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  when:
    - compose_stack_manage_docker | bool
    - not (compose_stack_render_only | default(false) | bool)
    - not ansible_check_mode
    - compose_stack_compose_probe.rc | default(1) != 0
    - compose_stack_compose_package_probe.rc | default(1) != 0

- name: Install Docker Compose plugin binary fallback
  ansible.builtin.get_url:
    url: >-
      https://github.com/docker/compose/releases/download/{{ compose_stack_compose_plugin_version
      }}/docker-compose-linux-{{ compose_stack_compose_plugin_arch }}
    dest: "{{ compose_stack_compose_plugin_dir }}/docker-compose"
    owner: root
    group: root
    mode: "0755"
  when:
    - compose_stack_manage_docker | bool
    - not (compose_stack_render_only | default(false) | bool)
    - not ansible_check_mode
    - compose_stack_compose_probe.rc | default(1) != 0
    - compose_stack_compose_package_probe.rc | default(1) != 0

- name: Verify Docker Compose plugin
  ansible.builtin.command:
    argv: [docker, compose, version]
  register: compose_stack_compose_final_probe
  changed_when: false
  check_mode: false
  when:
    - compose_stack_manage_docker | bool
    - not (compose_stack_render_only | default(false) | bool)

- name: Ensure Docker service is running
  ansible.builtin.service:
    name: "{{ compose_stack_docker_service }}"
    state: started
    enabled: true
  when:
    - compose_stack_manage_docker | bool
    - not (compose_stack_render_only | default(false) | bool)
    - not ansible_check_mode

# Two rendering paths:
#   - callers with a specific shape (chatwoot, listmonk) hand in a fully
#     rendered docker-compose.yml as `compose_stack_compose_content`;
#   - callers that want the generic single-service shape pass a
#     `compose_stack_service` dict ({image, port, container_port,
#     health_path}) and this role renders the compose from
#     templates/generic-compose.yml.j2.
- name: Render docker-compose.yml (explicit content)
  ansible.builtin.copy:
    dest: "{{ compose_stack_project_dir }}/docker-compose.yml"
    content: "{{ compose_stack_compose_content }}"
    owner: root
    group: root
    mode: "0644"
  when: (compose_stack_compose_content | default('')) | length > 0

- name: Render docker-compose.yml (generic service template)
  ansible.builtin.template:
    src: generic-compose.yml.j2
    dest: "{{ compose_stack_project_dir }}/docker-compose.yml"
    owner: root
    group: root
    mode: "0644"
  when:
    - (compose_stack_compose_content | default('')) | length == 0
    - (compose_stack_service | default({})) | length > 0

- name: Render .env file
  ansible.builtin.copy:
    dest: "{{ compose_stack_project_dir }}/.env"
    content: |
      {% for k, v in compose_stack_env.items() %}
      {{ k }}={{ v }}
      {% endfor %}
    owner: root
    group: root
    mode: "0600"
  when: compose_stack_env | length > 0
  no_log: true

- name: Fail when Docker registry authentication is required
  ansible.builtin.fail:
    msg: >-
      Docker registry authentication is required for {{
      compose_stack_service.image | default('this compose stack') }}, but
      compose_stack_registry_auth.username/password were not provided.
      Set GHCR_USERNAME/GHCR_TOKEN, GITHUB_USER/CR_PAT, or
      DOCKER_USERNAME/DOCKER_PASSWORD in the service env.
  when:
    - compose_stack_require_registry_auth | bool
    - not (compose_stack_render_only | default(false) | bool)
    - not ansible_check_mode
    - >-
      (compose_stack_registry_auth.username | default('')) | length == 0
      or (compose_stack_registry_auth.password | default('')) | length == 0

- name: Authenticate Docker registry
  community.docker.docker_login:
    registry_url: "{{ compose_stack_registry_auth.registry_url | default(omit) }}"
    username: "{{ compose_stack_registry_auth.username }}"
    password: "{{ compose_stack_registry_auth.password }}"
    reauthorize: true
  when:
    - compose_stack_registry_auth | length > 0
    - (compose_stack_registry_auth.username | default('')) | length > 0
    - (compose_stack_registry_auth.password | default('')) | length > 0
    - not (compose_stack_render_only | default(false) | bool)
    - not ansible_check_mode
  no_log: true

- name: Apply compose stack
  community.docker.docker_compose_v2:
    project_src: "{{ compose_stack_project_dir }}"
    state: present
    pull: "{{ compose_stack_pull }}"
    recreate: "{{ compose_stack_recreate }}"
    wait: "{{ compose_stack_wait }}"
    wait_timeout: "{{ compose_stack_wait_timeout }}"
  when:
    - not (compose_stack_render_only | default(false) | bool)
    - not ansible_check_mode
