---
galaxy_info:
  role_name: compose_stack
  author: FrameWorks Infra
  description: Generic wrapper around community.docker.docker_compose_v2 for FrameWorks app stacks.
  license: AGPL-3.0-or-later
  min_ansible_version: "2.15"

dependencies: []

argument_specs:
  main:
    short_description: Apply or remove a docker-compose stack.
    options:
      compose_stack_name:
        type: str
        required: true
      compose_stack_compose_content:
        type: str
        required: true
        description: Fully-rendered docker-compose.yml content.
      compose_stack_env:
        type: dict
        required: false
