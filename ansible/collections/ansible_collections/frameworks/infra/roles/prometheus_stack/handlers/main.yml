---
- name: Restart victoriametrics
  listen: victoriametrics restart
  ansible.builtin.systemd:
    name: victoriametrics
    state: restarted
    daemon_reload: true
  register: victoriametrics_restarted
  when: not ansible_check_mode

- name: Restart vmagent
  listen: vmagent restart
  ansible.builtin.systemd:
    name: vmagent
    state: restarted
    daemon_reload: true
  register: vmagent_restarted
  when: not ansible_check_mode

- name: Restart vmauth
  listen: vmauth restart
  ansible.builtin.systemd:
    name: vmauth
    state: restarted
    daemon_reload: true
  register: vmauth_restarted
  when: not ansible_check_mode
