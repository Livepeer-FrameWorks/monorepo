---
- name: Download vmauth binary
  ansible.builtin.get_url:
    url: "{{ vmauth_artifact_url }}"
    dest: /tmp/vmauth.tar.gz
    checksum: "{{ vmauth_artifact_checksum }}"
    mode: "0644"
  when: not ansible_check_mode

- name: Extract vmauth
  ansible.builtin.unarchive:
    src: /tmp/vmauth.tar.gz
    dest: /usr/local/bin
    remote_src: true
    mode: "0755"
    creates: "{{ vmauth_bin }}"
  when: not ansible_check_mode

- name: Render vmauth systemd unit
  ansible.builtin.template:
    src: vmauth.service.j2
    dest: /etc/systemd/system/vmauth.service
    owner: root
    group: root
    mode: "0644"
  notify: vmauth restart

- name: Ensure vmauth service
  ansible.builtin.systemd:
    name: vmauth
    state: started
    enabled: true
    daemon_reload: true
  when: not ansible_check_mode
