---
- name: Validate vmauth configuration
  ansible.builtin.assert:
    that:
      - vmauth_artifact_url | length > 0
      - vmauth_artifact_checksum | length > 0
      - vmauth_username | length > 0
      - vmauth_password | length > 0
      - vmauth_upstream_url | length > 0
    fail_msg: "vmauth requires artifact URL/checksum, basic auth credentials, and an upstream URL"

- name: Validate vmauth edge JWT support
  ansible.builtin.assert:
    that:
      - "(vmauth_edge_jwt_public_key_pem_b64 | length == 0) or ((vmauth_version | regex_replace('^v', '')) is version('1.138.0', '>='))"
    fail_msg: "vmauth edge JWT routing requires VictoriaMetrics v1.138.0 or newer"

- name: Set vmauth extract directory
  ansible.builtin.set_fact:
    vmauth_extract_dir: "/tmp/frameworks-vmauth-{{ vmauth_artifact_checksum | hash('sha1') }}"

- name: Ensure vmauth extract directory
  ansible.builtin.file:
    path: "{{ vmauth_extract_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  when: not ansible_check_mode

- name: Stat vmauth binary
  ansible.builtin.stat:
    path: "{{ vmauth_bin }}"
  register: vmauth_bin_stat
  check_mode: false
  changed_when: false

- name: Stat vmauth install sentinel
  ansible.builtin.stat:
    path: "{{ vmauth_install_sentinel }}"
  register: vmauth_install_sentinel_stat
  check_mode: false
  changed_when: false

- name: Decide whether vmauth reinstall is required
  ansible.builtin.set_fact:
    vmauth_reinstall_required: >-
      {{
        not (vmauth_bin_stat.stat.exists | default(false)) or
        not (vmauth_install_sentinel_stat.stat.exists | default(false))
      }}

- name: Report pending vmauth reinstall under --check
  ansible.builtin.debug:
    msg: >-
      vmauth would reinstall:
      binary_exists={{ vmauth_bin_stat.stat.exists | default(false) }},
      sentinel={{ vmauth_install_sentinel }}
  changed_when: vmauth_reinstall_required | bool
  when: ansible_check_mode

- name: Download vmauth binary
  ansible.builtin.get_url:
    url: "{{ vmauth_artifact_url }}"
    dest: /tmp/vmauth.tar.gz
    checksum: "{{ vmauth_artifact_checksum }}"
    mode: "0644"
  when:
    - not ansible_check_mode
    - vmauth_reinstall_required | default(true)

- name: Extract vmauth
  ansible.builtin.unarchive:
    src: /tmp/vmauth.tar.gz
    dest: "{{ vmauth_extract_dir }}"
    remote_src: true
    mode: "0755"
    creates: "{{ vmauth_extract_dir }}/{{ vmauth_artifact_binary }}"
  when:
    - not ansible_check_mode
    - vmauth_reinstall_required | default(true)

- name: Install vmauth binary
  ansible.builtin.copy:
    src: "{{ vmauth_extract_dir }}/{{ vmauth_artifact_binary }}"
    dest: "{{ vmauth_bin }}"
    remote_src: true
    owner: root
    group: root
    mode: "0755"
  notify: vmauth restart
  when:
    - not ansible_check_mode
    - vmauth_reinstall_required | default(true)

- name: Record vmauth install sentinel
  ansible.builtin.file:
    path: "{{ vmauth_install_sentinel }}"
    state: touch
    owner: root
    group: root
    mode: "0644"
  changed_when: false
  when:
    - not ansible_check_mode
    - vmauth_reinstall_required | default(true)

- name: Ensure vmauth config directory
  ansible.builtin.file:
    path: "{{ vmauth_config_path | dirname }}"
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Render vmauth config
  ansible.builtin.template:
    src: vmauth.yml.j2
    dest: "{{ vmauth_config_path }}"
    owner: root
    group: "{{ prometheus_stack_group }}"
    mode: "0640"
  notify: vmauth restart

- name: Render vmauth systemd unit
  ansible.builtin.template:
    src: vmauth.service.j2
    dest: /etc/systemd/system/vmauth.service
    owner: root
    group: root
    mode: "0644"
  notify: vmauth restart

- name: Ensure vmauth service
  ansible.builtin.systemd:
    name: vmauth
    state: started
    enabled: true
    daemon_reload: true
  when: not ansible_check_mode
