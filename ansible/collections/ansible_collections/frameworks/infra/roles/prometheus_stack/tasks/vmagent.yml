---
- name: Ensure prometheus user (vmagent runs under same uid)
  ansible.builtin.user:
    name: "{{ prometheus_stack_user }}"
    group: "{{ prometheus_stack_group }}"
    system: true
    shell: /usr/sbin/nologin
    create_home: false
    state: present

- name: Download vmagent binary
  ansible.builtin.get_url:
    url: "{{ vmagent_artifact_url }}"
    dest: /tmp/vmagent.tar.gz
    checksum: "{{ vmagent_artifact_checksum }}"
    mode: "0644"
  when: not ansible_check_mode

- name: Extract vmagent
  ansible.builtin.unarchive:
    src: /tmp/vmagent.tar.gz
    dest: /usr/local/bin
    remote_src: true
    mode: "0755"
    creates: "{{ vmagent_bin }}"
  when: not ansible_check_mode

- name: Render vmagent systemd unit
  ansible.builtin.template:
    src: vmagent.service.j2
    dest: /etc/systemd/system/vmagent.service
    owner: root
    group: root
    mode: "0644"
  notify: vmagent restart

- name: Ensure vmagent service
  ansible.builtin.systemd:
    name: vmagent
    state: started
    enabled: true
    daemon_reload: true
  when: not ansible_check_mode
