---
- name: Validate vmagent configuration
  ansible.builtin.assert:
    that:
      - vmagent_artifact_url | length > 0
      - vmagent_artifact_checksum | length > 0
      - vmagent_remote_write_url | length > 0
      - vmagent_scrape_targets | length > 0
    fail_msg: "vmagent requires artifact URL/checksum, remote write URL, and at least one scrape target"

- name: Set vmagent extract directory
  ansible.builtin.set_fact:
    vmagent_extract_dir: "/tmp/frameworks-vmagent-{{ vmagent_artifact_checksum | hash('sha1') }}"

- name: Ensure vmagent extract directory
  ansible.builtin.file:
    path: "{{ vmagent_extract_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  when: not ansible_check_mode

- name: Stat vmagent binary
  ansible.builtin.stat:
    path: "{{ vmagent_bin }}"
  register: vmagent_bin_stat
  check_mode: false
  changed_when: false

- name: Stat vmagent install sentinel
  ansible.builtin.stat:
    path: "{{ vmagent_install_sentinel }}"
  register: vmagent_install_sentinel_stat
  check_mode: false
  changed_when: false

- name: Decide whether vmagent reinstall is required
  ansible.builtin.set_fact:
    vmagent_reinstall_required: >-
      {{
        not (vmagent_bin_stat.stat.exists | default(false)) or
        not (vmagent_install_sentinel_stat.stat.exists | default(false))
      }}

- name: Report pending vmagent reinstall under --check
  ansible.builtin.debug:
    msg: >-
      vmagent would reinstall:
      binary_exists={{ vmagent_bin_stat.stat.exists | default(false) }},
      sentinel={{ vmagent_install_sentinel }}
  changed_when: vmagent_reinstall_required | bool
  when: ansible_check_mode

- name: Download vmagent binary
  ansible.builtin.get_url:
    url: "{{ vmagent_artifact_url }}"
    dest: /tmp/vmagent.tar.gz
    checksum: "{{ vmagent_artifact_checksum }}"
    mode: "0644"
  when:
    - not ansible_check_mode
    - vmagent_reinstall_required | default(true)

- name: Extract vmagent
  ansible.builtin.unarchive:
    src: /tmp/vmagent.tar.gz
    dest: "{{ vmagent_extract_dir }}"
    remote_src: true
    mode: "0755"
    creates: "{{ vmagent_extract_dir }}/{{ vmagent_artifact_binary }}"
  when:
    - not ansible_check_mode
    - vmagent_reinstall_required | default(true)

- name: Install vmagent binary
  ansible.builtin.copy:
    src: "{{ vmagent_extract_dir }}/{{ vmagent_artifact_binary }}"
    dest: "{{ vmagent_bin }}"
    remote_src: true
    owner: root
    group: root
    mode: "0755"
  notify: vmagent restart
  when:
    - not ansible_check_mode
    - vmagent_reinstall_required | default(true)

- name: Record vmagent install sentinel
  ansible.builtin.file:
    path: "{{ vmagent_install_sentinel }}"
    state: touch
    owner: root
    group: root
    mode: "0644"
  changed_when: false
  when:
    - not ansible_check_mode
    - vmagent_reinstall_required | default(true)

- name: Ensure vmagent config directory
  ansible.builtin.file:
    path: "{{ vmagent_config_path | dirname }}"
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Ensure vmagent remote-write data directory
  ansible.builtin.file:
    path: "{{ vmagent_tmp_data_path }}"
    state: directory
    owner: "{{ omit if ansible_check_mode else prometheus_stack_user }}"
    group: "{{ omit if ansible_check_mode else prometheus_stack_group }}"
    mode: "0755"

- name: Render vmagent scrape config
  ansible.builtin.template:
    src: vmagent-scrape.yml.j2
    dest: "{{ vmagent_config_path }}"
    owner: root
    group: root
    mode: "0644"
  notify: vmagent restart

- name: Render vmagent env file
  ansible.builtin.template:
    src: vmagent.env.j2
    dest: "{{ vmagent_env_path }}"
    owner: root
    group: "{{ prometheus_stack_group }}"
    mode: "0640"
  no_log: true
  notify: vmagent restart

- name: Render vmagent systemd unit
  ansible.builtin.template:
    src: vmagent.service.j2
    dest: /etc/systemd/system/vmagent.service
    owner: root
    group: root
    mode: "0644"
  notify: vmagent restart

- name: Ensure vmagent service
  ansible.builtin.systemd:
    name: vmagent
    state: started
    enabled: true
    daemon_reload: true
  when: not ansible_check_mode
