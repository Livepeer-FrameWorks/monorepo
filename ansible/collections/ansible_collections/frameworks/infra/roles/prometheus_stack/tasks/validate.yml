---
- name: Refresh service facts
  ansible.builtin.service_facts:

- name: Validate prometheus listener
  ansible.builtin.wait_for:
    host: 127.0.0.1
    port: "{{ prometheus_port }}"
    timeout: 30
  when: "'prometheus' in prometheus_stack_components"

- name: Validate node_exporter listener
  ansible.builtin.wait_for:
    host: 127.0.0.1
    port: "{{ node_exporter_port }}"
    timeout: 30
  when: "'node_exporter' in prometheus_stack_components"

- name: Validate victoriametrics listener
  ansible.builtin.wait_for:
    host: 127.0.0.1
    port: "{{ victoriametrics_port }}"
    timeout: 30
  when: "'victoriametrics' in prometheus_stack_components"

- name: Validate vmagent listener
  block:
    - name: Wait for vmagent listener
      ansible.builtin.wait_for:
        host: 127.0.0.1
        port: "{{ vmagent_port }}"
        timeout: 30
  rescue:
    - name: Capture vmagent systemctl status
      ansible.builtin.command: systemctl status vmagent --no-pager -l
      register: vmagent_status_after_failed_validate
      changed_when: false
      failed_when: false

    - name: Capture vmagent journal
      ansible.builtin.command: journalctl -u vmagent -n 120 --no-pager
      register: vmagent_journal_after_failed_validate
      changed_when: false
      failed_when: false

    - name: Fail with vmagent diagnostics
      ansible.builtin.fail:
        msg: |-
          vmagent did not listen on 127.0.0.1:{{ vmagent_port }}
          systemctl status:
          {{ vmagent_status_after_failed_validate.stdout | default('(no output)') }}

          journalctl:
          {{ vmagent_journal_after_failed_validate.stdout | default('(no output)') }}
  when: "'vmagent' in prometheus_stack_components"

- name: Validate vmauth listener
  ansible.builtin.wait_for:
    host: 127.0.0.1
    port: "{{ vmauth_port }}"
    timeout: 30
  when: "'vmauth' in prometheus_stack_components"
