---
- name: Ensure prometheus system group
  ansible.builtin.group:
    name: "{{ prometheus_stack_group }}"
    system: true
    state: present
  when: prometheus_stack_group != ""

- name: Ensure prometheus system user
  ansible.builtin.user:
    name: "{{ prometheus_stack_user }}"
    group: "{{ prometheus_stack_group }}"
    system: true
    shell: /usr/sbin/nologin
    create_home: false
    state: present
  when: prometheus_stack_user != ""
