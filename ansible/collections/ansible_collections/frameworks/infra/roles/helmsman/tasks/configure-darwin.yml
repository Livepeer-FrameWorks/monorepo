---
- name: Render env file
  ansible.builtin.copy:
    dest: "{{ helmsman_darwin_conf_dir }}/helmsman.env"
    content: |
      # Helmsman edge environment (managed by frameworks.infra.helmsman)
      {% for k, v in (helmsman_env_full | dictsort) %}
      {{ k }}={{ v }}
      {% endfor %}
    mode: "0600"
  no_log: true
  notify: helmsman restart

- name: Render launchd wrapper script
  ansible.builtin.copy:
    dest: "{{ helmsman_darwin_base_dir }}/helmsman/run.sh"
    content: |
      #!/bin/bash
      set -e
      while IFS= read -r line || [ -n "$line" ]; do
        line="${line%%#*}"
        line="${line#"${line%%[! ]*}"}"
        [ -z "$line" ] && continue
        case "$line" in
          *=*) export "$line" ;;
        esac
      done < "{{ helmsman_darwin_conf_dir }}/helmsman.env"
      exec "{{ helmsman_darwin_base_dir }}/helmsman/helmsman"
    mode: "0755"
  notify: helmsman restart

- name: Render launchd plist
  ansible.builtin.template:
    src: helmsman.plist.j2
    dest: "{{ helmsman_darwin_plist_dir }}/{{ helmsman_darwin_label }}.plist"
    mode: "0644"
  notify: helmsman restart
