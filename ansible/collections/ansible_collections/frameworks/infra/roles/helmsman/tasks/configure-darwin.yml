---
- name: Ensure trigger WAL directory
  ansible.builtin.file:
    path: "{{ helmsman_effective_trigger_wal_dir }}"
    state: directory
    mode: "0700"

- name: Render env file
  ansible.builtin.copy:
    dest: "{{ helmsman_darwin_conf_dir }}/helmsman.env"
    content: |
      # Helmsman edge environment (managed by frameworks.infra.helmsman)
      {% for k, v in (helmsman_env_full | dictsort) %}
      {{ k }}={{ v }}
      {% endfor %}
    mode: "0600"
  no_log: true
  notify: helmsman restart

# Write-once: a fresh token on re-provision must not restart an enrolled
# node (Foghorn ignores the token once the node fingerprint resolves).
- name: Render enrollment env file
  ansible.builtin.copy:
    dest: "{{ helmsman_darwin_conf_dir }}/helmsman-enroll.env"
    content: |
      EDGE_ENROLLMENT_TOKEN={{ helmsman_enrollment_token }}
    mode: "0600"
    force: "{{ helmsman_force_reenroll | bool }}"
  no_log: true
  when: helmsman_enrollment_token | length > 0
  notify: helmsman restart

- name: Render launchd wrapper script
  ansible.builtin.copy:
    dest: "{{ helmsman_darwin_base_dir }}/helmsman/run.sh"
    content: |
      #!/bin/bash
      set -e
      for env_file in "{{ helmsman_darwin_conf_dir }}/helmsman.env" "{{ helmsman_darwin_conf_dir }}/helmsman-enroll.env"; do
        [ -f "$env_file" ] || continue
        while IFS= read -r line || [ -n "$line" ]; do
          line="${line%%#*}"
          line="${line#"${line%%[! ]*}"}"
          [ -z "$line" ] && continue
          case "$line" in
            *=*) export "$line" ;;
          esac
        done < "$env_file"
      done
      exec "{{ helmsman_darwin_base_dir }}/helmsman/helmsman"
    mode: "0755"
  notify: helmsman restart

- name: Render launchd plist
  ansible.builtin.template:
    src: helmsman.plist.j2
    dest: "{{ helmsman_darwin_plist_dir }}/{{ helmsman_darwin_label }}.plist"
    mode: "0644"
  notify: helmsman restart
