---
- name: Ensure frameworks group
  ansible.builtin.group:
    name: "{{ helmsman_group }}"
    system: true

- name: Ensure frameworks user
  ansible.builtin.user:
    name: "{{ helmsman_user }}"
    group: "{{ helmsman_group }}"
    system: true
    shell: /usr/sbin/nologin
    create_home: false

- name: Ensure directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ helmsman_user }}"
    group: "{{ helmsman_group }}"
    mode: "0755"
  loop:
    - /etc/frameworks
    - "{{ helmsman_install_dir }}"

- name: Install unzip (zip archives only)
  ansible.builtin.package:
    name: unzip
    state: present
  when: helmsman_is_zip | bool

- name: Download Helmsman asset
  ansible.builtin.get_url:
    url: "{{ helmsman_artifact_url }}"
    dest: "/tmp/helmsman.asset"
    checksum: "{{ helmsman_artifact_checksum }}"
    mode: "0644"
    timeout: 300

- name: Set install sentinel path
  ansible.builtin.set_fact:
    helmsman_install_sentinel: "{{ helmsman_install_dir }}/.installed-{{ helmsman_artifact_checksum | default('') | hash('sha1') }}"

- name: Create Helmsman artifact verification directory
  ansible.builtin.tempfile:
    state: directory
    suffix: helmsman-verify
  register: helmsman_verify_dir
  when: not ansible_check_mode

- name: Extract Helmsman artifact for binary verification
  ansible.builtin.unarchive:
    src: "/tmp/helmsman.asset"
    dest: "{{ helmsman_verify_dir.path }}"
    remote_src: true
  when: not ansible_check_mode

- name: Read desired Helmsman binary checksum
  ansible.builtin.shell: |
    set -e
    desired_binary=""
    for candidate in \
      "{{ helmsman_verify_dir.path }}"/frameworks-helmsman-* \
      "{{ helmsman_verify_dir.path }}/frameworks" \
      "{{ helmsman_verify_dir.path }}/helmsman"; do
      if [ -f "$candidate" ]; then
        desired_binary="$candidate"
        break
      fi
    done
    if [ -z "$desired_binary" ]; then
      echo "missing helmsman binary in artifact" >&2
      exit 1
    fi
    sha256sum "$desired_binary"
  args:
    executable: /bin/sh
  register: helmsman_desired_binary_checksum
  changed_when: false
  when: not ansible_check_mode

- name: Read installed Helmsman binary checksum
  ansible.builtin.command:
    argv:
      - sha256sum
      - "{{ helmsman_install_dir }}/helmsman"
  register: helmsman_installed_binary_checksum
  changed_when: false
  failed_when: false
  when: not ansible_check_mode

- name: Remove stale Helmsman install sentinel when binary differs from artifact
  ansible.builtin.file:
    path: "{{ helmsman_install_sentinel }}"
    state: absent
  when:
    - not ansible_check_mode
    - helmsman_installed_binary_checksum.rc != 0
      or ((helmsman_installed_binary_checksum.stdout.split() | first) | default(''))
      != ((helmsman_desired_binary_checksum.stdout.split() | first) | default(''))

- name: Remove Helmsman artifact verification directory
  ansible.builtin.file:
    path: "{{ helmsman_verify_dir.path }}"
    state: absent
  when: not ansible_check_mode

- name: Extract Helmsman
  ansible.builtin.unarchive:
    src: "/tmp/helmsman.asset"
    dest: "{{ helmsman_install_dir }}"
    remote_src: true
    owner: "{{ helmsman_user }}"
    group: "{{ helmsman_group }}"
    creates: "{{ helmsman_install_sentinel }}"
  notify: helmsman restart
  when: not ansible_check_mode

# Release archives ship the binary under one of three names; normalize to
# "helmsman" then mark the sentinel so this block is a true once-per-pin op.
- name: Normalize extracted binary name
  ansible.builtin.shell: |
    set -e
    if ls "{{ helmsman_install_dir }}"/frameworks-helmsman-* >/dev/null 2>&1; then
      mv "{{ helmsman_install_dir }}"/frameworks-helmsman-* "{{ helmsman_install_dir }}/helmsman"
    elif [ -f "{{ helmsman_install_dir }}/frameworks" ]; then
      mv "{{ helmsman_install_dir }}/frameworks" "{{ helmsman_install_dir }}/helmsman"
    fi
    chmod 0755 "{{ helmsman_install_dir }}/helmsman"
    chown {{ helmsman_user }}:{{ helmsman_group }} "{{ helmsman_install_dir }}/helmsman"
    touch "{{ helmsman_install_sentinel }}"
    chown {{ helmsman_user }}:{{ helmsman_group }} "{{ helmsman_install_sentinel }}"
  args:
    creates: "{{ helmsman_install_sentinel }}"
  when: not ansible_check_mode
