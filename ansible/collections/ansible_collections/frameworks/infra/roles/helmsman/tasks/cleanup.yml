---
- name: Stop and disable systemd service (linux)
  ansible.builtin.systemd:
    name: "{{ helmsman_systemd_name }}"
    state: stopped
    enabled: false
  failed_when: false
  when: ansible_facts.os_family != 'Darwin'

- name: Remove systemd unit (linux)
  ansible.builtin.file:
    path: "{{ helmsman_unit_path }}"
    state: absent
  when: ansible_facts.os_family != 'Darwin'

- name: Reload systemd (linux)
  ansible.builtin.systemd:
    daemon_reload: true
  changed_when: false
  when: ansible_facts.os_family != 'Darwin'

- name: Unload and remove launchd job (darwin)
  community.general.launchd:
    name: "{{ helmsman_darwin_label }}"
    state: absent
  failed_when: false
  when: ansible_facts.os_family == 'Darwin'

- name: Remove launchd plist file (darwin)
  ansible.builtin.file:
    path: "{{ helmsman_darwin_plist_dir }}/{{ helmsman_darwin_label }}.plist"
    state: absent
  when: ansible_facts.os_family == 'Darwin'
