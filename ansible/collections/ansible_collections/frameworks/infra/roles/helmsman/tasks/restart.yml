---
- name: Restart helmsman (linux)
  ansible.builtin.systemd:
    name: "{{ helmsman_systemd_name }}"
    state: restarted
  when: ansible_facts.os_family != 'Darwin'

- name: Restart helmsman (darwin)
  community.general.launchd:
    name: "{{ helmsman_darwin_label }}"
    state: restarted
  when: ansible_facts.os_family == 'Darwin'

- name: Wait for Helmsman port after restart
  ansible.builtin.wait_for:
    host: 127.0.0.1
    port: "{{ helmsman_port }}"
    timeout: 60
