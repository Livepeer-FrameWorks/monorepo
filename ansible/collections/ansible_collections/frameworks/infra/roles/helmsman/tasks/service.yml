---
- name: Ensure systemd service running (linux)
  ansible.builtin.systemd:
    name: "{{ helmsman_systemd_name }}"
    state: started
    enabled: true
    daemon_reload: true
  when: ansible_facts.os_family != 'Darwin'

- name: Ensure launchd job loaded (darwin)
  community.general.launchd:
    name: "{{ helmsman_darwin_label }}"
    state: started
    enabled: true
  when: ansible_facts.os_family == 'Darwin'
