---
- name: Resolve Helmsman trigger WAL directory
  ansible.builtin.set_fact:
    helmsman_effective_trigger_wal_dir: >-
      {{
        helmsman_trigger_wal_dir
        if helmsman_trigger_wal_dir | default('', true) | length > 0
        else (
          (helmsman_darwin_conf_dir | default(helmsman_darwin_system_conf_dir)) ~ '/helmsman/trigger-wal'
          if ansible_facts.os_family == 'Darwin'
          else helmsman_state_dir ~ '/trigger-wal'
        )
      }}

- name: Build helmsman env map
  ansible.builtin.set_fact:
    helmsman_env_full: >-
      {{ {
        'NODE_ID': helmsman_node_id,
        'EDGE_PUBLIC_URL': 'https://' ~ helmsman_edge_domain ~ '/view',
        'EDGE_DOMAIN': helmsman_edge_domain,
        'FOGHORN_CONTROL_ADDR': helmsman_foghorn_grpc_addr,
        'ACME_EMAIL': helmsman_acme_email | default('', true),
        'DEPLOY_MODE': helmsman_deploy_mode,
        'MISTSERVER_URL': 'http://' ~ helmsman_mist_api_upstream,
        'MISTSERVER_HTTP_URL': 'http://' ~ helmsman_mist_http_upstream,
        'HELMSMAN_WEBHOOK_URL': 'http://' ~ helmsman_webhook_upstream,
        'FRAMEWORKS_TRIGGER_WAL_DIR': helmsman_effective_trigger_wal_dir,
        'CADDY_ADMIN_URL': helmsman_caddy_admin_url,
        'CADDY_CONFIG_PATH': helmsman_caddy_config_path,
        'HELMSMAN_BIND_ADDR': helmsman_bind_addr,
        'MIST_API_USERNAME': helmsman_mist_api_user,
        'MIST_API_PASSWORD': helmsman_mist_api_password,
        }
        | combine({'GRPC_TLS_CA_PATH': helmsman_grpc_tls_ca_path}
                  if helmsman_grpc_tls_ca_path | length > 0 else {})
        | combine(helmsman_extra_env | default({}, true))
      }}

- name: Helmsman | configure (linux)
  ansible.builtin.import_tasks: configure-linux.yml
  when: ansible_facts.os_family != 'Darwin'

- name: Helmsman | configure (darwin)
  ansible.builtin.import_tasks: configure-darwin.yml
  when: ansible_facts.os_family == 'Darwin'
