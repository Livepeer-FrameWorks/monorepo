---
- name: Resolve Darwin layout for selected domain
  ansible.builtin.set_fact:
    helmsman_darwin_base_dir: >-
      {{ helmsman_darwin_user_base_dir if helmsman_darwin_domain == 'user'
         else helmsman_darwin_system_base_dir }}
    helmsman_darwin_conf_dir: >-
      {{ helmsman_darwin_user_conf_dir if helmsman_darwin_domain == 'user'
         else helmsman_darwin_system_conf_dir }}
    helmsman_darwin_log_dir: >-
      {{ helmsman_darwin_user_log_dir if helmsman_darwin_domain == 'user'
         else helmsman_darwin_system_log_dir }}
    helmsman_darwin_plist_dir: >-
      {{ helmsman_darwin_user_plist_dir if helmsman_darwin_domain == 'user'
         else helmsman_darwin_system_plist_dir }}

- name: Ensure Darwin directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - "{{ helmsman_darwin_base_dir }}"
    - "{{ helmsman_darwin_base_dir }}/helmsman"
    - "{{ helmsman_darwin_conf_dir }}"
    - "{{ helmsman_darwin_log_dir }}"
    - "{{ helmsman_darwin_plist_dir }}"

- name: Download Helmsman asset
  ansible.builtin.get_url:
    url: "{{ helmsman_artifact_url }}"
    dest: "/tmp/helmsman.asset"
    checksum: "{{ helmsman_artifact_checksum }}"
    mode: "0644"
    timeout: 300

- name: Set install sentinel path
  ansible.builtin.set_fact:
    helmsman_install_sentinel: "{{ helmsman_darwin_base_dir }}/helmsman/.installed-{{ helmsman_artifact_checksum | default('') | hash('sha1') }}"

- name: Extract Helmsman
  ansible.builtin.unarchive:
    src: "/tmp/helmsman.asset"
    dest: "{{ helmsman_darwin_base_dir }}/helmsman"
    remote_src: true
    creates: "{{ helmsman_install_sentinel }}"
  register: helmsman_extract_result
  notify: helmsman restart
  when: not ansible_check_mode

- name: Normalize extracted binary name
  ansible.builtin.shell: |
    set -e
    cd "{{ helmsman_darwin_base_dir }}/helmsman"
    if ls frameworks-helmsman-* >/dev/null 2>&1; then
      mv frameworks-helmsman-* helmsman
    elif [ -f frameworks ]; then
      mv frameworks helmsman
    fi
    chmod 0755 helmsman
    touch "{{ helmsman_install_sentinel }}"
  args:
    creates: "{{ helmsman_install_sentinel }}"
  when: not ansible_check_mode

# The component updater (helmsman itself) owns this file at runtime. Stamp
# only when this run actually installed the pinned artifact, or the key was
# never seeded — never regress a version the updater recorded.
- name: Check recorded Helmsman component version
  ansible.builtin.command:
    argv:
      - grep
      - -q
      - "^HELMSMAN_VERSION="
      - "{{ helmsman_component_versions_file }}"
  register: helmsman_version_recorded
  changed_when: false
  failed_when: false
  when:
    - not ansible_check_mode
    - helmsman_component_versions_file | length > 0

- name: Record Helmsman version for the component updater
  ansible.builtin.lineinfile:
    path: "{{ helmsman_component_versions_file }}"
    regexp: "^HELMSMAN_VERSION="
    line: "HELMSMAN_VERSION={{ helmsman_version }}"
    create: true
    mode: "0644"
  when:
    - not ansible_check_mode
    - helmsman_component_versions_file | length > 0
    - helmsman_version | length > 0
    - (helmsman_extract_result is changed) or (helmsman_version_recorded.rc | default(1)) != 0
