---
# Helmsman: the edge sidecar. Consumes the pinned release artifact
# (tar.gz or zip) and runs on the same host as MistServer. Two modes:
# Linux systemd + macOS launchd. Docker mode is served by compose_stack.

helmsman_artifact_url: ""
helmsman_artifact_checksum: ""
helmsman_version: ""

# Edge-specific env keys. All values flow in from the CLI (Go-side vars
# builder derives them from enrollment response + manifest).
helmsman_node_id: ""
helmsman_edge_domain: ""
helmsman_acme_email: ""
helmsman_foghorn_grpc_addr: ""
helmsman_enrollment_token: ""
helmsman_deploy_mode: native
helmsman_mist_upstream: "localhost:8080"
helmsman_webhook_upstream: "localhost:18007"
helmsman_caddy_admin_url: "http://localhost:2019"
helmsman_mist_api_user: frameworks
helmsman_mist_api_password: ""
# Optional: path to the gRPC CA bundle on the target, written by the edge
# meta-role. Empty means no bundle needed (plaintext Foghorn).
helmsman_grpc_tls_ca_path: ""

# Extra env keys merged last, letting operators override anything above.
helmsman_extra_env: {}

# Linux layout.
helmsman_user: frameworks
helmsman_group: frameworks
helmsman_install_dir: /opt/frameworks/helmsman
helmsman_env_file: /etc/frameworks/helmsman.env
helmsman_systemd_name: frameworks-helmsman
helmsman_unit_path: "/etc/systemd/system/{{ helmsman_systemd_name }}.service"
helmsman_port: 18007

# Set to true when helmsman_artifact_url ends with .zip; the role installs
# unzip as a prereq before unarchive. Default auto-derives from the URL.
helmsman_is_zip: "{{ helmsman_artifact_url | default('') | regex_search('\\.zip$') is not none }}"

# Darwin layout.
helmsman_darwin_domain: system
helmsman_darwin_label: com.livepeer.frameworks.helmsman

helmsman_darwin_system_base_dir: /usr/local/opt/frameworks
helmsman_darwin_system_conf_dir: /usr/local/etc/frameworks
helmsman_darwin_system_log_dir: /usr/local/var/log/frameworks
helmsman_darwin_system_plist_dir: /Library/LaunchDaemons

helmsman_darwin_user_base_dir: "{{ ansible_env.HOME }}/.local/opt/frameworks"
helmsman_darwin_user_conf_dir: "{{ ansible_env.HOME }}/.config/frameworks"
helmsman_darwin_user_log_dir: "{{ ansible_env.HOME }}/.local/var/log/frameworks"
helmsman_darwin_user_plist_dir: "{{ ansible_env.HOME }}/Library/LaunchAgents"
