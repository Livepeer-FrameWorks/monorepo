---
kafka_artifact_url: ""
kafka_artifact_checksum: ""
kafka_version: ""

kafka_user: kafka
kafka_group: kafka
kafka_install_dir: /opt/kafka
kafka_data_dir: /var/lib/kafka
kafka_log_dir: /var/log/kafka
kafka_tarball_path: /tmp/kafka.tar.gz

# KRaft mode — either "broker", "controller", or "combined" (small clusters).
kafka_role: broker
kafka_node_id: 1
kafka_cluster_id: ""
kafka_bootstrap_brokers: [] # [{host, id, port}]
kafka_controllers: [] # [{host, id, port, dir_id}]
kafka_controller_quorum_voters: ""
kafka_bind_host: 0.0.0.0
kafka_broker_port: 9092
kafka_controller_port: 9093
kafka_advertised_host: "{{ ansible_host | default(inventory_hostname) }}"
kafka_listener_wait_timeout: 30

# Topic list for init-tag. [{name, partitions, replication_factor, config}]
kafka_topics: []

# Resource limits.
kafka_heap_opts: "-Xmx2G -Xms2G"
