---
role_name_check: 1
prerun: false
dependency:
  name: galaxy
driver:
  name: docker
platforms:
  - name: kafka-instance
    image: geerlingguy/docker-ubuntu2404-ansible:latest
    pre_build_image: true
    privileged: true
    command: /usr/sbin/init
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    cgroupns_mode: host
    tmpfs:
      - /run
      - /tmp
provisioner:
  name: ansible
  playbooks:
    prepare: ../../../../molecule/prepare-apt.yml
  inventory:
    group_vars:
      all:
        kafka_version: "4.2.0"
        kafka_artifact_url: >-
          {{ lookup('env', 'KAFKA_ARTIFACT_URL') |
             default('https://downloads.apache.org/kafka/4.2.0/kafka_2.13-4.2.0.tgz', true) }}
        kafka_artifact_checksum: >-
          {{ lookup('env', 'KAFKA_ARTIFACT_CHECKSUM') |
             default(
               'sha512:16ce46e590ba915f01b720ea514445e49c88bf129cf4ceab' ~
               '88878b122d54ef24f0dedb88d0eb178957f58057a6c6a9adbea8b8059307585daea13129b85ba1d8',
               true) }}
        kafka_role: combined
        kafka_node_id: 1
        kafka_cluster_id: "MkU3OEVBNTcwNTJENDM2Qk"
        kafka_controllers:
          - host: 127.0.0.1
            id: 1
        kafka_advertised_host: "127.0.0.1"
verifier:
  name: ansible
