---
- name: Kafka | install
  ansible.builtin.import_tasks: install.yml
  tags: [install]

- name: Kafka | configure
  ansible.builtin.import_tasks: configure.yml
  tags: [configure]

- name: Kafka | flush handlers before service
  ansible.builtin.meta: flush_handlers
  tags: [configure, service]

- name: Kafka | service
  ansible.builtin.import_tasks: service.yml
  tags: [service]

- name: Kafka | flush handlers before validate
  ansible.builtin.meta: flush_handlers
  tags: [service, validate]

- name: Kafka | validate
  ansible.builtin.import_tasks: validate.yml
  tags: [validate]

- name: Kafka | init (topics)
  ansible.builtin.import_tasks: init.yml
  tags: [init, never]

- name: Kafka | restart
  ansible.builtin.import_tasks: restart.yml
  tags: [restart, never]

- name: Kafka | cleanup
  ansible.builtin.import_tasks: cleanup.yml
  tags: [cleanup, never]
