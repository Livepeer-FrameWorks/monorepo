---
- name: Assert Java package mapping exists for this distro family
  ansible.builtin.assert:
    that:
      - ansible_facts.os_family in kafka_java_package_by_family
    fail_msg: "frameworks.infra.kafka does not define a Java runtime package for os_family={{ ansible_facts.os_family }}"

- name: Probe for a compatible Java runtime
  ansible.builtin.shell:
    cmd: |
      set -o pipefail
      if ! command -v java >/dev/null 2>&1; then
        exit 1
      fi
      ver="$(java -XshowSettings:properties -version 2>&1 | awk -F'= ' '/^[[:space:]]*java.specification.version = / { print $2; exit }')"
      major="${ver%%.*}"
      if [ "$major" = "1" ]; then
        rest="${ver#1.}"
        major="${rest%%.*}"
      fi
      test -n "$major" && [ "$major" -ge 17 ]
    executable: /bin/bash
  register: kafka_java_runtime_probe
  changed_when: false
  failed_when: false
  check_mode: false

- name: Install Java runtime
  ansible.builtin.package:
    name: "{{ kafka_java_package_by_family[ansible_facts.os_family] }}"
    state: present
  when: kafka_java_runtime_probe.rc != 0

- name: Ensure kafka group
  ansible.builtin.group:
    name: "{{ kafka_group }}"
    system: true

- name: Ensure kafka user
  ansible.builtin.user:
    name: "{{ kafka_user }}"
    group: "{{ kafka_group }}"
    system: true
    shell: /usr/sbin/nologin
    create_home: false

- name: Ensure kafka dirs
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ kafka_user }}"
    group: "{{ kafka_group }}"
    mode: "0755"
  loop:
    - "{{ kafka_install_dir }}"
    - "{{ kafka_role_data_dir }}"
    - "{{ kafka_role_log_dir }}"

- name: Stat Kafka binary
  ansible.builtin.stat:
    path: "{{ kafka_bin_dir }}/kafka-storage.sh"
  register: kafka_bin_stat
  check_mode: false
  changed_when: false

- name: Stat Kafka install sentinel
  ansible.builtin.stat:
    path: "{{ kafka_install_sentinel }}"
  register: kafka_install_sentinel_stat
  check_mode: false
  changed_when: false

- name: Decide whether Kafka reinstall is required
  ansible.builtin.set_fact:
    kafka_reinstall_required: >-
      {{
        not (kafka_bin_stat.stat.exists | default(false)) or
        not (kafka_install_sentinel_stat.stat.exists | default(false))
      }}

- name: Report pending Kafka reinstall under --check
  ansible.builtin.debug:
    msg: >-
      {{ kafka_service_name }} would reinstall:
      binary_exists={{ kafka_bin_stat.stat.exists | default(false) }},
      sentinel={{ kafka_install_sentinel }}
  changed_when: kafka_reinstall_required | bool
  when: ansible_check_mode

- name: Remove stale Kafka install sentinel before reinstall
  ansible.builtin.file:
    path: "{{ kafka_install_sentinel }}"
    state: absent
  when:
    - not ansible_check_mode
    - kafka_reinstall_required | default(false)

- name: Download Kafka tarball
  ansible.builtin.get_url:
    url: "{{ kafka_artifact_url }}"
    dest: "{{ kafka_tarball_path }}"
    checksum: "{{ kafka_artifact_checksum }}"
    mode: "0644"
    timeout: 300
  when:
    - not ansible_check_mode
    - kafka_reinstall_required | default(true)

- name: Extract Kafka
  ansible.builtin.unarchive:
    src: "{{ kafka_tarball_path }}"
    dest: "{{ kafka_install_dir }}"
    remote_src: true
    owner: "{{ kafka_user }}"
    group: "{{ kafka_group }}"
    extra_opts:
      - --strip-components=1
    creates: "{{ kafka_install_sentinel }}"
  notify: kafka restart
  when:
    - not ansible_check_mode
    - kafka_reinstall_required | default(true)

- name: Record install sentinel
  ansible.builtin.file:
    path: "{{ kafka_install_sentinel }}"
    state: touch
    owner: "{{ kafka_user }}"
    group: "{{ kafka_group }}"
    mode: "0644"
  changed_when: false
  when:
    - not ansible_check_mode
    - kafka_reinstall_required | default(true)
