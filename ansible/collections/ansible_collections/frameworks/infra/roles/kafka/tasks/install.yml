---
- name: Assert Java package mapping exists for this distro family
  ansible.builtin.assert:
    that:
      - ansible_facts.os_family in kafka_java_package_by_family
    fail_msg: "frameworks.infra.kafka does not define a Java runtime package for os_family={{ ansible_facts.os_family }}"

- name: Probe for a compatible Java runtime
  ansible.builtin.shell:
    cmd: |
      set -o pipefail
      if ! command -v java >/dev/null 2>&1; then
        exit 1
      fi
      ver="$(java -XshowSettings:properties -version 2>&1 | awk -F'= ' '/^[[:space:]]*java.specification.version = / { print $2; exit }')"
      major="${ver%%.*}"
      if [ "$major" = "1" ]; then
        rest="${ver#1.}"
        major="${rest%%.*}"
      fi
      test -n "$major" && [ "$major" -ge 17 ]
    executable: /bin/bash
  register: kafka_java_runtime_probe
  changed_when: false
  failed_when: false

- name: Install Java runtime
  ansible.builtin.package:
    name: "{{ kafka_java_package_by_family[ansible_facts.os_family] }}"
    state: present
  when: kafka_java_runtime_probe.rc != 0

- name: Ensure kafka group
  ansible.builtin.group:
    name: "{{ kafka_group }}"
    system: true

- name: Ensure kafka user
  ansible.builtin.user:
    name: "{{ kafka_user }}"
    group: "{{ kafka_group }}"
    system: true
    shell: /usr/sbin/nologin
    create_home: false

- name: Ensure kafka dirs
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ kafka_user }}"
    group: "{{ kafka_group }}"
    mode: "0755"
  loop:
    - "{{ kafka_install_dir }}"
    - "{{ kafka_role_data_dir }}"
    - "{{ kafka_role_log_dir }}"

- name: Download Kafka tarball
  ansible.builtin.get_url:
    url: "{{ kafka_artifact_url }}"
    dest: "{{ kafka_tarball_path }}"
    checksum: "{{ kafka_artifact_checksum }}"
    mode: "0644"
    timeout: 300

- name: Extract Kafka
  ansible.builtin.unarchive:
    src: "{{ kafka_tarball_path }}"
    dest: "{{ kafka_install_dir }}"
    remote_src: true
    owner: "{{ kafka_user }}"
    group: "{{ kafka_group }}"
    extra_opts:
      - --strip-components=1
    creates: "{{ kafka_install_sentinel }}"
  notify: kafka restart

- name: Record install sentinel
  ansible.builtin.file:
    path: "{{ kafka_install_sentinel }}"
    state: touch
    owner: "{{ kafka_user }}"
    group: "{{ kafka_group }}"
    mode: "0644"
  changed_when: false
