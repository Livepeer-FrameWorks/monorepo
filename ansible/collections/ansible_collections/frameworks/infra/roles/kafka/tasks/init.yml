---
- name: Create topics (idempotent via --if-not-exists)
  ansible.builtin.command: >-
    {{ kafka_bin_dir }}/kafka-topics.sh
    --bootstrap-server 127.0.0.1:{{ kafka_broker_port }}
    --create --if-not-exists
    --topic {{ item.name }}
    --partitions {{ item.partitions | default(1) }}
    --replication-factor {{ item.replication_factor | default(1) }}
    {% for k, v in (item.config | default({})).items() %} --config {{ k }}={{ v }}{% endfor %}
  environment:
    KAFKA_HEAP_OPTS: "-Xms64m -Xmx256m"
    KAFKA_JMX_OPTS: "-Djava.awt.headless=true"
    JMX_PORT: ""
  loop: "{{ kafka_topics }}"
  loop_control:
    label: "{{ item.name }}"
  register: topic_create
  changed_when: "'Created topic' in topic_create.stdout"
  when: kafka_role in ['broker', 'combined']
