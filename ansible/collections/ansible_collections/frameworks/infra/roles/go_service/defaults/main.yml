---
# Generic native Go microservice installer. Used for every FrameWorks Go
# binary (quartermaster, commodore, bridge, purser, ...). The CLI supplies
# the pinned artifact URL + checksum + version from the release manifest,
# plus the env map and listener port.

go_service_name: "" # service identity; drives install/unit paths
go_service_artifact_url: "" # pinned tarball/zip URL
go_service_artifact_checksum: ""
go_service_version: ""
go_service_port: 0
go_service_env: {}
go_service_runtime_packages: []
go_service_debian_runtime_packages: []
go_service_pacman_runtime_packages: []
go_service_internal_ca_bundle_pem: ""
go_service_internal_tls_cert_pem: ""
go_service_internal_tls_key_pem: ""

go_service_user: frameworks
go_service_group: frameworks
go_service_binary_name: "{{ go_service_name }}"
go_service_install_dir: "/opt/frameworks/{{ go_service_name }}"
go_service_env_file: "/etc/frameworks/{{ go_service_name }}.env"
go_service_unit_path: "/etc/systemd/system/frameworks-{{ go_service_name }}.service"
go_service_defer_start: false
go_service_asset_path: "/tmp/{{ go_service_name }}.asset"
go_service_internal_ca_default_path: /etc/frameworks/pki/ca.crt
go_service_internal_tls_cert_default_path: "/etc/frameworks/pki/services/{{ go_service_name }}/tls.crt"
go_service_internal_tls_key_default_path: "/etc/frameworks/pki/services/{{ go_service_name }}/tls.key"
