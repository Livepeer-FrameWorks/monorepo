---
- name: Ensure frameworks group
  ansible.builtin.group:
    name: "{{ go_service_group }}"
    system: true

- name: Ensure frameworks user
  ansible.builtin.user:
    name: "{{ go_service_user }}"
    group: "{{ go_service_group }}"
    system: true
    shell: /usr/sbin/nologin
    create_home: false

- name: Ensure directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ omit if ansible_check_mode else go_service_user }}"
    group: "{{ omit if ansible_check_mode else go_service_group }}"
    mode: "0755"
  loop:
    - /etc/frameworks
    - "{{ go_service_install_dir }}"

- name: Ensure service state directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ omit if ansible_check_mode else go_service_user }}"
    group: "{{ omit if ansible_check_mode else go_service_group }}"
    mode: "0750"
  loop: "{{ go_service_state_dirs }}"
  when: go_service_state_dirs | length > 0

- name: Render service files
  ansible.builtin.copy:
    dest: "{{ item.path }}"
    content: "{{ item.content }}"
    owner: "{{ omit if ansible_check_mode else go_service_user }}"
    group: "{{ omit if ansible_check_mode else go_service_group }}"
    mode: "{{ item.mode | default('0600') }}"
  loop: "{{ go_service_files }}"
  loop_control:
    label: "{{ item.path }}"
  no_log: true
  when: go_service_files | length > 0

- name: Read expected Livepeer keystore file
  ansible.builtin.slurp:
    src: "{{ go_service_livepeer_expected_keystore_path }}"
  register: go_service_livepeer_keystore_slurp
  no_log: true
  when: go_service_livepeer_expected_keystore_path | length > 0

- name: Parse expected Livepeer keystore file
  ansible.builtin.set_fact:
    go_service_livepeer_keystore_json: "{{ go_service_livepeer_keystore_slurp.content | b64decode | from_json }}"
  no_log: true
  when: go_service_livepeer_expected_keystore_path | length > 0

- name: Validate expected Livepeer keystore format
  ansible.builtin.assert:
    that:
      - go_service_livepeer_keystore_json.address is defined
      - go_service_livepeer_keystore_json.address | string | length > 0
      - go_service_livepeer_keystore_json.crypto is defined
      - go_service_livepeer_keystore_json.crypto is mapping
      - go_service_livepeer_keystore_json.id is defined
      - go_service_livepeer_keystore_json.version is defined
      - go_service_livepeer_keystore_json.version | int == 3
    fail_msg: >-
      {{ go_service_name }} keystore must be a geth/Web3 v3 key JSON with
      address, crypto, id, and version=3.
  when: go_service_livepeer_expected_keystore_path | length > 0

- name: Validate expected Livepeer wallet address
  ansible.builtin.assert:
    that:
      - >-
        (go_service_livepeer_keystore_json.address | lower | regex_replace('^0x', '')) ==
        (go_service_livepeer_expected_wallet_address | lower | regex_replace('^0x', ''))
    fail_msg: >-
      {{ go_service_name }} keystore address does not match go_service_livepeer_expected_wallet_address.
  when:
    - go_service_livepeer_expected_keystore_path | length > 0
    - go_service_livepeer_expected_wallet_address | length > 0

- name: Find Livepeer keystore files
  ansible.builtin.find:
    paths: "{{ go_service_livepeer_expected_keystore_dir }}"
    file_type: file
    recurse: false
  register: go_service_livepeer_keystore_files
  when: go_service_livepeer_expected_keystore_dir | length > 0

- name: Assert Livepeer keystore directory only contains the provisioned key
  ansible.builtin.assert:
    that:
      - go_service_livepeer_keystore_files.files | length == 1
      - go_service_livepeer_keystore_files.files[0].path == go_service_livepeer_expected_keystore_path
    fail_msg: >-
      {{ go_service_name }} keystore directory must contain only
      {{ go_service_livepeer_expected_keystore_path }}; found {{
      go_service_livepeer_keystore_files.files | map(attribute='path') | list }}.
  when: go_service_livepeer_expected_keystore_dir | length > 0

- name: Resolve runtime packages
  ansible.builtin.set_fact:
    go_service_effective_runtime_packages: >-
      {{
        (
          go_service_runtime_packages +
          ((ansible_facts['os_family'] == 'Debian') | ternary(go_service_debian_runtime_packages, [])) +
          ((ansible_facts['pkg_mgr'] == 'pacman') | ternary(go_service_pacman_runtime_packages, []))
        ) | unique
      }}

- name: Install runtime packages
  ansible.builtin.package:
    name: "{{ go_service_effective_runtime_packages }}"
    state: present
  when: go_service_effective_runtime_packages | length > 0

- name: Install unzip (zip archives only)
  ansible.builtin.package:
    name: unzip
    state: present
  when: go_service_is_zip | bool

- name: Stat installed binary
  ansible.builtin.stat:
    path: "{{ go_service_install_dir }}/{{ go_service_name }}"
  register: go_service_bin_stat
  check_mode: false
  changed_when: false

- name: Stat install sentinel
  ansible.builtin.stat:
    path: "{{ go_service_install_sentinel }}"
  register: go_service_install_sentinel_stat
  check_mode: false
  changed_when: false

- name: Read installed service version
  ansible.builtin.shell: |
    set -o pipefail
    version="$(
      "{{ go_service_install_dir }}/{{ go_service_name }}" version 2>/dev/null |
        awk -F': ' '/platform version:/ {print $2; exit}'
    )"
    test -n "$version"
    printf '%s\n' "$version"
  args:
    executable: /bin/bash
  register: go_service_installed_version
  changed_when: false
  failed_when: false
  check_mode: false
  when: go_service_bin_stat.stat.exists | default(false)

- name: Decide whether service binary reinstall is required
  ansible.builtin.set_fact:
    go_service_reinstall_required: >-
      {{
        not (go_service_bin_stat.stat.exists | default(false)) or
        not (go_service_install_sentinel_stat.stat.exists | default(false))
      }}

- name: Report pending reinstall under --check
  ansible.builtin.debug:
    msg: >-
      {{ go_service_name }} would reinstall:
      installed={{ go_service_installed_version.stdout | default('(missing)') }},
      desired={{ go_service_version | default('(unset)') }},
      sentinel={{ go_service_install_sentinel }}
  changed_when: go_service_reinstall_required | bool
  when: ansible_check_mode

- name: Download pinned artifact
  ansible.builtin.get_url:
    url: "{{ go_service_artifact_url }}"
    dest: "{{ go_service_asset_path }}"
    checksum: "{{ go_service_artifact_checksum }}"
    mode: "0644"
    timeout: 300
  register: go_service_artifact_download
  until: go_service_artifact_download is succeeded
  retries: 5
  delay: 10
  when:
    - not ansible_check_mode
    - go_service_reinstall_required | default(true)

- name: Remove stale install sentinel before service binary reinstall
  ansible.builtin.file:
    path: "{{ go_service_install_sentinel }}"
    state: absent
  when:
    - not ansible_check_mode
    - go_service_reinstall_required | default(false)

- name: Find existing binary candidates before service binary reinstall
  ansible.builtin.find:
    paths: "{{ go_service_install_dir }}"
    file_type: file
    recurse: false
    patterns:
      - "{{ go_service_name }}"
      - "frameworks-{{ go_service_name }}"
      - "{{ go_service_binary_name }}"
      - frameworks
  register: go_service_existing_binary_candidates
  when:
    - not ansible_check_mode
    - go_service_reinstall_required | default(false)

- name: Remove existing binary candidates before service binary reinstall
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: absent
  loop: "{{ go_service_existing_binary_candidates.files | default([]) }}"
  loop_control:
    label: "{{ item.path }}"
  when:
    - not ansible_check_mode
    - go_service_reinstall_required | default(false)

- name: Extract artifact
  ansible.builtin.unarchive:
    src: "{{ go_service_asset_path }}"
    dest: "{{ go_service_install_dir }}"
    remote_src: true
    owner: "{{ go_service_user }}"
    group: "{{ go_service_group }}"
    creates: "{{ go_service_install_sentinel }}"
  notify: go_service restart
  when: not ansible_check_mode

# Vendor releases use several filename conventions inside the archive;
# pick whichever shipped, then mark the sentinel.
- name: Normalize extracted binary name
  ansible.builtin.shell: |
    set -e
    candidate=""
    for path in \
      "{{ go_service_install_dir }}/{{ go_service_name }}" \
      "{{ go_service_install_dir }}/frameworks-{{ go_service_name }}" \
      "{{ go_service_install_dir }}/{{ go_service_binary_name }}" \
      "{{ go_service_install_dir }}/frameworks"; do
      if [ -f "$path" ]; then
        candidate="$path"
        break
      fi
    done
    if [ -z "$candidate" ]; then
      candidate="$(
        find "{{ go_service_install_dir }}" -maxdepth 2 -type f \
          \( -name "{{ go_service_name }}" \
          -o -name "frameworks-{{ go_service_name }}" \
          -o -name "frameworks-{{ go_service_name }}-*" \
          -o -name "{{ go_service_binary_name }}" \
          -o -name "{{ go_service_binary_name }}-*" \
          -o -name frameworks \) \
          -print -quit
      )"
    fi
    test -n "$candidate"
    if [ "$candidate" != "{{ go_service_install_dir }}/{{ go_service_name }}" ]; then
      cp "$candidate" "{{ go_service_install_dir }}/{{ go_service_name }}"
    fi
    chmod +x "{{ go_service_install_dir }}/{{ go_service_name }}"
    touch "{{ go_service_install_sentinel }}"
    chown {{ go_service_user }}:{{ go_service_group }} "{{ go_service_install_sentinel }}" "{{ go_service_install_dir }}/{{ go_service_name }}"
  args:
    creates: "{{ go_service_install_sentinel }}"
  when: not ansible_check_mode

- name: Check native binary shared libraries
  ansible.builtin.shell: |
    set -o pipefail
    if ! command -v ldd >/dev/null 2>&1; then
      exit 0
    fi
    missing="$(
      ldd "{{ go_service_install_dir }}/{{ go_service_name }}" 2>/dev/null |
        awk '/not found/ {print}'
    )"
    if [ -n "$missing" ]; then
      printf '%s\n' "$missing"
    fi
  args:
    executable: /bin/bash
  register: go_service_ldd_missing
  changed_when: false
  failed_when: go_service_ldd_missing.stdout | trim | length > 0
  when: not ansible_check_mode
