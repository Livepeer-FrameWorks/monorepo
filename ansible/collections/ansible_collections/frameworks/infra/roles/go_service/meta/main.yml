---
galaxy_info:
  role_name: go_service
  author: FrameWorks Infra
  description: >-
    Generic native-mode installer for FrameWorks Go microservices. Downloads
    a pinned artifact, drops env file + systemd unit, starts the service.
  license: AGPL-3.0-or-later
  min_ansible_version: "2.15"

dependencies: []

argument_specs:
  main:
    short_description: Install and run a native Go microservice.
    options:
      go_service_name:
        type: str
        required: true
      go_service_artifact_url:
        type: str
        required: true
      go_service_artifact_checksum:
        type: str
        required: true
      go_service_version:
        type: str
        required: false
      go_service_port:
        type: int
        required: false
        default: 0
      go_service_env:
        type: dict
        required: false
      go_service_args:
        type: list
        elements: str
        required: false
        default: []
      go_service_files:
        type: list
        elements: dict
        required: false
        default: []
      go_service_runtime_packages:
        type: list
        elements: str
        required: false
        default: []
      go_service_debian_runtime_packages:
        type: list
        elements: str
        required: false
        default: []
      go_service_pacman_runtime_packages:
        type: list
        elements: str
        required: false
        default: []
      go_service_state_dirs:
        type: list
        elements: str
        required: false
        default: []
      go_service_livepeer_expected_keystore_path:
        type: str
        required: false
        default: ""
      go_service_livepeer_expected_keystore_dir:
        type: str
        required: false
        default: ""
      go_service_livepeer_expected_wallet_address:
        type: str
        required: false
        default: ""
      go_service_defer_start:
        type: bool
        required: false
        default: false
      go_service_internal_ca_bundle_pem:
        type: str
        required: false
        default: ""
      go_service_internal_tls_cert_pem:
        type: str
        required: false
        default: ""
      go_service_internal_tls_key_pem:
        type: str
        required: false
        default: ""
