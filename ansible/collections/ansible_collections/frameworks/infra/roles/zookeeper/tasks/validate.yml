---
- name: Wait for client port
  ansible.builtin.wait_for:
    host: 127.0.0.1
    port: "{{ zookeeper_client_port }}"
    timeout: 60

- name: Probe with ruok four-letter-word
  ansible.builtin.shell:
    cmd: |
      set -o pipefail
      exec 3<>/dev/tcp/127.0.0.1/{{ zookeeper_client_port }}
      printf 'ruok\n' >&3
      timeout 5 cat <&3
    executable: /bin/bash
  register: zookeeper_ruok
  changed_when: false
  failed_when: "'imok' not in zookeeper_ruok.stdout"
