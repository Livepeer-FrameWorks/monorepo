---
- name: Ensure /etc/frameworks exists (secret key storage)
  ansible.builtin.file:
    path: /etc/frameworks
    state: directory
    owner: root
    group: root
    mode: "0750"

- name: Check for an existing Chatwoot secret key
  ansible.builtin.stat:
    path: "{{ chatwoot_secret_key_path }}"
  register: chatwoot_secret_stat

- name: Generate a fresh SECRET_KEY_BASE if none present
  ansible.builtin.shell: "openssl rand -hex 64 > {{ chatwoot_secret_key_path | quote }}"
  args:
    creates: "{{ chatwoot_secret_key_path }}"
  register: chatwoot_secret_generated

- name: Tighten permissions on the secret file
  ansible.builtin.file:
    path: "{{ chatwoot_secret_key_path }}"
    owner: root
    group: root
    mode: "0600"
  when:
    - not ansible_check_mode
    - chatwoot_secret_stat.stat.exists or chatwoot_secret_generated is changed

- name: Read the persisted secret key
  ansible.builtin.slurp:
    src: "{{ chatwoot_secret_key_path }}"
  register: chatwoot_secret_slurp
  no_log: true
  when: not ansible_check_mode or chatwoot_secret_stat.stat.exists

- name: Register SECRET_KEY_BASE for the compose env
  ansible.builtin.set_fact:
    chatwoot_secret_key_value: "{{ (chatwoot_secret_slurp.content | default('Q0hFQ0tfTU9ERV9TRUNSRVRfS0VZX0JBU0U=') | b64decode | trim) }}"
  no_log: true
