      sla: true
      support_level: dedicated
      processing_customizable: true
    support_level: dedicated
    sla_level: custom
    metering_enabled: true
    entitlements:
      recording_retention_days: 0
      dvr_default_window_seconds: 14400 # 4h
      dvr_max_window_seconds: 86400 # 1d, cluster opt-in extends up to 72h
      dvr_default_segment_duration_seconds: 24
      dvr_max_entries: 10800
      dvr_allow_cluster_extension: true
    pricing_rules: []
    tier_level: 5
    is_enterprise: true
    is_default_prepaid: false
    is_default_postpaid: false
    processes_live: *standard_live
    processes_vod: *standard_vod
