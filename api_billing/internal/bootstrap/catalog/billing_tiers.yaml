# Purser canonical billing-tier catalog.
#
# This file is embedded into the purser binary at build time and reconciled
# into purser.billing_tiers (+ tier_pricing_rules + tier_entitlements) by
# `purser bootstrap` on every run. It is the authoritative source for
# production tier definitions.
#
# Schema notes (matches purser.billing_tiers + new normalized tables):
#
#   entitlements: non-billing grants. Examples:
#     recording_retention_days: <int>  -- Foghorn lifecycle policy
#
#   pricing_rules: rated meter behaviors. One per (meter, tier).
#     model: tiered_graduated -- (qty - included_quantity) * unit_price
#     model: all_usage        -- qty * unit_price
#     model: codec_multiplier -- per-codec processing fee using config.codec_multipliers
#     unit_price stored as string for decimal precision.
#
#   features: opaque feature flags consumed by the application layer.
#
#   processes_live / processes_vod: raw MistServer process JSON arrays, with
#     {{gateway_url}} placeholders that Foghorn substitutes at cache/dispatch
#     time from its local cluster's Livepeer gateway.
#
# Enforcement limits (max_streams, max_viewers, bandwidth caps) live in
# quartermaster.tenant_cluster_assignments — NOT here. This file is BILLING only.
# Stripe IDs (stripe_product_id, stripe_price_id_*) are filled by Purser's
# startup Stripe sync; the reconciler leaves them alone if already populated.

tiers:
  - tier_name: payg
    display_name: Pay As You Go
    description: Prepaid pay-as-you-go pricing with no included usage.
    base_price: 0.00
    currency: EUR
    billing_period: monthly
    features:
      recording: true
      analytics: true
      api_access: true
      support_level: community
    support_level: community
    sla_level: none
    metering_enabled: true
    entitlements: {}
    pricing_rules:
      - meter: delivered_minutes
        model: tiered_graduated
        included_quantity: 0
        unit_price: "0.00055"
      - meter: average_storage_gb
        model: all_usage
        unit_price: "0.035"
      - meter: ai_gpu_hours
        model: tiered_graduated
        included_quantity: 0
        unit_price: "1.50"
    tier_level: 0
    is_enterprise: false
    is_default_prepaid: true
    is_default_postpaid: false
    processes_live: &standard_live |
      [{"process":"AV","codec":"opus","track_inhibit":"audio=opus","track_select":"video=none","x-LSP-name":"Audio to Opus"},{"process":"AV","codec":"AAC","track_inhibit":"audio=aac","track_select":"video=none","x-LSP-name":"Audio to AAC"},{"process":"Livepeer","hardcoded_broadcasters":"[{\"address\":\"{{gateway_url}}\"}]","target_profiles":[{"name":"360p","bitrate":900000,"fps":0,"height":360,"profile":"H264ConstrainedHigh","track_inhibit":"video=<640x360"},{"name":"480p","bitrate":1600000,"fps":0,"height":480,"profile":"H264ConstrainedHigh","track_inhibit":"video=<850x480"},{"name":"720p","bitrate":3200000,"fps":0,"height":720,"profile":"H264ConstrainedHigh","track_inhibit":"video=<1280x720"},{"name":"1080p","bitrate":6500000,"fps":0,"height":1080,"profile":"H264ConstrainedHigh","track_inhibit":"video=<1920x1080"}],"track_inhibit":"video=<640x360","x-LSP-name":"ABR Transcode"},{"process":"Thumbs","x-LSP-name":"Thumbnail Sprites"}]
    processes_vod: &standard_vod |
      [{"process":"AV","codec":"opus","track_inhibit":"audio=opus","track_select":"video=none"},{"process":"AV","codec":"AAC","track_inhibit":"audio=aac","track_select":"video=none"},{"process":"Livepeer","hardcoded_broadcasters":"[{\"address\":\"{{gateway_url}}\"}]","target_profiles":[{"name":"360p","bitrate":900000,"fps":0,"height":360,"profile":"H264ConstrainedHigh","track_inhibit":"video=<640x360"},{"name":"480p","bitrate":1600000,"fps":0,"height":480,"profile":"H264ConstrainedHigh","track_inhibit":"video=<850x480"},{"name":"720p","bitrate":3200000,"fps":0,"height":720,"profile":"H264ConstrainedHigh","track_inhibit":"video=<1280x720"},{"name":"1080p","bitrate":6500000,"fps":0,"height":1080,"profile":"H264ConstrainedHigh","track_inhibit":"video=<1920x1080"}],"track_inhibit":"video=<640x360"},{"process":"Thumbs","track_select":"video=maxbps","track_inhibit":"subtitle=all","inconsequential":true,"exit_unmask":true}]

