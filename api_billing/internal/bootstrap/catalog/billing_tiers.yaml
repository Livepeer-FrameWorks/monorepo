      dvr_default_window_seconds: 7200 # 2h
      dvr_max_window_seconds: 21600 # 6h
      dvr_default_segment_duration_seconds: 6
      dvr_max_entries: 3600
      dvr_allow_cluster_extension: false
    pricing_rules:
      - meter: delivered_minutes
        model: tiered_graduated
        included_quantity: 120000
        unit_price: "0.00055"
      - meter: storage_gb_seconds_cold
        model: all_usage
        unit_price: "0.035"
    tier_level: 2
    is_enterprise: false
    is_default_prepaid: false
    is_default_postpaid: false
    processes_live: *standard_live
    processes_vod: *standard_vod

